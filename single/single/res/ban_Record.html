<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>违规记录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --hover-bg: #f9f9f9;
            --highlight-bg: #eff4ff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 32px rgba(91, 140, 255, 0.16);
        }

        .card-title {
            font-size: 24px;
            color: var(--text-color);
            /*margin-bottom: 20px;*/
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .complaint-list {
            margin-top: 30px;
        }

        .complaint-item {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            cursor: pointer;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }
        @media screen and (max-width: 768px) {
            #venue-control {
            flex-direction: column !important;
            align-items: stretch !important;
            width: 100%;
            }
            
            #venue-control label {
                margin-bottom: 4px;
            }
            
            #venue-control select {
                width: 100%;
            }

    .card-title {
        font-size: 18px;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
    }

    .complaint-item {
        font-size: 13px;
        padding: 10px;
    }

    .card {
        padding: 12px;
    }

    #venue_id {
        max-width: 100%;
    }

    img[alt="违规截图"] {
        max-width: 100%;
        height: auto;
    }
}
.card-title {
  display: flex;
  flex-direction: column;
  gap: 12px;
  font-weight: 600;
  color: var(--text-color);
  font-size: 20px;
  border-bottom: 2px solid var(--primary);
  padding-bottom: 10px;
}

.title-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}

.venue-control {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}

.venue-control select {
  padding: 4px 10px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.record-count {
  font-size: 14px;
  color: var(--secondary);
}

/* 小屏优化：全部垂直排布 */
@media (max-width: 480px) {
  .title-controls {
    flex-direction: column;
    align-items: flex-start;
  }

  .venue-control,
  .record-count {
    width: 100%;
  }

  .venue-control label,
  .venue-control select {
    width: 100%;
  }
}

    </style>
</head>

<body>
<div class="container">
  <div class="card">

    <!-- 标题 + 场地选择 + 记录数 -->
    <div class="card-title">
      <span class="card-heading">违规记录</span>

      <div class="title-controls">
        <!-- ✅ ID 保留给 JS 使用，同时可响应式布局 -->
        <div id="venue-control" class="venue-control">
          <label for="venue_id">选择场地：</label>
          <select id="venue_id">
            <option value="10">加载中...</option>
          </select>
        </div>
        <div id="Date-control" class="date-filter" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="datetime-local" id="startDate" class="date-input" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;">
                <span>至</span>
                <input type="datetime-local" id="endDate" class="date-input" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;">
                <button onclick="filterByDate()" style="padding: 5px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">筛选</button>
        </div>
        <div class="record-count">
          共 <span id="record-count">0</span> 条记录
        </div>
      </div>
    </div>
    
    <!-- 违规记录列表 -->
    <div class="complaint-list" id="record-list"></div>
  </div>
</div>


<script>
    let isMultiVenueMode = false;
    let venueMap = {}; // 用于缓存 id => 名称 映射
    document.addEventListener('DOMContentLoaded', function () {
        const result= getQueryParams();
        
    // const timeRange = formatDateRange(dropdown, start_date, end_date);
    
    console.log("解析后的时间范围：", result);
        // 解析 URL 参数
const query = new URLSearchParams(window.location.search);
// const dateParam = query.get("date");
const startDateParam = query.get("start_date");
const endDateParam = query.get("end_date");
 console.log(startDateParam,"||",endDateParam);
// 处理单个 date 参数（默认时间范围为一天）
if (startDateParam) {
    const start = `${startDateParam}T00:00`;
    const end = `${endDateParam}T23:59`;
    document.getElementById('startDate').value = start;
    document.getElementById('endDate').value = end;
     console.log(start,"||",end);
    setTimeout(() => filterByDate(), 100);  // 延迟确保元素加载
}

// 处理 start_date + end_date 参数
if (startDateParam && endDateParam) {
    const start = `${startDateParam}T00:00`;
    const end = `${endDateParam}T23:59`;
    document.getElementById('startDate').value = start;
    document.getElementById('endDate').value = end;
    setTimeout(() => filterByDate(), 100);
}

       if(!startDateParam){ 
        const now = new Date();
        const yyyy_mm_dd = now.toISOString().slice(0, 10); // 获取当前日期 yyyy-mm-dd
    
        // 设置默认时间为 00:00 和 23:59
        document.getElementById('startDate').value = `${yyyy_mm_dd}T00:00`;
        document.getElementById('endDate').value = `${yyyy_mm_dd}T23:59`;
        
        // 初始化时间变量
        startDate = `${yyyy_mm_dd} 00:00:00`;
        endDate = `${yyyy_mm_dd} 23:59:59`;
       }
        const urlParams = new URLSearchParams(window.location.search);
        const showDropdown = urlParams.get('dropdown') === '1';
        if (!showDropdown) {
            const controlBox = document.getElementById('venue-control');
            const controlBoxx = document.getElementById('Date-control');
            controlBox?.remove();
            controlBoxx?.remove();
        }

        const venueSelect = document.getElementById('venue_id');

        if (venueSelect) {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://open.rcwulian.cn/api/operat/EnergyGift.php', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            // let  venueMap = {};
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    if (response.code === 0) {
                        const data = response.data;
                        venueSelect.innerHTML = '';
                        data.forEach(venue => {
                            const option = document.createElement('option');
                            option.value = venue.id;
                            option.textContent = `${venue.id} - ${venue.venue_name}`;
                             venueMap[venue.id] = venue.venue_name; // 缓存映射
                            venueSelect.appendChild(option);
                        });
                        if(!startDateParam){fetchBanRecordsWithDefault();}
                    }
                }
            };
            xhr.send('action=get_venues');

            venueSelect.addEventListener('change', function () {
                fetchBanRecords(this.value);
            });
        } else {
            fetchBanRecords();
        }
    });
    function filterByDate() {
        const startInput = document.getElementById("startDate");
        const endInput = document.getElementById("endDate");
        console.log(startInput.value);
        const venueSelect = document.getElementById("venue_id");
        const start = startInput.value.replace('T', ' ') + ':00';
        const end = endInput.value.replace('T', ' ') + ':00';
         console.log(start,"|||",end);
    
        if (!start || !end) {
            alert("请填写完整的开始时间和结束时间");
            return;
        }
    
        let url = `https://open.rcwulian.cn/api/operat/ban_record.php?get_default=1&start_date=${encodeURIComponent(start)}&end_date=${encodeURIComponent(end)}`;
    
        if (venueSelect) {
            const venueId = venueSelect.value;
            if (venueId) {
                url += `&venue_id=${venueId}`;
            }
        }
    
        fetchBanData(url);
    }

    function fetchBanRecordsWithDefault() {
        isMultiVenueMode = true; // 开启多场地模式
        const url = "https://open.rcwulian.cn/api/operat/ban_record.php?get_default=1";
        fetchBanData(url);
        }


function fetchBanRecords(venueId) {
    const url = venueId
        ? `https://open.rcwulian.cn/api/operat/ban_record.php?venue_id=${venueId}`
        : `https://open.rcwulian.cn/api/operat/ban_record.php`;
    fetchBanData(url);
}

function fetchBanData(url) {
    fetch(url)
        .then(res => res.json())
        .then(res => {
            if (res.code !== 0) {
                document.getElementById('record-list').innerHTML = '<p style="color:red;">查询失败</p>';
                return;
            }
            const deviceRecords = res.data.device_bans || [];
            const venueRecords = res.data.venue_bans || [];
            const totalRecords = deviceRecords.length + venueRecords.length;
            document.getElementById('record-count').textContent = totalRecords;
            const container = document.getElementById('record-list');
            container.innerHTML = '';

            const allRecords = [...deviceRecords.map(r => ({ ...r, type: 'device' })), ...venueRecords.map(r => ({ ...r, type: 'venue' }))];

            allRecords.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); // 按时间倒序显示

            allRecords.forEach(item => {
                const banReason = item.ban_reason?.trim() || '未知原因';
                const deviceName = item.type === 'device' ? (item.name || '未知设备') : '场地封禁';
                const banContent = item.type === 'device'
                    ? `封禁设备【${deviceName}】驾驶权限 ${formatDuration(item.ban_duration)}`
                    : `封禁场地【${item.venue_name || '未知场地'}】`;

                const imageUrl = item.image_url || null;

                const endTime = new Date(item.ban_end_time.replace(/-/g, '/'));
                const isOver = Date.now() > endTime.getTime();
                const statusText = isOver ? '已结束' : '进行中';
                const statusStyle = `font-size: 12px; padding: 2px 6px; border-radius: 6px; color: white; background: ${isOver ? '#aaa' : '#5b8cff'}; float: right;`;

                const imageHtml = imageUrl
                    ? `<img src="${imageUrl}" alt="违规截图" style="max-width: 120px; border-radius: 6px; cursor: pointer; margin-top: 6px;" onclick="showModal('${imageUrl}')">`
                    : '';

                const venueName = venueMap[item.venue_id] || item.venue_name || '未知';
                const venueIdInfo = isMultiVenueMode ? `<span>设备场地(ID)：${venueName}(${item.venue_id})</span>` : '';

                const html = `
                    <div class="complaint-item">
                        <span class="complaint-title">
                            违规时间：${item.created_at}
                            <span style="${statusStyle}">${statusText}</span>
                        </span>
                        <span>处罚内容：${banContent}</span>
                        <span>处罚结束：${item.ban_end_time}</span>
                        <span>违规原因：${banReason}</span>
                        ${venueIdInfo}
                        ${imageHtml}
                    </div>`;

                container.insertAdjacentHTML('beforeend', html);
            });
        });
}



    function formatDuration(durationStr) {
        const parts = durationStr.split(':');
        const h = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10);
        const hPart = h ? `${h}小时` : '';
        const mPart = m ? `${m}分钟` : '';
        return hPart + mPart || '0分钟';
    }

    function showModal(imageUrl) {
        let modal = document.getElementById('img-modal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'img-modal';
            modal.className = 'modal';
            modal.innerHTML = `<img class="modal-content" id="modal-img">`;
            modal.onclick = () => (modal.style.display = 'none');
            document.body.appendChild(modal);
        }
        const img = modal.querySelector('#modal-img');
        img.src = imageUrl;
        modal.style.display = 'block';
    }
    
    function getQueryParams() {
    const params = new URLSearchParams(window.location.search);
    const result = {
        filterVal: params.get('filterVal'), // "1" 日，"2" 周，"3" 月
        start_date: params.get('start_date'),
        end_date: params.get('end_date')
    };
    console.log("filterVal:" + result.filterVal, "start_date:" + result.start_date, "end_date:", result.end_date);
    return result;
}

function formatDateRange(filterVal, start, end) {
    if (filterVal === "day") {
        // 日粒度，start = end，格式如 2025-05-07
        return `${start}T00:00 || ${end}T23:59`;

    } else if (filterVal === "week") {
        // 周粒度，格式如 2025-04-21 ~ 2025-04-27
        return `${start}T00:00 || ${end}T23:59`;

    } else if (filterVal === "month") {
        // 月粒度，start = YYYY-MM-01，end = YYYY-MM-末日
        const [year, month] = start.split('-');
        const lastDay = new Date(year, month, 0).getDate();
        const newEnd = `${year}-${month}-${lastDay}`;
        return `${start}T00:00 || ${newEnd}T23:59`;
    }

    return "未知时间格式";
}
</script>

</html>
