    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --shadow: 0 4px 24px rgba(91,140,255,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%);
            min-height: 100vh;
            padding: 16px;
        }

        /* 主卡片容器 */
        .dashboard-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        /* 数据指标区 */
        .metrics-container {
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .card-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .metric-item {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 16px;
        }

        .metric-label {
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .metric-value {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
        }

        /* 导航区 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-top: 24px;
        }

        .nav-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .nav-card:hover {
            transform: translateY(-2px);
        }

        .nav-icon {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .nav-text {
            color: #666;
            font-size: 10px;
        }

        /* 日历组件样式 */
        .calendar-widget {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            position: fixed;
            right: 24px;
            top: -100%;
            width: 280px;
            box-shadow: var(--shadow);
            transition: top 0.3s ease;
            z-index: 1000;
            cursor: pointer;
        }

        .calendar-widget.show {
            top: 24px;  /* 显示时的位置 */
        }

        /* 触发按钮样式 */
        .calendar-trigger {
            position: fixed;
            right: 24px;
            top: 24px;
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .calendar-trigger:hover {
            transform: scale(1.1);
        }

        .calendar-trigger i {
            color: #fff;
            font-size: 18px;
        }

        .calendar-date {
            text-align: center;
            margin-bottom: 12px;
        }

        .calendar-solar {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;  /* 防止换行 */
        }

        .calendar-lunar {
            font-size: 14px;
            color: var(--secondary);
            margin-top: 8px;
            white-space: nowrap;  /* 防止换行 */
        }

        .calendar-info {
            font-size: 14px;
            color: var(--secondary);
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;  /* 使用flex布局 */
            flex-wrap: wrap;  /* 允许换行 */
            gap: 8px;  /* 元素之间的间距 */
        }

        .calendar-info div {
            flex: 1;  /* 平均分配空间 */
            min-width: 45%;  /* 最小宽度 */
            text-align: center;  /* 文字居中 */
            padding: 4px;  /* 内边距 */
        }
        
        /* 点击波纹样式 */
        .ripple {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(100, 200, 255, 0.5);
            animation: rippleExpand 1s ease-out;
            pointer-events: none;
            z-index: 9999;
        }
 
        @keyframes rippleExpand {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(6); opacity: 0; }
        }
 
        /* 背景跟随波纹 */
        #waveCanvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;

<script>
        /**********************
         * 点击水波纹效果 
         **********************/
        class RippleEffect {
            constructor() {
                this.pool  = [];
                this.initPool(10);  // 初始化对象池 
                document.addEventListener('click',  this.handleClick.bind(this)); 
            }
 
            // 创建对象池优化性能 
            initPool(count) {
                for(let i=0; i<count; i++){
                    const ripple = document.createElement('div'); 
                    ripple.className  = 'ripple';
                    document.body.appendChild(ripple); 
                    this.pool.push(ripple); 
                }
            }
 
            handleClick(e) {
                const ripple = this.pool.shift() || document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = `${e.clientX - 20}px`;
                ripple.style.top = `${e.clientY - 20}px`;
                ripple.style.display = 'block'; // 显示
            
                // 触发重绘（重新启动动画）
                void ripple.offsetWidth;
            
                document.body.appendChild(ripple);
            
                setTimeout(() => {
                    ripple.style.display = 'none'; // 不再用 remove()
                    this.pool.push(ripple);
                }, 1000);
            }

        }
 
        /**********************
         * 鼠标跟随水波效果 
         **********************/
        class WaveEffect {
            constructor() {
                this.canvas  = document.getElementById('waveCanvas'); 
                this.ctx  = this.canvas.getContext('2d'); 
                this.resize(); 
                window.addEventListener('resize',  this.resize.bind(this)); 
                
                this.mousePos  = {x:0, y:0};
                this.waves  = [];
                
                document.addEventListener('mousemove',  (e) => {
                    this.mousePos  = {x: e.clientX,  y: e.clientY}; 
                });
                
                this.animate(); 
            }
 
            resize() {
                this.canvas.width  = window.innerWidth; 
                this.canvas.height  = window.innerHeight; 
            }
 
            animate() {
                this.ctx.clearRect(0,  0, this.canvas.width,  this.canvas.height); 
                
                // 生成新波纹 
                this.waves.push({ 
                    x: this.mousePos.x, 
                    y: this.mousePos.y, 
                    radius: 0,
                    alpha: 0.5 
                });
 
                // 绘制所有波纹 
                this.waves.forEach((wave,  index) => {
                    wave.radius  += 2;
                    wave.alpha  -= 0.02;
                    
                    this.ctx.beginPath(); 
                    this.ctx.arc(wave.x,  wave.y, wave.radius,  0, Math.PI*2);
                    this.ctx.strokeStyle  = `rgba(100,200,255,${wave.alpha})`; 
                    this.ctx.lineWidth  = 2;
                    this.ctx.stroke(); 
                    
                    if(wave.alpha  <= 0) this.waves.splice(index,  1);
                });
 
                requestAnimationFrame(this.animate.bind(this)); 
            }
        }
 
        /**********************
         * 初始化效果 
         **********************/
        // new RippleEffect(); // 初始化点击效果 
        new WaveEffect();   // 初始化跟随效果 
    </script>

                        document.getElementById('solar-month').textContent = data.yyue;
                        document.getElementById('solar-day').textContent = data.yri;
                        
                        // 更新农历
                        document.getElementById('lunar-month').textContent = data.nyue;
                        document.getElementById('lunar-day').textContent = data.nri;
                        
                        // 更新干支
                        document.getElementById('ganzhi-year').textContent = data.ganzhinian;
                        document.getElementById('ganzhi-month').textContent = data.ganzhiyue;
                        document.getElementById('ganzhi-day').textContent = data.ganzhiri;
                        
                        // 更新星期
                        document.getElementById('weekday').textContent = data.xingqi;
                    }
                })
                .catch(error => {
                    console.error('日历数据加载失败:', error);
                });
        }

        // 页面加载时更新日历
        updateCalendar();
        
        // 每隔1小时更新一次日历数据
        setInterval(updateCalendar, 3600000);
    </script>

    <script>
        // 日历显示/隐藏功能
        const calendarWidget = document.getElementById('calendarWidget');
        const calendarTrigger = document.getElementById('calendarTrigger');
        let isCalendarVisible = false;

        function toggleCalendar() {
            if (isCalendarVisible) {
                calendarWidget.classList.remove('show');
            } else {
                calendarWidget.classList.add('show');
                updateCalendar(); // 显示时更新日历数据
            }
            isCalendarVisible = !isCalendarVisible;
        }

        // 点击触发按钮显示/隐藏日历
        calendarTrigger.addEventListener('click', toggleCalendar);

        // 点击日历本身时隐藏
        calendarWidget.addEventListener('click', function(e) {
            if (e.target === this || this.contains(e.target)) {
                toggleCalendar();
            }
        });

        // 点击页面其他地方时隐藏日历
        document.addEventListener('click', function(e) {
            if (!calendarWidget.contains(e.target) && !calendarTrigger.contains(e.target) && isCalendarVisible) {
                toggleCalendar();
            }
        });
    </script>
<script src="canvas-nest-colorful.js"></script>
</body>
