<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户消费记录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --bg-gradient-start: #f8f9ff;
      --bg-gradient-end: #f0f3ff;
      --card-bg: #fff;
      --text-color: #333;
      --border-color: #e5e7eb;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "PingFang SC", system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100vh;
      padding: 24px;
    }

    .dashboard-card {
      background-color: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      max-width: 960px;
      margin: 0 auto;
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 24px;
    }

    .form-container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 20px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
    }

    .form-item {
      display: flex;
      flex-direction: column;
    }

    .form-label {
      font-size: 14px;
      color: var(--secondary);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      min-width: 180px;
    }

    .form-button {
      padding: 10px 20px;
      background-color: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .form-button:hover {
      background-color: #3f6edc;
    }

    .record-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      margin-top: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
    }

    .record-item {
      margin-bottom: 10px;
      line-height: 1.6;
      font-size: 15px;
    }

    .record-item strong {
      color: var(--secondary);
      margin-right: 6px;
    }

    .green {
      color: #22c55e;
    }

    .red {
      color: #ef4444;
    }

    #summary {
      text-align: right;
      margin-top: 16px;
      color: var(--text-color);
    }
    #summary {
  margin-top: 16px;
  color: var(--text-color);
  font-size: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  text-align: center;
}

#summary span {
  font-weight: 600;
  display: inline-block;
  min-width: 140px;
}

  </style>
</head>

<body>
  <div class="dashboard-card">
    <div class="card-title">用户消费查询变动记录</div>

    <div class="form-container">
      <div class="form-item">
        <label class="form-label" for="user_id">用户 ID</label>
        <input class="form-input" id="user_id" type="text" placeholder="请输入用户ID" />
      </div>
      <div class="form-item">
        <label class="form-label" for="change_type">变动类型</label>
        <select class="form-select" id="change_type">
          <option value="">全部类型</option>
          <option value="充值">充值</option>
          <option value="消费">消费</option>
          <option value="提现">提现</option>
          <option value="金额返还">金额返还</option>
        </select>
      </div>
      <button class="form-button" id="search_btn">查询</button>
    </div>

    <div id="summary"></div>
    <div id="record-container"></div>
  </div>

  <script>
    document.getElementById('search_btn').addEventListener('click', () => {
      const userId = document.getElementById('user_id').value;
      const changeType = document.getElementById('change_type').value;
      let apiUrl = `https://open.rcwulian.cn/api/finance/Comsumquery.php?user_id=${userId}`;
      if (changeType) apiUrl += `&change_type=${changeType}`;

      fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
          const records = data.data || [];
          const container = document.getElementById('record-container');
          const summary = document.getElementById('summary');
          container.innerHTML = '';
          summary.innerHTML = '';

          records.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

          let totalRecharge = 0;
          let totalConsumption = 0;

          records.forEach(record => {
            const card = document.createElement('div');
            card.className = 'record-card';

            let amount = parseFloat(record.change_amount).toFixed(2);
            let amountClass = '';
            let symbol = '';

            if (record.change_type === '消费') {
              symbol = '-';
              amountClass = 'red';
              totalConsumption += parseFloat(amount);
            } else if (record.change_type === '充值') {
              symbol = '+';
              amountClass = 'green';
              totalRecharge += parseFloat(amount);
            }

            card.innerHTML = `
              <div class="record-item"><strong>用户 ID:</strong> ${record.user_id}</div>
              <div class="record-item"><strong>变动金额:</strong> <span class="${amountClass}">${symbol}${amount}</span></div>
              <div class="record-item"><strong>变动前余额:</strong> ${record.balance_before}</div>
              <div class="record-item"><strong>变动后余额:</strong> ${record.balance_after}</div>
              <div class="record-item"><strong>变动类型:</strong> ${record.change_type}</div>
              <div class="record-item"><strong>描述:</strong> ${record.description || '无'}</div>
              <div class="record-item"><strong>支付渠道:</strong> ${record.payment_channel}</div>
              <div class="record-item"><strong>创建时间:</strong> ${record.created_at}</div>
            `;
            container.appendChild(card);
          });

          if (changeType === '') {
            summary.innerHTML = `
              总充值金额：<span class="green">+${totalRecharge.toFixed(2)}</span>
              总消费金额：<span class="red">-${totalConsumption.toFixed(2)}</span>
            `;
          } else if (changeType === '充值') {
            summary.innerHTML = `总充值金额：<span class="green">+${totalRecharge.toFixed(2)}</span>`;
          } else if (changeType === '消费') {
            summary.innerHTML = `总消费金额：<span class="red">-${totalConsumption.toFixed(2)}</span>`;
          }
        })
        .catch(err => {
          console.error('查询出错:', err);
        });
    });
  </script>
</body>
</html>
