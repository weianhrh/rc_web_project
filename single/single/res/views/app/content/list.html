

  <title>今日交易</title>
  
  <div class="layui-card layadmin-header">
    <div class="layui-breadcrumb" lay-filter="breadcrumb">
      <a lay-href="">主页</a>
      <a><cite>交易记录</cite></a>
      <a><cite>今日交易</cite></a>
    </div>
  </div>

  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-form layui-card-header layuiadmin-card-header-auto" lay-filter="app-content-list">
        <div class="layui-form-item">
         <div class="layui-inline">
              <label class="layui-form-label">订单编号</label>
              <div class="layui-input-inline">
                <input type="text" name="order_number" placeholder="请输入" autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">支付用户</label>
              <div class="layui-input-inline">
                <input type="text" name="uid" placeholder="请输入" autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">支付状态</label>
              <div class="layui-input-inline">
                <select name="status">
                  <option value="">请选择状态</option>
                  <option value="支付成功">支付成功</option>
                  <option value="待支付">待支付</option>
                </select>
              </div>
            </div>

          <div class="layui-inline">
            <button class="layui-btn layuiadmin-btn-list" lay-submit lay-filter="LAY-app-contlist-search">
              <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="layui-card-body">
      
        <table id="LAY-app-content-list" lay-filter="LAY-app-content-list"></table> 
        <script type="text/html" id="buttonTpl">
          {{#  if(d.status){ }}
            <button class="layui-btn layui-btn-xs">已发布</button>
          {{#  } else { }}
            <button class="layui-btn layui-btn-primary layui-btn-xs">待修改</button>
          {{#  } }}
        </script>
     
      </div>
    </div>
  </div>

  <script>
  layui.use('contlist', layui.factory('contlist')).use(['admin', 'contlist', 'table', 'form'], function(){
  var $ = layui.$
    ,admin = layui.admin
    ,view = layui.view
    ,table = layui.table
    ,form = layui.form;
  
  form.render(null, 'app-content-list');
  
  // 搜索事件
  form.on('submit(LAY-app-contlist-search)', function(data){
    var field = data.field;
    
    // 执行重载，传递用户输入的字段
    table.reload('LAY-app-content-list', {
      where: {
        order_number: field.order_number || '', // 订单编号
        uid: field.uid || '',                   // 支付用户
        status: field.status || ''              // 支付状态
      },
      page: { curr: 1 }  // 重置页码到第一页
    });
  });
  
  var active = {
    batchdel: function(){
      var checkStatus = table.checkStatus('LAY-app-content-list')
      ,checkData = checkStatus.data; //得到选中的数据

      if(checkData.length === 0){
        return layer.msg('请选择数据');
      }
    
      layer.confirm('确定删除吗？', function(index) {
        
        // 执行 Ajax 后重载
        table.reload('LAY-app-content-list');
        layer.msg('已删除');
      });
    }
  };

  $('.layui-btn.layuiadmin-btn-list').on('click', function(){
    var type = $(this).data('type');
    active[type] ? active[type].call(this) : '';
  });
});

  </script>
