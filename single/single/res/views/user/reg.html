<script type="text/html" template>
  <link rel="stylesheet" href="{{ layui.setter.paths.core }}css/login.css?v={{ layui.admin.v }}" media="all">
</script>

<div class="layadmin-user-login layadmin-user-display-show" id="LAY-user-login" style="display: none;">
  <div class="layadmin-user-login-main">
    <div class="layadmin-user-login-box layadmin-user-login-header">
      <h2>注册</h2>
    </div>
    <div class="layadmin-user-login-box layadmin-user-login-body layui-form">
      <div class="layui-form-item">
        <label class="layadmin-user-login-icon layui-icon layui-icon-cellphone" for="LAY-user-login-username"></label>
        <input type="text" name="username" id="LAY-user-login-username" lay-verify="required" placeholder="用户名" class="layui-input">
      </div>
      <div class="layui-form-item">
        <label class="layadmin-user-login-icon layui-icon layui-icon-password" for="LAY-user-login-password"></label>
        <input type="password" name="password" id="LAY-user-login-password" lay-verify="required|pass" placeholder="密码" class="layui-input">
      </div>
      <div class="layui-form-item">
        <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="LAY-user-reg-submit">注 册</button>
      </div>
    </div>
  </div>
  
  <div class="layui-trans layadmin-user-login-footer">
    <p>© All Rights Reserved</p>
  </div>
</div>

<script>
layui.use(['admin', 'form'], function(){
  var admin = layui.admin; // 获取admin模块
  var form = layui.form;

  form.render();

  // 提交注册表单
  form.on('submit(LAY-user-reg-submit)', function(data){
    var field = data.field; // 获取提交的字段

    // 请求接口
    admin.req({
      url: '/api/login/register.php', // 实际使用请改成服务端真实接口
      method: 'post',
      data: field,
      done: function(res){
        if(res.success) {
          layer.msg('注册成功', {
            offset: '15px',
            icon: 1,
            time: 1000
          }, function(){
            location.hash = '/user/login'; // 成功后跳转到登录页
          });
        } else {
          layer.msg(res.message, {icon: 2}); // 显示错误信息
        }
      }
    });
    return false; // 阻止表单跳转
  });
});
</script>
