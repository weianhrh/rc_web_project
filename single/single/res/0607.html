// 三态：all, onlyPredicted, onlyNonPredicted
const SENSITIVE_VENUES = ['泡芙', '贝壳', '神密森林', '娇娃', '小辣椒', '小屋'];
const SHOW_MODE_KEY = 'showPredictedMode';
let showPredictedMode = localStorage.getItem(SHOW_MODE_KEY) || 'all';
// ===== 获取今日统计 =====
async function fetchTodayCounters() {
    try {
        const res = await fetch('/api/pop/get_today_counters.php');
        const data = await res.json();
        const counterEl = document.getElementById('todayCounters');

        // 设置背景色和样式
        counterEl.style.backgroundColor = 'rgb(0, 234, 255)';
        counterEl.style.color = '#000';
        counterEl.style.padding = '8px 12px';
        counterEl.style.borderRadius = '6px';
        counterEl.style.display = 'inline-block';
        counterEl.style.fontWeight = 'bold';

        if (data.code === 200 && data.data) {
            const { safe_cnt, low_cnt, medium_cnt, high_cnt } = data.data;
            counterEl.innerHTML =
                `今日识别统计：安全 ${safe_cnt} 条 ｜ 低风险 ${low_cnt} 条 ｜ 中风险 ${medium_cnt} 条 ｜ 高风险 ${high_cnt} 条`;
        } else {
            counterEl.textContent = '今日暂无识别数据';
        }
    } catch (e) {
        console.error('获取今日统计失败', e);
        document.getElementById('todayCounters').textContent = '统计加载失败';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    updatePredictedBtn();
    fetchTodayCounters();
});

// 三态切换
function togglePredictedMode() {
    if (showPredictedMode === 'all') showPredictedMode = 'onlyPredicted';
    else if (showPredictedMode === 'onlyPredicted') showPredictedMode = 'onlyNonPredicted';
    else showPredictedMode = 'all';
    localStorage.setItem(SHOW_MODE_KEY, showPredictedMode);
    updatePredictedBtn();
    filterPredictedCards();
}

// 更新按钮文字
function updatePredictedBtn() {
    let text = '全部显示';
    if (showPredictedMode === 'onlyPredicted') text = '仅显示自研';
    else if (showPredictedMode === 'onlyNonPredicted') text = '仅显示非自研';
    document.getElementById('togglePredictedBtn').innerText = text;
    filterPredictedCards();
}

    document.querySelectorAll('.violation-card').forEach(card => {
        const isPredicted = card.querySelector('.card-remark');
        if (showPredictedMode === 'all') {
            card.style.display = '';
        } else if (showPredictedMode === 'onlyPredicted') {
            card.style.display = isPredicted ? '' : 'none';
        } else if (showPredictedMode === 'onlyNonPredicted') {
            card.style.display = !isPredicted ? '' : 'none';
        }
    });
}

function offbanDevice(serialNumber) {
    if (!confirm(`确定要忽略设备 ${serialNumber} 的本次违规记录吗？`)) return;

    // 找到点击按钮所在卡片，检查是否包含 .card-remark
    const button = document.querySelector(`button[onclick="offbanDevice('${serialNumber}')"]`);
    const cardContent = button?.closest('.card-content');
    const imageUrl = cardContent?.parentElement.querySelector('img')?.src;
    const hasRemark = cardContent?.querySelector('.card-remark') !== null;

    // 如果存在备注，认为是“自研模型”推理的，自动加 _predicted 后缀
    const finalSerial = hasRemark ? (serialNumber + '_predicted') : serialNumber;
    
    let manualRiskLevel = '';
    const selectElem = cardContent?.querySelector('.manual-risk-label');
    if (selectElem) {
        manualRiskLevel = selectElem.value || '';
    }
    // if (!manualRiskLevel) {
    //     alert("请先选择实际风险等级再进行封禁！");
    //     return;
    // }
    const formData = new URLSearchParams();
    formData.append('serial_number', finalSerial);
    formData.append('manual_risk', manualRiskLevel);
    formData.append('image_url', imageUrl);
    fetch('/api/pop/clear_device_violation.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || (data.success ? '忽略成功' : '忽略失败'));
        if (data.success) {
            fetchViolations(); // 刷新页面
        }
    })
    .catch(err => {
        alert('忽略请求失败：' + err);
        console.error(err);
    });
}

        function confirmBan() {
    const duration = document.getElementById('banDuration').value;
    const reason = document.getElementById('banReason').value;
    const imageSerial = selectedKey;

    // 获取按钮和卡片元素
    const button = document.querySelector(`button[onclick="banDevice('${imageSerial}')"]`);
    const cardContent = button?.closest('.card-content');
    const imageUrl = cardContent?.parentElement.querySelector('img')?.src;

    const hasRemark = cardContent?.querySelector('.card-remark') !== null;

    // 如果存在备注，认为是“自研模型”推理的，自动去掉 _predicted 后缀
    const finalSerial = hasRemark ? imageSerial.replace('_predicted', '') : imageSerial;
    let manualRiskLevel = '';
    const selectElem = cardContent?.querySelector('.manual-risk-label');
    if (selectElem) {
        manualRiskLevel = selectElem.value || '';
    }
    // if (!manualRiskLevel) {
    //     alert("请先选择实际风险等级再进行封禁！");
    //     return;
    // }
    const formData = new URLSearchParams();
    formData.append('image_device_serial', finalSerial);
    formData.append('image_url', imageUrl);
    formData.append('ban_duration', duration);
    formData.append('ban_reason', reason);
    formData.append('manual_risk', manualRiskLevel);
    fetch('/api/pop/handle_device_ban.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || (data.success ? '封禁成功' : '封禁失败'));
        if (data.success) {
            closeBanModal();
            // 立即移除该卡片
            const card = button.closest('.violation-card');
            card?.remove();
            fetchViolations(); // 刷新列表
        }
    })
    .catch(err => {
        alert('请求异常：' + err);
        console.error(err);
    });
}

<script>
let reportAlertShown = false;
let lastReportCount = 0;
let lastAlertTimestamp = 0;
const REPORT_POPUP_INTERVAL = 10 * 60 * 1000; // 10分钟

function checkReportCount() {
    const now = Date.now();

    // 防止过于频繁弹窗（10分钟内只提示一次）
    if (reportAlertShown && now - lastAlertTimestamp < REPORT_POPUP_INTERVAL) return;

    fetch('https://open.rcwulian.cn/api/index/adminbackstage.php')
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                const reportCount = data.data.reportCount || 0;

                // 只有在数量增加，并且我们还没提示过，才去校验详情
                if (reportCount > lastReportCount && !reportAlertShown) {

                    // 二次确认，是否还有“未处理或处理中”的投诉
                    fetch('https://open.rcwulian.cn/api/operat/ReporthandV2.php')
                        .then(r => r.json())
                        .then(reportData => {
                            if (reportData.code === 0 && reportData.data.length > 0) {
                                document.getElementById('customAlertMessage').textContent =
                                    `当前有 ${reportCount} 条举报待处理，是否立即前往？`;
                                document.getElementById('customAlert').style.display = 'block';
                                reportAlertShown = true;
                                lastAlertTimestamp = now;
                            }

                            lastReportCount = reportCount; // 不论结果，更新记录值
                        });
                }
            }
        })
        .catch(err => {
            console.error('举报数量检查失败:', err);
        });
}



function goToReportReview() {
    window.location.href = "https://open.rcwulian.cn/res/reporthand.html";
}


checkReportCount();
