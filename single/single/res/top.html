<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>场地业绩排行榜</title>
  <link rel="stylesheet" href="/res/fa/css/all.min.css"> 
  <style>
    /* 定义 CSS 变量 */
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
    }

    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", system-ui;
    }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    /* 卡片整体样式 */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(91, 140, 255, 0.16);
    }

    .card-title {
      font-size: 24px;
      color: var(--text-color);
      margin-bottom: 20px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 排行榜卡片样式 */
    .venue-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      transition: var(--transition);
    }

    .venue-card:hover {
      background: #f9f9f9;
    }

    /* 排名数字 */
    .rank {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
      margin-right: 15px;
    }

    /* 场地信息 */
    .venue-info {
      display: flex;
      flex-direction: column;
    }

    .venue-info span {
      font-size: 14px;
      color: var(--text-color);
      margin-bottom: 4px;
    }

    .venue-info span strong {
      color: var(--primary);
    }

    /* 按钮样式 */
    .date-button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
    }

    .date-button:hover {
      background-color: #4a73e6;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .card {
        padding: 16px;
      }
      .venue-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .rank {
        margin-bottom: 10px;
      }
      .venue-info span {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div  class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
     <span>
          当日场地业绩排行榜
          <span id="total-income" style="margin-left: 20px; font-size: 16px;">总收入: 0.00 元</span>
        </span>
        <div>
          
          <button class="date-button" id="yesterday-button">昨天</button>
          <button class="date-button" id="today-button">今天</button>
        </div>
      </div>
      <div id="ranking-list">
        <!-- 排行榜列表 -->
      </div>
    </div>
  </div>
<script src="canvas-nest-colorful.js"></script>
  <script>
    // 获取数据并展示排行榜
    function loadRankingData(date) {
      let url = 'https://open.rcwulian.cn/api/operat/topv2.php'; 
      if (date === 'yesterday') {
        // 这里需要后端支持根据日期查询，目前代码未实现，仅做示意
        url += '?date=yesterday'; 
      }
      fetch(url)
        .then(response => response.json()) 
        .then(data => {
          if (data.code === 0 && data.data && data.data.length > 0) {
            // 更新总收入显示
            document.getElementById('total-income').innerText = `总收入: ${data.totalIncome} 元`;
            // 将数据按总收入降序排序，注意 totalPayment 为字符串
            const sortedData = data.data.sort((a,  b) => parseFloat(b.totalPayment)  - parseFloat(a.totalPayment)); 
            displayRanking(sortedData);
          } else {
            alert('未找到业绩数据');
          }
        })
        .catch(error => {
          console.error(' 数据加载失败:', error);
        });
    }

    // 显示排行榜
    function displayRanking(venues) {
      const rankingList = document.getElementById('ranking-list'); 
      rankingList.innerHTML  = '';

      venues.forEach((venue,  index) => {
        const card = document.createElement('div'); 
        card.classList.add('venue-card'); 
        card.style.cursor = 'pointer';
        card.onclick = () => goToDetail(venue.venue_id);

        card.innerHTML  = `
          <div class="rank">${index + 1}</div>
          <div class="venue-info">
            <span><strong>${venue.venue_name}</strong></span> 
            <span>订单数: ${venue.orderCount}</span> 
            <span>预约人数: ${venue.reservationCount}</span> 
            <span>排队人数: ${venue.queue_length}</span> 
            <span>总收入: ${venue.totalPayment}  元</span>
          </div>
        `;
        rankingList.appendChild(card); 
      });
    }

    // 页面加载时默认显示今天的数据
    loadRankingData('today');

    // 为按钮添加点击事件
    const yesterdayButton = document.getElementById('yesterday-button'); 
    const todayButton = document.getElementById('today-button'); 

    yesterdayButton.addEventListener('click',  () => {
      loadRankingData('yesterday');
    });

    todayButton.addEventListener('click',  () => {
      loadRankingData('today');
    });
    function goToDetail(venueId) {
      window.location.href = `https://open.rcwulian.cn/api/venue/venue_detail.php?venue_id=${venueId}`;
    }

  </script>
</body>
</html>
