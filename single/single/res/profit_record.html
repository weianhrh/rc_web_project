<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>收益记录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --transition: all 0.3s ease;
            --hover-bg: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .card-title {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-row {
          display: flex;
          flex-wrap: wrap;         /* ✅ 允许换行 */
          gap: 10px;
          margin-bottom: 20px;
          align-items: center;
        }
        
        .form-row > * {
          flex: 1 1 100%;          /* ✅ 每个元素占一整行（移动端） */
        }

        input[type="datetime-local"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }

        .filter-button {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-button:hover {
            background-color: #4a79e5;
        }

        .income-total {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .loading {
            text-align: center;
            font-size: 16px;
            color: var(--primary);
            padding: 20px;
        }
        .profit-card {
            background: #fff;
            border: 1px solid var(--border-color); /* ✅ 添加边框 */
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-color);
            text-align: left; /* ✅ 左对齐 */
        }
        
        .profit-card span {
            font-weight: bold;
            color: var(--primary);
        }
        
        #venue_id {
  display: block;
  width: 100% !important;      /* ✅ 占满整行 */
  box-sizing: border-box;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  font-size: 14px;
  margin-top: 10px;
}

        @media (min-width: 768px) {
          .form-row > * {
            flex: initial;         /* ✅ 大屏恢复原样横向排列 */
          }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-title">
          收益记录
          <span class="income-total" id="income-total">累计收入：加载中...</span>
        </div>
        <div class="form-row" id="form-row">
          <select id="venue_id" style="display: none;"></select>
        <input type="datetime-local" id="start-time">
        <input type="datetime-local" id="end-time">

          <button class="filter-button" onclick="fetchIncome()">筛选</button>
        </div>
        
        <div id="result-area" class="loading">正在加载收益数据...</div>
    </div>
</div>

<script>
let roleId = 0;
let currentVenueId = null;

window.onload = () => {
    const urlParams = new URLSearchParams(location.search);
    const passedVenueId = urlParams.get('venue_id');

  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');

  const startStr = `${y}-${m}-${d}T00:00`;
  const endStr = `${y}-${m}-${d}T23:59`;

  document.getElementById('start-time').value = startStr;
  document.getElementById('end-time').value = endStr;
  fetch('/api/operat/get_current_user.php')
    .then(res => res.json())
    .then(res => {
      const user = res.data;
      roleId = user.role_id;
    //   currentVenueId = user.venue_id;
     currentVenueId = passedVenueId || user.venue_id;  // ✅ 优先使用传入参数

      const venueSelect = document.getElementById('venue_id');

      if (roleId === 1) {
        // 平台管理员，显示下拉框
        venueSelect.style.display = 'inline-block';

        fetch('/api/operat/EnergyGift.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'action=get_venues'
        })
          .then(r => r.json())
          .then(data => {
            if (data.code === 0) {
              data.data.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = `${v.id} - ${v.venue_name}`;
                venueSelect.appendChild(opt);
              });
              venueSelect.value = currentVenueId;
              fetchIncome(); // 默认加载
            }
          });

        venueSelect.addEventListener('change', fetchIncome);
      } else {
        fetchIncome();
      }
    });
};

function fetchIncome() {
  const start = document.getElementById('start-time').value.replace('T', ' ') + ':00';
  const end = document.getElementById('end-time').value.replace('T', ' ') + ':59';
  const resultEl = document.getElementById('result-area');
  const venueId = (roleId === 1) ? document.getElementById('venue_id').value : currentVenueId;

  resultEl.innerHTML = `<div class="loading">正在查询...</div>`;

  fetch(`/api/operat/energy_income_summary.php?venue_id=${venueId}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`)
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        resultEl.innerHTML = `<div class="loading">${data.error}</div>`;
        document.getElementById('income-total').innerText = `累计收入：0.00 元`;
        return;
      }

      const income = parseFloat(data.total_income || 0).toFixed(2);
      document.getElementById('income-total').innerText =
        roleId === 1 ? `平台总收益：${income} 元` : `累计收入：${income} 元`;

    //   const days = data.daily || [];
      const days = (data.daily || []).slice().reverse();
      if (days.length === 0) {
        resultEl.innerHTML = `<div class="loading">该时间段无收益记录</div>`;
        return;
      }

      let html = '';
      days.forEach(item => {
        html += `
          <div class="profit-card">
            日期：<span>${item.date}</span><br>
            场地编号：<span>${data.venue_id}</span><br>
            ${roleId === 1 ? `平台收益：<span>${parseFloat(item.platform_income || 0).toFixed(2)} 元</span><br>` : ''}
            加盟商收益：<span>${parseFloat(item.daily_income).toFixed(2)} 元</span>
          </div>`;
      });

      resultEl.innerHTML = html;
    })
    .catch(err => {
      resultEl.innerHTML = `<div class="loading">加载失败，请稍后再试</div>`;
      console.error('收益加载失败', err);
    });
}
</script>


</body>
</html>
