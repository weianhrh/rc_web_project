<!DOCTYPE html> 
<html lang="zh-CN"> 
 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>设备管理</title> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">  
    <style> 
        :root { 
            --primary: #5b8cff; 
            --secondary: #7f8fa4; 
            --background-gradient-start: #f8f9ff; 
            --background-gradient-end: #f0f3ff; 
            --card-bg: #ffffff; 
            --border-color: #ddd; 
            --text-color: #333; 
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08); 
            --transition: all 0.3s ease; 
            --hover-bg: #f9f9f9; 
        } 
 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "PingFang SC", system-ui; 
        } 
 
        body { 
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%); 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
        } 
 
        .container { 
            max-width: 1200px; 
            width: 100%; 
        } 
 
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
            transition: var(--transition); 
        } 
 
        .card-title-container { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            margin-bottom: 20px; 
        } 
 
        .card-title { 
            font-size: 24px; 
            color: var(--text-color); 
            font-weight: 600; 
            padding-bottom: 10px; 
            text-align: left; 
        } 
 
        #venue_id { 
            margin-right: 10px; 
            padding: 8px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            outline: none; 
        } 
            
        /* 新增搜索框样式 */ 
        #search-transmitter { 
            margin-right: 10px; 
            padding: 8px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            outline: none; 
        } 
        #search-box{
            margin-right: 10px; 
            padding: 8px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            outline: none;}
        /* 设备卡片样式 */ 
        .device-card { 
            background: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: flex-start; 
            gap: 15px; 
        } 
 
        .device-img { 
            width: 100px; 
            height: 100px; 
            object-fit: cover; 
            border-radius: 8px; 
            flex-shrink: 0; 
        } 
 
        .device-info { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            font-size: 14px; 
            color: var(--text-color); 
        } 
 
        .device-info .device-name { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--primary); 
        } 
 
        /*.device-info span { */
        /*    display: block; */
        /*} */
 
        /* 按钮组样式 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
            width: 120px; /* 固定按钮组宽度 */
        }

        /* 统一所有按钮样式 */
        .modify-btn,
        .violation-notice-btn,
        .modify-site-btn,
        .modify-uid-btn,
        .modify-config-btn,
        .modify-info-btn {
            width: 100%; /* 让所有按钮填满按钮组宽度 */
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            white-space: nowrap;
            text-align: center;
        }

        /* 各按钮的颜色样式 */
        .modify-btn {
            background-color: var(--primary);
            color: #fff;
        }

        .violation-notice-btn {
            background-color: #ff5b5b;
            color: #fff;
        }

        .modify-site-btn,
        .modify-uid-btn {
            background-color: #28a745;
            color: #fff;
        }

        .modify-config-btn,
        .modify-info-btn {
            background-color: #ffc107;
            color: #000;
        }

        /* 悬停效果 */
        .modify-btn:hover {
            background-color: #4a77e4;
        }

        .violation-notice-btn:hover {
            background-color: #e44a4a;
        }

        .modify-site-btn:hover,
        .modify-uid-btn:hover {
            background-color: #218838;
        }

        .modify-config-btn:hover,
        .modify-info-btn:hover {
            background-color: #e0a800;
        }

        /* 加载提示 */ 
        .loading { 
            text-align: center; 
            font-size: 16px; 
            color: var(--primary); 
            padding: 20px; 
        } 
 
        @media (max-width: 768px) { 
            .device-card { 
                flex-direction: column; 
                align-items: center; 
            } 
 
            .button-group { 
                width: 100%; 
            } 
 
            .button-group button { 
                width: 100%; 
            } 
        } 

        /* 添加或修改模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal-content {
            position: relative;
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }

        .modal-close {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input[readonly] {
            background-color: #f5f5f5;
        }

        .modify-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .add-device-btn {
            background-color: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .add-device-btn:hover {
            background-color: #4a77e4;
        }
        .search-input {
            margin-right: 10px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
        }
        
@media (max-width: 480px) {
    .device-card {
        flex-direction: column;
        align-items: center;
        padding: 10px;
    }

    .button-group {
        width: 100%;
        flex-direction: row; /* 小屏幕下按钮横排更紧凑 */
        flex-wrap: wrap;
        justify-content: center;
    }

    .button-group button {
        flex: 1 1 45%;
        margin: 4px;
        font-size: 12px;
        padding: 6px 8px;
    }

    .device-info {
        font-size: 12px;
        text-align: center;
    }

    .device-img {
        width: 80px;
        height: 80px;
    }
}

@media (max-width: 888px) {

    display: block;

    box-sizing: border-box;
  }

  .add-device-btn {
    text-align: center;
  }
   .filter-checkbox {
    justify-content: center;
    width: 100%;
    margin-top: 10px;
  }
}

    <script> 
        let currentPage = 1; 
        const limit = 10; 
        const accessToken = 'df39da38cf68a599912b75361e85d19b0269e1a0f355dc72ddf6495a204f41c4'; 
        // 定义一个全局变量来保存当前选中的场地 ID 
        let selectedVenueId = ''; 
        let allDevices = []; // 用于存储所有设备数据 
 
        // 监听场地选择事件 
        document.getElementById('venue_id').addEventListener('change',  function () { 
            const venueId = this.value;  
            selectedVenueId = venueId; // 保存选中的场地 ID 
            currentPage = 1; 
            document.getElementById('device-list').innerHTML  = ''; 
            loadDeviceData(currentPage, venueId); 
        }); 
        // 监听勾选框状态改变事件 
        document.getElementById('filter-online').addEventListener('change',  function () { 
            const isChecked = this.checked;  
            if (isChecked) { 
                const onlineDevices = allDevices.filter(device  => device.status  === '在线' || device.status === '占有'); 
                displayDevices(onlineDevices); 
            } else { 
                displayDevices(allDevices); 
            } 
        }); 
        // 监听搜索框输入事件 
    //     document.getElementById('search-transmitter').addEventListener('input',  function () { 
    //         SearchimgNum(); 
    //     }); 
    //     document.getElementById('search-serial').addEventListener('input', function () {
    //         SearchBySerialNumber();
    //     });
    //     document.getElementById('search-serial').addEventListener('input', function () {
    // document.getElementById('search-transmitter').value = '';
    //     SearchBySerialNumber();
    // });
    
    // document.getElementById('search-transmitter').addEventListener('input', function () {
    //     document.getElementById('search-serial').value = '';

    // });

    document.getElementById('global-search').addEventListener('input', function () {
        const keyword = this.value.trim();
        if (keyword === '') {
            loadDeviceData(currentPage, selectedVenueId); // 恢复当前场地数据
        } else {
            globalSearch(keyword);
        }
    });

    function globalSearch(keyword) {
        const url = `https://open.rcwulian.cn/api/devMgr/devMgtV2.php?get_vehicles=1&global_search=${encodeURIComponent(keyword)}`;
        document.getElementById('loading').style.display = 'block';

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.code === 0 && data.data.vehicles.length > 0) {
                    allDevices = data.data.vehicles;
                    displayDevices(allDevices);

                    // console.log("8C4F00AC4258",allDevices);
                } else {
                    document.getElementById('device-list').innerHTML = '<div class="loading">未找到匹配设备</div>';
                }
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('全局搜索失败:', error);
                document.getElementById('loading').textContent = '搜索失败';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 2000);
            });
    }
    
    // 监听设备名称搜索框输入事件
    // document.getElementById('search-device-name').addEventListener('input', function () {
    //     searchByDeviceName();
    // });
        // 获取场地列表 
        function loadVenues() {
    const url = `https://open.rcwulian.cn/api/devMgr/devMgtV2.php?get_venues`;  
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.code === 0 && data.data.venues.length > 0) {
                const venueSelect = document.getElementById('venue_id');
                data.data.venues.forEach(venue => {
                    const option = document.createElement('option');
                    option.value = venue.id;
                    option.textContent = `${venue.id}-${venue.venue_name}`;
                    venueSelect.appendChild(option);
                });

                // ✅ 在场地列表加载完成后再恢复状态或默认设置
                const savedVenueId = sessionStorage.getItem('selectedVenueId');
                if (savedVenueId && venueSelect.querySelector(`option[value="${savedVenueId}"]`)) {
                    venueSelect.value = savedVenueId;
                    selectedVenueId = savedVenueId;
                } else {
                    // sessionStorage.removeItem('selectedVenueId');
                    venueSelect.value = '10';
                    selectedVenueId = '10';
                }
                sessionStorage.removeItem('selectedVenueId');
                currentPage = 1;
                loadDeviceData(currentPage, selectedVenueId);
                 
                // 滚动恢复
                const scrollY = sessionStorage.getItem('scrollY');
                if (scrollY) {
                    setTimeout(() => {
                        window.scrollTo(0, parseInt(scrollY));
                    }, 300);
                    sessionStorage.removeItem('scrollY');
                }
            }
        })
        .catch(error => {
            console.error('获取场地列表失败:', error);
        });
}

 
        // 获取设备数据 
        function loadDeviceData(page, venueId = selectedVenueId, search = '') { 
            if (!venueId) return; // 确保 venueId 存在，防止请求错误 
            const url = `https://open.rcwulian.cn/api/devMgr/devMgtV2.php?get_vehicles=1&page=${page}&limit=${limit}&access_token=${accessToken}&venue_id=${venueId}&search=${search}`;  
            // console.log("  请求 URL:", url); // 打印 URL 以调试 
 
            document.getElementById('loading').style.display  = 'block'; 
 
            fetch(url) 
              .then(response => response.json())  
              .then(data => { 
                    if (data.code  === 0 && data.data.vehicles.length  > 0) { 
                        allDevices = data.data.vehicles;  // 保存所有设备数据 
                        displayDevices(allDevices, venueId); 
                        currentPage++; 
                    } else { 
                        document.getElementById('loading').textContent  = '没有更多数据了'; 
                    } 
                    document.getElementById('loading').style.display  = 'none'; 
                }) 
              .catch(error => { 
                    console.error('  数据加载失败:', error); 
                    document.getElementById('loading').textContent  = '加载失败，请重试'; 
                    setTimeout(() => { 
                        document.getElementById('loading').style.display  = 'none'; 
                    }, 2000); 
                }); 
        } 
        /*预留一个已经封禁通知的api url接口，告诉他你已被封禁。这个写个模板，后期直接对接APIUrl了*/
        // 显示设备信息 
        function displayDevices(devices) {

            const deviceList = document.getElementById('device-list');  
            deviceList.innerHTML  = ''; // 清空之前的设备列表 
            devices.forEach(device  => { 
                const card = document.createElement('div');  
                card.classList.add('device-card');  
                card.setAttribute('data-device',  JSON.stringify(device));  
                card.innerHTML  = ` 
                    <img class="device-img" src="${device.photo_url}"  alt="设备图片"> 
                    <div class="device-info"> 
                        <span class="device-name">${device.name}</span>  
                        <span class="device-serial">序列号: ${device.serial_number}</span>  
                        <span class="device-status">
    状态: <b class="device-status-color" style="color: ${device.status === '在线' ? 'green' : (device.status === '离线' ? 'red' : (device.status === '占有' ? 'orange' : 'black'))};">${device.status}</b>
</span>


 
                        <span class="device-ban-status">封禁状态: ${device.is_banned ? '已封禁' : '未封禁'}</span>
                        <span class="ban-end-time" data-serial="${device.serial_number}">
                            ${device.is_banned ? '正在获取封禁结束时间...' : ''}
                        </span> 
                        <span class="device-sharing-status">共享状态: ${device.sharing_status}</span>  
                        <span class="device-image-serial">前图传: ${device.image_device_serial}</span>  
                        ${device.bk_image_device_serial ? `<span class="device-bk-image-serial">后图传: ${device.bk_image_device_serial}</span>` : ''} 
                        <span class="device-venue-id">场地 ID: ${device.bind_site}</span>

                        <span class="device-uid">绑定用户: ${device.uid || '未绑定'}</span>
                    </div> 
                    <div class="button-group"> 
                        <button class="modify-btn" data-serial="${device.serial_number}"  data-banned="${device.is_banned  ? 1 : 0}"> 
                            ${device.is_banned  ? '解封' : '封禁'} 
                        </button> 
                        <!-- 新增违规通知按钮 --> 
                        <button class="violation-notice-btn" data-serial="${device.serial_number}">  
                            违规通知 
                        </button>
                        <!-- 修改场地ID按钮 -->
                        <button class="modify-site-btn" data-serial="${device.serial_number}" data-bind-site="${device.bind_site || ''}">
                            修改场地ID
                        </button>
                        <!-- 修改用户ID按钮 -->
                        <button class="modify-uid-btn" data-serial="${device.serial_number}" data-uid="${device.uid || ''}">
                            修改用户ID
                        </button>
                        <!-- 修改配置按钮 - 直接跳转 -->
                        <button class="modify-config-btn" onclick="goToConfig(this)" data-device='${JSON.stringify(device)}'>
                            修改配置
                        </button>

                         <button class="modify-info-btn" onclick="goToModify(this)" data-device='${JSON.stringify(device)}'>
                          修改信息
                        </button>

                    </div> 
                `; 
                
                deviceList.appendChild(card);  
 
                // Attach click event listener to the ban/unban button 
                card.querySelector('.modify-btn').addEventListener('click',  function () { 
                    banDevice(this); 
                }); 
 
                // 新增违规通知按钮点击事件 
                card.querySelector('.violation-notice-btn').addEventListener('click',  function () { 
                    sendViolationNotice(this.dataset.serial);  
                });

                // 修改场地ID按钮点击事件
                card.querySelector('.modify-site-btn').addEventListener('click', function() {
                    updateBindSite(this);
                });

                // 修改用户ID按钮点击事件
                card.querySelector('.modify-uid-btn').addEventListener('click', function() {
                    updateUid(this);
                });

                // 修改配置按钮点击事件
                card.querySelector('.modify-config-btn').addEventListener('click', function() {
                    updateConfig(this);
                });

                if (device.is_banned) {
                    getBanEndTime(device.serial_number);
                }
            }); 
        }

        // 提交封禁/解封操作
        function submitBanAction(serialNumber, banStatus, additionalData = {}) {
            const requestBody = {
                ban: true,
                serial_number: serialNumber,
                id: banStatus,
                ...additionalData
            };

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://open.rcwulian.cn/api/devMgr/devMgtV2.php', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.code === 0) {
                                alert(banStatus === 1 ? '封禁成功' : '解封成功');
                                
                                // 获取设备卡片的引用
                                const deviceCard = document.querySelector(`.device-card button[data-serial="${serialNumber}"]`).closest('.device-card');
                                
                                // 更新设备状态和按钮
                                requestAnimationFrame(() => {
                                    updateDeviceStatus(serialNumber, banStatus, deviceCard);
                                    // 新增：刷新设备列表
                                    loadDeviceData(currentPage, selectedVenueId);
                                });
                            } else {
                                alert('操作失败: ' + response.msg);
                            }
                        } catch (error) {
                            console.error('JSON解析失败:', error);
                            alert('找不到对应按钮或设备，可能是列表被刷新或过滤了。跳过本地更新。');
                        }
                    }
                }
            };

            const data = {
                ban: true,
                serial_number: serialNumber,
                id: banStatus,
                ...additionalData
            };
            xhr.send(JSON.stringify(data));
        }

        function updateDeviceStatus(serialNumber, banStatus, deviceCard) {

            banStatusElement.textContent = `封禁状态: ${banStatus === 1 ? '已封禁' : '未封禁'}`;
            sharingStatusElement.textContent = `共享状态: ${banStatus === 1 ? '未共享' : '正在共享'}`;

            // 更新封禁时间显示
            if (banEndTimeElement) {
                banEndTimeElement.textContent = banStatus === 1 ? '正在获取封禁结束时间...' : '';
            }

            // 更新设备信息
            const deviceInfo = JSON.parse(deviceCard.getAttribute('data-device'));
            deviceInfo.is_banned = banStatus === 1;
            deviceInfo.sharing_status = banStatus === 1 ? '未共享' : '正在共享';

        }

        // 添加获取封禁结束时间的函数
        // 添加获取封禁结束时间的函数（含自动解封和封禁时长匹配）
        function getBanEndTime(serialNumber) {
    fetch(`https://open.rcwulian.cn/api/devMgr/devMgtV2.php?get_ban_info=${serialNumber}`)
        .then(response => response.json())
        .then(data => {
            console.log("getBanInfo 返回值：", data);

            if (data.code === 0 && data.data.ban_end_time) {
                const endTimeElement = document.querySelector(`.ban-end-time[data-serial="${serialNumber}"]`);
                const endTime = new Date(data.data.ban_end_time);
                const now = new Date();
                console.log("now:", now, "endTime", endTime, "endTimeElement", endTimeElement);

                if (now >= endTime) {
                    submitBanAction(serialNumber, 0); // 自动解封
                } else {
                    const timeDiffMs = endTime - now;
                    const remainingHours = timeDiffMs / (1000 * 60 * 60);

                    let humanReadable = '';
                    if (remainingHours <= 0.1) {
                        humanReadable = '5分钟';
                    } else if (remainingHours <= 0.2) {
                        humanReadable = '10分钟';
                    }else if (remainingHours <= 0.6) {
                        humanReadable = '半小时';
                    } else if (remainingHours <= 1.5) {
                        humanReadable = '一小时';
                    } else if (remainingHours <= 13) {
                        humanReadable = '半天';
                    } else if (remainingHours <= 25) {
                        humanReadable = '一天';
                    } else if (remainingHours <= 73) {
                        humanReadable = '三天';
                    } else if (remainingHours <= 170) {
                        humanReadable = '一周';
                    } else {
                        humanReadable = `约${Math.ceil(remainingHours)}小时`;
                    }

                    if (endTimeElement) {
                        endTimeElement.textContent = `封禁结束时间: ${data.data.ban_end_time} (剩余${humanReadable})`;
                    }

                    // 设置定时器，到点自动检查封禁状态
                    setTimeout(() => {
                        checkBanStatus(serialNumber, data.data.ban_end_time);
                    }, timeDiffMs);
                }

                // 自动设置模态框中封禁时长下拉框
                if (data.data.ban_duration_hours) {
                    const durationValue = data.data.ban_duration_hours.toString();
                    const banDurationSelect = document.getElementById("banDuration");

                    if (banDurationSelect) {
                        for (let option of banDurationSelect.options) {
                            if (option.value === durationValue) {
                                option.selected = true;
                                break;
                            }
                        }
                    }
                }
            }
        })
        .catch(error => {
            console.error('获取封禁结束时间失败:', error);
        });
}
