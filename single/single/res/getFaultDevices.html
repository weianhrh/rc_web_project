<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当日故障设备查看</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> 
    <style>
        /* 定义 CSS 变量 */
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --transition: all 0.3s ease;
            --hover-bg: #f9f9f9;
            --highlight-bg: #eff4ff;
        }

        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 32px rgba(91, 140, 255, 0.16);
        }

        .card-title {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        /* 故障设备列表样式 */
        .fault-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .fault-item {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fault-item span {
            display: block;
        }

        .fault-item .fault-title {
            font-weight: 600;
            color: var(--primary);
        }

        /* 修改处理状态按钮样式 */
        .update-status-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .update-status-btn:hover {
            background-color: #4a79e6;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .card {
                padding: 16px;
            }

            .fault-item {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
                <span>当日故障设备查看</span>
                <a href="fault_summary.html" style="background-color: var(--primary); color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none;">
                    故障记录
                </a>
            </div>

            <div id="fault-list" class="fault-list"></div>
        </div>
    </div>

    <script>
        // 获取当日故障设备信息
        function loadFaultRecords() {
            fetch('https://open.rcwulian.cn/api/devMgr/getFaultDevices.php') 
              .then(response => response.json()) 
              .then(data => {
                    if (data.code  === 0) {
                        const mergedRecords = mergeFaultRecords(data.data); 
                        displayFaultRecords(mergedRecords);
                    } else {
                        document.getElementById('fault-list').innerHTML  = '<p style="text-align:center;">暂无当日故障设备记录</p>';
                    }
                })
              .catch(error => {
                    console.error('  请求失败:', error);
                    document.getElementById('fault-list').innerHTML  = '<p style="text-align:center;">加载故障设备记录失败，请重试</p>';
                });
        }

        // 合并故障记录
        function mergeFaultRecords(records) {
            const merged = {};
            records.forEach(record  => {
                const key = `${record.serial_number}-${record.user_id}`; 
                if (!merged[key]) {
                    merged[key] = {
                        ...record,
                        reportCount: 1
                    };
                } else {
                    merged[key].reportCount++;
                }
            });
            return Object.values(merged); 
        }

        // 显示故障设备记录列表
        function displayFaultRecords(records) {
            const container = document.getElementById('fault-list'); 
            container.innerHTML  = '';

            records.forEach(record  => {
                const item = document.createElement('div'); 
                item.classList.add('fault-item'); 

                item.innerHTML  = `
                     <!-- 隐藏故障设备编号 <span class="fault-title">故障设备编号：${record.serial_number}</span>  -->
                    <span>车辆名称：${record.name}</span>
                    <span>客户 ID：${record.user_id}</span> 
                    <span>场地 ID：${record.bind_site}</span> 
                    <span>问题原因：${record.fault_reason}</span> 
                    <span>处理状态：${record.resolved_status  === 0 ? '未处理' : '已处理'}</span>
                    <span>举报次数：${record.reportCount}</span> 

                    <button class="update-status-btn" data-serial="${record.serial_number}"  data-status="${record.resolved_status}"> 
                        ${record.resolved_status  === 0 ? '标记为已处理' : '标记为未处理'}
                    </button>
                `;

                // 为按钮绑定点击事件
                const button = item.querySelector('.update-status-btn'); 
                button.addEventListener('click',  function () {
                    const serialNumber = this.dataset.serial; 
                    const currentStatus = parseInt(this.dataset.status); 
                    const newStatus = currentStatus === 0 ? 1 : 0;
                    updateStatus(serialNumber, newStatus, this);
                });

                container.appendChild(item); 
            });
        }

        // 更新处理状态
        function updateStatus(serialNumber, newStatus, button) {
            // 调用后端接口更新状态
            fetch(`https://open.rcwulian.cn/api/devMgr/updateFaultStatus.php?serial_number=${serialNumber}&status=${newStatus}`) 
              .then(response => response.json()) 
              .then(data => {
                    if (data.code  === 0) {
                        // 更新按钮文本和状态
                        button.dataset.status  = newStatus;
                        button.textContent  = newStatus === 0 ? '标记为已处理' : '标记为未处理';
                        // 更新列表中的处理状态文本
                        const parent = button.parentNode; 
                        const statusSpan = parent.querySelector('span:nth-child(5)'); 
                        statusSpan.textContent  = `处理状态：${newStatus === 0 ? '未处理' : '已处理'}`;

                        // 如果状态变为已处理，移除该项
                        if (newStatus === 1) {
                            parent.remove(); 
                        }
                    } else {
                        alert('更新处理状态失败，请重试');
                    }
                })
              .catch(error => {
                    console.error('  请求失败:', error);
                    alert('更新处理状态失败，请重试');
                });
        }

        // 页面加载时获取当日故障设备信息
        loadFaultRecords();
    </script>
</body>

</html>
