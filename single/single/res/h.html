<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>预约管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --shadow: 0 4px 24px rgba(91,140,255,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            /*padding: 24px;*/
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .order-item {
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(5, auto);
            gap: 12px;
        }

        .order-item .order-id,
        .order-item .status {
            font-weight: 700;
            font-size: 12px;
            color: var(--primary);
        }

        .order-item .status {
            color: var(--primary);
            text-align: right;
        }

        .order-item .status.completed {
            color: #4CAF50;
        }

        .order-item .status.cancelled {
            color: #FF6347;
        }

        .order-item .status.pending {
            color: #FF9800;
        }

        .order-item .label {
            color: var(--secondary);
            font-size: 14px;
            text-align: left;
        }

        .order-item .value {
            color: #333;
            font-size: 16px;
            text-align: right;
        }

        .order-item .cancel-btn {
            background-color: #ff5c5c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            grid-column: span 2;
            transition: background-color 0.3s;
            margin-top: 16px;
        }

        .order-item .cancel-btn:hover {
            background-color: #e04d4d;
        }

        @media (max-width: 768px) {
            .order-item {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="card-title" style="margin-bottom:1px">预约管理</div>
            <div id="order-list"></div> <!-- 这里将动态插入订单 -->
        </div>
    </div>

    <script>
        // 发起请求获取数据并更新页面
        fetch('https://open.rcwulian.cn/api/venue/getReservationsList.php?page=1&limit=20&order_number=&reservation_date=&reservation_location=&status=%E7%AD%89%E5%BE%85%E9%A9%BE%E9%A9%B6')
            .then(response => response.json())
            .then(data => {
                if (data.code === 0 && data.data.length > 0) {
                    const orderListContainer = document.getElementById('order-list');

                    data.data.forEach(order => {
                        const orderItem = document.createElement('div');
                        orderItem.classList.add('order-item');

                        // 订单编号和状态
                        orderItem.innerHTML = `
                            <div class="order-id">订单编号：${order.order_number}</div>
                            <div class="status ${getStatusClass(order.order_status)}">${getStatusText(order.order_status)}</div>

                            <div class="label">用户昵称</div>
                            <div class="value">${order.nickname} (ID: ${order.user_id})</div>

                            <div class="label">预约时长</div>
                            <div class="value">${order.driving_duration}分钟</div>

                            <div class="label">预约时间</div>
                            <div class="value">${order.reservation_time}</div>

                            <div class="label">支付方式</div>
                            <div class="value">${order.pay_type}</div>

                            <button class="cancel-btn" ${order.order_status === "已取消" ? "disabled" : ""} onclick="cancelReservation('${order.order_number}', this)">${order.order_status === "已取消" ? "已取消" : "取消预约"}</button>
                        `;

                        orderListContainer.appendChild(orderItem);
                    });
                } else {
                    const orderListContainer = document.getElementById('order-list');
                    orderListContainer.innerHTML = "<p>暂无预约记录</p>";
                }
            })
            .catch(error => {
                console.error('数据加载失败:', error);
            });

        // 根据状态获取对应的状态文本和颜色
        function getStatusText(status) {
            switch (status) {
                case "等待驾驶": return "等待驾驶";
                case "已完成": return "已完成";
                case "已取消": return "已取消";
                default: return "未知";
            }
        }

        // 根据状态返回对应的状态类名
        function getStatusClass(status) {
            switch (status) {
                case "等待驾驶": return "pending";
                case "已完成": return "completed";
                case "已取消": return "cancelled";
                default: return "pending";
            }
        }

        // 取消预约的功能
        function cancelReservation(orderNumber, buttonElement) {
            const url = `https://open.rcwulian.cn/api/venue/CancelReservation.php?order_number=${orderNumber}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        // 更新状态为已取消
                        const statusElement = buttonElement.closest('.order-item').querySelector('.status');
                        statusElement.textContent = '已取消';
                        statusElement.classList.remove('pending');
                        statusElement.classList.add('cancelled');

                        // 禁用按钮，防止重复点击
                        buttonElement.disabled = true;
                        buttonElement.textContent = '已取消';
                        alert(data.msg);  // 显示取消成功的消息

                        // 重新加载页面
                        window.location.reload();
                    } else {
                        alert(data.msg);
                    }
                })
                .catch(error => {
                    console.error('取消预约失败:', error);
                    alert('网络错误，取消预约失败');
                });
        }
    </script>

</body>
</html>
