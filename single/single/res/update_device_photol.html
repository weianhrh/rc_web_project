<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>批量修改设备图片</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'ZCOOL KuaiLe', cursive;
            background: #fff;
            padding: 20px;
        }

        .panel {
            border: 3px solid black;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 2px dashed black;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f9f9f9;
        }

        .upload-box img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid black;
            border-radius: 10px;
        }

        .upload-box input[type="file"] {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .upload-box input[type="text"] {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 18px;
            padding: 6px 10px;
            width: 180px;
            border: 2px solid black;
            border-radius: 10px;
        }

        .status {
            font-size: 14px;
            color: green;
        }

        .hand-button {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 20px;
            padding: 8px 20px;
            border: 3px solid black;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            margin: 10px 10px 10px 0;
        }

        #image-list {
            min-height: 50px;
        }
body.dark-mode {
    background-color: #121212;
    color: #f5f5f5;
}

body.dark-mode .panel {
    background-color: #1e1e1e;
    border-color: #888;
}

body.dark-mode .card {
    background-color: #2a2a2a;
    border-color: #888;
}

body.dark-mode input,
body.dark-mode select,
body.dark-mode textarea {
    background-color: #1a1a1a;
    color: #f5f5f5;
    border-color: #888;
}

body.dark-mode .hand-button {
    background-color: #1a1a1a;
    color: #f5f5f5;
    border-color: #888;
}

body.dark-mode a {
    color: #80d4ff;
}

    </style>
</head>
<body>

<div class="panel">
    <h2>批量修改设备图片</h2>
    <div id="image-list"></div>
    <button class="hand-button" onclick="addUploadBox()">添加图片</button>
    <button class="hand-button" onclick="submitAll()">提交所有设备图片</button>
</div>
<div id="modeIndicator" style="position: fixed; top: 10px; right: 10px; z-index: 9999; background: black; color: white; padding: 6px 12px; border-radius: 8px; font-size: 14px; display: none;">🌙 已切换深色模式</div>

<!-- 引入 SortableJS -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
    let imageIndex = 0;
    const imageList = document.getElementById('image-list');

    // 初始化拖拽排序
    new Sortable(imageList, {
        animation: 150,
        ghostClass: 'sortable-ghost'
    });

    function addUploadBox() {
        const box = document.createElement('div');
        box.className = 'upload-box';
        box.setAttribute('data-index', imageIndex);
        box.innerHTML = `
            <img id="preview-${imageIndex}" src="https://via.placeholder.com/80" />
            <div>
                <input type="file" onchange="uploadImage(this, ${imageIndex})" /><br>
                <input type="text" placeholder="设备序列号" id="serial-${imageIndex}" />
                <input type="hidden" id="photo-${imageIndex}" />
                <div class="status" id="status-${imageIndex}">未上传</div>
            </div>
        `;
        imageList.appendChild(box);
        imageIndex++;
    }

    async function uploadImage(input, index) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        document.getElementById(`status-${index}`).innerText = "上传中...";

        try {
            const response = await fetch('https://rcwulian.cn/app/img/userimg/upload_profile.php', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.code === 0) {
                document.getElementById(`photo-${index}`).value = result.url;
                document.getElementById(`status-${index}`).innerText = "上传成功";
                document.getElementById(`preview-${index}`).src = result.url;
            } else {
                document.getElementById(`status-${index}`).innerText = "上传失败：" + result.msg;
            }
        } catch (err) {
            document.getElementById(`status-${index}`).innerText = "上传出错";
        }
    }

    async function submitAll() {
        const boxes = document.querySelectorAll('.upload-box');
        const payload = [];

        boxes.forEach(box => {
            const index = box.getAttribute('data-index');
            const serial = document.getElementById(`serial-${index}`)?.value?.trim();
            const url = document.getElementById(`photo-${index}`)?.value?.trim();

            if (serial && url) {
                payload.push({ serial_number: serial, photo_url: url });
            }
        });

        if (payload.length === 0) {
            alert("请至少上传一个有效图片并填写序列号");
            return;
        }

        try {
            const res = await fetch('https://open.rcwulian.cn/api/operat/batch_update_photos.php',{
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: payload })
            });
            const result = await res.json();

            if (result.code === 0) {
                alert("全部更新成功");
            } else {
                alert("更新失败：" + result.msg);
            }
        } catch (err) {
            alert("提交失败，请稍后重试");
        }
    }
    
    // 页面初始化时检查本地存储的模式
    document.addEventListener('DOMContentLoaded', () => {
        const savedMode = localStorage.getItem('theme');
        const seenTip = localStorage.getItem('seenThemeTip');
        if (savedMode === 'dark') {
            document.body.classList.add('dark-mode');
        }
         // 首次访问提示快捷键功能
        if (!seenTip) {
            alert("提示：按下 Shift + A 可切换深色 / 浅色模式！");
            localStorage.setItem('seenThemeTip', '1');
        }
    });

    function showModeTip(msg) {
        const el = document.getElementById('modeIndicator');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => {
            el.style.display = 'none';
        }, 1500);
    }
    
    document.addEventListener('keydown', function(e) {
        if (e.shiftKey && e.key.toLowerCase() === 'a') {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            showModeTip(isDark ? '🌙 已切换深色模式' : '☀️ 已切换浅色模式');
        }
    });

</script>

</body>
</html>
