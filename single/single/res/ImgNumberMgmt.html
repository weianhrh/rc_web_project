<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>批量上传图传序列号</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --hover-bg: #f9f9f9;
            --highlight-bg: #eff4ff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 32px rgba(91, 140, 255, 0.16);
        }

        .card-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 24px;
            color: var(--text-color);
            font-weight: 600;
            padding-bottom: 10px;
            flex-grow: 1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            color: var(--text-color);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background-color: #f8f9ff;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
        }

        .action-button {
            background-color: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            transition: 0.3s;
        }

        .action-button:hover {
            background-color: #4a77e4;
        }

        @media (max-width: 768px) {
            .card {
                padding: 16px;
            }

            .form-group label {
                font-size: 12px;
            }

            .action-button {
                font-size: 12px;
            }
        }

        .query-result {
            margin-top: 20px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .result-table th,
        .result-table td {
            padding: 8px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .result-table th {
            background-color: var(--highlight-bg);
            font-weight: 600;
        }

        .result-table tr:hover {
            background-color: var(--hover-bg);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 添加查询卡片 -->
        <div class="card">
            <div class="card-title-container">
                <h2 class="card-title">查询图传序列号</h2>
                <button onclick="queryData()" class="action-button">查询</button>
            </div>
            <div class="form-group">
                <label for="queryArea">选择区域</label>
                <select id="queryArea">
                    <option value="AA" selected>AA区</option>
                    <!-- 其他区域选项会通过JavaScript填充 -->
                </select>
            </div>
            <div class="form-group">
                <label for="queryGroup">选择组号</label>
                <select id="queryGroup">
                    <option value="1" selected>第1组</option>
                    <!-- 其他组号选项会通过JavaScript填充 -->
                </select>
            </div>
            <div id="queryResult" class="query-result">
                <!-- 查询结果将在这里显示 -->
            </div>
        </div>

        <!-- 原有的上传卡片 -->
        <div class="card">
            <div class="card-title-container">
                <h2 class="card-title">批量上传图传序列号</h2>
                <button type="submit" form="uploadForm" class="action-button">提交</button>
            </div>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="image_device_serials">图传序列号（每行一个）</label>
                    <textarea id="image_device_serials" name="image_device_serials" rows="8" required></textarea>
                </div>
                <div class="form-group">
                    <label for="area">区域（AA-ZZ）</label>
                    <select id="area" name="area" required>
                        <option value="AA" selected>AA区</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="group">组号（1-9）</label>
                    <select id="group" name="group" required>
                        <option value="1" selected>第1组</option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 填充区域选项
        const areaSelect = document.getElementById('area');
        for (let i = 65; i <= 90; i++) { // ASCII码 A-Z
            const letter = String.fromCharCode(i);
            const doubleLetter = letter + letter; // 创建双字母，如 AA, BB
            const option = document.createElement('option');
            option.value = doubleLetter;
            option.textContent = doubleLetter + '区';
            if (i !== 65) { // 跳过AA，因为已经默认添加
                areaSelect.appendChild(option);
            }
        }

        // 填充组号选项
        const groupSelect = document.getElementById('group');
        for (let i = 2; i <= 9; i++) { // 从2开始，因为1已经默认添加
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第${i}组`;
            groupSelect.appendChild(option);
        }

        // 表单提交处理
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);

            // 检查必要参数
            const serialNumbers = document.getElementById('image_device_serials').value;
            const area = document.getElementById('area').value;
            const group = document.getElementById('group').value;

            if (!serialNumbers || !area || !group) {
                alert('请填写所有必要参数！');
                return;
            }

            // 发送请求
            fetch('https://open.rcwulian.cn/api/devMgr/UploadImgNumber.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 200) {
                    // 提交成功后刷新页面
                    window.location.reload();
                }
            })
            .catch(error => {
                alert('请求发生错误：' + error.message);
            });
        });

        // 修改填充查询区域选项的代码
        const queryAreaSelect = document.getElementById('queryArea');
        for (let i = 65; i <= 90; i++) {
            const letter = String.fromCharCode(i);
            const doubleLetter = letter + letter;
            if (doubleLetter !== 'AA') { // 跳过AA，因为已经默认添加
                const option = document.createElement('option');
                option.value = doubleLetter;
                option.textContent = doubleLetter + '区';
                queryAreaSelect.appendChild(option);
            }
        }

        // 修改填充查询组号选项的代码
        const queryGroupSelect = document.getElementById('queryGroup');
        for (let i = 2; i <= 9; i++) { // 从2开始，因为1已经默认添加
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第${i}组`;
            queryGroupSelect.appendChild(option);
        }

        // // 页面加载完成后自动执行查询
        // window.addEventListener('load', function() {
        //     queryData();
        // });

        // 查询数据函数
        function queryData() {
            const area = document.getElementById('queryArea').value;
            const group = document.getElementById('queryGroup').value;
            
            const queryParams = new URLSearchParams();
            if (area) queryParams.append('area', area);
            if (group) queryParams.append('group', group);

            fetch(`https://open.rcwulian.cn/api/devMgr/QueryImgNumber.php?${queryParams.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        displayResults(data.data);
                    } else {
                        alert(data.msg);
                    }
                })
                .catch(error => {
                    alert('查询失败：' + error.message);
                });
        }

        // 显示查询结果
        function displayResults(data) {
            const resultDiv = document.getElementById('queryResult');
            if (data.length === 0) {
                resultDiv.innerHTML = '<p>没有找到匹配的记录</p>';
                return;
            }

            let html = `
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>序列号</th>
                            <th>区域</th>
                            <th>组号</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(item => {
                html += `
                    <tr>
                        <td>${item.image_device_serial}</td>
                        <td>${item.area}</td>
                        <td>第${item.group_number}组</td>
                        <td>${item.created_at}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            resultDiv.innerHTML = html;
        }
    </script>
</body>

</html>
