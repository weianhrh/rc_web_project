<!DOCTYPE html> 
<html lang="zh-CN"> 
 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>修改设备配置</title> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">   
    <style> 
        :root { 
            --primary: #5b8cff; 
            --secondary: #7f8fa4; 
            --background-gradient-start: #f8f9ff; 
            --background-gradient-end: #f0f3ff; 
            --card-bg: #ffffff; 
            --border-color: #ddd; 
            --text-color: #333; 
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08); 
            --transition: all 0.3s ease; 
        } 
 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "PingFang SC", system-ui; 
        } 
 
        body { 
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%); 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
        } 
 
        .container { 
            max-width: 600px; 
            width: 100%; 
        } 
 
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
            transition: var(--transition); 
        } 
 
        .card-title { 
            font-size: 24px; 
            color: var(--text-color); 
            margin-bottom: 20px; 
            font-weight: 600; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 10px; 
            text-align: center; 
        } 
 
        .form-field { 
            margin-bottom: 16px; 
            display: flex; 
            align-items: center; 
        } 
 
        .form-field label { 
            display: block; 
            font-size: 14px; 
            color: var(--secondary); 
            margin-bottom: 6px; 
            margin-right: 10px; 
            flex: 0 0 auto; 
        } 
 
        .form-field input[type="text"], 
        .form-field input[type="range"], 
        .form-field input[type="number"], 
        .form-field select { 
            padding: 10px; 
            font-size: 14px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
        } 
 
        .form-field input[type="range"] { 
            margin-right: 10px; 
            flex: 1; 
        } 
 
        /* 缩小输入框宽度 */ 
        .form-field input[type="number"] { 
            width: 80px; 
        } 
 
        .form-field select { 
            width: 100%; 
        } 
 
        .submit-btn { 
            background-color: var(--primary); 
            color: #fff; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: var(--transition); 
            width: 120px; /* 设置按钮宽度 */ 
            margin-right: 10px; /* 添加右外边距，使按钮之间有间隔 */ 
        } 
 
        .submit-btn:hover { 
            background-color: #4a77e4; 
        } 
 
 
        .form-field.radio-group   { 
            display: flex; 
            align-items: center; 
        } 
 
        .form-field.radio-group   label { 
            display: inline-block; 
            margin-right: 10px; 
            margin-bottom: 0; 
        } 
 
        .form-field.radio-group   input[type="radio"] { 
            width: auto; 
            margin-right: 5px; 
        } 
    </style> 
</head> 
 
<body> 
    <div class="container"> 
        <div class="card"> 
            <div class="card-title">修改设备配置</div> 
            <form id="modify-form"> 
                <div class="form-field"> 
                    <label for="name">设备名称</label> 
                    <input type="text" id="name" name="name" required disabled> 
                </div> 
                <input type="hidden" id="device_id" name="device_id"> 
                <div class="form-field"> 
                    <label for="throttle_max">油门最大值</label> 
                    <input type="range" id="throttle_max_range" min="0" max="100" oninput="updateThrottleMaxValue(this.value)">   
                    <input type="number" id="throttle_max" name="throttle_max" readonly> 
                 
                </div> 
                <div class="form-field"> 
                    <label for="direction_mid">方向中位值</label> 
                    <input type="range" id="direction_mid_range" min="0" max="100" oninput="updateValue('direction_mid', this.value)">   
                    <input type="number" id="direction_mid" name="direction_mid" readonly> 
                </div> 
                <div class="form-field" id="throttle-mid-field" style="display: none">
                    <label for="throttle_mid">油门中位值</label>
                    <input type="range" id="throttle_mid_range" min="0" max="100" oninput="updateThrottleMidValue(this.value)">
                    <input type="number" id="throttle_mid" name="throttle_mid" readonly>
                </div>

                <div class="form-field"> 
                    <label for="throttle_min">油门最小值</label> 
                    <input type="range" id="throttle_min_range" min="0" max="100" oninput="updateThrottleMinValue(this.value)">   
                    <input type="number" id="throttle_min" name="throttle_min" readonly> 
                    
                </div> 
                <div class="form-field radio-group"> 
                    <label>方向</label> 
                    <input type="radio" id="direction_false" name="direction" value="true"> 
                    <label for="direction_false">正向</label> 
                    <input type="radio" id="direction_true" name="direction" value="false"> 
                    <label for="direction_true">反向</label> 
                </div> 
                <div class="form-field radio-group"> 
                    <label>油门</label> 
                    <input type="radio" id="throttle_false" name="throttle" value="true"> 
                    <label for="throttle_false">正向</label> 
                    <input type="radio" id="throttle_true" name="throttle" value="false"> 
                    <label for="throttle_true">反向</label> 
                </div> 
                <div id="channel-switches" style="display: none;">
                    <div class="card-title" style="margin-top: 20px;">通道开关配置 (仅管理员)</div>
                    <div id="ch-toggle-fields">
                        <!-- 每个ch独立div，将由 JS 插入 -->
                    </div>
                </div>


                <div class="form-field">
                    <label for="car_type">车辆类型</label>
                    <select id="car_type" name="car_type">
                        <option value="1">汽车</option>
                        <option value="2">坦克</option>
                        <option value="3">挖掘机</option>
                        <option value="4">推土机</option>
                        <option value="5">翻斗车</option>
                        <option value="6">娃娃机</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">保存修改</button> 
                <button type="button" class="submit-btn" id="restore-default-btn">恢复默认</button> 
            </form> 
        </div> 
    </div> 
 
    <script> 
        // 映射函数：将 1500 - 2000 范围的值映射到 0 - 100 范围 
        function mapThrottleMaxToRange(value) { 
            return ((value - 1500) / (2000 - 1500)) * 100; 
        } 
 
        // 映射函数：将 0 - 100 范围的值映射到 1500 - 2000 范围 
        function mapThrottleMaxFromRange(value) { 
            return (value / 100) * (2000 - 1500) + 1500; 
        } 
 
        // 映射函数：将 1000 - 1500 范围的值映射到 0 - 100 范围 
        function mapThrottleMinToRange(value) { 
            return ((value - 1000) / (1500 - 1000)) * 100; 
        } 
 
        // 映射函数：将 0 - 100 范围的值映射到 1000 - 1500 范围 
        function mapThrottleMinFromRange(value) { 
            return (value / 100) * (1500 - 1000) + 1000; 
        } 
 
        // 映射函数：将 1000 - 2000 范围的值映射到 0 - 100 范围 
        function mapToRange(value) { 
            return ((value - 1000) / (2000 - 1000)) * 100; 
        } 
 
        // 映射函数：将 0 - 100 范围的值映射到 1000 - 2000 范围 
        function mapFromRange(value) { 
            return (value / 100) * (2000 - 1000) + 1000; 
        } 
        function mapThrottleMidToRange(value) {
            return ((value - 1000) / (2000 - 1000)) * 100; // 假设范围是 1500 - 2000
        }
        
        function mapThrottleMidFromRange(value) {
            return (value / 100) * (2000 - 1000) + 1000;
        }

        // 更新油门最大值输入框的值 
        function updateThrottleMaxValue(value) { 
            document.getElementById('throttle_max').value   = Math.round(mapThrottleMaxFromRange(value));   
        } 
 
        // 更新油门最小值输入框的值 
        function updateThrottleMinValue(value) { 
            document.getElementById('throttle_min').value   = Math.round(mapThrottleMinFromRange(value));   
        } 
 
        // 更新数值输入框的值 
        function updateValue(id, value) { 
            document.getElementById(id).value   = Math.round(mapFromRange(value));   
        } 
        function updateThrottleMidValue(value) {
            document.getElementById('throttle_mid').value = Math.round(mapThrottleMidFromRange(value));
        }

        // 页面加载时从 URL 参数中获取设备信息 
        window.addEventListener('DOMContentLoaded',  async  function () { 
              // 获取当前用户权限
            try {
                const res = await fetch('https://open.rcwulian.cn/api/operat/get_current_user.php', {
                    credentials: 'include'
                });
                const user = await res.json();
                if (user.code === 0 && user.data.role_id === 1) {
                    document.getElementById('throttle-mid-field').style.display = 'flex';
                    document.getElementById('channel-switches').style.display = 'block';

                }
            } catch (err) {
                console.warn('获取用户信息失败:', err);
            }
            const urlParams = new URLSearchParams(window.location.search);   
            const device = {}; 
            urlParams.forEach((value,   key) => { 
                device[key] = value; 
            }); 
 
            if (Object.keys(device).length   > 0) { 
                document.getElementById('name').value   = device.name;   
                document.getElementById('device_id').value   = device.serial_number;   // 确保 device_id 
                // 调用后端接口获取设备配置信息 
                fetch('https://open.rcwulian.cn/api/vehicle/modifDevicecfg.php',   { 
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json' 
                    }, 
                    body: JSON.stringify({   device_id: device.serial_number   }) 
                }) 
                   .then(response => response.json())   
                   .then(result => { 
                        if (result.code   === 200) { 
                            
                            const channels = ['ch1', 'ch2', 'ch3', 'ch4', 'ch5', 'ch6'];
                            let html = '';
                            
                            channels.forEach(ch => {
                                const raw = data[ch];
                                const parts = raw.split('#');
                                const status = parts[2] === 'true' ? 'true' : 'false';
                               html += `
                                    <div class="form-field radio-group">
                                        <label style="width:60px;">${ch.toUpperCase()}</label>
                                        <input type="radio" name="${ch}_status" value="true" ${status === 'true' ? 'checked' : ''}/> 启用
                                        <input type="radio" name="${ch}_status" value="false" ${status === 'false' ? 'checked' : ''} style="margin-left:10px"/> 禁用
                                    </div>
                                    `;

                            });
                            
                            document.getElementById('ch-toggle-fields').innerHTML = html;

                            
                            const data = result.data;   
                            document.getElementById('car_type').value = data.car_type;
                            document.getElementById('direction_mid_range').value   = mapToRange(data.direction_mid);   
                            document.getElementById('direction_mid').value   = data.direction_mid;  
                            document.getElementById('throttle_mid_range').value = mapThrottleMidToRange(data.throttle_mid || 1500);
                            document.getElementById('throttle_mid').value = data.throttle_mid || 1500;


                            document.getElementById('throttle_max_range').value   = mapThrottleMaxToRange(data.throttle_max);   
                            document.getElementById('throttle_max').value   = data.throttle_max;   
                            document.getElementById('throttle_min_range').value   = mapThrottleMinToRange(data.throttle_min);   
                            document.getElementById('throttle_min').value   = data.throttle_min;   
                            // 修改单选框选中逻辑 
                            document.querySelector(`input[name="direction"][value="${data.direction   === 'true' ? 'false' : 'true'}"]`).checked = true; 
                            document.querySelector(`input[name="throttle"][value="${data.throttle   === 'true' ? 'false' : 'true'}"]`).checked = true; 
                        } else { 
                            alert('获取设备配置信息失败：' + result.msg);   
                        } 
                    }) 
                   .catch(error => { 
                        console.error('   获取设备配置信息失败:', error); 
                        alert('获取设备配置信息失败，请重试'); 
                    }); 
            } else { 
                alert('未获取到设备序列号'); 
            } 
        }); 
 
        // 处理表单提交 
        document.getElementById('modify-form').addEventListener('submit',   function (e) { 
            e.preventDefault();   
            // 收集表单数据 
            const formData = new FormData(this); 
            const data = {}; 
            formData.forEach((value,   key) => data[key] = value); 
            channels.forEach(ch => {
            const selected = document.querySelector(`input[name="${ch}_status"]:checked`);
            if (selected) {
                data[`${ch}_status`] = selected.value;
            }
        });

            // 修正方向和油门值 
            data.direction   = data.direction   === 'true' ? 'false' : 'true'; 
            data.throttle   = data.throttle   === 'true' ? 'false' : 'true'; 
            // 调用后端修改设备信息接口（这里接口为 modifDevicecfg.php   ） 
            fetch('https://open.rcwulian.cn/api/vehicle/modifDevicecfg.php',   { 
                method: 'POST', 
                headers: { 
                    'Content-Type': 'application/json' 
                }, 
                body: JSON.stringify(data)   
            }) 
               .then(response => response.json())   
               .then(result => { 
                    if (result.code   === 200) { 
                        alert('设备信息修改成功'); 
                        // 修改成功后，可以清除 localStorage 中的设备数据 
                        localStorage.removeItem('deviceData');   
                        // 跳转回设备管理页面 
                        if (document.referrer)  {
                            window.location.href  = document.referrer; 
                            } else {
                                window.history.back();  // 降级处理 
                            }   
                    } else { 
                        alert('修改失败：' + result.msg);   
                    } 
                }) 
               .catch(error => { 
                    console.error('   修改设备信息失败:', error); 
                    alert('修改设备信息失败，请重试'); 
                }); 
        }); 
 
        // 恢复默认值的函数 
        function restoreDefaultValues() { 
            const defaultThrottleMax = 1620; 
            const defaultDirectionMid = 1500; 
            const defaultThrottleMin = 1350; 
            const defaultDirection = 'true'; 
            const defaultThrottle = 'true'; 
 
            document.getElementById('throttle_max_range').value  = mapThrottleMaxToRange(defaultThrottleMax); 
            document.getElementById('throttle_max').value  = defaultThrottleMax; 
            document.getElementById('direction_mid_range').value  = mapToRange(defaultDirectionMid); 
            document.getElementById('direction_mid').value  = defaultDirectionMid; 
            const defaultThrottleMid = 1500;
            document.getElementById('throttle_mid_range').value = mapThrottleMidToRange(defaultThrottleMid);
            document.getElementById('throttle_mid').value = defaultThrottleMid;

            document.getElementById('throttle_min_range').value  = mapThrottleMinToRange(defaultThrottleMin); 
            document.getElementById('throttle_min').value  = defaultThrottleMin; 
            document.querySelector(`input[name="direction"][value="${defaultDirection}"]`).checked  = true; 
            document.querySelector(`input[name="throttle"][value="${defaultThrottle}"]`).checked  = true; 
        } 
 
        // 为恢复默认按钮添加点击事件监听器 
        document.getElementById('restore-default-btn').addEventListener('click',  restoreDefaultValues); 
    </script> 
</body> 
 
</html>
