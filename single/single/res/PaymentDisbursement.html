<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提现申请</title>
  <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">-->
     <link rel="stylesheet" href="/res/fa/css/all.min.css"> 
  <style>
    /* 定义 CSS 变量 */
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
      --highlight-bg: #eff4ff;
    }

    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", system-ui;
    }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    /* 卡片样式 */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(91, 140, 255, 0.16);
    }

    .card-title {
      font-size: 24px;
      color: var(--text-color);
      margin-bottom: 20px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
    }

    /* 账户信息样式 */
    .account-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .account-info .field {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      align-items: center;
      margin-bottom: 8px;
    }

    .account-info .label {
      color: var(--secondary);
      font-weight: 500;
    }

    .account-info .value {
      color: var(--text-color);
      font-size: 14px;
      font-weight: 400;
    }

    /* 金额卡片样式 */
    .amount-card {
      background-color: #f5faff;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 16px rgba(0, 123, 255, 0.15);
    }

    .amount-card .field {
      font-size: 16px;
      color: #333;
      display: flex;
      justify-content: space-between;
      font-weight: 500;
    }

    .amount-card .value {
      font-weight: 600;
      color: #007bff;
    }

    /* 提现金额输入框前的标签 */
    .input-label {
      font-size: 16px;
      color: var(--text-color);
      font-weight: 500;
      margin-bottom: 8px;
    }

    /* 本次提现金额输入框 */
    .withdraw-input {
      padding: 12px 16px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      width: 100%;
      margin-top: 8px;
      box-sizing: border-box;
    }

    .withdraw-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* 提现按钮 */
    .withdraw-button {
      background-color: var(--primary);
      color: #fff;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      transition: 0.3s;
      margin-top: 20px;
    }

    .withdraw-button:hover {
      background-color: #4a77e4;
    }

    .withdraw-button:disabled {
      background-color: #d0d0d0;
      cursor: not-allowed;
    }

    /* 提示信息样式 */
    .loading,
    .success,
    .error {
      text-align: center;
      font-size: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .loading {
      color: var(--primary);
    }

    .success {
      color: #4caf50;
    }

    .error {
      color: #ff6b6b;
    }

    /* 提现记录列表 */
    .record-list {
      margin-top: 30px;
    }

    .record-item {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .record-item span {
      display: block;
    }

    .record-item .record-title {
      font-weight: 600;
      color: var(--primary);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .card {
        padding: 16px;
      }
      .field {
        font-size: 12px;
      }
      .withdraw-button {
        font-size: 14px;
      }
      .withdraw-input {
        font-size: 14px;
      }
      .record-item {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <div class="card-title">提现申请</div>

      <!-- 账户信息 -->
      <div class="account-info" id="account-info"></div>

      <!-- 金额信息卡片 -->
      <div class="amount-card" id="amount-info"></div>

      <!-- 本次提现金额输入框 -->
      <div>
        <div class="input-label">本次提现金额</div>
        <input type="number" id="withdraw-amount" class="withdraw-input" placeholder="请输入提现金额" />
      </div>

      <!-- 提现按钮 -->
      <button class="withdraw-button" id="withdraw-button" onclick="applyWithdrawal()">立即提现</button>

      <div id="status-message" class="loading" style="display: none;">正在申请提现...</div>

      <!-- 提现记录列表 -->
      <div id="withdrawal-records" class="record-list"></div>
    </div>
  </div>

  <script>
    // 获取提现账户和金额信息
    function loadAccountInfo() {
      const url = 'https://open.rcwulian.cn/api/pay/CalculateSettlements.php?access_token=df39da38cf68a599912b75361e85d19b0269e1a0f355dc72ddf6495a204f41c4';
      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            // 显示账户信息
            const accountInfo = document.getElementById('account-info');
            accountInfo.innerHTML = `
              <div class="field">
                <div class="label">账户号:</div>
                <div class="value">${data.account_number}</div>
              </div>
              <div class="field">
                <div class="label">账户姓名:</div>
                <div class="value">${data.account_name}</div>
              </div>
              <div class="field">
                <div class="label">账户类型:</div>
                <div class="value">${data.account_pay}</div>
              </div>
            `;

            // 显示金额信息
            const amountInfo = document.getElementById('amount-info');
            amountInfo.innerHTML = `
              <div class="field">
                <div class="label">可提现金额:</div>
                <div class="value">${data.account_balance} 元</div>
              </div>
              <div class="field">
                <div class="label">未核对金额:</div>
                <div class="value">${data.notSettledAmount} 元</div>
              </div>
              
            `;

            // 初始化提现金额输入框
            const withdrawAmountInput = document.getElementById('withdraw-amount');
            withdrawAmountInput.value = data.account_balance; // 设置默认提现金额为可提现金额
            updateWithdrawButtonState();
          } else if (data.code === 1002) {
            if (confirm('需要先绑定收款账号才可以提现，是否立即绑定？')) {
              window.location.href = 'https://open.rcwulian.cn/res/paybind.html';
            } else {
              window.history.back();
            }
          } else {
            alert('加载账户信息失败，请稍后再试');
          }
        })
        .catch(error => {
          console.error('请求失败:', error);
          alert('加载账户信息失败，请重试');
        });
    }

    // 更新提现按钮的状态
   function updateWithdrawButtonState() {
      const withdrawAmountInput = document.getElementById('withdraw-amount');
      const withdrawButton = document.getElementById('withdraw-button');
      const withdrawAmount = parseFloat(withdrawAmountInput.value);
      const maxWithdrawAmount = parseFloat(document.querySelector('.amount-card .value').textContent.split(' ')[0]); // 确保从文本中提取数字
    
      if (isNaN(withdrawAmount) || withdrawAmount <= 0 || withdrawAmount > maxWithdrawAmount) {
        withdrawButton.disabled = true;
      } else {
        withdrawButton.disabled = false;
      }
    }


    // 提交提现申请
    function applyWithdrawal() {
      const withdrawButton = document.getElementById('withdraw-button');
      const statusMessage = document.getElementById('status-message');
      statusMessage.style.display = 'block';
      withdrawButton.disabled = true;
      const withdrawAmount = parseFloat(document.getElementById('withdraw-amount').value);
      if (isNaN(withdrawAmount) || withdrawAmount <= 0) {
        alert('请输入有效的提现金额');
        withdrawButton.disabled = false;
        statusMessage.style.display = 'none';
        return;
      }
      const url = 'https://open.rcwulian.cn/api/pay/ApplyWithdrawal.php';
      const data = { amount: withdrawAmount };
      fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
        },
        body: new URLSearchParams(data).toString()
      })
        .then(response => response.json())
        .then(data => {
          statusMessage.style.display = 'none';
          if (data.code === 0) {
            alert('提现申请成功');
            loadAccountInfo(); // 重新加载账户信息
            loadWithdrawalRecords(); // 刷新提现记录
          } else if (data.code === 1005) {
            alert('场地已被封禁，无法提现，请联系运营处理');
          }else {
            
            alert('提现申请失败，请稍后重试');
          }
        })
        .catch(error => {
          console.error('提现申请失败:', error);
          statusMessage.style.display = 'none';
          alert('提现申请失败，请重试');
        });
    }

    // 获取提现记录
    function loadWithdrawalRecords() {
      const url = 'https://open.rcwulian.cn/api/pay/getWithdrawalRecords.php';
      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0 && data.data && data.data.length > 0) {
            displayWithdrawalRecords(data.data);
          } else {
            document.getElementById('withdrawal-records').innerHTML = '<p style="text-align:center;">暂无提现记录</p>';
          }
        })
        .catch(error => {
          console.error('提现记录加载失败:', error);
        });
    }

    // 显示提现记录列表
    function displayWithdrawalRecords(records) {
      const container = document.getElementById('withdrawal-records');
      container.innerHTML = '';
      records.forEach(record => {
        const item = document.createElement('div');
        item.classList.add('record-item');
        item.innerHTML = `
          <span class="record-title">提现编号：${record.id}</span>
          <span>账户姓名：${record.account_name}</span>
          <span>提现金额：${record.withdrawal_amount} 元</span>
          <span>技术服务费：${record.technical_service_fee} 元</span>
          <span>提现手续费：${record.withdrawal_fee} 元</span>
          <span>实际打款：${record.actual_amount} 元</span>
          <span>申请时间：${record.application_time}</span>
         <span>打款状态：${record.payout_status  == 1 ? '已打款' : '未打款'}</span>
          <span>申请状态：${record.application_status == 0 ? '待处理' : (record.application_status == 1 ? '已处理' : (record.application_status == 2 ? '已打款' : '拒绝'))}</span>
        `;
        container.appendChild(item);
      });
    }

    // 监听提现金额输入框
    document.getElementById('withdraw-amount').addEventListener('input', updateWithdrawButtonState);

    // 页面加载时获取账户信息和提现记录
    loadAccountInfo();
    loadWithdrawalRecords();
  </script>

</body>

</html>
