<!DOCTYPE html> 
<html lang="zh-CN"> 
 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>用户充值</title> 
    <!-- 引入Font Awesome图标库 --> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">   
 
    <style> 
        :root { 
            --primary: #5b8cff; 
            --secondary: #7f8fa4; 
            --background-gradient-start: #f8f9ff; 
            --background-gradient-end: #f0f3ff; 
            --card-bg: #ffffff; 
            --border-color: #ddd; 
            --text-color: #333; 
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08); 
            --transition: all 0.3s ease; 
            --hover-bg: #f9f9f9; 
        } 
 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "PingFang SC", system-ui; 
        } 
 
        body { 
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%); 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
        } 
 
        .container { 
            max-width: 1200px; 
            width: 100%; 
        } 
 
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
            transition: var(--transition); 
        } 
 
        .card-title { 
            font-size: 24px; 
            color: var(--text-color); 
            margin-bottom: 20px; 
            font-weight: 600; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 10px; 
            text-align: left; 
        } 
 
        /* 用户卡片样式 */ 
        .user-card { 
            background: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            transition: var(--transition); 
        } 
 
        .user-card:hover { 
            box-shadow: var(--shadow); 
            border-color: var(--primary); 
        } 
 
        .user-img { 
            width: 60px; 
            height: 60px; 
            object-fit: cover; 
            border-radius: 8px; 
            flex-shrink: 0; 
        } 
 
        .user-info { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 12px; 
            align-items: center; 
        } 
 
        .user-info span { 
            color: var(--text-color); 
            font-size: 14px; 
        } 
 
        .user-info .user-name { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--primary); 
            grid-column: 1 / -1; 
        } 
 
        .user-card .form-button { 
            margin-left: auto; 
            white-space: nowrap; 
            height: fit-content; 
        } 
 
        /* 表单样式 */ 
        .form-container { 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            gap: 16px;
        }

        /* 搜索区域样式 */
        .search-area {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            flex: 1;
        }

        /* 表单项样式 */
        .form-item {
            flex: 1;
            max-width: 200px;
        }

        .form-input {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            height: 36px;
        }

        /* 按钮组样式 */
        .button-group {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .form-button, 
        .czcx-btn {
            height: 36px;
            padding: 0 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        /* 分页样式 */ 
        .pagination { 
            margin-top: 24px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 16px; 
        } 
 
        .pagination button { 
            background-color: var(--primary); 
            color: white; 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        } 
 
        #page-info { 
            color: var(--text-color); 
            font-size: 14px; 
        } 
 
        /* 加载提示 */ 
        .loading { 
            text-align: center; 
            font-size: 16px; 
            color: var(--primary); 
            padding: 20px; 
        } 
        .czcx-btn {
            background-color: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
            margin-left: auto;
        }
        
        .czcx-btn:hover {
            background-color: #4a77e4;
        }

        /* 添加搜索表单包装器 */
        .search-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 16px;
        }

        /* 调整充值按钮样式 */
        .recharge-btn {
            background-color: var(--primary);
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recharge-btn:hover {
            background-color: #4a77e4;
        }
        @media (max-width: 768px) {
        .form-container {
            flex-direction: column;
            align-items: stretch;
        }
    
        .search-area {
            flex-direction: column;
            align-items: stretch;
        }
    
        .form-item {
            max-width: 100%;
        }
    
        .button-group {
            flex-direction: column;
            align-items: stretch;
        }
    
        .form-button,
        .czcx-btn {
            width: 100%;
            justify-content: center;
        }
    
        .user-card {
            flex-direction: column;
            align-items: flex-start;
        }
    
        .user-info {
            grid-template-columns: 1fr; /* 一列 */
        }
    
        .recharge-btn {
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }
    }

    </style> 
</head> 
 
<body> 
    <div class="container"> 
        <div class="card"> 
            <div class="card-title">用户充值</div> 
            <!-- 表单搜索区域 --> 
            <div class="form-container"> 
                <div class="search-area">
                    <div class="form-item"> 
                        <label class="form-label">ID</label> 
                        <input type="text" name="id" placeholder="请输入" autocomplete="off" class="form-input"> 
                    </div> 
                    <div class="form-item"> 
                        <label class="form-label">用户名</label> 
                        <input type="text" name="username" placeholder="请输入" autocomplete="off" class="form-input"> 
                    </div> 
                    <div class="form-item"> 
                        <label class="form-label">手机号</label> 
                        <input type="text" name="phone" placeholder="请输入" autocomplete="off" class="form-input"> 
                    </div> 
                </div>
                <div class="button-group">
                    <button class="form-button" type="submit"> 
                        <i class="fas fa-search"></i> 搜索 
                    </button> 
                    <a href="Rechargeinquiry.html" class="czcx-btn">充值查询</a>
                </div> 
            </div> 
            <div id="user-list"> 
                <!-- 用户信息将动态加载 --> 
            </div> 
            <div id="loading" class="loading" style="display: none;">正在加载...</div> 
            <!-- 分页区域 --> 
            <div class="pagination"> 
                <button id="prev-page" disabled>上一页</button> 
                <span id="page-info">第 1 页，共 1 页</span> 
                <button id="next-page">下一页</button> 
            </div> 
        </div> 
    </div> 
 <script src="canvas-nest-colorful.js"></script>
    <script> 
        const searchButton = document.querySelector('.form-button');
        const searchInputs = document.querySelectorAll('.form-input');
        const userList = document.getElementById('user-list');  
        const prevPageButton = document.getElementById('prev-page');   
        const nextPageButton = document.getElementById('next-page');   
        const pageInfo = document.getElementById('page-info');   
        const loading = document.getElementById('loading');  
        let currentPage = 1; 
        let totalPages = 1; 
 
        // 初始化表格数据 
        function loadTableData(params = {}) { 
            params.page   = currentPage; 
            params.limit   = 20; 
 
            const queryString = Object.entries(params)   
               .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`) 
               .join('&'); 
            const url = `https://open.rcwulian.cn/api/user/getUserList.php?${queryString}`;   
 
            loading.style.display  = 'block'; 
            fetch(url) 
               .then(response => { 
                    if (!response.ok)   { 
                        throw new Error('网络响应异常'); 
                    } 
                    return response.json();   
                }) 
               .then(data => { 
                    loading.style.display  = 'none'; 
                    if (data.code   === 0) { 
                        // 清空列表 
                        userList.innerHTML   = ''; 
 
                        totalPages = Math.ceil(data.count   / params.limit);   
                        pageInfo.textContent   = `第 ${currentPage} 页，共 ${totalPages} 页`; 
 
                        prevPageButton.disabled   = currentPage === 1; 
                        nextPageButton.disabled   = currentPage === totalPages; 
 
                        data.data.forEach(item   => { 
                            const userHTML = ` 
                                <div class="user-card"> 
                                    <img class="user-img" src="${item.avatar}" onerror="this.src='default-avatar.png'">  
                                    <div class="user-info"> 
                                        <span class="user-name">${item.username}</span>  
                                        <span>ID: ${item.id}</span>  
                                        <span>手机号: ${item.phone || '未设置'}</span> 
                                        <span>用户余额: ¥${item.wallet || '0.00'}</span>  
                                        <span>加入时间: ${item.jointime}</span>  
                                    </div> 
                                    <button class="recharge-btn" onclick="rechargeUser(${item.id})">  
                                        <i class="fas fa-coins"></i> 充值 
                                    </button> 
                                </div> 
                            `; 
                            userList.insertAdjacentHTML('beforeend',  userHTML); 
                        }); 
                    } else { 
                        console.error('   获取用户列表失败:', data.msg);   
                    } 
                }) 
               .catch(error => { 
                    loading.style.display  = 'none'; 
                    console.error('   数据加载失败:', error); 
                }); 
        } 
 
        // 修改搜索事件监听
        searchButton.addEventListener('click', function(event) {
            event.preventDefault();
            const params = {};
            
            // 收集搜索输入值
            searchInputs.forEach(input => {
                if (input.value) {
                    params[input.name] = input.value;
                }
            });

            currentPage = 1;
            loadTableData(params);
        }); 
 
        // 上一页 
        prevPageButton.addEventListener('click',   function () { 
            if (currentPage > 1) { 
                currentPage--; 
                loadTableData(); 
            } 
        }); 
 
        // 下一页 
        nextPageButton.addEventListener('click',   function () { 
            if (currentPage < totalPages) { 
                currentPage++; 
                loadTableData(); 
            } 
        }); 
 
        // 用户充值功能 
        function rechargeUser(uid) { 
            const amount = prompt('请输入充值金额'); 
            if (amount &&!isNaN(amount)) { 
                // const url = 'https://open.rcwulian.cn/api/user/recharge.php';   
                const formData = new FormData(); 
                formData.append('uid',   uid); 
                formData.append('amount',   amount); 
 
                fetch(url, { 
                    method: 'POST', 
                    body: formData 
                }) 
               .then(response => { 
                    if (!response.ok)   { 
                        throw new Error('网络响应异常'); 
                    } 
                    return response.json();   
                }) 
               .then(res => { 
                    if (res.success)   { 
                        alert('充值成功'); 
                        loadTableData(); 
                    } else { 
                        alert('充值失败: ' + res.message);   
                    } 
                }) 
               .catch(error => { 
                    alert('请求失败，请稍后重试'); 
                    console.error('   充值请求失败:', error); 
                }); 
            } else { 
                alert('无效的充值金额'); 
            } 
        } 
        // 初始化加载数据 
        loadTableData(); 
    </script> 
 
</body> 
 
</html>
