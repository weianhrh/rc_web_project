<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>人工客服面板</title>
  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", system-ui;
    }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .chat-panel {
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      background: #fff;
      display: flex;
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      width: 300px;
      border-right: 1px solid var(--border-color);
      background-color: #f8f9ff;
      overflow-y: auto;
    }

    .sidebar h3 {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 18px;
      color: var(--primary);
    }

    .user-item {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: var(--transition);
    }

    .user-item:hover {
      background: var(--hover-bg);
    }

    .user-item.active {
      background-color: #e6eeff;
      font-weight: bold;
    }

    .chat-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      font-weight: bold;
      color: var(--text-color);
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .chat-footer {
      border-top: 1px solid var(--border-color);
      padding: 10px;
      display: flex;
      gap: 10px;
    }

    .chat-footer textarea {
      flex: 1;
      resize: none;
      padding: 8px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .chat-footer button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
    }

    .chat-footer button.send {
      background: var(--primary);
      color: #fff;
    }

    .chat-footer button.send:hover {
      background-color: #4a77e4;
    }

    .chat-footer button.end {
      background: #999;
      color: #fff;
    }

    .msg {
      display: flex;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .msg.user {
      justify-content: flex-start;
    }

    .msg.kf {
      justify-content: flex-end;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 70%;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .msg.user .bubble {
      background-color: #f2f2f2;
      color: #000;
    }

    .msg.kf .bubble {
      background-color: var(--primary);
      color: #fff;
    }

    #msgTip {
      text-align: right;
      color: green;
      font-size: 13px;
      padding: 4px 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="chat-panel">
    <div class="sidebar">
      <h3>待接入用户</h3>
      <div id="userList"></div>
    </div>
    <div class="chat-content">
      <div class="chat-header" id="chatHeader">请选择用户</div>
      <div class="chat-body" id="chatHistory"></div>
      <div id="msgTip"></div>
      <div class="chat-footer">
        <textarea id="msgInput" placeholder="请输入回复内容..."></textarea>
        <button class="send" onclick="sendMsg()">发送</button>
        <button class="end" onclick="endSession()">结束会话</button>
      </div>
    </div>
  </div>

  <script>
    let currentUserId = null;

    function loadUsers() {
      fetch('https://open.rcwulian.cn/api/wx/get_kfstate3_users.php')
        .then(res => res.json())
        .then(users => {
          const list = document.getElementById('userList');
          list.innerHTML = '';
          users.forEach(user => {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.textContent = `${user.userid} - ${user.last_msg}`;
            div.onclick = () => {
              currentUserId = user.userid;
              document.getElementById('chatHeader').textContent = `正在与 ${user.userid} 对话`;
              loadMessages(currentUserId);

              // 清除高亮
              document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
              div.classList.add('active');

              // ✅ 通知微信客服已接入 & 写入 Redis
              fetch('https://open.rcwulian.cn/api/wx/sendmsg.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `userid=${encodeURIComponent(currentUserId)}&msg=&event=waiterEnter`
              });

              fetch(`https://open.rcwulian.cn/api/wx/kf_state.php?action=set&userid=${encodeURIComponent(currentUserId)}`);
            };
            list.appendChild(div);
          });
        });
    }

    function loadMessages(userid) {
      fetch(`https://open.rcwulian.cn/api/wx/load_messages.php?userid=${userid}`)
        .then(res => res.json())
        .then(msgs => {
          const history = document.getElementById('chatHistory');
          history.innerHTML = '';
          msgs.forEach(msg => {
            if (!msg.msg || msg.msg.trim() === '') return;
            const wrapper = document.createElement('div');
            wrapper.className = 'msg ' + (msg.from === 0 ? 'user' : 'kf');

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = msg.msg;

            wrapper.appendChild(bubble);
            history.appendChild(wrapper);
          });
        });
    }

    function sendMsg() {
      const msg = document.getElementById('msgInput').value.trim();
      if (!msg || !currentUserId) return alert('请选择用户并输入内容');
      fetch('https://open.rcwulian.cn/api/wx/sendmsg.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `userid=${encodeURIComponent(currentUserId)}&msg=${encodeURIComponent(msg)}`
      })
      .then(res => res.json())
      .then(result => {
        if (result.status === 1) {
          document.getElementById('msgInput').value = '';
          loadMessages(currentUserId);
          showSuccessTip();
          loadUsers(); // ✅ 更新列表状态
        } else {
          alert(result.msg || '发送失败');
        }
      });
    }

    function endSession() {
      if (!currentUserId) return;

      fetch('https://open.rcwulian.cn/api/wx/sendmsg.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `userid=${encodeURIComponent(currentUserId)}&msg=&event=waiterQuit`
      });

      fetch(`https://open.rcwulian.cn/api/wx/kf_state.php?action=del&userid=${encodeURIComponent(currentUserId)}`);

      currentUserId = null;
      document.getElementById('chatHeader').textContent = '请选择用户';
      document.getElementById('chatHistory').innerHTML = '';
      loadUsers();
    }

    function showSuccessTip(text = '发送成功') {
      const tip = document.getElementById('msgTip');
      tip.textContent = text;
      tip.style.opacity = 0;
      tip.style.display = 'block';
      let opacity = 0;
      const fadeIn = setInterval(() => {
        opacity += 0.1;
        tip.style.opacity = opacity;
        if (opacity >= 1) clearInterval(fadeIn);
      }, 30);

      setTimeout(() => {
        const fadeOut = setInterval(() => {
          opacity -= 0.1;
          tip.style.opacity = opacity;
          if (opacity <= 0) {
            clearInterval(fadeOut);
            tip.style.display = 'none';
          }
        }, 30);
      }, 2000);
    }

    setInterval(() => {
      if (typeof currentUserId === 'string' && currentUserId.trim() !== '') {
        loadMessages(currentUserId);
      }
    }, 5000);

    loadUsers();
  </script>
</body>
</html>
