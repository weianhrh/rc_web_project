<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>专区详情</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --primary: #4f7cff;
      --primary-dark: #3867f0;
      --primary-soft: #eef3ff;
      --bg: #f5f7ff;
      --card-bg: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --line: #e5e7eb;
      --danger: #ef4444;
      --danger-soft: #fff1f2;
      --success: #16a34a;
      --success-soft: #ecfdf5;
      --warning: #f59e0b;
      --warning-soft: #fffbeb;
      --shadow: 0 16px 40px rgba(36, 72, 160, 0.10);
      --shadow-soft: 0 10px 24px rgba(36, 72, 160, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --transition: all .22s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(79,124,255,.16), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(22,163,74,.10), transparent 28%),
        linear-gradient(135deg, #f7f9ff 0%, #eef3ff 100%);
      padding: 22px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .page-shell {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .hero-card {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      backdrop-filter: blur(12px);
      margin-bottom: 16px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: 28px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .hero-desc {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      height: 38px;
      padding: 0 15px;
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 8px 18px rgba(79,124,255,.24);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 650;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(79,124,255,.28);
    }

    .btn:disabled {
      opacity: .65;
      cursor: not-allowed;
      transform: none;
    }

    .btn.secondary {
      background: #f3f4f6;
      color: #374151;
      box-shadow: none;
      border: 1px solid var(--line);
    }

    .btn.secondary:hover {
      background: #e5e7eb;
      box-shadow: none;
    }

    .btn.danger {
      background: linear-gradient(135deg, #ff5a5f, #ef4444);
      box-shadow: 0 8px 18px rgba(239,68,68,.20);
    }

    .btn.small {
      height: 34px;
      padding: 0 12px;
      border-radius: 10px;
      font-size: 13px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.82);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-soft);
      padding: 16px;
    }

    .summary-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 22px;
      font-weight: 850;
      color: var(--text);
      word-break: break-all;
    }

    .content-card {
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(255,255,255,.82);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .section-title {
      font-size: 19px;
      font-weight: 800;
    }

    .section-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .venue-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .venue-card {
      background: #fff;
      border: 1px solid #edf0f7;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 20px rgba(17,24,39,.04);
      padding: 14px;
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 14px;
      transition: var(--transition);
      min-height: 148px;
    }

    .venue-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(17,24,39,.08);
      border-color: #dfe6ff;
    }

    .venue-cover {
      width: 128px;
      height: 116px;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, #eef3ff, #f8fafc);
      border: 1px solid #edf0f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #93a0b8;
      font-size: 13px;
      font-weight: 650;
    }

    .venue-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .venue-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .venue-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .venue-name {
      font-size: 17px;
      font-weight: 850;
      color: var(--text);
      word-break: break-word;
    }

    .venue-id {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
      color: #3150c8;
      background: var(--primary-soft);
      white-space: nowrap;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .meta-item {
      min-width: 0;
      background: #f8faff;
      border: 1px solid #eef2ff;
      border-radius: 12px;
      padding: 8px 10px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 750;
      color: var(--text);
      word-break: break-all;
    }

    .zone-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px;
      align-items: center;
      margin-top: 2px;
    }

    .zone-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .zone-badge {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--success-soft);
      color: #047857;
      font-size: 13px;
      font-weight: 800;
      word-break: break-all;
    }

    .zone-select {
      display: none;
      width: min(360px, 100%);
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: none;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      transition: var(--transition);
    }

    .zone-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,124,255,.12);
    }

    .zone-select.show {
      display: block;
    }

    .venue-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 4px;
    }

    .loading,
    .empty-state {
      min-height: 160px;
      border: 1px dashed #d8def0;
      border-radius: var(--radius-md);
      background: #fbfcff;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      grid-column: 1 / -1;
      font-size: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      inset: 0;
      background: rgba(15, 23, 42, .56);
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-panel {
      width: min(680px, 96vw);
      max-height: min(86vh, 760px);
      overflow: hidden;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
      border: 1px solid rgba(255,255,255,.9);
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(10px);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 850;
      margin-bottom: 4px;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .modal-close {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      background: #f3f4f6;
      color: #4b5563;
      transition: var(--transition);
      font-size: 18px;
    }

    .modal-close:hover {
      background: #e5e7eb;
    }

    .modal-body {
      padding: 18px 22px 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .search-input {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      font-size: 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      outline: none;
      background: #fff;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,124,255,.12);
    }

    .venue-dropdown {
      width: 100%;
      max-height: 330px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }

    .venue-option {
      padding: 12px 14px;
      border-bottom: 1px solid #eef2ff;
      cursor: pointer;
      transition: var(--transition);
    }

    .venue-option:last-child {
      border-bottom: none;
    }

    .venue-option:hover {
      background: #f6f8ff;
    }

    .venue-option-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 5px;
    }

    .venue-option-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .selected-info {
      font-size: 13px;
      color: #374151;
      background: #f7f8ff;
      border: 1px solid #e1e6ff;
      border-radius: 14px;
      padding: 10px 12px;
      min-height: 40px;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .toast {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 2000;
      min-width: 220px;
      max-width: 360px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #111827;
      color: #fff;
      box-shadow: 0 16px 32px rgba(15,23,42,.26);
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: var(--transition);
      font-size: 14px;
      line-height: 1.5;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #047857;
    }

    .toast.error {
      background: #be123c;
    }

    @media (max-width: 1100px) {
      .venue-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .hero-card,
      .section-head {
        flex-direction: column;
        align-items: stretch;
      }

      .hero-actions {
        width: 100%;
      }

      .hero-actions .btn {
        flex: 1;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .venue-card {
        grid-template-columns: 1fr;
      }

      .venue-cover {
        width: 100%;
        height: 170px;
      }

      .zone-row {
        grid-template-columns: 1fr;
      }

      .venue-actions,
      .modal-actions {
        flex-direction: column;
      }

      .venue-actions .btn,
      .modal-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <section class="hero-card">
      <div>
        <div class="kicker">专区详情</div>
        <h1 class="hero-title" id="zoneTitle">专区详情</h1>
        <div class="hero-desc" id="zoneDesc">查看该专区下的场地，并支持直接用专区下拉框调整场地归属。</div>
      </div>
      <div class="hero-actions">
        <button class="btn secondary" type="button" onclick="location.href='zone.html'">返回列表</button>
        <button class="btn" type="button" onclick="openAddVenueModal()">＋ 添加场地</button>
      </div>
    </section>

    <section class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">当前专区 ID</div>
        <div class="summary-value" id="summaryZoneId">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">当前专区名称</div>
        <div class="summary-value" id="summaryZoneName">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">场地数量</div>
        <div class="summary-value" id="summaryVenueCount">0</div>
      </div>
    </section>

    <section class="content-card">
      <div class="section-head">
        <div>
          <div class="section-title">专区场地列表</div>
          <div class="section-subtitle">点击“修改专区”后，直接选择专区并保存。</div>
        </div>
      </div>

      <div id="venueList" class="venue-list">
        <div class="loading">加载中...</div>
      </div>
    </section>
  </div>

  <!-- 添加场地弹窗 -->
  <div class="modal" id="addVenueModal" onclick="closeAddVenueModal()">
    <div class="modal-panel" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div>
          <div class="modal-title">添加场地到当前专区</div>
          <div class="modal-desc">可以输入场地名称或 ID 搜索，然后提交到当前专区。</div>
        </div>
        <button class="modal-close" type="button" onclick="closeAddVenueModal()">×</button>
      </div>

      <div class="modal-body">
        <input
          class="search-input"
          type="text"
          id="venueSearchInput"
          placeholder="输入场地名称或 ID 快速搜索，例如：朵朵、远程、1001"
          autocomplete="off"
          oninput="onVenueSearchInput()"
        />

        <div id="venueDropdown" class="venue-dropdown">
          <div class="empty-state">请输入场地名称或 ID 搜索</div>
        </div>

        <input type="hidden" id="selectedVenueId" />

        <div class="selected-info" id="selectedVenueText">
          未选择场地
        </div>

        <div class="modal-actions">
          <button class="btn secondary" type="button" onclick="closeAddVenueModal()">取消</button>
          <button class="btn" type="button" id="addVenueSubmitBtn" onclick="submitAddVenueToZone()">确认添加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ZONE_API_BASE = 'https://open.rcwulian.cn/api/zone';
    const ZONES_API = 'https://open.rcwulian.cn/api/venue/zones.php';

    const params = new URLSearchParams(window.location.search);
    const zoneId = params.get('zone_id');

    let allZones = [];
    let currentZone = null;
    let currentVenues = [];
    let venueSearchTimer = null;
    let selectedVenue = null;
    let toastTimer = null;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, function (m) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m];
      });
    }

    function normalizeUrl(url) {
      const value = String(url || '').trim();
      if (!value) return '';
      return value.replace(/^http:\/\//i, 'https://');
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = 'toast';
      }, 2200);
    }

    function renderImage(url) {
      const imgUrl = normalizeUrl(url);
      if (!imgUrl) return '<div>暂无图片</div>';
      return `<img src="${escapeHtml(imgUrl)}" alt="场地图" onerror="handleImageError(this)" />`;
    }

    function handleImageError(img) {
      const parent = img && img.parentElement;
      if (!parent) return;
      parent.innerHTML = '<div>图片加载失败</div>';
    }

    function getZoneById(id) {
      return allZones.find(z => String(z.zone_id) === String(id));
    }

    function getZoneLabel(id) {
      const normalized = String(id ?? '');
      if (normalized === '' || normalized === '0' || normalized.toLowerCase() === 'null') {
        return '0 - 未分区';
      }

      const zone = getZoneById(normalized);
      if (!zone) return `${normalized} - 未知专区`;
      return `${zone.zone_id} - ${zone.partition_name || '未命名专区'}`;
    }

    function buildZoneOptions(currentId) {
      const selected = String(currentId ?? '0');
      let html = `<option value="0" ${selected === '0' || selected === '' ? 'selected' : ''}>0 - 未分区</option>`;

      allZones.forEach(zone => {
        const value = String(zone.zone_id);
        html += `<option value="${escapeHtml(value)}" ${value === selected ? 'selected' : ''}>${escapeHtml(value)} - ${escapeHtml(zone.partition_name || '未命名专区')}</option>`;
      });

      if (
        selected &&
        selected !== '0' &&
        !allZones.some(zone => String(zone.zone_id) === selected)
      ) {
        html += `<option value="${escapeHtml(selected)}" selected>${escapeHtml(selected)} - 当前未知专区</option>`;
      }

      return html;
    }

    async function loadZonesMeta() {
      try {
        const res = await fetch(ZONES_API);
        const result = await res.json();

        if (result.code === 0 && Array.isArray(result.data)) {
          allZones = result.data.slice().sort((a, b) => {
            const sa = Number(a.sort_order ?? 0);
            const sb = Number(b.sort_order ?? 0);
            if (sa !== sb) return sa - sb;
            return Number(a.zone_id ?? 0) - Number(b.zone_id ?? 0);
          });
        } else {
          allZones = [];
          showToast('专区列表加载失败：' + (result.msg || '未知错误'), 'error');
        }
      } catch (e) {
        allZones = [];
        showToast('专区列表请求失败：' + e.message, 'error');
      }

      currentZone = getZoneById(zoneId);
      updateHeader();
    }

    function updateHeader() {
      document.getElementById('summaryZoneId').textContent = zoneId || '-';
      document.getElementById('summaryVenueCount').textContent = currentVenues.length;

      if (!zoneId) {
        document.getElementById('zoneTitle').textContent = '专区详情：缺少 zone_id';
        document.getElementById('summaryZoneName').textContent = '-';
        document.getElementById('zoneDesc').textContent = '当前页面 URL 缺少 zone_id 参数。';
        return;
      }

      const title = currentZone
        ? `${currentZone.partition_name || '未命名专区'}`
        : `专区 ${zoneId}`;

      document.getElementById('zoneTitle').textContent = title;
      document.getElementById('summaryZoneName').textContent = currentZone ? (currentZone.partition_name || '未命名专区') : '未匹配到专区名称';
      document.getElementById('zoneDesc').textContent = `当前专区 ID：${zoneId}，可在列表里直接把场地移动到其他专区。`;
    }

    async function loadVenues() {
      const venueList = document.getElementById('venueList');

      if (!zoneId) {
        venueList.innerHTML = '<div class="empty-state">缺少 zone_id</div>';
        return;
      }

      venueList.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(`${ZONE_API_BASE}/get_venues_by_zone.php?zone_id=${encodeURIComponent(zoneId)}`);
        const result = await res.json();

        if (result.code !== 0) {
          venueList.innerHTML = `<div class="empty-state">加载失败：${escapeHtml(result.msg || '未知错误')}</div>`;
          currentVenues = [];
          updateHeader();
          return;
        }

        currentVenues = Array.isArray(result.data) ? result.data : [];
        updateHeader();
        renderVenues();
      } catch (e) {
        currentVenues = [];
        updateHeader();
        venueList.innerHTML = `<div class="empty-state">请求失败：${escapeHtml(e.message)}</div>`;
      }
    }

    function renderVenues() {
      const venueList = document.getElementById('venueList');

      if (!currentVenues.length) {
        venueList.innerHTML = '<div class="empty-state">当前专区暂无场地数据</div>';
        return;
      }

      venueList.innerHTML = '';

      currentVenues.forEach(venue => {
        const venueId = Number(venue.id);
        const div = document.createElement('div');
        div.className = 'venue-card';
        div.id = `venue_card_${venueId}`;

        div.innerHTML = `
          <div class="venue-cover">
            ${renderImage(venue.image_url)}
          </div>

          <div class="venue-main">
            <div class="venue-title-row">
              <div class="venue-name">${escapeHtml(venue.venue_name || '未命名场地')}</div>
              <span class="venue-id">ID ${escapeHtml(venue.id)}</span>
            </div>

            <div class="meta-grid">
              <div class="meta-item">
                <div class="meta-label">开放时间</div>
                <div class="meta-value">${escapeHtml(venue.start_time || '-')}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">排队人数</div>
                <div class="meta-value">${escapeHtml(venue.queue_length || 0)}</div>
              </div>
            </div>

            <div class="zone-row">
              <div class="zone-label">当前专区</div>
              <div>
                <span class="zone-badge" id="current_zone_${venueId}">${escapeHtml(getZoneLabel(venue.zone_id))}</span>
                <select class="zone-select" id="zone_select_${venueId}">
                  ${buildZoneOptions(venue.zone_id)}
                </select>
              </div>
            </div>

            <div class="venue-actions">
              <button class="btn small" id="edit_btn_${venueId}" type="button" onclick="toggleEdit(${venueId})">修改专区</button>
              <button class="btn small secondary" id="cancel_btn_${venueId}" type="button" onclick="cancelEdit(${venueId})" style="display:none">取消</button>
            </div>
          </div>
        `;

        venueList.appendChild(div);
      });
    }

    function closeOtherEditors(currentId) {
      currentVenues.forEach(venue => {
        const id = Number(venue.id);
        if (id !== Number(currentId)) cancelEdit(id);
      });
    }

    function toggleEdit(id) {
      const select = document.getElementById(`zone_select_${id}`);
      const badge = document.getElementById(`current_zone_${id}`);
      const btn = document.getElementById(`edit_btn_${id}`);
      const cancelBtn = document.getElementById(`cancel_btn_${id}`);

      if (!select || !badge || !btn || !cancelBtn) return;

      if (!select.classList.contains('show')) {
        closeOtherEditors(id);
        select.classList.add('show');
        badge.style.display = 'none';
        cancelBtn.style.display = 'inline-flex';
        btn.textContent = '保存';
        return;
      }

      updateVenueZone(id);
    }

    function cancelEdit(id) {
      const select = document.getElementById(`zone_select_${id}`);
      const badge = document.getElementById(`current_zone_${id}`);
      const btn = document.getElementById(`edit_btn_${id}`);
      const cancelBtn = document.getElementById(`cancel_btn_${id}`);

      if (!select || !badge || !btn || !cancelBtn) return;

      const venue = currentVenues.find(v => Number(v.id) === Number(id));
      if (venue) select.value = String(venue.zone_id ?? '0');

      select.classList.remove('show');
      badge.style.display = 'inline-flex';
      cancelBtn.style.display = 'none';
      btn.disabled = false;
      btn.textContent = '修改专区';
    }

    async function updateVenueZone(venueId) {
      const select = document.getElementById(`zone_select_${venueId}`);
      const btn = document.getElementById(`edit_btn_${venueId}`);
      if (!select || !btn) return;

      const newZoneId = select.value;

      const form = new URLSearchParams({
        venue_id: venueId,
        zone_id: newZoneId
      });

      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        const res = await fetch(`${ZONE_API_BASE}/update_venue_zone.php`, {
          method: 'POST',
          body: form
        });

        const result = await res.json();

        if (result.code === 0) {
          showToast(`修改成功，已移动到：${getZoneLabel(newZoneId)}`, 'success');
          await loadZonesMeta();
          await loadVenues();
        } else {
          showToast('修改失败：' + (result.msg || '未知错误'), 'error');
          btn.disabled = false;
          btn.textContent = '保存';
        }
      } catch (e) {
        showToast('请求失败：' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = '保存';
      }
    }

    function openAddVenueModal() {
      if (!zoneId) {
        showToast('缺少当前专区 zone_id', 'error');
        return;
      }

      selectedVenue = null;
      document.getElementById('venueSearchInput').value = '';
      document.getElementById('selectedVenueId').value = '';
      document.getElementById('selectedVenueText').textContent = '未选择场地';
      document.getElementById('venueDropdown').innerHTML = '<div class="empty-state">加载场地中...</div>';
      document.getElementById('addVenueModal').style.display = 'flex';

      searchVenues('');

      setTimeout(() => {
        document.getElementById('venueSearchInput').focus();
      }, 50);
    }

    function closeAddVenueModal() {
      document.getElementById('addVenueModal').style.display = 'none';
    }

    function onVenueSearchInput() {
      selectedVenue = null;
      document.getElementById('selectedVenueId').value = '';
      document.getElementById('selectedVenueText').textContent = '未选择场地';

      const keyword = document.getElementById('venueSearchInput').value.trim();

      clearTimeout(venueSearchTimer);
      venueSearchTimer = setTimeout(() => {
        searchVenues(keyword);
      }, 250);
    }

    async function searchVenues(keyword) {
      const dropdown = document.getElementById('venueDropdown');
      dropdown.innerHTML = '<div class="empty-state">搜索中...</div>';

      try {
        const res = await fetch(`${ZONE_API_BASE}/search_venues.php?keyword=${encodeURIComponent(keyword)}`);
        const result = await res.json();

        if (result.code !== 0) {
          dropdown.innerHTML = `<div class="empty-state">搜索失败：${escapeHtml(result.msg || '未知错误')}</div>`;
          return;
        }

        renderVenueOptions(result.data || []);
      } catch (e) {
        dropdown.innerHTML = `<div class="empty-state">请求失败：${escapeHtml(e.message)}</div>`;
      }
    }

    function renderVenueOptions(venues) {
      const dropdown = document.getElementById('venueDropdown');
      dropdown.innerHTML = '';

      if (!venues.length) {
        dropdown.innerHTML = '<div class="empty-state">没有找到匹配的场地</div>';
        return;
      }

      venues.forEach(venue => {
        const item = document.createElement('div');
        item.className = 'venue-option';

        const inCurrentZone = String(venue.zone_id ?? '0') === String(zoneId);

        item.innerHTML = `
          <div class="venue-option-name">
            ${escapeHtml(venue.id)} - ${escapeHtml(venue.venue_name || '未命名场地')}
          </div>
          <div class="venue-option-meta">
            当前专区：${escapeHtml(getZoneLabel(venue.zone_id))}　
            ${inCurrentZone ? '已在当前专区　' : ''}
            开放时间：${escapeHtml(venue.start_time || '-')}　
            排队人数：${escapeHtml(venue.queue_length || 0)}
          </div>
        `;

        item.onclick = function () {
          selectVenue(venue);
        };

        dropdown.appendChild(item);
      });
    }

    function selectVenue(venue) {
      selectedVenue = venue;

      document.getElementById('selectedVenueId').value = venue.id;
      document.getElementById('venueSearchInput').value = `${venue.id} - ${venue.venue_name || ''}`;

      document.getElementById('selectedVenueText').textContent =
        `已选择：${venue.id} - ${venue.venue_name || '未命名场地'}，当前专区：${getZoneLabel(venue.zone_id)}，将添加到：${getZoneLabel(zoneId)}`;

      document.getElementById('venueDropdown').innerHTML =
        '<div class="empty-state">已选择场地，点击下方“确认添加”即可</div>';
    }

    async function submitAddVenueToZone() {
      if (!zoneId) {
        showToast('缺少当前专区 zone_id', 'error');
        return;
      }

      if (!selectedVenue || !selectedVenue.id) {
        showToast('请先选择一个场地', 'error');
        return;
      }

      if (String(selectedVenue.zone_id ?? '0') === String(zoneId)) {
        showToast('该场地已经在当前专区，无需重复添加', 'error');
        return;
      }

      const btn = document.getElementById('addVenueSubmitBtn');
      const form = new URLSearchParams({
        venue_id: selectedVenue.id,
        zone_id: zoneId
      });

      btn.disabled = true;
      btn.textContent = '添加中...';

      try {
        const res = await fetch(`${ZONE_API_BASE}/update_venue_zone.php`, {
          method: 'POST',
          body: form
        });

        const result = await res.json();

        if (result.code === 0) {
          showToast('添加成功', 'success');
          closeAddVenueModal();
          await loadZonesMeta();
          await loadVenues();
        } else {
          showToast('添加失败：' + (result.msg || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('请求失败：' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '确认添加';
      }
    }

    async function initPage() {
      await loadZonesMeta();
      await loadVenues();
    }

    initPage();
  </script>
</body>
</html>
