#customAlert {
    position: fixed;
    top: 40%;
    left: 50%;

    border: 2px solid red;
    padding: 40px 60px;
    z-index: 9999;
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
    display: none;
    text-align: center;
    border-radius: 12px;
    width: auto;
    max-width: 400px;
    word-break: break-word;
}

#customAlertClose {
    position: absolute;
    top: 8px;
    right: 10px;
    color: red;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10000;
}


#customAlertMessage {
    font-size: 28px;

    margin-bottom: 20px;
}

#customAlert button {
    padding: 12px 30px;

    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

        width: 90vw;

    localStorage.setItem(SHOW_MODE_KEY, showPredictedMode);
    updatePredictedBtn();
    filterPredictedCards();
}

// 更新按钮文字

    let text = '全部显示';

    else if (showPredictedMode === 'onlyNonPredicted') text = '仅显示非自研';
    document.getElementById('togglePredictedBtn').innerText = text;
    filterPredictedCards();
}

            card.style.display = isPredicted ? '' : 'none';
        } else if (showPredictedMode === 'onlyNonPredicted') {
            card.style.display = !isPredicted ? '' : 'none';
        }
    });

        function toDisplayUrl(url) {
          try {
            return url.replace(/\/pending_images_folder\//i, '/risk_images_folder/');
          } catch { return url; }
        }
        
        // 互换 pending <-> risk（用于 onerror 兜底）
        function swapPendingRisk(url) {
          if (/\/pending_images_folder\//i.test(url))
            return url.replace(/\/pending_images_folder\//i, '/risk_images_folder/');
          if (/\/risk_images_folder\//i.test(url))
            return url.replace(/\/risk_images_folder\//i, '/pending_images_folder/');
          return url;
        }
        
        // <img> 加载失败时只尝试互换一次
        function imgFallback(img) {
          if (img.dataset.tried === '1') return;
          img.dataset.tried = '1';
          const alt = swapPendingRisk(img.src);
          if (alt !== img.src) img.src = alt;
        }

        function renderViolations(violations) {
    const container = document.getElementById('violationsContainer');
    container.innerHTML = '';

    // 按风险等级排序：high > medium > low
    violations.sort((a, b) => {
        const levelWeight = { high: 3, medium: 2, low: 1 };
        return (levelWeight[b.risk_level] || 0) - (levelWeight[a.risk_level] || 0);
    });

    violations.forEach(violation => {
        const card = document.createElement('div');
        card.className = 'violation-card';

        // ✅ 把归档相关字段挂到卡片上
        card.dataset.archiveKey = violation.archive_key || '';
        card.dataset.redisKey = violation.redis_key || '';
        card.dataset.sourceType = violation.source_type || '';
        card.dataset.rawSerial = violation.key || '';

        const venueName = (violation.venue_name || '');
        const isSensitiveVenue = SENSITIVE_VENUES.some(k => venueName.includes(k));
        const displayUrl = toDisplayUrl(violation.image_url || '');

        card.innerHTML = `
            <div class="image-wrapper">
                <img src="${displayUrl}"
                    alt="违规截图"
                    class="card-image"
                    loading="lazy"
                    onclick="showImageModal('${displayUrl}')"
                    onerror="imgFallback(this)">
                <div class="time-overlay">${violation.time || ''}</div>
            </div>
            <div class="card-content">
                <div class="risk-and-count">
                    <div class="risk-level ${getRiskClass(violation.risk_level)}">
                        ${getRiskText(violation.risk_level)}
                    </div>
                    <div class="violation-count">
                        <span class="count-num">${violation.hit_count ?? 0}</span> 次违规
                    </div>
                </div>

                <div class="card-venue ${isSensitiveVenue ? 'hl' : ''}">
                    场地：${venueName}
                </div>

                <div class="card">
                    违规次数：<span class="count-num">${violation.violation_count ?? 0}</span> 次违规
                </div>
                <div class="card-reason">描述：${violation.reason || ''}</div>

                ${violation.remark ? `<div class="card-remark">备注：${violation.remark}</div>` : ''}

                <div class="manual-tagging">
                  <label for="riskLabel_${violation.key}">实际标记：</label>
                  <select id="riskLabel_${violation.key}" class="manual-risk-label">
                      <option value="">请选择</option>
                      <option value="safe">安全</option>
                      <option value="low">低风险</option>
                      <option value="medium">中风险</option>
                      <option value="high">高风险</option>

                </div>

                <button onclick="banDevice(this, '${violation.key}')">

                </button>
                <button class="button-off" onclick="offbanDevice(this, '${violation.key}')">
                    忽略
                </button>
            </div>
        `;

        container.appendChild(card);
    });

    filterPredictedCards();
}

        function getRiskClass(level) {
            return {
                high: 'risk-high',
                medium: 'risk-medium',
                low: 'risk-low'
            }[level] || 'risk-medium';
        }

        function getRiskText(level) {
            return {
                high: '高风险',
                medium: '中风险',
                low: '低风险'
            }[level] || '未知风险';
        }

        function offbanDevice(button, serialNumber) {
    if (!confirm(`确定要忽略设备 ${serialNumber} 的本次违规记录吗？`)) return;

    const card = button?.closest('.violation-card');
    const cardContent = button?.closest('.card-content');
    const imageUrl = card?.querySelector('img')?.src || '';
    const hasRemark = cardContent?.querySelector('.card-remark') !== null;

    // 兼容你当前后端 serial 逻辑
    const finalSerial = hasRemark ? (serialNumber + '_predicted') : serialNumber;

    const archiveKey = card?.dataset.archiveKey || '';
    const redisKey = card?.dataset.redisKey || '';

    let manualRiskLevel = '';
    const selectElem = cardContent?.querySelector('.manual-risk-label');
    if (selectElem) {
        manualRiskLevel = selectElem.value || '';
    }

    const formData = new URLSearchParams();
    formData.append('serial_number', finalSerial);
    formData.append('manual_risk', manualRiskLevel);
    formData.append('image_url', imageUrl);
    formData.append('archive_key', archiveKey);
    formData.append('redis_key', redisKey);

    fetch('/api/pop/clear_device_violation.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || (data.success ? '忽略成功' : '忽略失败'));
        if (data.success) {
            fetchViolations();
        }
    })
    .catch(err => {
        alert('忽略请求失败：' + err);
        console.error(err);
    });
}

        let defaultReason = '';
        
        function banDevice(button, key) {
    selectedBanButton = button;
    selectedKey = key;

    const card = button?.closest('.violation-card');
    const cardContent = button?.closest('.card-content');

    selectedArchiveKey = card?.dataset.archiveKey || '';
    selectedRedisKey = card?.dataset.redisKey || '';

    const reasonElem = cardContent?.querySelector('.card-reason');
    defaultReason = reasonElem ? reasonElem.textContent.replace('描述：', '') : '';

    document.getElementById('banDeviceKey').textContent = key;
    document.getElementById('banDuration').value = '360';
    document.getElementById('banReason').value = defaultReason;

    document.getElementById('banModal').classList.add('show');
}
        
        function closeBanModal() {
            document.getElementById('banModal').classList.remove('show');

    function confirmBan() {
    const duration = document.getElementById('banDuration').value;
    const reason = document.getElementById('banReason').value;
    const imageSerial = selectedKey;

    const button = selectedBanButton;
    const card = button?.closest('.violation-card');
    const cardContent = button?.closest('.card-content');
    const imageUrl = card?.querySelector('img')?.src || '';

    const hasRemark = cardContent?.querySelector('.card-remark') !== null;

    // 兼容你当前后端 image_device_serial 逻辑
    const finalSerial = hasRemark ? imageSerial.replace('_predicted', '') : imageSerial;

    let manualRiskLevel = '';
    const selectElem = cardContent?.querySelector('.manual-risk-label');
    if (selectElem) {
        manualRiskLevel = selectElem.value || '';
    }

    const formData = new URLSearchParams();
    formData.append('image_device_serial', finalSerial);
    formData.append('image_url', imageUrl);
    formData.append('ban_duration', duration);
    formData.append('ban_reason', reason);
    formData.append('manual_risk', manualRiskLevel);
    formData.append('archive_key', selectedArchiveKey || '');
    formData.append('redis_key', selectedRedisKey || '');

    fetch('/api/pop/handle_device_ban.php', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || (data.success ? '封禁成功' : '封禁失败'));
        if (data.success) {
            closeBanModal();
            const card = button?.closest('.violation-card');
            card?.remove();
            fetchViolations();
        }
    })
    .catch(err => {
        alert('请求异常：' + err);
        console.error(err);
    });
}

<script>
let reportAlertShown = false;
let lastReportCount = 0;
let lastAlertTimestamp = 0;
const REPORT_POPUP_INTERVAL = 10 * 60 * 1000; // 10分钟

function checkReportCount() {
    const now = Date.now();

    // 防止过于频繁弹窗（10分钟内只提示一次）
    if (reportAlertShown && now - lastAlertTimestamp < REPORT_POPUP_INTERVAL) return;

    fetch('https://open.rcwulian.cn/api/index/adminbackstage.php')
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                const reportCount = data.data.reportCount || 0;

                // 只有在数量增加，并且我们还没提示过，才去校验详情
                if (reportCount > lastReportCount && !reportAlertShown) {

                    // 二次确认，是否还有“未处理或处理中”的投诉
                    fetch('https://open.rcwulian.cn/api/operat/ReporthandV2.php')
                        .then(r => r.json())
                        .then(reportData => {
                            if (reportData.code === 0 && reportData.data.length > 0) {
                                document.getElementById('customAlertMessage').textContent =
                                    `当前有 ${reportCount} 条举报待处理，是否立即前往？`;
                                document.getElementById('customAlert').style.display = 'block';
                                reportAlertShown = true;
                                lastAlertTimestamp = now;
                            }

                            lastReportCount = reportCount; // 不论结果，更新记录值
                        });
                }
            }
        })
        .catch(err => {
            console.error('举报数量检查失败:', err);
        });
}



function goToReportReview() {
    window.location.href = "https://open.rcwulian.cn/res/reporthand.html";
}


checkReportCount();
setInterval(checkReportCount, 10000);
setTimeout(() => {
    if (document.getElementById('customAlert').style.display === 'block') {
        closeCustomAlert();
    }
}, 30000); // 15秒后自动关闭

</script>

<script>
(function(){
  const INTERVAL = 60000;  //1分钟 轮询
  let current = null;
  let hasShownLoginError = false; // ★ 新增：是否已经提示过登录过期
  // 补签弹窗（带自动补签+不同提示）
  function showResignModal(info){
    if (document.getElementById('resignModal')) return;
    const box = document.createElement('div');
    box.id='resignModal';
    box.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:10000;';
    box.innerHTML=`
      <div style="background:#fff;padding:20px;border-radius:10px;text-align:center;min-width:220px">
        <div style="margin-bottom:10px;">本时间段签到不足 3 次</div>
        <div style="margin-bottom:10px;">给你最后一次补签机会</div>
        <button id="btnResign" style="padding:6px 16px;border:none;border-radius:6px;background:#5b8cff;color:#fff;">立即补签</button>
      </div>`;
    document.body.appendChild(box);

    let done = false;      // 防止重复提交
    let autoTimer = null;  // 自动补签定时器句柄
   
    // 统一的补签请求（手动/自动都用它）
    function doResign(auto = false) {
      if (done) return;
      done = true;
      if (autoTimer) {
        clearTimeout(autoTimer);
        autoTimer = null;
      }

      // 弹窗可能已经被移除
      if (!document.getElementById('resignModal')) return;

      const fd = new URLSearchParams();
      fd.append('resign','1');
      if (info && info.period) {
        fd.append('period', info.period); // 让后端知道是哪个小时的补签
      }
      fetch('/api/checkin/click_redis.php',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:fd
      }).then(r=>r.json()).then(j=>{
        if (auto) {
          // ★ 自动补签的提示文案
          alert('为避免本时间段签到不足 3 次，若您未及时补签，系统已自动为您补签一次。');
        } else {
          // 手动补签沿用原来的提示
          alert(j.msg || '补签成功');
        }
        box.remove();
      }).catch(e=>{
        console.error(e);
        if (!auto) {
          alert('补签请求失败');
        }
        box.remove();
      });
    }

    // 1) 手动补签：用户点击按钮
    document.getElementById('btnResign').onclick = ()=>{
      doResign(false);
    };

    // 2) 自动补签：比如弹窗出现后 80 秒自动执行
    // 80 秒只是示例，你想更接近 59:20 可以自己调这个值
    const AUTO_MS = 40000; // 40秒 ≈ 1分20秒
    autoTimer = setTimeout(()=>{
      console.log('自动补签触发');
      doResign(true);
    }, AUTO_MS);
  }

  // 正常签到弹窗
  function showModal(info){
    if (current === info.planned_at) return;
    current = info.planned_at;
    if (document.getElementById('checkModal')) return;
    const box = document.createElement('div');
    box.id='checkModal';
    box.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:9999;';
    box.innerHTML=`
      <div style="background:#fff;padding:20px;border-radius:10px;text-align:center;min-width:220px">
        <div style="margin-bottom:10px;">计划时间：${info.planned_at}</div>
        <button id="btnCheck" style="padding:6px 16px;border:none;border-radius:6px;background:#5b8cff;color:#fff;">我在</button>
      </div>`;
    document.body.appendChild(box);

    document.getElementById('btnCheck').onclick = ()=>{
      const fd=new URLSearchParams();
      fd.append('planned_at',info.planned_at);
      fetch('/api/checkin/click_redis.php',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:fd
      }).then(r=>r.json()).then(j=>{
        alert(j.msg || '签到成功');
        box.remove();
        current=null;
      }).catch(e=>{
        console.error(e);
        alert('签到请求失败');
        box.remove();
        current=null;
      });
    };
  }

 function tick(){
    fetch('/api/checkin/next_prompt_redis.php')
      .then(r=>r.json())
      .then(j=>{
        if (j.code === 200 && j.show && j.data) {
          const info = j.data;
          if (info.is_makeup) {
            showResignModal(info);   // 补签弹窗（带自动补签）
          } else if (info.planned_at) {
            showModal(info);         // 正常随机节点弹窗
          }
        } else if (j.code === 1001) {
          // ★ 只提示一次，然后跳转
          if (!hasShownLoginError) {
            hasShownLoginError = true;
            alert(j.msg || '登录状态已失效，请重新登录');
            // 根据你的实际登录页地址改
            window.location.href = '/login.html';
          }
        }
      }).catch(e=>{
        console.error(e);
      });
  }

  tick();
  setInterval(tick, INTERVAL);
})();
</script>
