<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片审核页面</title>
    <style>
        /* 引用你提供的完整样式 */
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --transition: all 0.3s ease;
            --hover-bg: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }

     

        .venue-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            transition: var(--transition);
        }

        .venue-card:hover {
            background-color: var(--hover-bg);
        }

        .venue-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .venue-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: var(--text-color);
        }

        .venue-info .venue-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }

        .venue-info span {
            display: block;
        }

        .venue-actions {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 15px;
            gap: 8px;
        }

        .edit-btn {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .edit-btn:hover {
            background-color: #4a77e4;
        }

        .loading {
            text-align: center;
            font-size: 16px;
            color: var(--primary);
            padding: 20px;
        }
        
        .modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    overflow: auto;
    background-color: rgba(0,0,0,0.8); /* 背景半透明黑 */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    display: block;
    margin: auto;
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    object-fit: contain;
}

 @media (max-width: 860px) {
    .venue-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .venue-img {
        width: 80%;
        height: auto;
        max-height: 200px;
    }

    .venue-info {
        align-items: center;
        gap: 6px;
    }

    .venue-actions {
        flex-direction: row;
        justify-content: center;
        gap: 10px;
        padding-left: 0;
        flex-wrap: wrap;
    }

    .edit-btn {
        padding: 10px 14px;
        font-size: 15px;
        width: 45%;
    }
}
 
    </style>
</head>

<div class="container">
    <div class="card">
    <!-- 已移除标题 -->
    <div id="image-list"></div>
    <div class="loading" id="loading">正在加载图片...</div>
</div>

</div>
   <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.17.0.min.js"></script>   
<script>

         let ossConfig = null; 
                
                // 页面加载时获取场地列表和OSS配置 
        window.onload = async function() {
            try {
                // 获取 OSS 配置
                const configResponse = await fetch('https://open.rcwulian.cn/api/operat/upload.php?get_config=1'); 
                const configData = await configResponse.json(); 
                if (configData.code === 0) { 
                    ossConfig = configData.data; 
                }
        
                // 加载待审核图片
                loadPendingImages();
        
            } catch (e) {
                console.error('初始化失败:', e);
            }
        }

function loadPendingImages() {
    fetch('https://open.rcwulian.cn/api/venue/getPendingImages.php')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('image-list');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';

            if (data.code === 0 && data.data.length > 0) {
                 data.data.sort((a, b) => new Date(b.upload_time) - new Date(a.upload_time));
                data.data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'venue-card';
                    const imageUrl = "https://open.rcwulian.cn/api/venue/"+item.image_url;
                    card.innerHTML = `
                    <img src="https://open.rcwulian.cn/api/venue/${item.image_url}"class="venue-img" alt="待审核图片"  onclick="showModal('${imageUrl}')">
                        <div class="venue-info">
                            <span class="venue-name">${item.venue_name}</span>
                            <span>场地ID: ${item.id}</span>
                            <span>状态: ${item.image_status}</span>
                            <span>上传时间: ${item.upload_time}</span>
                        </div>
                        <div class="venue-actions">
                            <button class="edit-btn" onclick="approveImage(${item.id})">审核通过</button>
                            <button class="edit-btn" style="background-color:#f44336" onclick="rejectImage(${item.id})">拒绝</button>
                        </div>
                    `;

                    container.appendChild(card);
                });
                 // ✅ 主动通知父页面
                setTimeout(notifyParentCount, 100);
            } else {
                container.innerHTML = '<div class="loading">暂无待审核图片</div>';
                notifyParentCount(); // 如果没图也要通知 count=0
            }
        })
        .catch(error => {
            document.getElementById('loading').innerText = '加载失败';
            console.error('加载失败：', error);
        });
}

async function approveImage(venueId) {
    if (!confirm("确认通过该图片审核，并设为场地头像？")) return;

    const card = document.querySelector(`.venue-card button[onclick="approveImage(${venueId})"]`).closest('.venue-card');
    const imgUrl = card.querySelector('img').getAttribute('src');

    try {
        const response = await fetch(imgUrl);
        const blob = await response.blob();

        if (blob.size < 100) {
            alert("图片太小或无效，上传中止");
            return;
        }

        const formData = new FormData();
        formData.append('file', blob, `venue_${venueId}.jpg`);
        formData.append('action', 'update_venue_pictrue');
        formData.append('venue_id', venueId);

        const uploadRes = await fetch('https://rcwulian.cn/app/img/userimg/upload_profile.php', {
            method: 'POST',
            body: formData
        });

        const uploadData = await uploadRes.json();
        if (uploadData.code === 0) {
            alert("上传成功，头像已更新");

            // 删除待审核图片
            const filename = imgUrl.split('/pending_images/')[1]; // 取文件名
            const deleteRes = await fetch('https://open.rcwulian.cn/api/venue/deletePendingImage.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    venue_id: venueId,
                    filename: `pending_images/${filename}`
                })
            });
            const deleteText = await deleteRes.text();
            console.log("🧹 删除图片响应文本：", deleteText);

            location.reload();
        } else {
            alert("上传失败：" + uploadData.msg);
        }

    } catch (e) {
        console.error("上传异常：", e);
        alert("图片审核处理失败，请检查网络或服务器");
    }
}

async function rejectImage(venueId) {
  
    

    // 缓存驳回理由到 localStorage
    // localStorage.setItem(`rejected_reason_${venueId}`, reason);

    // 找到图片 URL 并提取 filename
    const reason = prompt("请输入拒绝原因：");
    if (!reason) return;
    const rejectRes = await fetch('https://open.rcwulian.cn/api/venue/rejectImage.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            venue_id: venueId,
            reason: reason
        })
    });

    const card = document.querySelector(`.venue-card button[onclick="rejectImage(${venueId})"]`).closest('.venue-card');
    const imgUrl = card.querySelector('img').getAttribute('src');
    const filename = imgUrl.split('/pending_images/')[1];

    // 删除图片 + 还原 image_status
    const deleteRes = await fetch('https://open.rcwulian.cn/api/venue/deletePendingImage.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            venue_id: venueId,
            filename: `pending_images/${filename}`
        })
    });

    const deleteData = await deleteRes.json();
    console.log("🧹 删除图片响应：", deleteData);

    if (deleteData.code === 0) {
        alert('图片已驳回并清理');
        location.reload();
    } else {
        alert('删除失败：' + deleteData.msg);
    }
}

 function showModal(imageUrl) {
        let modal = document.getElementById('img-modal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'img-modal';
            modal.className = 'modal';
            modal.innerHTML = `<img class="modal-content" id="modal-img">`;
            modal.onclick = () => (modal.style.display = 'none');
            document.body.appendChild(modal);
        }
        const img = modal.querySelector('#modal-img');
        img.src = imageUrl;
        modal.style.display = 'block';
    }
 // 方法2：页面加载完后主动告诉父页面
  function notifyParentCount() {
    const count = document.querySelectorAll('.venue-card').length;
    window.parent.postMessage({ type: 'image-card-count', count }, '*');
  }
</script>
