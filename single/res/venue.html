<!DOCTYPE html>
<!-- venue.html -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>场地信息管理</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root { --primary:#5b8cff; --secondary:#7f8fa4; --shadow:0 4px 24px rgba(91,140,255,0.08); }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:"PingFang SC", system-ui; }
    body{ background:linear-gradient(135deg,#f8f9ff 0%, #f0f3ff 100%); min-height:100vh; padding:20px; }
    .container{ max-width:1200px; margin:0 auto; }
    .card{ background:#fff; border-radius:24px; padding:24px; box-shadow:var(--shadow); margin-bottom:24px; }
    .card-title{ font-size:20px; color:#333; margin-bottom:24px; font-weight:600; }
    .venue-item{ display:flex; flex-direction:column; align-items:center; margin-bottom:24px; }
    .venue-item img{ width:100%; max-width:600px; border-radius:12px; margin-bottom:16px; }
    .venue-info{ width:100%; display:flex; flex-direction:column; }
    .venue-info .field{ margin-bottom:16px; font-size:16px; }
    .venue-info .label{ font-weight:600; color:var(--secondary); margin-bottom:6px; }
    .venue-info .value{ color:#333; font-size:16px; }
    .edit-btn,.save-btn{ background-color:var(--primary); color:#fff; padding:10px 20px; border-radius:8px; border:none; cursor:pointer; transition:.3s; margin-top:16px; }
    .edit-btn:hover,.save-btn:hover{ background-color:#4c6ef5; }
    .edit-input,.edit-select{ background:#f8f9ff; padding:8px 12px; border-radius:8px; border:1px solid #ddd; width:100%; }
    /* 时间区：强制一行显示（PC/手机一致） */
#venue-time{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:nowrap;      /* 不换行 */
  white-space:nowrap;
}

/* 覆盖 edit-input 默认 100% 宽，让 time 输入可以并排 */
#venue-time input[type="time"]{
  width:auto;
  min-width:90px;        /* 需要可调小一些就改这个值 */
}

@media (max-width:768px){
  #venue-time input[type="time"]{ min-width:80px; }
}

    .mini-btn{ background:#5b8cff; color:#fff; border:none; border-radius:8px; cursor:pointer }
    @media (max-width:768px){ .venue-item{ align-items:flex-start; } }
    
/* 手机端场地信息页优化 */
@media (max-width: 768px) {
  body {
    padding: 10px 8px;
  }

    width: 100%;
    max-width: 430px;
  }

  .card {

  .venue-info {

  .venue-info .field {

  .venue-info .label {

    width: 100%;

    padding: 0 12px;

  /* 场地描述里的锁提示单独换行，不要挤在正文后面 */

  }

    line-height: 1.5 !important;

  /* 开放时间保持一行，但不要挤 */

  /* 显示直播区域手机端上下排 */
  #show-live-wrap .value {
    display: grid !important;
    grid-template-columns: 1fr;
    gap: 8px !important;
    align-items: stretch !important;
  }

#show-live-stream-select,
#voice-room-select,
#voice-room-scene-type-select {
  width: 100%;
}

  .mini-btn {
    height: 36px;
    padding: 0 12px;
  }

  #liveBanBtn {
    width: 100%;
  }

  #liveBanTip {
    line-height: 1.45;
  }

  #mainEditBtn,

    width: 100%;
    height: 42px;
    margin-top: 8px;
  }
}
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="card-title">场地信息</div>
      <div id="venue-info" class="venue-item"><!-- 动态加载 --></div>
    </div>
  </div>

  <script>
    // ================= 全局状态 =================
    let LOCKS = { name: null, image: null };
    let IS_ADMIN  = false;
    let ROLE_ID   = 0;      // ⭐ 新增：记录当前管理员的角色ID
    let IS_EDITING = false;
    let SENSITIVE_WORDS = [];
    let hasUploaded = false;

    // ================= 工具函数 =================
    function getUrlParameter(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    function loadSensitiveWords() {
      return fetch('https://open.rcwulian.cn/api/sensitive_words.json')
        .then(res => res.json()).then(words => { SENSITIVE_WORDS = words || []; });
    }
    function containsSensitiveWords(text) {
      const t = (text || '') + '';
      for (let w of SENSITIVE_WORDS) if (t.includes(w)) return w;
      return null;
    }
async function handleVoiceRoomBgUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  try {
    const formData = new FormData();

    // 这里我同时 append 两个键，兼容你那边 upload_profile.php 可能取 file 或 image
    formData.append('file', file);
    formData.append('image', file);

    const response = await fetch('https://rcwulian.cn/app/img/userimg/upload_profile.php', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error(`HTTP 错误：${response.status}`);
    }

    const result = await response.json();
    console.log('上传返回结果', result.url);

    if (result.url) {
      document.getElementById('voice-room-bg-input').value = result.url;
      alert('上传成功，已回填链接');
    } else {
      alert(result.msg || '上传成功，但未返回图片链接');
    }
  } catch (e) {
    console.error('语音房背景图上传失败：', e);
    alert('上传失败：' + e.message);
  } finally {
    event.target.value = '';
  }
}
    // ================= 锁：名称/图片 10天冷却 =================
    function loadLocks(venueId) {
      const url = `https://open.rcwulian.cn/api/venue/getVenueEditLock.php${venueId ? `?id=${venueId}` : ''}`;
      return fetch(url)
        .then(r => r.json())
        .then(res => {
          if (res.code === 0 && res.data) {
            IS_ADMIN    = !!res.data.is_admin;
            ROLE_ID     = Number(res.data.role_id || 0);  // ⭐ 新增：从接口拿 role_id
            LOCKS.name  = res.data.name_lock  || null;
            LOCKS.image = res.data.image_lock || null;
            renderLocksUI();
            updateIncomeLockUI();
            applyLiveLock(); // ← 新增：根据是否管理员，应用直播地址可编辑/只读
            applyShowLiveVisibility();  // ← 新增
                // ✅补这句：ROLE_ID 有了，重新渲染封禁按钮显示/隐藏
            renderLiveBanUI();
            applyVenueRoomIdPermission();
            applyDrVenueIdPermission();
            applyVoiceRoomPermission();
            applyVoiceRoomBgPermission();
            applyVoiceRoomSceneTypePermission();
          }
        })
        .catch(err => console.error('锁加载失败：', err));
    }
    // =============== 直播封禁状态 ===============
let LIVE_BAN = { banned:false, ttl:-2, until:null, info:null };

function fmtTTL(sec){
  sec = Math.max(0, Number(sec||0));
  const d = Math.floor(sec / 86400); sec %= 86400;
  const h = Math.floor(sec / 3600);  sec %= 3600;
  const m = Math.floor(sec / 60);
  if (d > 0) return `${d}天${h}小时`;
  if (h > 0) return `${h}小时${m}分`;
  return `${m}分`;
}

function loadLiveBanStatus(venueId){
  const url = `https://open.rcwulian.cn/api/venue/getLiveBanStatus.php${venueId ? `?id=${venueId}` : ''}`;
  return fetch(url).then(r=>r.json()).then(res=>{
    if(res.code===0 && res.data){
      LIVE_BAN = res.data;
      renderLiveBanUI();
      applyRole3BanGuard(); // role3 被封禁时禁用 UI
       // ✅ 新增：根据封禁状态，立即刷新“显示直播”下拉框
      syncShowLiveSelectByBan();
    }
  }).catch(e=>console.error('loadLiveBanStatus err', e));
}
// ✅ 新增：封禁 => 强制选“否(0)”；解封 => 不强制改回（或你想改回 1 也可）
function syncShowLiveSelectByBan(){
  const sel = document.getElementById('show-live-stream-select');
  if (!sel) return;

  if (LIVE_BAN && LIVE_BAN.banned) {
    sel.value = "0";
    // 如果你希望封禁时也把 window.CURRENT_VENUE 同步
    if (window.CURRENT_VENUE) window.CURRENT_VENUE.show_live_stream = 0;
  } else {
    // ✅ 解封后你后端已经 UPDATE show_live_stream=1，那这里也同步成 1
    // sel.value = "1";
    if (window.CURRENT_VENUE) window.CURRENT_VENUE.show_live_stream = 1;
  }
}
function safeText(s){
  return String(s || '').trim();
}

// 可选：原因太长就截断一下（不想截断就直接 return s）
function shortReason(s, maxLen = 30){
  s = safeText(s);
  if (!s) return '';
  return s.length > maxLen ? (s.slice(0, maxLen) + '…') : s;
}

function renderLiveBanUI(){
  const btn = document.getElementById('liveBanBtn');
  const tip = document.getElementById('liveBanTip');

  // 只有 role 1/2 能看到按钮
  const canAdminBan = (ROLE_ID === 1 || ROLE_ID === 2);
  if (btn) btn.style.display = canAdminBan ? 'inline-block' : 'none';

  if (LIVE_BAN && LIVE_BAN.banned) {
    if (btn) btn.textContent = '解封直播';

    const reason = shortReason(LIVE_BAN?.data?.reason || LIVE_BAN?.info?.reason || '');
    const reasonText = reason ? `，原因：${reason}` : '';

    if (tip) {
      tip.style.display = 'inline';
      tip.textContent = `直播已封禁，剩余：${fmtTTL(LIVE_BAN.ttl)}${reasonText}`;
      // ✅ 鼠标悬停显示完整原因（PC 上很好用）
      const fullReason = safeText(LIVE_BAN?.data?.reason || LIVE_BAN?.info?.reason || '');
      tip.title = fullReason ? `原因：${fullReason}` : '';
    }
  } else {
    if (btn) btn.textContent = '封禁直播';
    if (tip) { tip.style.display = 'none'; tip.textContent = ''; tip.title = ''; }
  }
}

// role3 被封禁时：禁用“是否显示直播”以及（可选）直播地址输入
function applyRole3BanGuard(){
  const sel = document.getElementById('show-live-stream-select');
  const liveInput = document.getElementById('live-stream-input');
  const tip = document.getElementById('liveBanTip');

  if (ROLE_ID === 3 && LIVE_BAN && LIVE_BAN.banned) {
    if (sel) sel.disabled = true;
    if (liveInput) liveInput.readOnly = true;

    const reason = shortReason(LIVE_BAN?.data?.reason || LIVE_BAN?.info?.reason || '');
    const reasonText = reason ? `，原因：${reason}` : '';

    if (tip) {
      tip.style.display = 'inline';
      tip.textContent = `直播已封禁，剩余：${fmtTTL(LIVE_BAN.ttl)}${reasonText}`;
      const fullReason = safeText(LIVE_BAN?.data?.reason || LIVE_BAN?.info?.reason || '');
      tip.title = fullReason ? `原因：${fullReason}` : '';
    }
  }
}
    function applyLiveLock() {
      const live = document.getElementById('live-stream-input');
      const tip  = document.getElementById('live-tip');
      if (!live) return;
    
      if (IS_ADMIN) {
        // 管理员可编辑
        live.disabled = false;
        live.readOnly = false;
        if (tip) tip.style.display = 'none';
      } else {
        // 非管理员只读
       live.disabled = false;
        live.readOnly = false;
        if (tip) tip.style.display = 'none';
      }
    }
    function applyShowLiveVisibility() {
      const wrap = document.getElementById('show-live-wrap');
      const sel  = document.getElementById('show-live-stream-select');
      if (!wrap || !sel) return;
    
        // role_id = 1 / 2 / 3 / 4 可见
  if (ROLE_ID === 1 || ROLE_ID === 2 || ROLE_ID === 3 || ROLE_ID === 4) {
        wrap.style.display = 'block';        // 管理员可见
        // 是否可编辑由“编辑模式”控制（保持与其它字段一致）
        sel.disabled = !IS_EDITING;
         applyRole3BanGuard();
      } else {
        wrap.style.display = 'none';         // 非管理员隐藏
      }
    }
function applyVenueRoomIdPermission() {
  const input = document.getElementById('venue-room-id-input');
  if (!input) return;

  const canEdit = (ROLE_ID === 1 || ROLE_ID === 2) && IS_EDITING;

  input.disabled = !canEdit;
  input.readOnly = !canEdit;

  if (!canEdit) {
    input.style.background = '#f5f5f5';
    input.style.color = '#999';
  } else {
    input.style.background = '#f8f9ff';
    input.style.color = '#333';
  }
}

function applyDrVenueIdPermission() {
  const wrap = document.getElementById('dr-venue-id-wrap');
  const input = document.getElementById('dr-venue-id-input');

  if (!wrap || !input) return;

  if (ROLE_ID === 1 || ROLE_ID === 2) {
    wrap.style.display = 'block';

    const canEdit = IS_EDITING;

    input.disabled = !canEdit;
    input.readOnly = !canEdit;

    if (!canEdit) {
      input.style.background = '#f5f5f5';
      input.style.color = '#999';
    } else {
      input.style.background = '#f8f9ff';
      input.style.color = '#333';
    }
  } else {
    wrap.style.display = 'none';
  }
}

function applyVoiceRoomBgPermission() {
  const wrap = document.getElementById('voice-room-bg-wrap');
  const input = document.getElementById('voice-room-bg-input');
  const btn = document.getElementById('voice-room-bg-upload-btn');

  if (!wrap || !input || !btn) return;

  if (ROLE_ID === 1 || ROLE_ID === 2) {
    wrap.style.display = 'block';

    input.disabled = !IS_EDITING;
    input.readOnly = !IS_EDITING;

    input.style.background = IS_EDITING ? '#f8f9ff' : '#f5f5f5';
    input.style.color = IS_EDITING ? '#333' : '#999';

    btn.style.display = IS_EDITING ? 'inline-block' : 'none';
  } else {
    wrap.style.display = 'none';
  }
}
function applyVoiceRoomPermission() {
  const wrap = document.getElementById('voice-room-wrap');
  const sel = document.getElementById('voice-room-select');
  if (!wrap || !sel) return;

  if (ROLE_ID === 1 || ROLE_ID === 2) {
    wrap.style.display = 'block';
    sel.disabled = !IS_EDITING;
    sel.readOnly = !IS_EDITING;
    sel.style.background = IS_EDITING ? '#f8f9ff' : '#f5f5f5';
    sel.style.color = IS_EDITING ? '#333' : '#999';
  } else {
    wrap.style.display = 'none';
  }
}
function applyVoiceRoomSceneTypePermission() {
  const wrap = document.getElementById('voice-room-scene-type-wrap');
  const sel = document.getElementById('voice-room-scene-type-select');
  if (!wrap || !sel) return;

  if (ROLE_ID === 1 || ROLE_ID === 2) {
    wrap.style.display = 'block';
    sel.disabled = !IS_EDITING;
    sel.readOnly = !IS_EDITING;
    sel.style.background = IS_EDITING ? '#f8f9ff' : '#f5f5f5';
    sel.style.color = IS_EDITING ? '#333' : '#999';
  } else {
    wrap.style.display = 'none';
  }
}
function renderLocksUI() {
  // 名称锁提示 + 管理员解除按钮
  const wrap = document.getElementById('venue-name');
  if (wrap) {
    let tip = document.getElementById('name-lock-tip');

    if (LOCKS.name && !IS_ADMIN) {
      if (!tip) {
        tip = document.createElement('div');
        tip.id = 'name-lock-tip';
        tip.style.cssText = 'color:#f44336;font-size:13px;margin-top:6px;';
        wrap.appendChild(tip);
      }
      tip.textContent = `名称修改已锁定，解锁时间：${(LOCKS.name && LOCKS.name.until_iso) || ''}`;
    } else if (tip) {
      tip.remove();
    }

    // ✅ 只有管理员看到“解除名称锁”按钮（即使当前账号是管理员，也能帮加盟商解锁）
    let btn = document.getElementById('unlockNameLockBtn');
    if (LOCKS.name && IS_ADMIN) {
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'unlockNameLockBtn';
        btn.className = 'mini-btn';
        btn.style.cssText = 'padding:6px 10px;margin-top:8px;';
        btn.textContent = '解除名称锁';
        btn.onclick = () => clearVenueLock('name');
        wrap.appendChild(btn);
      }
      btn.style.display = 'inline-block';
    } else if (btn) {
      btn.style.display = 'none';
    }
  }

  // 图片锁：禁用上传 + 状态提示 + 管理员解除按钮
  const fileInput = document.getElementById('imageUploadInput');
  const statusEl = document.getElementById('image_status');

  if (fileInput) {
    if (LOCKS.image && !IS_ADMIN) {
      fileInput.disabled = true;
      fileInput.style.opacity = 0.5;
      if (statusEl) {
        statusEl.innerHTML = `图片上传已锁定，解锁时间：${(LOCKS.image && LOCKS.image.until_iso) || ''}`;
        statusEl.style.color = '#f44336';
      }
    } else {
      fileInput.disabled = false;
      fileInput.style.opacity = 1;
    }
  }

  // ✅ 图片锁的解除按钮（放在 image_status 后面）
  if (statusEl) {
    let btn2 = document.getElementById('unlockImageLockBtn');
    if (LOCKS.image && IS_ADMIN) {
      if (!btn2) {
        btn2 = document.createElement('button');
        btn2.id = 'unlockImageLockBtn';
        btn2.className = 'mini-btn';
        btn2.style.cssText = 'padding:6px 10px;';
        btn2.textContent = '解除图片锁';
        btn2.onclick = () => clearVenueLock('image');
        statusEl.insertAdjacentElement('afterend', btn2);
      }
      btn2.style.display = 'inline-block';
    } else if (btn2) {
      btn2.style.display = 'none';
    }
  }
}


    // ================= 数据加载 =================
    function loadVenueData() {
      const venueId = getUrlParameter('id');
      const url = venueId
        ? `https://open.rcwulian.cn/api/venue/getVenueList.php?id=${venueId}`
        : 'https://open.rcwulian.cn/api/venue/getVenueList.php?page=1&limit=10';

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0 && data.data.length > 0) {
            const venue = data.data[0];
            displayVenueInfo(venue);
            loadLocks(venueId);
            loadLiveBanStatus(venueId);

            // ===== 名称审核状态（通过时刷新锁与数据；拒绝时告警并清理）=====
            fetch('https://open.rcwulian.cn/api/venue/getVenueNameStatus.php')
              .then(r => r.json()).then(res => {
                if (res.code === 0 && res.data) {
                  const status = res.data.status, reason = res.data.reason;
                  if (status === 'approved') { loadLocks(venueId); loadVenueData(); }
                  else if (status === 'rejected') {
                    alert(`场地名称审核未通过，原因：${reason}`);
                    fetch('https://open.rcwulian.cn/api/venue/deleteVenueNameStatus.php');
                  }
                }
              });

            // ===== 图片审核状态（通过时刷新锁；拒绝时显示原因）=====
            fetch('https://open.rcwulian.cn/api/venue/getVenueImageStatus.php')
              .then(r => r.json()).then(imgRes => {
                const statusEl = document.getElementById('image_status');
                if (imgRes.code === 0 && imgRes.data && statusEl) {
                  const status = imgRes.data.status;
                  const reason = imgRes.data.reason || '无';
                  if (status === 'pending') { statusEl.innerText = '图片审核中'; statusEl.style.color = '#ff9800'; }
                  else if (status === 'approved') { statusEl.innerText = '图片审核已通过'; statusEl.style.color = '#4caf50'; loadLocks(venueId); }
                  else if (status === 'rejected') {
                    statusEl.innerHTML = `图片审核未通过<br><span style="color:#999;font-size:14px;">原因：${reason}</span>`;
                    statusEl.style.color = '#f44336';
                  }
                }
              });

            // 场地描述审核状态（保持不变）
            fetch('https://open.rcwulian.cn/api/venue/getVenueDescriptionStatus.php')
              .then(res => res.json()).then(res => {
                if (res.code === 0 && res.data && res.data.status === 'rejected') {
                  alert(`场地描述审核未通过，原因：${res.data.reason}`);
                  fetch('https://open.rcwulian.cn/api/venue/deleteVenueDescriptionStatus.php');
                }
              });

          } else {
            alert('未找到场地信息');
          }
        })
        .catch(err => console.error('数据加载失败:', err));
    }

    // ================= 30天锁 UI/解锁 =================
    function updateIncomeLockUI() {
      const badge = document.getElementById('lock30dBadge');
      const btn   = document.getElementById('unlock30dBtn');
      if (!window.CURRENT_VENUE) return;

      const locked = Number(window.CURRENT_VENUE.income_30d_lock) === 1;
      if (locked) {
        if (badge) badge.style.display = 'inline';
        if (btn)   btn.style.display   = IS_ADMIN ? 'inline-block' : 'none';
      } else {
        if (badge) badge.style.display = 'none';
        if (btn)   btn.style.display   = 'none';
      }
    }

    function unlock30d() {
      if (!window.CURRENT_VENUE) return;
      if (!IS_ADMIN) { alert('仅管理员可解除该限制'); return; }
      if (!confirm('确定要解除“近30天无收入锁”吗？')) return;

      fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: window.CURRENT_VENUE.id, unlock_income_30d: 1 })
      })
      .then(r => r.json())
      .then(res => {
        if (res.code === 0) {
          alert('已解除限制');
          window.CURRENT_VENUE.income_30d_lock = 0;
          updateIncomeLockUI();
        } else {
          alert(res.msg || '操作失败');
        }
      })
      .catch(err => { console.error(err); alert('请求失败，请稍后重试'); });
    }
function clearVenueLock(type) {
  const venueId = getUrlParameter('id');
  if (!venueId) { alert('缺少场地ID'); return; }
  if (!IS_ADMIN) { alert('仅管理员可解除'); return; }

  const tip = (type === 'name') ? '名称锁' : (type === 'image') ? '图片锁' : '锁';
  if (!confirm(`确定要解除该场地的【${tip}】吗？`)) return;

  fetch('https://open.rcwulian.cn/api/venue/clearVenueEditLock.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
    body: `id=${encodeURIComponent(venueId)}&type=${encodeURIComponent(type)}`
  })
  .then(r => r.json())
  .then(res => {
    if (res.code === 0) {
      alert('已解除');
      // 解除后刷新锁信息 + UI
      loadLocks(venueId);
      // 如果你想更“干净”，也可以直接 reload
      // location.reload();
    } else {
      alert(res.msg || '解除失败');
    }
  })
  .catch(err => { console.error(err); alert('请求失败'); });
}

      document.getElementById('mainSaveBtn').style.display = 'inline-block';

      // 批量解锁可编辑控件
      document.querySelectorAll('.edit-control').forEach(el => el.disabled = false);

      // 名称锁下，非管理员不得编辑
      if (LOCKS.name && !IS_ADMIN) {
        const nameInput = document.getElementById('venue-name-input');
        if (nameInput) nameInput.disabled = true;
      }

      // 图片：编辑时显示，按锁控制可用性
      const fileInput = document.getElementById('imageUploadInput');
      if (fileInput) {
        fileInput.style.display = 'block';

        fileInput.disabled = !!locked;
        fileInput.style.opacity = locked ? 0.5 : 1;
      }
        // 再次应用直播地址权限（确保非管理员仍是只读）
        applyLiveLock();
        applyShowLiveVisibility();  // ← 新增
        applyVenueRoomIdPermission();
        applyDrVenueIdPermission();
        applyVoiceRoomPermission();
        applyVoiceRoomBgPermission();
        applyVoiceRoomSceneTypePermission();

function saveChanges() {
  const payload = {
    id: getUrlParameter('id'),
    venue_name: document.getElementById('venue-name-input').value.trim(),
    venue_status: document.getElementById('status-select').value
  };
if (ROLE_ID === 1 || ROLE_ID === 2) {
  const venueRoomIdRaw = document.getElementById('venue-room-id-input').value.trim();

  if (venueRoomIdRaw === '') {
    payload.venue_room_id = null;
  } else {
    if (!/^\d+$/.test(venueRoomIdRaw)) {
      alert('venue_room_id 只能填写数字');
      return;
    }
    payload.venue_room_id = parseInt(venueRoomIdRaw, 10);
  }

  const drVenueIdRaw = document.getElementById('dr-venue-id-input').value.trim();

  if (drVenueIdRaw === '') {
    payload.dr_venue_id = null;
  } else {
    if (!/^\d+$/.test(drVenueIdRaw)) {
      alert('dr_venue_id 只能填写数字');
      return;
    }

    const drVenueId = parseInt(drVenueIdRaw, 10);

    if (drVenueId < 1 || drVenueId > 9999) {
      alert('dr_venue_id 必须留空，或者填写 1~9999 的数字');
      return;
    }

    payload.dr_venue_id = drVenueId;
  }

  payload.voice_room_bg_url = document.getElementById('voice-room-bg-input').value.trim();

  const voiceRoomSceneType = parseInt(
    document.getElementById('voice-room-scene-type-select').value,
    10
  );

  if (![1, 2].includes(voiceRoomSceneType)) {
    alert('语音房场景只能选择室内或户外');
    return;
  }

  payload.voice_room_scene_type = voiceRoomSceneType;
}
    // 仅 role_id=1 || 2 可改语音房标识
if (ROLE_ID === 1 || ROLE_ID === 2) {
      payload.venue_status_num = parseInt(
        document.getElementById('voice-room-select').value,
        10
      );
    }
  const st = document.getElementById('start-time').value;
  const et = document.getElementById('end-time').value;
  if (st && et) payload.start_time = `${st}-${et}`;

  const hitName = containsSensitiveWords(payload.venue_name || '');
  if (hitName) { alert(`场地名称中包含敏感词：${hitName}`); return; }

  const canEditLive =
    (ROLE_ID === 1 || ROLE_ID === 2) ||
    (ROLE_ID === 3 && !(LIVE_BAN && LIVE_BAN.banned));

  if (canEditLive) {
    payload.show_live_stream = document.getElementById('show-live-stream-select').value;
    payload.live_stream_url = document.getElementById('live-stream-input').value.trim();
  }

  fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res.code === 0 || res.code === 1008) {
      alert(res.msg || '保存成功');
      setTimeout(() => location.reload(), 50); // ✅ 稳一点
      return;
    }

    // ✅ 名称冷却
    if (res.code === 1020) {
      alert(res.msg || '名称处于冷却期');
      loadLocks(getUrlParameter('id'));
      return;
    }

    alert(res.msg || '保存失败');
    loadVenueData();
  })
  .catch(e => { console.error(e); alert('保存失败，请稍后重试'); })
  .finally(() => { IS_EDITING = false; });
}




    // ================= 图片上传 =================
    function handleImageUpload(event) {
      if (hasUploaded) { alert("您已经上传过图片，请等待审核结果。"); return; }
      if (LOCKS.image && !IS_ADMIN) {
        alert(`图片上传处于冷却中，解锁时间：${(LOCKS.image && LOCKS.image.until_iso) || ''}`);
        event.target.value = '';
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      const venueId = getUrlParameter('id');
      formData.append('id', venueId || '');
      formData.append('image', file);

      fetch('https://open.rcwulian.cn/api/venue/uploadImg.php', { method:'POST', body:formData })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            alert("图片上传成功，等待审核");
            hasUploaded = true;
            loadVenueData(); // 刷新状态
          } else if (data.code === 1021) {
            alert(data.msg);
            loadLocks(venueId);
          } else {
            alert("上传失败：" + (data.msg || '未知错误'));
          }
        })
        .catch(err => {
          console.error('上传失败:', err);
          alert("上传失败，请重试");
        });
    }
function onClickLiveBanBtn(){
  if (!(ROLE_ID === 1 || ROLE_ID === 2)) { alert('仅管理员可操作'); return; }
  if (!window.CURRENT_VENUE) return;

  // 如果当前已封禁 => 解封
  if (LIVE_BAN && LIVE_BAN.banned) {
    if (!confirm('确定要解封直播吗？')) return;
    fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id: window.CURRENT_VENUE.id, unban_live: 1 })
    }).then(r=>r.json()).then(res=>{
      if(res.code===0){
        alert('已解封');
        loadLiveBanStatus(getUrlParameter('id'));
          setTimeout(() => location.reload(), 50); // ✅ 稳一点
      } else {
        alert(res.msg || '操作失败');
      }
    }).catch(e=>{console.error(e); alert('请求失败');});
    return;
  }

  // 未封禁 => 弹出封禁模态
  showLiveBanModal();
}

          <option value="3600">1 小时</option>
          <option value="21600">6 小时</option>

          <option value="604800">7 天</option>
          <option value="2592000">30 天</option>
        </select>
      </div>

      <div style="margin-bottom:12px;">
        <div style="color:#7f8fa4;font-size:13px;margin-bottom:6px;">原因（选填）</div>
        <textarea id="banReason" placeholder="选填" style="width:100%;min-height:72px;padding:10px;border:1px solid #ddd;border-radius:10px;resize:none;">经核实，你存在引流至第三方APP行为，现对你直播跳转功能限制，请及时整改。</textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="mini-btn" style="padding:8px 12px;background:#e5e7eb;color:#111;" onclick="closeLiveBanModal()">取消</button>
        <button class="mini-btn" style="padding:8px 12px;" onclick="submitLiveBan()">确定封禁</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeLiveBanModal(){
  const m = document.getElementById('banModalMask');
  if (m) m.remove();
}

function submitLiveBan(){
  if (!window.CURRENT_VENUE) return;
  const ttl = Number(document.getElementById('banDuration')?.value || 86400);
  const reason = (document.getElementById('banReason')?.value || '').trim();

  fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      id: window.CURRENT_VENUE.id,
      ban_live: 1,
      ban_live_ttl: ttl,
      ban_reason: reason
    })
  }).then(r=>r.json()).then(res=>{
    if(res.code===0){
      alert('已封禁');
      closeLiveBanModal();
      loadLiveBanStatus(getUrlParameter('id'));
    } else {
      alert(res.msg || '封禁失败');
    }
  }).catch(e=>{console.error(e); alert('请求失败');});
}
