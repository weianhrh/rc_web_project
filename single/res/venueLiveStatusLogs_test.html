<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>场地开关播记录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-color: #333;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --danger: #ff4d4f;
            --success: #18a058;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 18px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .form-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-item label {
            font-size: 14px;
            color: #555;
            white-space: nowrap;
        }

        select,
        input {
            height: 38px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 10px;
            font-size: 14px;
            min-width: 180px;
            background: #fff;
        }
        #venue_keyword {
            min-width: 260px;
        }
        button {
            height: 38px;
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            cursor: pointer;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background: #64748b;
        }

        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
            color: #555;
            font-size: 14px;
        }

        .summary span {
            background: #f4f7ff;
            border: 1px solid #e2e8ff;
            padding: 6px 10px;
            border-radius: 999px;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1050px;
        }

        th,
        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            font-size: 13px;
            white-space: nowrap;
        }

        th {
            background: #f8fafc;
            font-weight: 700;
            color: #334155;
        }

        tr:hover td {
            background: #f9fbff;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-open {
            background: #e8f8ef;
            color: var(--success);
        }

        .badge-close {
            background: #fff1f0;
            color: var(--danger);
        }

        .badge-system {
            background: #fff7e6;
            color: var(--warning);
        }

        .badge-self {
            background: #eef4ff;
            color: var(--primary);
        }

        .empty {
            padding: 30px;
            text-align: center;
            color: #777;
        }

        .loading {
            padding: 30px;
            text-align: center;
            color: var(--primary);
        }

        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .pagination button {
            background: #fff;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 14px;
            color: #555;
        }

        .ua-cell {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 14px;
            }

            .card-title {
                font-size: 20px;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .form-item {
                width: 100%;
                align-items: stretch;
                flex-direction: column;
                gap: 6px;
            }

            select,
            input,
            button {
                width: 100%;
                min-width: 0;
            }

            .pagination {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <div class="card">
        <div class="card-title">场地开关播记录</div>

<div class="toolbar">
    <div class="form-item">
        <label for="venue_id">场地</label>
        <select id="venue_id">
            <option value="0">全部场地</option>
        </select>
    </div>

    <div class="form-item">
        <label for="venue_keyword">搜索场地</label>
        <input id="venue_keyword" type="text" placeholder="输入场地ID或名称自动查询">
    </div>

    <div class="form-item">
        <label for="page_size">每页</label>
        <select id="page_size">
            <option value="20">20条</option>
            <option value="50">50条</option>
            <option value="100">100条</option>
        </select>
    </div>

    <button onclick="searchLogs()">查询</button>
    <button class="secondary" onclick="resetSearch()">重置</button>
</div>

        <div class="summary">
            <span id="total_text">总记录：0</span>
            <span id="page_text">当前页：1 / 1</span>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>场地</th>
                    <th>动作</th>
                    <th>类型</th>
                    <!--<th>操作前</th>-->
                    <!--<th>操作后</th>-->
                    <th>操作人</th>
                    <th>备注</th>
                    <!--<th>IP</th>-->
                    <!--<th>来源</th>-->
                    <th>时间</th>
                </tr>
                </thead>
                <tbody id="log_tbody">
                <tr>
                    <td colspan="11" class="loading">加载中...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="prev_btn" onclick="changePage(-1)">上一页</button>
            <span class="page-info" id="pagination_info">1 / 1</span>
            <button id="next_btn" onclick="changePage(1)">下一页</button>
        </div>
    </div>
</div>

<script>
    const VENUE_API = '/api/operat/EnergyGift.php';
    const LOG_API = '/api/operat/venueLiveStatusLogs.php';

    let currentPage = 1;
    let totalPages = 1;
    let venueSearchTimer = null;
    function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name) || '';
    }
    document.addEventListener('DOMContentLoaded', function () {
        bindSearchEvents();
        loadVenues(function () {
            const venueId = getQueryParam('venue_id');

        if (venueId) {
            const venueSelect = document.getElementById('venue_id');

            // 如果下拉框还没有这个场地，就临时加一个，避免 value 设置不上
            let exists = false;
            for (let i = 0; i < venueSelect.options.length; i++) {
                if (venueSelect.options[i].value === venueId) {
                    exists = true;
                    break;
                }
            }

            if (!exists) {
                const option = document.createElement('option');
                option.value = venueId;
                option.textContent = `场地ID：${venueId}`;
                venueSelect.appendChild(option);
            }

            venueSelect.value = venueId;
        }

        loadLogs();
    });
});
function bindSearchEvents() {
    const venueSelect = document.getElementById('venue_id');
    const venueKeyword = document.getElementById('venue_keyword');
    const pageSizeSelect = document.getElementById('page_size');

    // 输入场地ID或名称，自动模糊查询
    venueKeyword.addEventListener('input', function () {
        venueSelect.value = '0';

        clearTimeout(venueSearchTimer);
        venueSearchTimer = setTimeout(function () {
            currentPage = 1;
            loadLogs();
        }, 400);
    });

    // 下拉框选择场地后，清空模糊搜索，并自动查询
    venueSelect.addEventListener('change', function () {
        venueKeyword.value = '';
        currentPage = 1;
        loadLogs();
    });

    // 每页条数变化后，自动查询
    pageSizeSelect.addEventListener('change', function () {
        currentPage = 1;
        loadLogs();
    });
}
function loadVenues(callback) {
    const venueSelect = document.getElementById('venue_id');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', VENUE_API, true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

    xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) {
            return;
        }

        try {
            if (xhr.status !== 200) {
                console.error('场地下拉框加载失败', xhr.status, xhr.responseText);
                return;
            }

            const response = JSON.parse(xhr.responseText);

            if (response.code === 0 && Array.isArray(response.data)) {
                response.data.forEach(venue => {
                    const option = document.createElement('option');
                    option.value = venue.id;
                    option.textContent = `${venue.id} - ${venue.venue_name}`;
                    venueSelect.appendChild(option);
                });
            } else {
                console.error('场地下拉框接口返回异常', response);
            }
        } catch (e) {
            console.error('场地下拉框JSON解析失败', e, xhr.responseText);
        } finally {
            if (typeof callback === 'function') {
                callback();
            }
        }
    };

    xhr.onerror = function () {
        console.error('场地下拉框请求异常');
        if (typeof callback === 'function') {
            callback();
        }
    };

    xhr.send('action=get_venues');
}

    function searchLogs() {
        currentPage = 1;
        loadLogs();
    }

function resetSearch() {
    document.getElementById('venue_id').value = '0';
    document.getElementById('venue_keyword').value = '';
    document.getElementById('page_size').value = '20';
    currentPage = 1;
    loadLogs();
}

    function changePage(step) {
        const nextPage = currentPage + step;

        if (nextPage < 1 || nextPage > totalPages) {
            return;
        }

        currentPage = nextPage;
        loadLogs();
    }

    function loadLogs() {
        const tbody = document.getElementById('log_tbody');
        const venueId = document.getElementById('venue_id').value;
        const venueKeyword = document.getElementById('venue_keyword').value.trim();
        const pageSize = document.getElementById('page_size').value;

        tbody.innerHTML = '<tr><td colspan="11" class="loading">加载中...</td></tr>';

        const params = new URLSearchParams();
        params.append('action', 'get_logs');
        params.append('venue_id', venueId);
        params.append('venue_keyword', venueKeyword);
        params.append('page', currentPage);
        params.append('page_size', pageSize);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', LOG_API, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status !== 200) {
                    tbody.innerHTML = '<tr><td colspan="11" class="empty">请求失败，请检查接口路径</td></tr>';
                    return;
                }

                try {
                    const response = JSON.parse(xhr.responseText);

                    if (response.code !== 0) {
                        tbody.innerHTML = `<tr><td colspan="11" class="empty">${escapeHtml(response.msg || '查询失败')}</td></tr>`;
                        return;
                    }

                    renderLogs(response.data);
                } catch (e) {
                    tbody.innerHTML = '<tr><td colspan="11" class="empty">返回数据解析失败</td></tr>';
                }
            }
        };

        xhr.send(params.toString());
    }

    function renderLogs(data) {
        const tbody = document.getElementById('log_tbody');
        const list = data.list || [];

        currentPage = Number(data.page || 1);
        totalPages = Number(data.total_pages || 1);

        document.getElementById('total_text').textContent = `总记录：${data.total || 0}`;
        document.getElementById('page_text').textContent = `当前页：${currentPage} / ${totalPages}`;
        document.getElementById('pagination_info').textContent = `${currentPage} / ${totalPages}`;

        document.getElementById('prev_btn').disabled = currentPage <= 1;
        document.getElementById('next_btn').disabled = currentPage >= totalPages;

        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" class="empty">暂无开关播记录</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(row => {
            const isOpen = Number(row.action) === 1;
            const isSystem = row.remark === '系统关播';

            const actionBadge = isOpen
                ? '<span class="badge badge-open">开播</span>'
                : '<span class="badge badge-close">关播</span>';

            const typeBadge = isSystem
                ? '<span class="badge badge-system">系统关播</span>'
                : '<span class="badge badge-self">主播开关播</span>';

            const venueText = `${row.venue_id || ''} - ${row.venue_name || ''}`;

            const beforeText = `is_live=${safe(row.old_is_live)} / status=${safe(row.old_venue_status_num)}`;
            const afterText = `is_live=${safe(row.new_is_live)} / status=${safe(row.new_venue_status_num)}`;

            return `
                <tr>
                    <td>${safe(row.id)}</td>
                    <td>${escapeHtml(venueText)}</td>
                    <td>${actionBadge}</td>
                    <td>${typeBadge}</td>
           <!--
                    <td>${escapeHtml(beforeText)}</td>
                    <td>${escapeHtml(afterText)}</td>
          -->
                    <td>${escapeHtml(row.operator_text || '')}</td>
                    <td>${escapeHtml(row.remark || '')}</td>
          <!--
                    <td>${escapeHtml(row.ip || '-')}</td>
                    <td class="ua-cell" title="${escapeHtml(row.user_agent || '')}">${escapeHtml(row.user_agent || '-')}</td>
                  -->
                    <td>${escapeHtml(row.created_at || '')}</td>
                </tr>
            `;
        }).join('');
    }

    function safe(value) {
        if (value === null || value === undefined || value === '') {
            return '-';
        }
        return value;
    }

    function escapeHtml(value) {
        return String(value === null || value === undefined ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
</script>
</body>
</html>
