<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>退款申请</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 24px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #4c6ef5;
        }

        .error-message {
            color: #ff4d4f;
            font-size: 14px;
            margin-top: 4px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
        }

        /* 添加自动补全下拉框样式 */
        .autocomplete-items {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            border-radius: 0 0 8px 8px;
            background: white;
            max-height: 200px;
            overflow-y: auto;
        }

        .autocomplete-items div {
            padding: 10px;
            cursor: pointer;
            background-color: #fff;
            border-bottom: 1px solid #d4d4d4;
        }

        .autocomplete-items div:hover {
            background-color: #e9e9e9;
        }

        .autocomplete-active {
            background-color: var(--primary) !important;
            color: #ffffff;
        }
        
        .form-group {
            position: relative;
        }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-left: 10px;
            height: 44px; /* 与输入框高度保持一致 */
        }

        .search-btn:hover {
            background-color: #4c6ef5;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1 class="card-title">退款申请</h1>
            <form id="refundForm" action="https://rcwulian.cn/app/pay/tui.php" method="POST">
                <div class="form-group">
                    <label class="form-label">微信支付订单号</label>
                    <input type="text" name="transaction_id" id="transactionId" class="form-input" required placeholder="请输入微信支付订单号">
                    <div class="error-message">请输入有效的微信支付订单号</div>
                </div>

                <div class="form-group">
                    <label class="form-label">商户退款单号</label>
                    <div class="input-wrapper">
                        <input type="text" name="out_refund_no" id="outRefundNo" class="form-input" required placeholder="请输入或搜索商户退款单号">
                        <div id="autocomplete-list" class="autocomplete-items"></div>
                    </div>
                    <div class="error-message">请输入有效的商户退款单号</div>
                </div>

                <div class="form-group">
                    <label class="form-label">退款原因</label>
                    <textarea name="refund_reason" class="form-input" rows="3" placeholder="请输入退款原因（必填）"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">订单金额（元）</label>
                    <input type="number" name="total_fee" id="totalFee" class="form-input" required min="0" step="0.01" readonly>
                    <div class="error-message">订单金额将自动填充</div>
                </div>

                <div class="form-group">
                    <label class="form-label">退款金额（元）</label>
                    <input type="number" name="refund_fee" id="refundFee" class="form-input" required min="0" step="0.01">
                    <div class="error-message">退款金额不能大于订单金额</div>
                </div>

                <button type="submit" class="submit-btn">提交退款申请</button>
            </form>
        </div>
    </div>

    <script>
        // 存储所有订单的数组
        let allOrders = [];
        
        // 页面加载时获取所有订单
        window.addEventListener('load', function() {
            fetch('https://open.rcwulian.cn/api/finance/getOrderSearch.php?get_all=1')
                .then(response => response.json())
                .then(result => {
                    if (result.code === 0 && result.data) {
                        allOrders = result.data;
                        // 可以选择性地将数据存储到 localStorage
                        localStorage.setItem('orderCache', JSON.stringify({
                            timestamp: Date.now(),
                            orders: allOrders
                        }));
                    }
                })
                .catch(error => console.error('Error loading orders:', error));
        });

        // 订单号自动补全
        const outRefundNoInput = document.getElementById('outRefundNo');
        const autocompleteList = document.getElementById('autocomplete-list');
        
        outRefundNoInput.addEventListener('input', function(e) {
            const searchStr = this.value.toLowerCase();
            if (searchStr.length < 2) {
                autocompleteList.innerHTML = '';
                return;
            }

            // 本地搜索过滤
            const matchedOrders = allOrders.filter(order => 
                order.order_number.toLowerCase().includes(searchStr)
            ).slice(0, 10); // 限制显示前10条

            // 显示匹配结果
            autocompleteList.innerHTML = '';
            matchedOrders.forEach(order => {
                const div = document.createElement('div');
                div.innerHTML = `${order.order_number} (￥${order.payer_total})`;
                div.addEventListener('click', function() {
                    outRefundNoInput.value = order.order_number;
                    document.getElementById('totalFee').value = order.payer_total;
                    document.getElementById('refundFee').value = order.payer_total;
                    autocompleteList.innerHTML = '';
                });
                autocompleteList.appendChild(div);
            });
        });

        // 表单提交处理
        document.getElementById('refundForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const totalFee = Math.round(this.total_fee.value * 100);
            const refundFee = Math.round(this.refund_fee.value * 100);

            if (refundFee > totalFee) {
                alert('退款金额不能大于订单金额');
                return;
            }

            const formData = new FormData();
            formData.append('transaction_id', this.transaction_id.value);
            formData.append('out_refund_no', this.out_refund_no.value);
            formData.append('total_fee', totalFee);
            formData.append('refund_fee', refundFee);
            formData.append('refund_reason', this.refund_reason.value);

            fetch('https://rcwulian.cn/app/pay/tui.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.code === 200) {
                    alert('退款申请成功！退款ID: ' + data.refund_id);
                    this.reset();
                } else {
                    alert('退款申请失败：' + data.msg);
                }
            })
            .catch(error => {
                alert('提交失败，请稍后重试');
                console.error('Error:', error);
            });
        });

        // 点击其他地方关闭自动补全
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.form-group')) {
                autocompleteList.innerHTML = '';
            }
        });
    </script>
</body>
</html>
