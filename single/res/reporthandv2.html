<!--reporthandv2.html-->
<!DOCTYPE html> 
<html lang="zh-CN"> 
 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>投诉处理</title> 
    <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">  -->
    <style> 
        :root { 
            --primary: #5b8cff; 
            --secondary: #7f8fa4; 
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08); 
            --background-gradient-start: #f8f9ff; 
            --background-gradient-end: #f0f3ff; 
            --card-bg: #ffffff; 
            --border-color: #ddd; 
            --text-color: #333; 
            --hover-bg: #f9f9f9; 
            --highlight-bg: #eff4ff; 
            --transition: all 0.3s ease; 
        } 
 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "PingFang SC", system-ui; 
        } 
 
        body { 
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%); 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
        } 
 
        .container { 
            max-width: 1200px; 
            width: 100%; 
        } 
 
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            transition: var(--transition); 
        } 
 
        .card:hover { 
            box-shadow: 0 8px 32px rgba(91, 140, 255, 0.16); 
        } 
 
        .card-title { 
            font-size: 24px; 
            color: var(--text-color); 
            margin-bottom: 20px; 
            font-weight: 600; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 10px; 
        } 
 
        .complaint-list { 
            margin-top: 30px; 
        } 
 
        .complaint-item { 
            background: #fff; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            padding: 15px; 
            margin-bottom: 10px; 
            font-size: 14px; 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        } 
 
        .complaint-item span { 
            display: block; 
        } 
 
        .complaint-item .complaint-title { 
            font-weight: 600; 
            color: var(--primary); 
        } 
 
        .action-button { 
            background-color: var(--primary); 
            color: #fff; 
            padding: 8px 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            margin-right: 10px; 
            transition: 0.3s; 
        } 
 
        .action-button:hover { 
            background-color: #4a77e4; 
        } 
 
        .edit-input { 
            background-color: #f8f9ff; 
            padding: 8px 12px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            width: 100%; 
        } 
 
        /* 返回上一页按钮样式 */ 
        .back-button { 
            background-color: var(--primary); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            transition: background-color 0.3s; 
            margin-top: 16px; 
            margin-right: 10px; 
        } 
 
        .back-button:hover { 
            background-color: #4c6ef5; 
        } 
 
        @media (max-width: 768px) { 
            .card { 
                padding: 16px; 
            } 
 
            .complaint-item { 
                font-size: 12px; 
            } 
 
            .action-button { 
                font-size: 12px; 
            } 
 
            .back-button { 
                font-size: 12px; 
            } 
        } 
 
        /* 添加图片预览相关样式 */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-content {
  position: relative;
  background-color: #fff;
  padding: 20px;
  border-radius: 8px;
  width: 90%;
  max-width: 500px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
}
.modal-close {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
  font-size: 20px;
  color: #333;
}



    </style> 
</head> 
 
<body> 
 
    <div class="container"> 
        <!-- 返回上一页按钮 --> 
        <!--<button class="back-button" onclick="goBack()">返回上一页</button> -->
        <div class="card"> 
            <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
            <span>投诉处理</span>
            <button class="action-button" onclick="window.location.href='reporthandrecord.html'">
                查看处理记录
            </button>
        </div>

 
            <!-- 投诉记录列表 --> 
            <div id="complaint-records" class="complaint-list"></div> 
        </div> 
    </div> 
 
    <!-- 添加图片预览模态框 -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <img class="modal-content" id="modalImg">
    </div>
 
    <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  -->
    <script> 
        const STATUS_ENUM = { 
            '未处理': '未处理', 
            '处理中': '处理中', 
            '已处理': '已处理' 
        }; 
 
        // 获取投诉记录 
        function loadComplaintRecords() { 
            const url = 'https://open.rcwulian.cn/api/operat/ReporthandV2.php';  
            fetch(url) 
               .then(response => response.json())  
               .then(data => { 
                    if (data.code  === 0 && data.data  && data.data.length  > 0) { 
                        displayComplaintRecords(data.data);  
                    } else { 
                        document.getElementById('complaint-records').innerHTML  = '<p style="text-align:center;">暂无投诉记录</p>'; 
                    } 
                }) 
               .catch(error => { 
                    console.error(' 投诉记录加载失败:', error); 
                }); 
        } 
    //   <span>备注：${complaint.notes}</span>  
        // 显示投诉记录列表 
        function displayComplaintRecords(records) { 
            const container = document.getElementById('complaint-records');  
            container.innerHTML = ''; 
            records.forEach(complaint => { 
                const item = document.createElement('div');  
                item.classList.add('complaint-item');  
                
                // 构建基本信息HTML
                let itemHTML = `
                    <span>投诉ID：${complaint.id}</span>
                    <span>设备 ID：${complaint.device_id}</span>  
                    <span>设备名称：${complaint.vehicle_name}</span>  
                    <span>绑定场地：${complaint.bind_site}</span>  
                    <span>投诉类型：${complaint.report_type}</span>  
                    <span>处理状态：${complaint.status}</span>  
               
                    <span>处理人 ID：${complaint.handler_uid}</span>  
                    <span>投诉时间：${complaint.insert_time}</span>
                `;

                // 如果有图片URL且不为空，添加图片元素
                if (complaint.image_url && complaint.image_url.trim() !== '') {
                    itemHTML += `
                        <img src="${complaint.image_url}" 
                             alt="违规截图" 
                             style="max-width: 30%; border-radius: 8px; margin-top: 10px; cursor: pointer;" 
                             onclick="showModal('${complaint.image_url}')" />
                    `;
                }

              if (currentUserRole !== 1 && currentUserRole !== 2) {// 添加操作按钮
                    itemHTML += `
                        <button class="action-button"  onclick="modifyComplaintStatus(${complaint.id},'${complaint.status}')">
                            修改处理状态
                        </button> 
                    `;
                  }
              if (currentUserRole === 1 || currentUserRole === 2) {
                    itemHTML += `
                      <div style="display:flex;gap:10px;margin-top:8px;">
                        <button style="background:red; flex: 1;" class="action-button" onclick="deleteComplaint(${complaint.id})">无效</button>
                        <button style="background:green; flex: 1;" class="action-button" onclick='openBanModal(${JSON.stringify(complaint)})'>有效</button>
                      </div>
                    `;
                  }
                item.innerHTML = itemHTML;
                container.appendChild(item);  
            }); 
        } 
 
        // 修改投诉状态 
        function modifyComplaintStatus(report_id, currentStatus, overrideStatus = null) {
            let newStatus;
        
            if (overrideStatus !== null) {
                newStatus = overrideStatus;
            } else {
                if (currentStatus === '未处理') {
                    newStatus = '处理中';
                } else if (currentStatus === '处理中') {
                    newStatus = '已处理';
                } else {
                    newStatus = '未处理';
                }
            }
        
            const url = 'https://open.rcwulian.cn/api/operat/ReporthandV2.php';  
            const formData = new FormData(); 
            formData.append('report_id', report_id); 
            formData.append('status', STATUS_ENUM[newStatus]); 
        
            fetch(url, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    alert('处理状态修改成功');
                    loadComplaintRecords();
                } else {
                    alert('状态修改失败，请稍后重试');
                }
            })
            .catch(error => {
                console.error('状态修改失败:', error);
                alert('处理状态修改失败，请重试');
            });
        }

        // 返回上一页函数 
        function goBack() { 
            window.history.back();  
        } 
 
        // 显示图片预览
        function showModal(imgUrl) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = "block";
            modalImg.src = imgUrl;
        }

        // 关闭图片预览
        function closeModal() {
            document.getElementById('imageModal').style.display = "none";
        }
 
        
        let currentUserRole = 0;

        fetch('https://open.rcwulian.cn/api/operat/get_current_user.php')
          .then(res => res.json())
          .then(data => {
            if (data.code === 0) {
              currentUserRole = data.data.role_id;
              // ✅ 角色确认后再加载投诉记录
              loadComplaintRecords();
            } else {
              alert('未登录');
              location.href = '/login.html';
            }
          });

    </script> 
<div id="banModal" class="modal" style="display: none;">

  <div class="modal-content">
    <span class="modal-close" onclick="closeBanModal()">&times;</span>
    <h2 style="font-size: 20px; font-weight: bold; margin-bottom: 20px;">封禁操作</h2>
    <form id="banForm">
      <input type="hidden" id="banSerialNumber">
      <input type="hidden" id="banReportId">
      <input type="hidden"  id="venueId">

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="banType" style="display:block; margin-bottom: 5px; font-weight: bold;">封禁类型</label>
        <select id="banType" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
          <option value="device">封禁设备</option>
          <option value="venue">封禁场地</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom: 15px;">
        <label for="banDuration" style="display:block; margin-bottom: 5px; font-weight: bold;">封禁时长</label>
        <select id="banDuration" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;">
          <option value="0.1667">10分钟</option>
          <option value="0.5">半小时</option>
          <option value="1">1小时</option>
          <option value="12">半天</option>
          <option value="24">1天</option>
          <option value="72">3天</option>
          <option value="168">1周</option>
        </select>
      </div>
      <div id="imageDeviceSerialWrapper" style="margin-bottom: 15px;">
          <label for="imageDeviceSerial" style="display:block; margin-bottom: 5px; font-weight: bold;">图传序列号</label>
          <input type="text" id="imageDeviceSerial" readonly style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;" />
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="banReason" style="display:block; margin-bottom: 5px; font-weight: bold;">封禁原因</label>
        <textarea id="banReason" rows="4" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;"></textarea>
      </div>
      <button type="submit" class="modify-btn" style="width: 100%; padding: 10px; background-color: blue; color: white; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s ease;">确认封禁</button>
    </form>
  </div>
</div>

<script>
function deleteComplaint(id) {
  if (!confirm('确定要删除此条投诉记录吗？')) return;
  fetch('https://open.rcwulian.cn/api/operat/ReporthandV2.php', {
    method: 'POST',
    body: new URLSearchParams({ delete_id: id })
  })
  .then(res => res.json())
  .then(data => {
    if (data.code === 0) {
      alert('删除成功');
      loadComplaintRecords();
    } else {
      alert('删除失败: ' + data.msg);
    }
  });
}

function openBanModal(complaint) {
  const modal = document.getElementById('banModal');
  modal.style.display = 'flex';

  // 基本字段
  document.getElementById('banSerialNumber').value = complaint.device_id;
  document.getElementById('banReportId').value = complaint.id;
  document.getElementById('banType').value = 'device';
  document.getElementById('banReason').value = '';
  document.getElementById('banDuration').value = '0.1667'; // 默认10分钟


  // 绑定场地
  if (document.getElementById('venueId')) {
    document.getElementById('venueId').value = complaint.bind_site || '';
  }
// 图传设备序列号（可选字段）
const imageSerial = getImageDeviceSerial(complaint);
const wrapper = document.getElementById('imageDeviceSerialWrapper');
const imageDeviceInput = document.getElementById('imageDeviceSerial');

if (imageDeviceInput) {
  if (imageSerial) {
    imageDeviceInput.value = imageSerial;
    imageDeviceInput.style.display = 'block';
    if (wrapper) wrapper.style.display = 'block';
  } else {
    imageDeviceInput.value = '';
    imageDeviceInput.style.display = 'none';
    if (wrapper) wrapper.style.display = 'none';
  }
}


  // 监听下拉变化：场地时填入绑定场地
  document.getElementById('banType').onchange = function () {
    if (this.value === 'venue') {
      document.getElementById('venueId').value = complaint.bind_site || '';
    } else {
      document.getElementById('venueId').value = '';
    }
  };
}

function getImageDeviceSerial(complaint) {
  if (!complaint.image_url || !complaint.image_url.trim()) return null;
  const match = complaint.image_url.match(/\/([^\/_]+)_/);
  return match ? match[1] : null;
}

function closeBanModal() {
  document.getElementById('banModal').style.display = 'none';
}

document.getElementById('banForm').onsubmit = function(e) {
  e.preventDefault();
  const req = {
    ban: true,
    id: 1,
    serial_number: document.getElementById('banSerialNumber').value,
    ban_duration: document.getElementById('banDuration').value,
    ban_reason: document.getElementById('banReason').value,
    banType: document.getElementById('banType').value,
     venue_id: document.getElementById('venueId').value
  };
  fetch('https://open.rcwulian.cn/api/devMgr/devMgtV2.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(req)
  })
  .then(res => res.json())
  .then(data => {
    if (data.code === 0) {
      // 标记为已处理
      modifyComplaintStatus(document.getElementById('banReportId').value, null, '已处理');

      alert('封禁成功');
      closeBanModal();
    } else {
      alert('封禁失败: ' + data.msg);
    }
  });
};

</script>

</body> 
 
</html>
