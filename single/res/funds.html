<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>场地资金概览</title>

<style>
:root {
  --primary:#5b8cff; --secondary:#7f8fa4;
  --background-gradient-start:#f8f9ff; --background-gradient-end:#f0f3ff;
  --card-bg:#ffffff; --border-color:#ddd; --text-color:#333;
  --shadow:0 4px 24px rgba(91,140,255,0.08);
  --transition:all 0.3s ease; --hover-bg:#f9f9f9;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC",system-ui}
body{
  background:linear-gradient(135deg,var(--background-gradient-start) 0%,var(--background-gradient-end) 100%);
  min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start;
}
.container{max-width:1200px;width:100%}
.card{background:var(--card-bg);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px;transition:var(--transition)}
.card-title{font-size:24px;color:var(--text-color);margin-bottom:20px;font-weight:600;border-bottom:2px solid var(--primary);padding-bottom:10px;text-align:left}

.controls{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.select{padding:10px 12px;border:1px solid var(--border-color);border-radius:8px;background:#fff;min-width:220px}

/* ⭐ KPI：PC三列，移动端一列 */
.summary{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:16px;
  margin-bottom:4px
}
.kpi{border:1px solid var(--border-color);border-radius:10px;padding:16px;background:#fff;box-shadow:var(--shadow)}
.kpi h4{font-size:14px;color:var(--secondary);margin-bottom:8px}
.kpi .val{font-size:24px;font-weight:700;color:#222}

/* 列表卡片：左图右文；PC图片更小并与文字垂直对齐 */
.venue-card{background:#fff;border:1px solid var(--border-color);border-radius:8px;padding:15px;margin-bottom:15px;display:flex;gap:12px;transition:var(--transition);align-items:center}
.venue-card:hover{background-color:var(--hover-bg)}
.venue-img{width:72px;height:72px;flex:0 0 72px;object-fit:cover;border-radius:8px;background:#f2f4ff}
.venue-info{flex:1;display:flex;flex-direction:column;gap:6px;font-size:14px;color:var(--text-color)}
.venue-info .venue-name{font-size:16px;font-weight:600;color:var(--primary)}

.loading{text-align:center;font-size:16px;color:var(--primary);padding:12px}
.err{color:#d93025;font-size:14px;margin-left:8px}

/* 手机端也保持横排小图卡片 */
@media (max-width: 720px) {
  .summary{ grid-template-columns: 1fr; }
  .venue-card{ flex-direction: row; align-items:center; gap:12px; padding:12px; }
  .venue-img{ width:64px; height:64px; flex:0 0 64px; }
  .venue-info{ gap:4px; font-size:13px; }
  .venue-info .venue-name{ font-size:15px; line-height:1.25; }
}
/* 缩小图片并与文字对齐 */
.venue-card{ align-items: center; }                  /* 垂直对齐 */
.venue-img{ width:56px; height:56px; flex:0 0 56px; }/* 再小一点 */

/* 三项金额一行显示 */
.metrics{
  display:flex;
  align-items: center;
  gap: 18px;                 /* 三项之间的间距 */
  white-space: nowrap;       /* PC 端不换行 */
  margin-top: 4px;
}
.metric .label{ font-size:13px; color: var(--secondary); }
.metric .val{ font-weight:700; margin-left:6px; color:#222; }

/* 手机端允许自动换行，避免溢出 */
@media (max-width: 720px){
  .venue-img{ width:52px; height:52px; flex:0 0 52px; }
  .metrics{ flex-wrap: wrap; white-space: normal; gap: 10px 16px; }
}

</style>
</head>
<body>
<div class="container">

  <!-- 顶部：筛选与汇总 -->
  <div class="card">
    <div class="card-title">资金总览</div>
    <div class="controls">
      <select id="venueSelect" class="select"></select>
      <span id="status" class="loading" style="display:none">加载中...</span>
      <span id="err" class="err"></span>
    </div>

    <div class="summary">
      <div class="kpi">
        <h4>可提现金额</h4>
        <div id="kpiBalance" class="val">--</div>
      </div>
      <div class="kpi">
        <h4>未核对金额</h4>
        <div id="kpiUnchecked" class="val">--</div>
      </div>
      <div class="kpi">
        <h4>已申请未打款</h4>
        <div id="kpiPending7d" class="val">--</div>
      </div>
    </div>
  </div>

  <!-- 列表 -->
  <div class="card">
    <div class="card-title">场地明细</div>
    <div id="list"></div>
  </div>
</div>

<script>
const API_URL = '/api/operat/venue-funds-overview.php'; // ← 改成你的接口路径
const sel = document.getElementById('venueSelect');
const listEl = document.getElementById('list');
const kpiBalance = document.getElementById('kpiBalance');
const kpiUnchecked = document.getElementById('kpiUnchecked');
const kpiPending7d = document.getElementById('kpiPending7d');
const statusEl = document.getElementById('status');
const errEl = document.getElementById('err');

function fmt(n){
  if(n===null||n===undefined||isNaN(n)) return '--';
  return Number(n).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function showLoading(b){ statusEl.style.display = b ? 'inline' : 'none'; }
function setErr(msg){ errEl.textContent = msg||''; }

async function fetchData(venue_id='all'){
  setErr(''); showLoading(true);
  try{
    const res = await fetch(`${API_URL}?venue_id=${encodeURIComponent(venue_id)}`, {credentials:'include'});
    const json = await res.json();
    showLoading(false);
    if(json.code!==0){ setErr(json.msg || '请求失败'); render({}, true); return; }
    render(json.data);
  }catch(e){
    showLoading(false);
    setErr('网络异常，请稍后重试');
    render({}, true);
  }
}

function render(data={}, empty=false){
  // 下拉选项
  if(Array.isArray(data.options)){
    sel.innerHTML = `<option value="all">全部场地</option>` + 
      data.options.map(o=>`<option value="${o.id}">${o.venue_name}（ID: ${o.id}）</option>`).join('');
    if(data.filters && data.filters.venue_id){
      sel.value = data.filters.venue_id === 'all' ? 'all' : String(data.filters.venue_id);
    }else{
      sel.value = 'all';
    }
  }

  // KPI 汇总
  const s = data.summary || {};
  kpiBalance.textContent   = empty ? '--' : `¥ ${fmt(s.account_balance||0)}`;
  kpiUnchecked.textContent = empty ? '--' : `¥ ${fmt(s.notSettledAmount||0)}`;
  kpiPending7d.textContent = empty ? '--' : `¥ ${fmt(s.pending_withdraw_30d||0)}`; // ⭐ 新增

  // 列表
  const rows = Array.isArray(data.rows) ? data.rows : [];
  if(empty || rows.length===0){
    listEl.innerHTML = `<div class="loading" style="padding:30px 0">暂无数据</div>`;
    return;
  }
listEl.innerHTML = rows.map(r=>{
  const img = r.image_url || '';
  return `
    <div class="venue-card">
      <img class="venue-img" src="${img || 'https://via.placeholder.com/200x200?text=Venue'}" alt="">
      <div class="venue-info">
        <div class="venue-name">${r.venue_name || '—'}（ID: ${r.venue_id}）</div>

        <div class="metrics">
          <div class="metric">
            <span class="label">可提现金额：</span>
            <span class="val">¥ ${fmt(r.account_balance||0)}</span>
          </div>

          <div class="metric">
            <span class="label">未核对金额：</span>
            <span class="val">¥ ${fmt(r.notSettledAmount||0)}</span>
          </div>

          <div class="metric">
            <span class="label">已申请未打款：</span>
            <span class="val">¥ ${fmt(r.pending_withdraw_30d||0)}</span>
          </div>
        </div>
      </div>
    </div>`;
}).join('');

}

// 切换场地
sel.addEventListener('change', ()=>fetchData(sel.value));

// 初次加载
fetchData('all');
</script>
</body>
</html>
