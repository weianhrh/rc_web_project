

<title>网站用户</title>
  
<div class="layui-card layadmin-header">
  <div class="layui-breadcrumb" lay-filter="breadcrumb">
    <a lay-href="">主页</a>
    <a><cite>用户</cite></a>
    <a><cite>网站用户</cite></a>
  </div>
</div>

<div class="layui-fluid">
  <div class="layui-card">
    <div class="layui-form layui-card-header layuiadmin-card-header-auto" lay-filter="layadmin-userfront-formlist">
      <div class="layui-form-item">
        <div class="layui-inline">
          <label class="layui-form-label">ID</label>
          <div class="layui-input-block">
            <input type="text" name="id" placeholder="请输入" autocomplete="off" class="layui-input">
          </div>
        </div>
        <div class="layui-inline">
          <label class="layui-form-label">用户名</label>
          <div class="layui-input-block">
            <input type="text" name="username" placeholder="请输入" autocomplete="off" class="layui-input">
          </div>
        </div>
        <div class="layui-inline">
          <label class="layui-form-label">手机号</label>
          <div class="layui-input-block">
            <input type="text" name="phone" placeholder="请输入" autocomplete="off" class="layui-input">
          </div>
        </div>
      
        <div class="layui-inline">
          <button class="layui-btn layuiadmin-btn-useradmin" lay-submit lay-filter="LAY-user-front-search">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
          </button>
        </div>
      </div>
    </div>
    
    <div class="layui-card-body">
      <script type="text/html" id="table-useradmin-webuser">
      <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="recharge"><i class="layui-icon layui-icon-rmb"></i>充值</a>
  <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>编辑</a>
  <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
  
</script>

      
      <table id="LAY-user-manage" lay-filter="LAY-user-manage"></table>
      <script type="text/html" id="imgTpl"> 
        <img style="display: inline-block; width: 50%; height: 100%;" src= {{ d.avatar }}>
      </script> 
      <script type="text/html" id="table-useradmin-webuser">
        <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>编辑</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>
      </script>
    </div>
  </div>
</div>

<script>
layui.use('useradmin', layui.factory('useradmin')).use(['admin', 'useradmin', 'table', 'form', 'layer'], function(){
  var $ = layui.$
  ,admin = layui.admin
  ,view = layui.view
  ,table = layui.table
  ,form = layui.form
  ,layer = layui.layer;
  
  form.render(null, 'layadmin-userfront-formlist');
  
  // 搜索功能
  form.on('submit(LAY-user-front-search)', function(data){
    var field = data.field;

    table.reload('LAY-user-manage', {
      where: field
    });
  });

  // 监听工具条
  table.on('tool(LAY-user-manage)', function(obj){
    var data = obj.data;
    var event = obj.event;
    
    if(event === 'edit') {
      // 编辑事件处理
    } else if(event === 'del') {
      // 删除事件处理
    } else if(event === 'recharge') {
      // 充值事件处理
      layer.prompt({
        formType: 0,
        title: '请输入充值金额',
        btn: ['确认', '取消']
      }, function(value, index, elem){
        // 此处可以对输入的充值金额 `value` 进行进一步处理
        layer.close(index);

        // 模拟向后端提交充值金额的 Ajax 请求
        $.ajax({
          url: '/api/user/recharge.php', // 替换为实际的充值接口地址
          type: 'POST',
          data: {
            uid: data.id, // 用户ID
            amount: value  // 充值金额
          },
          success: function(res){
            if(res.success) {
              layer.msg('充值成功');
              table.reload('LAY-user-manage'); // 重载表格
            } else {
              layer.msg('充值失败: ' + res.message);
            }
          },
          error: function(){
            layer.msg('请求失败，请稍后重试');
          }
        });
      });
    }
  });

  // 批量删除和添加功能
  var active = {
    batchdel: function(){
      var checkStatus = table.checkStatus('LAY-user-manage')
      ,checkData = checkStatus.data;
      if(checkData.length === 0){
        return layer.msg('请选择数据');
      }

      layer.confirm('确定删除吗？', function(index) {
        table.reload('LAY-user-manage');
        layer.msg('已删除');
      });
    },
    add: function(){
      admin.popup({
        title: '添加用户',
        area: ['500px', '450px'],
        id: 'LAY-popup-user-add',
        success: function(layero, index){
          view(this.id).render('user/user/userform').done(function(){
            form.render(null, 'layuiadmin-form-useradmin');

            form.on('submit(LAY-user-front-submit)', function(data){
              layui.table.reload('LAY-user-manage');
              layer.close(index);
            });
          });
        }
      });
    }
  };

  $('.layui-btn.layuiadmin-btn-useradmin').on('click', function(){
    var type = $(this).data('type');
    active[type] ? active[type].call(this) : '';
  });
});


</script>
