      function escapeHtml(s){
        return String(s)
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;')
          .replace(/'/g,'&#39;');
      }

      // 去掉 URL 末尾可能粘上的标点（中英混合环境很常见）
      function stripTrailingPunct(url){
        return url.replace(/[。．\.，,；;！!？\?\)\]】》」'"]+$/u,'');
      }

      // 将纯文本中的 http(s) 链接转成 <a>
      function linkify(text){
        if(!text) return '';
        var urlRe = /(https?:\/\/[^\s<>"']+)/g;
        var out = [];
        var last = 0;

        String(text).replace(urlRe, function(m, _1, offset){
          // 追加之前的纯文本（做转义）
          out.push(escapeHtml(text.slice(last, offset)));

          var clean = stripTrailingPunct(m);
          var trailing = m.slice(clean.length);

          // 作为可读 label 试着 decode（例如中文文件名更友好）
          var label;
          try { label = decodeURI(clean); } catch(e){ label = clean; }

          // 生成链接（新窗口 + 安全 rel）
          out.push(
            '<a href="'+ clean +'" target="_blank" rel="noopener noreferrer nofollow">'
            + escapeHtml(label) + '</a>'
          );

          // 把被剥离的标点再补回（做转义）
          out.push(escapeHtml(trailing));

          last = offset + m.length;
          return m;
        });

        // 收尾剩余纯文本
        out.push(escapeHtml(text.slice(last)));
        return out.join('');

function formatDate(dateStr) {

      // 检查未读通知
      function checkUnreadNotices() {
        $.ajax({
          url: './api/index/Msg.php',
          type: 'POST',
          data: { action: 'getUnreadNotices' },
          dataType: 'json',
          success: function(res) {
            if(res.code === 0 && res.data && res.data.length > 0) {
              showNoticePopup(res.data[0]); // 显示第一条未读
            }
          }
        });
      }

      // 弹窗
window.showNoticePopup = function(notice) {
  layer.open({
    type: 1,
    title: false,
    closeBtn: 0,
    shadeClose: false,
    area: [window.innerWidth < 500 ? '90%' : '800px', 'auto'],
    maxHeight: '80vh',
    content: `
      <div class="notice-popup">
        <h3>${escapeHtml(notice.title || '')}</h3>
        <div class="content">${linkify(notice.content || '')}</div>
        <div class="btn-group">
          <button class="layui-btn layui-btn-primary" onclick="markAsRead(${Number(notice.id) || 0})">标记已读</button>
        </div>
      </div>
    `
  });
};


      // 标记已读（挂到 window 供弹窗按钮调用）
      window.markAsRead = function(noticeId) {
        $.ajax({
          url: './api/index/Msg.php',
          type: 'POST',
          data: {
            action: 'markNoticeAsRead',
            notice_id: noticeId
          },
          dataType: 'json',
          success: function(res) {
            if(res.code === 0) {
              layer.closeAll();
              checkUnreadNotices();
            } else {
              layer.msg('标记已读失败：' + res.msg);
            }
          }
        });
      };

      // 页面就绪后检查未读通知
      $(document).ready(function() {
        checkUnreadNotices();
      });
