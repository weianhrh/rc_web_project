<!DOCTYPE html> 
<html lang="zh-CN"> 
 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>OSS 图床管理</title> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">        
    <style> 
        :root { 
            --primary: #5b8cff; 
            --secondary: #7f8fa4; 
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08); 
            --danger: #ff5b5b; /* 新增红色变量 */ 
        } 
 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "PingFang SC", system-ui; 
        } 
 
        body { 
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%); 
            min-height: 100vh; 
            padding: 20px; 
        } 
 
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        } 
 
        .card { 
            background: #ffffff; 
            border-radius: 24px; 
            padding: 24px; 
            box-shadow: var(--shadow); 
            margin-bottom: 24px; 
        } 
 
        .card-title { 
            font-size: 20px; 
            color: #333; 
            margin-bottom: 24px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        } 
 
        .image-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(calc(33.33% - 20px), 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        } 
 
        .image-item { 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: var(--shadow); 
            position: relative; 
        } 
 
        .image-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            object-fit: cover; 
        } 
 
        .copy-button { 
            background-color: var(--primary); 
            color: white; 
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 48%; /* 调小按钮宽度 */ 
            text-align: center; 
            position: absolute; 
            bottom: 0; 
            left: 0; 
        } 
        .delete-button { 
            background-color: var(--danger); /* 红色背景 */ 
            color: white; 
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 48%; /* 与复制按钮宽度一致 */ 
            text-align: center; 
            position: absolute; 
            bottom: 0; 
            right: 0; /* 靠右对齐 */ 
        } 
        .upload-button { 
            background-color: var(--primary); 
            color: white; 
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 120px; 
            text-align: center; 
        } 
 
        @media (max-width: 768px) { 
            .image-list { 
                grid-template-columns: repeat(auto-fill, minmax(calc(50% - 20px), 1fr)); 
            } 
        } 
 
        @media (max-width: 480px) { 
            .image-list { 
                grid-template-columns: 1fr; 
            } 
        } 
    </style> 
</head> 
 
<body> 
    <div class="container"> 
        <div class="card"> 
            <h2 class="card-title"> 
                获取 OSS 图床图片列表 
                <!-- 上传按钮 --> 
                <button class="upload-button" onclick="window.location.href='ossImgUpload.html'">   上传</button> 
            </h2> 
            <div id="imageList" class="image-list"></div> 
        </div> 
    </div> 
 
    <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.17.0.min.js"></script>        
    <script> 
        let ossConfig = null; 
 
        document.addEventListener('DOMContentLoaded',  async () => { 
            try { 
                // 获取OSS配置 
                const configResponse = await fetch('https://open.rcwulian.cn/api/operat/upload.php?get_config=1');  
                const configData = await configResponse.json();  
                if (configData.code  === 0) { 
                    ossConfig = configData.data;  
                } else { 
                    throw new Error('获取OSS配置失败'); 
                } 
 
                if (!ossConfig) { 
                    throw new Error('OSS配置无效'); 
                } 
 
                // 使用获取到的配置初始化OSS客户端 
                const client = new OSS(ossConfig); 
                const imageListDiv = document.getElementById('imageList');  
                imageListDiv.innerHTML  = ''; 
 
                async function listObjects(prefix) { 
                    try { 
                        const result = await client.list({  
                            prefix: prefix, 
                            delimiter: '/' 
                        }); 
 
                        if (result.objects  && result.objects.length  > 0) { 
                            for (const object of result.objects)  { 
                                const imageUrl = object.url;  
                                const imageItem = document.createElement('div');  
                                imageItem.classList.add('image-item');  
 
                                const img = new Image(); 
                                img.src  = imageUrl; 
                                // 等待图片加载完成以获取尺寸 
                                await new Promise((resolve) => { 
                                    img.onload  = resolve; 
                                }); 
 
                                const width = img.width;  
                                const height = img.height;  
                                imageItem.style.minHeight  = `${height / width * 100}px`; 
 
                                imageItem.appendChild(img);  
 
                                const copyButton = document.createElement('button');  
                                copyButton.classList.add('copy-button');  
                                copyButton.textContent  = '复制链接'; 
                                copyButton.addEventListener('click',  () => { 
                                    navigator.clipboard.writeText(imageUrl).then(()  => { 
                                        alert('链接已复制到剪贴板'); 
                                    }).catch((error) => { 
                                        console.error(' 复制链接失败:', error); 
                                        alert('复制链接失败，请稍后重试'); 
                                    }); 
                                }); 
                                imageItem.appendChild(copyButton);  
                                
                                // 添加删除按钮 
                                const deleteButton = document.createElement('button');  
                                deleteButton.classList.add('delete-button');  
                                deleteButton.textContent  = '删除'; 
                                deleteButton.addEventListener('click',  async () => { 
                                    if (confirm('您确定要删除这张图片吗？')) { 
                                        try { 
                                            await client.delete(object.name);  // 调用OSS SDK的删除方法 
                                            alert('图片已删除'); 
                                            imageListDiv.innerHTML  = ''; // 清空当前列表 
                                            await listObjects('app/img/'); // 重新加载图片列表 
                                        } catch (error) { 
                                            console.error(' 删除图片失败:', error); 
                                            alert('删除图片失败，请稍后重试'); 
                                        } 
                                    } 
                                }); 
                                imageItem.appendChild(deleteButton);  
 
                                imageListDiv.appendChild(imageItem);  
                            } 
                        } 
 
                        if (result.prefixes  && result.prefixes.length  > 0) { 
                            for (const subPrefix of result.prefixes)  { 
                                await listObjects(subPrefix); 
                            } 
                        } 
                    } catch (error) { 
                        console.error(' 获取图片列表失败:', error); 
                        alert('获取图片列表失败，请稍后重试'); 
                    } 
                } 
 
                await listObjects('app/img/'); 
            } catch (error) { 
                console.error(' 初始化失败:', error); 
                alert('初始化失败: ' + error.message);  
            } 
        }); 
    </script> 
</body> 
 
</html>
