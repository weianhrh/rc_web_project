<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语音房全局开关</title>
  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
      --success: #19be6b;
      --danger: #ff4d4f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", system-ui;
    }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .card-title {
      font-size: 24px;
      color: var(--text-color);
      margin-bottom: 20px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      text-align: left;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .form-row:last-child {
      border-bottom: none;
    }

    .label-wrap {
      flex: 1;
    }

    .label-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 6px;
    }

    .label-desc {
      font-size: 13px;
      color: var(--secondary);
      line-height: 1.6;
    }

    .switch {
      position: relative;
      width: 56px;
      height: 30px;
      flex-shrink: 0;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #d9d9d9;
      border-radius: 999px;
      transition: 0.3s;
      cursor: pointer;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .switch input:checked + .slider {
      background: var(--primary);
    }

    .switch input:checked + .slider::before {
      transform: translateX(26px);
    }

    .textarea-group {
      margin-top: 18px;
    }

    .textarea-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 12px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      color: var(--text-color);
      transition: var(--transition);
      background: #fff;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.08);
    }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: #4a77e4;
    }

    .btn-default {
      background: #f4f6fb;
      color: #333;
    }

    .btn-default:hover {
      background: #e9edf8;
    }

    .status-bar {
      margin-top: 12px;
      font-size: 14px;
      min-height: 22px;
    }

    .success {
      color: #19be6b;
    }

    .error {
      color: #ff4d4f;
    }

    .loading {
      text-align: center;
      font-size: 16px;
      color: var(--primary);
      padding: 20px;
    }

    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-title">语音房全局开关</div>

      <div id="loadingBox" class="loading">加载中...</div>

      <div id="mainBox" style="display:none;">
        <input type="hidden" id="msg1_id" />
        <input type="hidden" id="msg2_id" />

        <div class="form-row">
          <div class="label-wrap">
            <div class="label-title">显示游戏入口</div>
            <div class="label-desc">控制 App 端语音房内是否显示游戏入口。</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="is_show_game">
            <span class="slider"></span>
          </label>
        </div>

        <div class="form-row">
          <div class="label-wrap">
            <div class="label-title">显示礼物入口</div>
            <div class="label-desc">控制 App 端语音房内是否显示礼物入口。</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="is_show_gift">
            <span class="slider"></span>
          </label>
        </div>

        <div class="textarea-group">
          <label class="textarea-label" for="msg1_text">系统文案 1</label>
          <textarea id="msg1_text" placeholder="请输入欢迎文案"></textarea>
        </div>

        <div class="textarea-group">
          <label class="textarea-label" for="msg2_text">系统文案 2</label>
          <textarea id="msg2_text" placeholder="请输入提示文案"></textarea>
        </div>

        <div class="btn-row">
          <button class="btn btn-default" id="reloadBtn">重新加载</button>
          <button class="btn btn-primary" id="saveBtn">保存配置</button>
        </div>

        <div id="statusBar" class="status-bar"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/voiceRoom/voiceRoomGlobalSwitch.php'; // 按你的实际路径改

    const loadingBox = document.getElementById('loadingBox');
    const mainBox = document.getElementById('mainBox');
    const statusBar = document.getElementById('statusBar');

    const msg1IdEl = document.getElementById('msg1_id');
    const msg2IdEl = document.getElementById('msg2_id');

    const isShowGameEl = document.getElementById('is_show_game');
    const isShowGiftEl = document.getElementById('is_show_gift');
    const msg1TextEl = document.getElementById('msg1_text');
    const msg2TextEl = document.getElementById('msg2_text');

    const reloadBtn = document.getElementById('reloadBtn');
    const saveBtn = document.getElementById('saveBtn');

    function setStatus(msg, type = '') {
      statusBar.className = 'status-bar';
      if (type) statusBar.classList.add(type);
      statusBar.textContent = msg || '';
    }

    async function loadConfig() {
      loadingBox.style.display = 'block';
      mainBox.style.display = 'none';
      setStatus('');

      try {
        const res = await fetch(API_URL + '?action=get_admin', {
          method: 'GET'
        });
        const json = await res.json();

        if (json.code !== 200) {
          throw new Error(json.msg || '加载失败');
        }

        const data = json.data || {};

        msg1IdEl.value = data.msg1_id || 0;
        msg2IdEl.value = data.msg2_id || 0;

        isShowGameEl.checked = Number(data.is_show_game) === 1;
        isShowGiftEl.checked = Number(data.is_show_gift) === 1;

        msg1TextEl.value = data.msg1_text || '';
        msg2TextEl.value = data.msg2_text || '';

        loadingBox.style.display = 'none';
        mainBox.style.display = 'block';
      } catch (err) {
        loadingBox.style.display = 'none';
        mainBox.style.display = 'block';
        setStatus(err.message || '加载失败', 'error');
      }
    }

    async function saveConfig() {
      setStatus('保存中...');

      const formData = new FormData();
      formData.append('action', 'save');
      formData.append('msg1_id', msg1IdEl.value || '0');
      formData.append('msg2_id', msg2IdEl.value || '0');
      formData.append('is_show_game', isShowGameEl.checked ? '1' : '0');
      formData.append('is_show_gift', isShowGiftEl.checked ? '1' : '0');
      formData.append('msg1_text', msg1TextEl.value.trim());
      formData.append('msg2_text', msg2TextEl.value.trim());

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });
        const json = await res.json();

        if (json.code !== 200) {
          throw new Error(json.msg || '保存失败');
        }

        setStatus(json.msg || '保存成功', 'success');
        await loadConfig();
      } catch (err) {
        setStatus(err.message || '保存失败', 'error');
      }
    }

    reloadBtn.addEventListener('click', loadConfig);
    saveBtn.addEventListener('click', saveConfig);

    loadConfig();
  </script>
</body>
</html>
