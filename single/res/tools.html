<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台工具入口</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --transition: all 0.3s ease;
            --hover-bg: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .card-title {
            font-size: 22px;
            color: var(--text-color);
            margin-bottom: 16px;
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            text-align: left;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-btn {
            background-color: #fff;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            text-align: left;
        }

        .tool-btn:hover {
            background-color: var(--hover-bg);
            box-shadow: var(--shadow);
        }

        .tool-main {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tool-label {
            font-size: 15px;
            color: var(--text-color);
            font-weight: 500;
        }

        .tool-sub {
            font-size: 12px;
            color: var(--secondary);
        }

        .tool-right-icon {
            color: var(--secondary);
            margin-left: 10px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 16px;
            }
            .card-title {
                font-size: 20px;
            }
        }

        /* 你原本 modal 的样式，预留以后用 */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: border-color 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-title">后台工具导航</div>

        <div class="tool-list">
            <!-- 菜单管理 -->
            <button class="tool-btn" onclick="location.href='admin_menu_mgt.html'">
                <div class="tool-main">
                    <span class="tool-label"><i class="fas fa-dice-d6"></i> 菜单管理</span>
                    <span class="tool-sub">admin_menu_mgt.html</span>
                </div>
                <i class="fas fa-chevron-right tool-right-icon"></i>
            </button>

            <!-- 导航管理 -->
            <button class="tool-btn" onclick="location.href='navmanager.html'">
                <div class="tool-main">
                    <span class="tool-label"><i class="fas fa-box"></i> 导航管理</span>
                    <span class="tool-sub">navmanager.html</span>
                </div>
                <i class="fas fa-chevron-right tool-right-icon"></i>
            </button>

            <!-- Redis 通知配置 -->
            <button class="tool-btn" onclick="location.href='redis_notification.html'">
                <div class="tool-main">
                    <span class="tool-label"><i class="fas fa-bell"></i> Redis 通知配置</span>
                    <span class="tool-sub">redis_notification.html</span>
                </div>
                <i class="fas fa-chevron-right tool-right-icon"></i>
            </button>

            <!-- 切换场地 id -->
            <button class="tool-btn" onclick="location.href='manage_venue.html'">
                <div class="tool-main">
                    <span class="tool-label"><i class="fas fa-bezier-curve"></i> 切换场地 ID</span>
                    <span class="tool-sub">manage_venue.html</span>
                </div>
                <i class="fas fa-chevron-right tool-right-icon"></i>
            </button>
        </div>
    </div>
</div>
</body>
</html>
