<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>礼物管理</title>
<style>
  :root{
    --primary:#5b8cff;
    --bg-a:#f8f9ff;
    --bg-b:#f0f3ff;
    --card:#fff;
    --border:#e6e8ef;
    --text:#333;
    --muted:#7f8fa4;
    --shadow:0 4px 24px rgba(91,140,255,.08);
    --hover:#f9f9f9;
    --danger:#c62828;
    --success:#0a7f3f;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"PingFang SC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  }

  body{
    background:linear-gradient(135deg,var(--bg-a) 0%,var(--bg-b) 100%);
    min-height:100vh;
    padding:16px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    color:var(--text);
  }

  .container{
    max-width:1280px;
    width:100%;
  }

  .card{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    box-shadow:var(--shadow);
  }

  .card-title{
    font-size:22px;
    font-weight:700;
    border-bottom:2px solid var(--primary);
    padding-bottom:10px;
    margin-bottom:16px;
  }

  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
  }

  .input,.select,.textarea{
    border:1px solid var(--border);
    border-radius:10px;
    background:#fff;
    font-size:14px;
    color:var(--text);
  }

  .input,.select{
    height:38px;
    padding:0 12px;
  }

  .input{
    min-width:220px;
  }

  .select{
    min-width:150px;
  }

  .textarea{
    width:100%;
    min-height:84px;
    padding:10px 12px;
    resize:vertical;
  }

  .btn{
    height:38px;
    padding:0 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    transition:.2s;
  }

  .btn-primary{
    background:var(--primary);
    color:#fff;
  }

  .btn-primary:hover{
    filter:brightness(.96);
  }

  .btn-ghost{
    background:#fff;
    border:1px solid var(--border);
    color:var(--text);
  }

  .btn-ghost:hover,
  .btn-outline:hover{
    background:var(--hover);
  }

  .btn-outline{
    background:#fff;
    border:1px solid var(--border);
    color:var(--text);
  }

  .btn-danger{
    background:#fff;
    border:1px solid #f1b4b4;
    color:var(--danger);
  }

  .btn-danger:hover{
    background:#fff1f1;
  }

  .btn-s{
    height:32px;
    padding:0 10px;
    border-radius:10px;
    font-size:13px;
  }

  .spacer{
    flex:1;
  }

  .muted{
    color:var(--muted);
  }

  .thead,.rowgrid{
    display:grid;
    grid-template-columns:36px minmax(360px,1fr) 110px 110px 200px;
    gap:12px;
    align-items:center;
    padding:12px 0;
  }

  .thead{
    font-weight:600;
    color:#666;
    border-bottom:1px dashed #eceff5;
  }

  .rowgrid{
    border-bottom:1px dashed #f0f2f7;
  }

  .checkbox{
    width:18px;
    height:18px;
  }

  .gift-main{
    display:flex;
    gap:12px;
    align-items:flex-start;
    min-width:0;
  }

  .thumb{
    width:64px;
    height:64px;
    border-radius:12px;
    object-fit:cover;
    background:#f3f4f8;
    border:1px solid #eef0f5;
    flex-shrink:0;
  }

  .thumb-placeholder{
    width:64px;
    height:64px;
    border-radius:12px;
    background:#f3f4f8;
    border:1px solid #eef0f5;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#9aa4b2;
    font-size:12px;
    flex-shrink:0;
  }

  .gift-info{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .gift-name{
    font-size:15px;
    font-weight:700;
    color:#2b59ff;
    word-break:break-all;
  }

  .gift-link{
    font-size:12px;
    color:#4b5563;
    word-break:break-all;
    line-height:1.5;
  }

  .gift-link a{
    color:#2b59ff;
    text-decoration:none;
  }

  .gift-link a:hover{
    text-decoration:underline;
  }

  .price{
    font-weight:700;
  }

  .tag{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:72px;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    border:1px solid var(--border);
    cursor:pointer;
    user-select:none;
  }

  .tag-on{
    color:var(--success);
    border-color:rgba(10,127,63,.35);
    background:rgba(10,127,63,.06);
  }

  .tag-off{
    color:#b10b0b;
    border-color:rgba(177,11,11,.28);
    background:rgba(177,11,11,.05);
  }

  .btn-group{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    flex-wrap:wrap;
  }

  .pagination{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:flex-end;
    align-items:center;
    margin-top:12px;
  }

  #pagerInfo{
    margin-right:auto;
    color:#666;
  }

  .loading{
    text-align:center;
    font-size:16px;
    color:var(--primary);
    padding:26px;
  }

  .empty{
    text-align:center;
    color:#8b95a7;
    padding:28px 12px;
  }

  .modal{
    display:none;
    position:fixed;
    inset:0;
    z-index:999;
    background:rgba(0,0,0,.55);
    justify-content:center;
    align-items:center;
    padding:16px;
  }

  .modal-content{
    background:#fff;
    padding:20px;
    border-radius:14px;
    width:520px;
    max-width:100%;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .modal-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:4px;
  }

  .modal-content label{
    font-size:14px;
    font-weight:600;
    color:#374151;
  }

  .modal-content input[type="text"],
  .modal-content input[type="number"]{
    width:100%;
    height:40px;
    border:1px solid #d8dce6;
    border-radius:10px;
    padding:0 12px;
    font-size:14px;
  }

  .check-line{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:2px;
  }

  .check-line input{
    width:auto;
    height:auto;
    transform:scale(1.1);
  }

  .modal-actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:4px;
  }

  @media (max-width: 980px){
    body{
      padding:10px;
    }

    .card{
      padding:14px;
      border-radius:12px;
    }

    .card-title{
      font-size:20px;
    }

    .input,.select{
      width:100%;
      min-width:0;
    }

    .toolbar .btn{
      height:36px;
    }

    .thead{
      display:none;
    }

    .rowgrid{
      grid-template-columns:30px 1fr;
      gap:10px;
      align-items:flex-start;
      padding:14px 0;
    }

    .row-right{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .row-top{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .meta-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn-group{
      justify-content:flex-start;
    }

    .pagination{
      justify-content:center;
    }

    #pagerInfo{
      width:100%;
      margin-right:0;
      text-align:center;
      margin-bottom:4px;
    }
  }

  .input-upload-row{
    display:flex;
    gap:10px;
    align-items:center;
  }

  .input-upload-row input{
    flex:1;
    min-width:0;
  }

  .upload-mini-btn{
    height:40px;
    padding:0 14px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:#fff;
    cursor:pointer;
    white-space:nowrap;
  }

  .upload-mini-btn:hover{
    filter:brightness(.96);
  }

  @media (max-width: 768px){
    .input-upload-row{
      flex-direction:column;
      align-items:stretch;
    }

    .upload-mini-btn{
      width:100%;
    }
  }

  .gif-play-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:88px;
    height:30px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(43,89,255,.08);
    color:#2b59ff;
    border:1px solid rgba(43,89,255,.18);
    cursor:pointer;
    user-select:none;
    transition:.2s;
    font-size:12px;
    font-weight:600;
  }

  .gif-play-btn:hover{
    background:rgba(43,89,255,.12);
    transform:translateY(-1px);
  }

  .preview-modal{
    display:none;
    position:fixed;
    inset:0;
    z-index:1001;
    background:rgba(0,0,0,.68);
    justify-content:center;
    align-items:center;
    padding:16px;
  }

  .preview-box{
    position:relative;
    width:min(92vw, 720px);
    max-height:88vh;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 18px 60px rgba(0,0,0,.22);
    display:flex;
    flex-direction:column;
  }

  .preview-header{
    height:52px;
    padding:0 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #eef1f6;
    font-size:16px;
    font-weight:700;
    color:#222;
    flex-shrink:0;
  }

  .preview-close{
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    background:#f3f5f9;
    color:#333;
    font-size:22px;
    cursor:pointer;
    line-height:1;
  }

  .preview-close:hover{
    background:#e9edf5;
  }

  .preview-stage{
    min-height:320px;
    max-height:calc(88vh - 52px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:linear-gradient(180deg,#f8fbff 0%,#f1f5ff 100%);
    overflow:auto;
  }

  .preview-stage img,
  .preview-stage video{
    max-width:100%;
    max-height:100%;
    border-radius:12px;
    display:none;
    background:#fff;
  }

  .preview-empty{
    color:#7b8794;
    font-size:14px;
  }

  #svgaPreviewWrap{
    width:100%;
    display:none;
    align-items:center;
    justify-content:center;
  }

  #svgaPlayerBox{
    width:min(80vw, 420px);
    height:min(80vw, 420px);
    max-width:420px;
    max-height:420px;
  }

  @media (max-width: 768px){
    .preview-box{
      width:100%;
      max-height:92vh;
      border-radius:14px;
    }

    .preview-stage{
      min-height:260px;
      max-height:calc(92vh - 52px);
      padding:12px;
    }

    #svgaPlayerBox{
      width:min(86vw, 320px);
      height:min(86vw, 320px);
    }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-title">礼物管理</div>

      <div class="toolbar">
        <input id="kw" class="input" placeholder="搜索礼物名称…" />
        <select id="filterDisplay" class="select">
          <option value="">全部状态</option>
          <option value="1">仅显示中</option>
          <option value="0">仅隐藏</option>
        </select>

        <button class="btn btn-primary" id="btnSearch">搜索</button>
        <div class="spacer"></div>
        <button class="btn btn-ghost" id="btnBatchDelete">批量删除</button>
        <button class="btn btn-primary" id="btnCreate">新增礼物</button>
      </div>

      <div class="thead">
        <div><input class="checkbox" id="checkAll" type="checkbox"></div>
        <div>礼物信息</div>
        <div>价格</div>
        <div>显示状态</div>
        <div style="text-align:right;">操作</div>
      </div>

      <div id="list"></div>

      <div class="pagination">
        <span id="pagerInfo"></span>
        <button class="btn btn-ghost" id="prev">上一页</button>
        <button class="btn btn-ghost" id="next">下一页</button>
        <select id="pageSize" class="select">
          <option value="10">10/页</option>
          <option value="20" selected>20/页</option>
          <option value="50">50/页</option>
          <option value="100">100/页</option>
        </select>
      </div>
    </div>
  </div>

  <div class="modal" id="giftModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">新增礼物</div>

      <input id="f_id" type="hidden" />

      <label>礼物名称</label>
      <input id="f_name" type="text" placeholder="例如：小跑车" />

      <label>礼物价格</label>
      <input id="f_price" type="number" step="0.01" placeholder="例如：5 或 5.00" />

      <label>图片链接 image_url</label>
      <div class="input-upload-row">
        <input id="f_image_url" type="text" placeholder="https://..." />
        <button type="button" class="upload-mini-btn" id="btnUploadImageUrl">上传图片</button>
      </div>
      <input id="uploadImageFile" type="file" accept="image/*" style="display:none;" />

      <label>动图链接 gif_url</label>
      <div class="input-upload-row">
        <input id="f_gif_url" type="text" placeholder="https://..." />
        <button type="button" class="upload-mini-btn" id="btnUploadGifUrl">上传图片/动图</button>
      </div>
      <input id="uploadGifFile" type="file" accept="image/*,.gif,.svga,video/*" style="display:none;" />

      <label class="check-line">
        <input id="f_display" type="checkbox" checked />
        <span>显示</span>
      </label>
    <label class="check-line">
      <input id="f_top_banner_show" type="checkbox" checked />
      <span>顶部浮条显示</span>
    </label>
    
    <label class="check-line">
      <input id="f_play_svga" type="checkbox" checked />
      <span>播放 SVGA</span>
    </label>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btnCancel">取消</button>
        <button class="btn btn-primary" id="btnSave">保存</button>
      </div>
    </div>
  </div>

  <div class="preview-modal" id="previewModal">
    <div class="preview-box">
      <div class="preview-header">
        <span>动画预览</span>
        <button type="button" class="preview-close" id="previewClose">×</button>
      </div>

      <div class="preview-stage" id="previewStage">
        <img id="previewImage" alt="preview" />
        <video id="previewVideo" controls autoplay muted loop playsinline></video>

        <div id="svgaPreviewWrap">
          <div id="svgaPlayerBox"></div>
        </div>

        <div class="preview-empty" id="previewEmpty">请选择动画进行播放</div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/svgaplayerweb/build/svga.min.js"></script>
<script>
  const API_BASE = '/api/operat/gift_detail.php';
  const API_HEADERS = { 'Content-Type': 'application/json' };
  const API_FETCH_OPTS = { credentials: 'include' };

  const btnUploadImageUrl = document.getElementById('btnUploadImageUrl');
  const btnUploadGifUrl = document.getElementById('btnUploadGifUrl');
  const uploadImageFile = document.getElementById('uploadImageFile');
  const uploadGifFile = document.getElementById('uploadGifFile');

  const previewModal = document.getElementById('previewModal');
  const previewClose = document.getElementById('previewClose');
  const previewImage = document.getElementById('previewImage');
  const previewVideo = document.getElementById('previewVideo');
  const previewEmpty = document.getElementById('previewEmpty');
  const svgaPreviewWrap = document.getElementById('svgaPreviewWrap');

  let previewSvgaPlayer = null;
  let previewSvgaParser = null;

  if (btnUploadImageUrl && uploadImageFile) {
    btnUploadImageUrl.onclick = () => {
      uploadImageFile.value = '';
      uploadImageFile.click();
    };

    uploadImageFile.onchange = async (e) => {
      const file = e.target.files[0];
      await uploadFileAndFillInput(file, 'f_image_url');
    };
  }

  if (btnUploadGifUrl && uploadGifFile) {
    btnUploadGifUrl.onclick = () => {
      uploadGifFile.value = '';
      uploadGifFile.click();
    };

    uploadGifFile.onchange = async (e) => {
      const file = e.target.files[0];
      await uploadFileAndFillInput(file, 'f_gif_url');
    };
  }

  const state = {
    page: 1,
    pageSize: 20,
    q: '',
    is_display: '',
    total: 0,
    list: [],
    checked: new Set()
  };

  const $ = (s) => document.querySelector(s);
  const listEl = $('#list');
  const pagerInfoEl = $('#pagerInfo');
  const checkAllEl = $('#checkAll');

  function qs(obj){
    const p = new URLSearchParams();
    Object.entries(obj).forEach(([k, v]) => {
      if (v !== '' && v !== null && v !== undefined) p.append(k, v);
    });
    return p.toString();
  }

  function toast(msg){
    alert(msg);
  }

  function escapeHtml(s = ''){
    return String(s).replace(/[&<>"']/g, m => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[m]));
  }

  function formatPrice(v){
    const n = Number(v || 0);
    return Number.isInteger(n) ? String(n) : n.toFixed(2);
  }

  function getFileExt(url = ''){
    try{
      const u = new URL(url, window.location.href);
      const path = (u.pathname || '').toLowerCase();
      const idx = path.lastIndexOf('.');
      return idx > -1 ? path.substring(idx + 1) : '';
    }catch(e){
      const pure = String(url).split('?')[0].split('#')[0].toLowerCase();
      const idx = pure.lastIndexOf('.');
      return idx > -1 ? pure.substring(idx + 1) : '';
    }
  }

  function hideAllPreviewMedia(){
    previewImage.style.display = 'none';
    previewVideo.style.display = 'none';
    svgaPreviewWrap.style.display = 'none';
    previewEmpty.style.display = 'none';
  }

  function stopPreviewMedia(){
    try{
      previewVideo.pause();
      previewVideo.removeAttribute('src');
      previewVideo.load();
    }catch(e){}

    try{
      if (previewSvgaPlayer) {
        previewSvgaPlayer.stopAnimation();
        previewSvgaPlayer.clear();
      }
    }catch(e){}
  }

  function ensureSvgaPlayer(){
    if (!window.SVGA) return false;

    if (!previewSvgaPlayer) {
      previewSvgaPlayer = new SVGA.Player('#svgaPlayerBox');
      previewSvgaParser = new SVGA.Parser('#svgaPlayerBox');
      previewSvgaPlayer.loops = 0;
      previewSvgaPlayer.clearsAfterStop = false;
      previewSvgaPlayer.setContentMode('AspectFit');
    }

    return true;
  }

  function openPreview(url){
    if (!url) {
      toast('没有可播放的动图链接');
      return;
    }

    previewModal.style.display = 'flex';
    hideAllPreviewMedia();
    stopPreviewMedia();

    const ext = getFileExt(url);

    if (ext === 'svga') {
      if (!ensureSvgaPlayer()) {
        previewEmpty.style.display = 'block';
        previewEmpty.textContent = 'SVGA 播放库加载失败';
        return;
      }

      svgaPreviewWrap.style.display = 'flex';
      previewEmpty.style.display = 'none';

      previewSvgaParser.load(
        url,
        function(videoItem){
          try{
            previewSvgaPlayer.setVideoItem(videoItem);
            previewSvgaPlayer.startAnimation();
          }catch(err){
            svgaPreviewWrap.style.display = 'none';
            previewEmpty.style.display = 'block';
            previewEmpty.textContent = 'SVGA 播放失败';
            console.error('SVGA start error:', err);
          }
        },
        function(error){
          svgaPreviewWrap.style.display = 'none';
          previewEmpty.style.display = 'block';
          previewEmpty.textContent = 'SVGA 加载失败';
          console.error('SVGA load error:', error);
        }
      );
      return;
    }

    if (['mp4','webm','mov','m4v','ogg'].includes(ext)) {
      previewVideo.style.display = 'block';
      previewVideo.src = url;
      previewVideo.play().catch(() => {});
      return;
    }

    previewImage.style.display = 'block';
    previewImage.src = url;
    previewImage.onerror = function(){
      previewImage.style.display = 'none';
      previewEmpty.style.display = 'block';
      previewEmpty.textContent = '资源加载失败';
    };
  }

  function closePreviewModal(){
    previewModal.style.display = 'none';
    hideAllPreviewMedia();
    stopPreviewMedia();
    previewImage.removeAttribute('src');
    previewImage.onerror = null;
    previewEmpty.textContent = '请选择动画进行播放';
  }

  const apiList = async () => {
    const params = {
      act: 'list',
      page: state.page,
      page_size: state.pageSize,
      q: state.q,
      is_display: state.is_display
    };

    const res = await fetch(`${API_BASE}?${qs(params)}`, {
      ...API_FETCH_OPTS,
      headers: API_HEADERS
    });
    return res.json();
  };

  const apiCreate = (payload) =>
    fetch(`${API_BASE}?act=create`, {
      ...API_FETCH_OPTS,
      method: 'POST',
      headers: API_HEADERS,
      body: JSON.stringify(payload)
    }).then(r => r.json());

  const apiUpdate = (payload) =>
    fetch(`${API_BASE}?act=update`, {
      ...API_FETCH_OPTS,
      method: 'POST',
      headers: API_HEADERS,
      body: JSON.stringify(payload)
    }).then(r => r.json());

  const apiDelete = (id) =>
    fetch(`${API_BASE}?act=delete`, {
      ...API_FETCH_OPTS,
      method: 'POST',
      headers: API_HEADERS,
      body: JSON.stringify({ id })
    }).then(r => r.json());

  const apiBatchDelete = (ids) =>
    fetch(`${API_BASE}?act=batch_delete`, {
      ...API_FETCH_OPTS,
      method: 'POST',
      headers: API_HEADERS,
      body: JSON.stringify({ ids })
    }).then(r => r.json());

  const apiToggleDisplay = (id, is_display) =>
    fetch(`${API_BASE}?act=toggle_display`, {
      ...API_FETCH_OPTS,
      method: 'POST',
      headers: API_HEADERS,
      body: JSON.stringify({ id, is_display })
    }).then(r => r.json());

  function updateHeaderCheck(){
    const total = state.list.length;
    const selected = state.list.filter(row => state.checked.has(Number(row.id))).length;

    checkAllEl.indeterminate = selected > 0 && selected < total;
    checkAllEl.checked = total > 0 && selected === total;
  }

  checkAllEl.onchange = () => {
    const checked = checkAllEl.checked;
    checkAllEl.indeterminate = false;
    state.checked.clear();

    if (checked) {
      state.list.forEach(row => state.checked.add(Number(row.id)));
    }

    document.querySelectorAll('.checkbox-row').forEach(el => {
      el.checked = checked;
    });

    updateHeaderCheck();
  };

  function buildThumb(url){
    if (!url) {
      return '<div class="thumb-placeholder">无图</div>';
    }
    return `<img class="thumb" src="${escapeHtml(url)}" alt="gift" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>加载失败</div>'">`;
  }

function renderDesktopRow(row){
  const topBannerOn = String(row.is_top_banner_show ?? 1) === '1';
  const playSvgaOn = String(row.is_play_svga ?? 1) === '1';

  return `
    <div class="gift-main">
      ${buildThumb(row.image_url || '')}
      <div class="gift-info">
        <div class="gift-name">${escapeHtml(row.gift_name || '')}</div>
        <div class="muted">礼物ID：${row.id}</div>

        <div class="gift-link">
          图片：${row.image_url ? `<a href="${escapeHtml(row.image_url)}" target="_blank">查看链接</a>` : '—'}
        </div>

        <div class="gift-link">
          动图：${
            row.gif_url
              ? `<span class="gif-play-btn" data-play-url="${escapeHtml(row.gif_url)}">点击播放</span>`
              : '—'
          }
        </div>

        <div class="gift-link">
          顶部浮条：<strong style="color:${topBannerOn ? '#0a7f3f' : '#b10b0b'};">
            ${topBannerOn ? '显示' : '隐藏'}
          </strong>
        </div>

        <div class="gift-link">
          SVGA播放：<strong style="color:${playSvgaOn ? '#0a7f3f' : '#b10b0b'};">
            ${playSvgaOn ? '播放' : '关闭'}
          </strong>
        </div>
      </div>
    </div>
  `;
}

  function renderMobileRight(row){
    const isOn = String(row.is_display) === '1';

    return `
      <div class="row-right">
        <div class="row-top">
          ${renderDesktopRow(row)}
          <div class="meta-line">
            <div class="price">￥${formatPrice(row.gift_price)}</div>
            <span class="tag ${isOn ? 'tag-on' : 'tag-off'}" data-toggle-id="${row.id}" data-toggle-val="${isOn ? 0 : 1}">
              ${isOn ? '显示中' : '已隐藏'}
            </span>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-outline btn-s" data-edit-id="${row.id}">编辑</button>
          <button class="btn btn-danger btn-s" data-del-id="${row.id}">删除</button>
        </div>
      </div>
    `;
  }

  function renderList(){
    listEl.innerHTML = '';

    if (!state.list.length) {
      listEl.innerHTML = '<div class="empty">暂无数据</div>';
      pagerInfoEl.textContent = '第 0/0 页，共 0 条';
      updateHeaderCheck();
      return;
    }

    const isMobile = window.innerWidth <= 980;

    state.list.forEach(row => {
      const wrap = document.createElement('div');
      wrap.className = 'rowgrid';

      const checked = state.checked.has(Number(row.id));
      const isOn = String(row.is_display) === '1';

      if (isMobile) {
        wrap.innerHTML = `
          <div>
            <input class="checkbox checkbox-row" type="checkbox" data-id="${row.id}" ${checked ? 'checked' : ''}>
          </div>
          ${renderMobileRight(row)}
        `;
      } else {
        wrap.innerHTML = `
          <div>
            <input class="checkbox checkbox-row" type="checkbox" data-id="${row.id}" ${checked ? 'checked' : ''}>
          </div>
          <div>${renderDesktopRow(row)}</div>
          <div class="price">￥${formatPrice(row.gift_price)}</div>
          <div>
            <span class="tag ${isOn ? 'tag-on' : 'tag-off'}" data-toggle-id="${row.id}" data-toggle-val="${isOn ? 0 : 1}">
              ${isOn ? '显示中' : '已隐藏'}
            </span>
          </div>
          <div>
            <div class="btn-group">
              <button class="btn btn-outline btn-s" data-edit-id="${row.id}">编辑</button>
              <button class="btn btn-danger btn-s" data-del-id="${row.id}">删除</button>
            </div>
          </div>
        `;
      }

      listEl.appendChild(wrap);
    });

    bindRowEvents();

    const totalPage = Math.max(1, Math.ceil(state.total / state.pageSize));
    pagerInfoEl.textContent = `第 ${state.page}/${totalPage} 页，共 ${state.total} 条`;
    updateHeaderCheck();
  }

  function bindRowEvents(){
    document.querySelectorAll('.checkbox-row').forEach(el => {
      el.onchange = () => {
        const id = Number(el.getAttribute('data-id'));
        if (el.checked) state.checked.add(id);
        else state.checked.delete(id);
        updateHeaderCheck();
      };
    });

    document.querySelectorAll('[data-edit-id]').forEach(el => {
      el.onclick = () => {
        const id = Number(el.getAttribute('data-edit-id'));
        const row = state.list.find(item => Number(item.id) === id);
        if (row) openEdit(row);
      };
    });

    document.querySelectorAll('[data-del-id]').forEach(el => {
      el.onclick = async () => {
        const id = Number(el.getAttribute('data-del-id'));
        if (!confirm('确定删除该礼物？')) return;

        const ret = await apiDelete(id);
        if (!ret.ok) {
          toast(ret.msg || '删除失败');
          return;
        }

        state.checked.delete(id);
        load();
      };
    });

    document.querySelectorAll('[data-toggle-id]').forEach(el => {
      el.onclick = async () => {
        const id = Number(el.getAttribute('data-toggle-id'));
        const val = Number(el.getAttribute('data-toggle-val'));

        const ret = await apiToggleDisplay(id, val);
        if (!ret.ok) {
          toast(ret.msg || '状态更新失败');
          return;
        }

        load();
      };
    });

    document.querySelectorAll('[data-play-url]').forEach(el => {
      el.onclick = () => {
        const url = el.getAttribute('data-play-url') || '';
        openPreview(url);
      };
    });
  }

function openCreate(){
  $('#modalTitle').textContent = '新增礼物';
  $('#f_id').value = '';
  $('#f_name').value = '';
  $('#f_price').value = '';
  $('#f_image_url').value = '';
  $('#f_gif_url').value = '';
  $('#f_display').checked = true;
  $('#f_top_banner_show').checked = true;
  $('#f_play_svga').checked = true;
  $('#giftModal').style.display = 'flex';
}

function openEdit(row){
  $('#modalTitle').textContent = '编辑礼物';
  $('#f_id').value = row.id || '';
  $('#f_name').value = row.gift_name || '';
  $('#f_price').value = row.gift_price ?? '';
  $('#f_image_url').value = row.image_url || '';
  $('#f_gif_url').value = row.gif_url || '';
  $('#f_display').checked = String(row.is_display) === '1';
  $('#f_top_banner_show').checked = String(row.is_top_banner_show ?? 1) === '1';
  $('#f_play_svga').checked = String(row.is_play_svga ?? 1) === '1';
  $('#giftModal').style.display = 'flex';
}

  function closeModal(){
    $('#giftModal').style.display = 'none';
  }

  async function saveGift(){
    const id = $('#f_id').value.trim();

    const payload = {
      gift_name: $('#f_name').value.trim(),
      gift_price: Number($('#f_price').value || 0),
      image_url: $('#f_image_url').value.trim(),
      gif_url: $('#f_gif_url').value.trim(),
      is_display: $('#f_display').checked ? 1 : 0,
      is_top_banner_show: $('#f_top_banner_show').checked ? 1 : 0,
      is_play_svga: $('#f_play_svga').checked ? 1 : 0
    };

    if (!payload.gift_name) {
      toast('礼物名称不能为空');
      return;
    }

    if (payload.gift_price < 0) {
      toast('礼物价格不能为负数');
      return;
    }

    const ret = id
      ? await apiUpdate({ id: Number(id), ...payload })
      : await apiCreate(payload);

    if (!ret.ok) {
      toast(ret.msg || '保存失败');
      return;
    }

    closeModal();
    load();
  }

  async function uploadFileAndFillInput(file, targetInputId){
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const response = await fetch('https://rcwulian.cn/app/img/userimg/upload_profile.php', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        throw new Error(`HTTP 错误：${response.status}`);
      }

      const result = await response.json();
      console.log('上传返回结果', result);

      if (result.code === 0 && result.url) {
        const input = document.getElementById(targetInputId);
        if (input) {
          input.value = result.url;
        }

        if (document.getElementById('result')) {
          document.getElementById('result').innerHTML = `
            上传成功！<a href="${result.url}" target="_blank">点击查看图片</a>
            <button class="copy-btn" onclick="copyUrl('${result.url}')">复制链接</button>
          `;
        }

        alert('上传成功，链接已自动填入输入框');
      } else {
        alert('上传失败：' + (result.msg || '未知错误'));
      }
    } catch (error) {
      console.error('上传失败:', error);
      alert('上传失败，请稍后重试');
    }
  }

  async function load(){
    listEl.innerHTML = '<div class="loading">加载中…</div>';

    const ret = await apiList();
    if (!ret.ok) {
      listEl.innerHTML = `<div class="loading" style="color:#c62828">加载失败：${escapeHtml(ret.msg || '')}</div>`;
      return;
    }

    state.list = (ret.data && ret.data.list) ? ret.data.list : [];
    state.total = (ret.data && ret.data.pagination) ? Number(ret.data.pagination.total || 0) : 0;

    renderList();
  }

  $('#btnSearch').onclick = () => {
    state.q = $('#kw').value.trim();
    state.is_display = $('#filterDisplay').value;
    state.page = 1;
    state.checked.clear();
    load();
  };

  $('#pageSize').onchange = (e) => {
    state.pageSize = Number(e.target.value || 20);
    state.page = 1;
    state.checked.clear();
    load();
  };

  $('#prev').onclick = () => {
    if (state.page > 1) {
      state.page--;
      state.checked.clear();
      load();
    }
  };

  $('#next').onclick = () => {
    const totalPage = Math.max(1, Math.ceil(state.total / state.pageSize));
    if (state.page < totalPage) {
      state.page++;
      state.checked.clear();
      load();
    }
  };

  $('#btnCreate').onclick = openCreate;
  $('#btnCancel').onclick = closeModal;
  $('#btnSave').onclick = saveGift;

  $('#btnBatchDelete').onclick = async () => {
    if (!state.checked.size) {
      toast('请先勾选要删除的项');
      return;
    }

    if (!confirm('确定批量删除所选礼物？')) return;

    const ret = await apiBatchDelete(Array.from(state.checked));
    if (!ret.ok) {
      toast(ret.msg || '批量删除失败');
      return;
    }

    state.checked.clear();
    load();
  };

  $('#giftModal').addEventListener('click', (e) => {
    if (e.target.id === 'giftModal') {
      closeModal();
    }
  });

  previewClose.onclick = closePreviewModal;

  previewModal.addEventListener('click', (e) => {
    if (e.target.id === 'previewModal') {
      closePreviewModal();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && previewModal.style.display === 'flex') {
      closePreviewModal();
    }
  });

  window.addEventListener('resize', () => {
    renderList();
  });

  (function init(){
    $('#pageSize').value = String(state.pageSize);
    load();
  })();
</script>
</body>
</html>
