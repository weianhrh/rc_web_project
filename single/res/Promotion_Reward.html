<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>收益流水</title>

  <style>
    :root{
      --primary:#5b8cff;
      --bg1:#f7f9ff;
      --bg2:#eef3ff;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e7ecff;
      --shadow:0 10px 26px rgba(91,140,255,.10);
      --radius:16px;
    }

    *{box-sizing:border-box;font-family:"PingFang SC",system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    body{
      margin:0;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height:100vh;
      color:var(--text);
    }

    /* 手机端默认：窄屏居中，像 App 页面 */
    .page{
      max-width:520px;
      margin:0 auto;
      padding:14px 14px 22px;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 4px 10px;
    }

    /* ✅ 返回键：手机显示，桌面隐藏（下方媒体查询处理） */
    .back{
      width:38px;height:38px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.75);
      border:1px solid var(--border);
      box-shadow:0 6px 16px rgba(17,24,39,.06);
      cursor:pointer;
      user-select:none;
      flex:0 0 auto;
    }
    .back:active{transform:scale(.98);}

    .title{
      font-size:18px;
      font-weight:700;
      flex:1;
      text-align:center;
      margin-right:38px; /* 为了手机端视觉居中（有返回键） */
    }

    .summary{
      background:rgba(255,255,255,.65);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px 14px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(8px);
    }

    .summaryRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:8px;
      gap:10px;
    }

    .summaryRow .left{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14px;
      color:var(--muted);
      flex-wrap:wrap;
      flex:1;
      min-width:0; /* ✅ 允许收缩，避免把右侧刷新顶出去 */
    }

    .chip{
      border:1px solid var(--border);
      background:#fff;
      color:var(--primary);
      padding:7px 10px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .totals{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      padding-top:6px;
    }

    .metric{
      flex:1;
      min-width:140px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px 12px;
      box-shadow:0 6px 18px rgba(91,140,255,.08);
    }
    .metric .k{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .metric .v{font-size:18px;font-weight:800;}
    .metric .sub{font-size:12px;color:var(--muted);margin-top:4px; line-height:1.35;}

    /* ✅ 记录条数卡：数字居中 + 分成比例居中胶囊 */
    .metricCount{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:6px;
    }
    .metricCount .v{
      font-size:22px;
      font-weight:900;
      line-height:1.1;
      margin-top:2px;
    }
    .metricCount .sub{
      margin-top:2px;
    }
    .rateCenter{
      margin-top:8px;
      font-size:12px;
      color: var(--primary);
      background: rgba(91,140,255,.10);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 999px;
      user-select:none;
    }

    .list{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .item{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:12px 12px;
      box-shadow:0 10px 20px rgba(17,24,39,.06);
      display:flex;
      gap:12px;
    }

    .icon{
      width:44px;height:44px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(91,140,255,.12);
      color:var(--primary);
      flex:0 0 auto;
    }
    .icon svg{width:22px;height:22px;}

    .content{flex:1;min-width:0;}
    .row1{display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .name{font-size:15px;font-weight:800;}
    .amount{font-size:20px;font-weight:900;color:#111827;}

    .meta{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .order{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .order code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background:#f6f8ff;
      border:1px solid var(--border);
      padding:4px 8px;
      border-radius:10px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      display:inline-block;
      max-width:100%;
      flex:1;
    }

    .copy{
      margin-left:auto;
      border:none;
      background:rgba(91,140,255,.10);
      color:var(--primary);
      padding:6px 10px;
      border-radius:10px;
      cursor:pointer;
      user-select:none;
      font-size:12px;
      flex:0 0 auto;
    }
    .copy:active{transform:scale(.98);}

    .state{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:18px 0;
    }

    /* ===== 时间筛选控件样式 ===== */
    .rangeSelect{
      border:1px solid var(--border);
      background:#fff;
      color:#374151;
      padding:7px 10px;
      border-radius:999px;
      font-size:13px;
      outline:none;
      max-width: 140px;
    }

    .customBox{
      width:100%;
      margin-top:10px;
      display:flex;
      flex-direction: column; /* ✅ 三行：start / end / button */
      gap:10px;
    }

    .dateInput{
      width:100%;
      border:1px solid var(--border);
      background:#fff;
      color:#374151;
      padding:10px 10px;
      border-radius:12px;
      font-size:13px;
    }

    .applyBtn{
      width:100%;
      border:none;
      background: var(--primary);
      color:#fff;
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
    }
    .applyBtn:active{transform:scale(.98);}

    /* =========================================================
       ✅ 桌面端：占满宽度 + 不要返回键
       ========================================================= */
    @media (min-width: 900px){
      body{ padding: 24px; }

      .page{
        max-width: none;
        width: 100%;
        margin: 0;
        padding: 18px 22px 28px;
      }

      .back{ display:none !important; }

      .topbar{
        justify-content:center;
        padding: 6px 0 14px;
      }
      .title{
        margin-right: 0;
        text-align:center;
        font-size: 20px;
      }

      .summary{
        max-width: 1200px;
        margin: 0 auto;
      }

      .totals{
        flex-wrap: nowrap;
        gap: 16px;
      }

      .metric{ min-width: 360px; }

      .list{
        max-width: 1200px;
        margin: 14px auto 0;
      }

      /* 桌面端自定义日期：横向更像后台筛选 */
      .customBox{
        flex-direction: row;
        align-items: center;
        width: auto;
        margin-top: 0;
      }
      .dateInput{
        width: 160px;
        padding: 8px 10px;
      }
      .applyBtn{
        width: auto;
        padding: 8px 14px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <div class="back" onclick="history.back()" title="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </div>
      <div class="title">收益流水</div>
    </div>

    <div class="summary">
      <div class="summaryRow">
        <div class="left">
          <span style="font-weight:700;color:#374151;">选择时间</span>

          <select id="rangeSelect" class="rangeSelect">
            <option value="today">今天</option>
            <option value="7">近7天</option>
            <option value="30" selected>近30天</option>
            <option value="month">本月</option>
            <option value="custom">自定义</option>
          </select>

          <!-- 自定义日期（默认隐藏） -->
          <div id="customBox" class="customBox" style="display:none;">
            <input id="startDate" type="date" class="dateInput">
            <input id="endDate" type="date" class="dateInput">
            <button id="applyBtn" class="applyBtn">查询</button>
          </div>
        </div>

        <div class="chip" id="refreshBtn">刷新</div>
      </div>

      <div class="totals">
        <div class="metric">
          <div class="k">推荐分成</div>
          <div class="v" id="totalReward">￥0.00</div>
          <div class="sub" id="venueInfo">-</div>
        </div>

        <div class="metric metricCount">
          <div class="k">记录条数</div>
          <div class="v" id="totalCount">0</div>
          <div class="sub">仅展示推荐分成</div>
          <div class="rateCenter" id="rateBadge">分成比例 0%</div>
        </div>
      </div>
    </div>

    <div class="list" id="list"></div>
    <div class="state" id="state">加载中...</div>
  </div>

<script>
  // ✅ 接口地址（后端支持 start_date / end_date；不传默认近30天）
  const API = '/api/venue/GetPromotionRewardsByMyVenue.php';

  const elList = document.getElementById('list');
  const elState = document.getElementById('state');
  const elTotalReward = document.getElementById('totalReward');
  const elTotalCount = document.getElementById('totalCount');
  const elVenueInfo = document.getElementById('venueInfo');
  const elRefreshBtn = document.getElementById('refreshBtn');
  const elRateBadge = document.getElementById('rateBadge');

  const elRange = document.getElementById('rangeSelect');
  const elCustomBox = document.getElementById('customBox');
  const elStartDate = document.getElementById('startDate');
  const elEndDate = document.getElementById('endDate');
  const elApplyBtn = document.getElementById('applyBtn');

  elRefreshBtn.addEventListener('click', loadData);

  function pad(n){ return String(n).padStart(2,'0'); }
  function ymd(d){
    const dt = new Date(d);
    return dt.getFullYear() + '-' + pad(dt.getMonth()+1) + '-' + pad(dt.getDate());
  }

  function getMonthRange(){
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    const end = new Date(now.getFullYear(), now.getMonth()+1, 0);
    return {start_date: ymd(start), end_date: ymd(end)};
  }

  function getRangeParams(){
    const v = elRange.value;
    const now = new Date();

    if (v === 'today'){
      const s = ymd(now);
      return {start_date: s, end_date: s};
    }
    if (v === 'month'){
      return getMonthRange();
    }
    if (v === 'custom'){
      const s = elStartDate.value;
      const e = elEndDate.value;
      if (!s || !e) return null;
      return {start_date: s, end_date: e};
    }

    const days = parseInt(v, 10); // 7 / 30
    const end = ymd(now);
    const start = ymd(new Date(now.getTime() - (days-1)*24*3600*1000));
    return {start_date: start, end_date: end};
  }

  function buildUrl(base, params){
    const u = new URL(base, window.location.origin);
    if (params){
      u.searchParams.set('start_date', params.start_date);
      u.searchParams.set('end_date', params.end_date);
    }
    return u.toString();
  }

  function money(n){
    const x = Number(n || 0);
    return '￥' + x.toFixed(2);
  }

  function esc(s){
    return String(s ?? '').replace(/[&<>"']/g, (m)=>({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      toast('已复制');
    }catch(e){
      const t = document.createElement('textarea');
      t.value = text; document.body.appendChild(t);
      t.select(); document.execCommand('copy');
      document.body.removeChild(t);
      toast('已复制');
    }
  }

  let toastTimer = null;
  function toast(msg){
    clearTimeout(toastTimer);
    let el = document.getElementById('toast');
    if(!el){
      el = document.createElement('div');
      el.id = 'toast';
      el.style.cssText = `
        position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
        background:rgba(17,24,39,.92);color:#fff;
        padding:10px 14px;border-radius:12px;font-size:13px;
        z-index:9999;opacity:0;transition:opacity .18s ease;
      `;
      document.body.appendChild(el);
    }
    el.textContent = msg;
    requestAnimationFrame(()=> el.style.opacity = '1');
    toastTimer = setTimeout(()=> el.style.opacity='0', 1200);
  }

  function renderItem(row){
    const amount = money(row.reward_amount);
    const time = esc(row.created_at);
    const orderIdRaw = row.order_id || '';
    const orderId = esc(orderIdRaw);
    const safeOrderIdForJs = String(orderIdRaw).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    return `
      <div class="item">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 9V5a3 3 0 0 0-3-3l-1 7"></path>
            <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
            <path d="M7 11h10a2 2 0 0 1 2 2l-1 7a2 2 0 0 1-2 2H7V11z"></path>
          </svg>
        </div>
        <div class="content">
          <div class="row1">
            <div class="name">推荐分成</div>
            <div class="amount">${amount}</div>
          </div>
          <div class="meta">
            <div>关联订单号：</div>
            <div>${time}</div>
          </div>
          <div class="order">
            <code title="${orderId}">${orderId || '-'}</code>
            ${orderIdRaw ? `<button class="copy" onclick="copyText('${safeOrderIdForJs}')">复制</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  async function loadData(){
    elState.textContent = '加载中...';
    elList.innerHTML = '';

    const params = getRangeParams();
    if (elRange.value === 'custom' && !params){
      elState.textContent = '请选择开始/结束日期';
      return;
    }

    try{
      const url = buildUrl(API, params);
      const res = await fetch(url, {
        method: 'GET',
        credentials: 'include',
        headers: { 'Accept': 'application/json' }
      });

      const json = await res.json();

      if(!json || json.code !== 200){
        elState.textContent = (json && json.msg) ? ('加载失败：' + json.msg) : '加载失败';
        return;
      }

      const data = json.data || {};
      const summary = data.summary || {};
      const list = data.list || [];

      elTotalReward.textContent = money(summary.total_reward_amount || 0);
      elTotalCount.textContent = String(summary.total ?? list.length ?? 0);

      const ratePct = Number(summary.reward_rate_percent ?? 0);
      elRateBadge.textContent = `分成比例 ${ratePct}%`;

      const vName = data.venue_name ? String(data.venue_name) : '';
      const vId = data.venue_id ? String(data.venue_id) : '';
      const code = data.invite_code ? String(data.invite_code) : '';
      const info = [
        vName ? `场地：${vName}` : '',
        vId ? `ID：${vId}` : '',
        code ? `邀请码：${code}` : ''
      ].filter(Boolean).join('  ');
      elVenueInfo.textContent = info || '—';

      if(!list.length){
        elState.textContent = '暂无推荐分成记录';
        return;
      }

      elList.innerHTML = list.map(renderItem).join('');
      elState.textContent = '— 到底了 —';

    }catch(e){
      elState.textContent = '网络异常，请刷新重试';
    }
  }

  // 下拉改变：非自定义直接查
  elRange.addEventListener('change', ()=>{
    if (elRange.value === 'custom'){
      elCustomBox.style.display = 'flex';

      // 默认给最近30天
      const now = new Date();
      elEndDate.value = ymd(now);
      elStartDate.value = ymd(new Date(now.getTime() - 29*24*3600*1000));
      return;
    }
    elCustomBox.style.display = 'none';
    loadData();
  });

  // 自定义点击查询
  elApplyBtn.addEventListener('click', ()=>{
    const params = getRangeParams();
    if (!params){
      toast('请选择开始/结束日期');
      return;
    }
    loadData();
  });

  // 首次加载（默认近30天）
  loadData();
</script>
</body>
</html>
