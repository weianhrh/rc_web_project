    <h1>关于国庆放假延期打款通知</h1>
    <p>各位加盟商老板好！</p>
    <p class="indent">国庆假期（<strong>10.1–10.7</strong>）将至，本公司财务服务将暂停业务。</p>
    <p class="indent">因此，原计划在假期内支付的款项，将<strong>统一推迟到 10 月 8 日（节后第一天）</strong>进行处理和打款。感谢各位加盟商的理解与支持，请大家提前做好资金安排。</p>
    <p class="indent">给您带来不便，敬请谅解！祝大家国庆快乐，财源广进！</p>
