<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>场地用户拉黑管理</title>
  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", system-ui; }
    body { background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
    .container { max-width: 1200px; width: 100%; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; transition: var(--transition); }
    .card-title { font-size: 24px; color: var(--text-color); margin-bottom: 20px; font-weight: 600; border-bottom: 2px solid var(--primary); padding-bottom: 10px; text-align: left; }
    .loading { text-align: center; font-size: 16px; color: var(--primary); padding: 20px; }

    /* 工具栏 */
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
    .toolbar .input { flex: 1 1 240px; min-width: 200px; }
    .venue-filter { width: 220px; }

    .input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; transition: var(--transition); background: #fff; }
    .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(91,140,255,0.12); }
    .btn { appearance: none; border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; cursor: pointer; transition: var(--transition); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { filter: brightness(0.95); }
    .btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
    .btn-outline:hover { background: rgba(91,140,255,0.06); }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { filter: brightness(0.95); }

    /* 卡片列表 */
    .cards{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      align-items: stretch;            /* <— 关键 */
    }
    
    /* 卡片本身充满可用高度，内部用列布局 */
    .black-card{
      background:#fff;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: flex;                   /* <— 关键 */
      flex-direction: column;          /* <— 关键 */
      gap: 8px;
      height: 100%;                    /* <— 关键 */
    }
    .black-card:hover { background: var(--hover-bg); }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .uid { display: inline-flex; align-items: center; gap: 6px; }
    .tag { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 12px; background: #eef2ff; color: #4f46e5; border: 1px solid #e0e7ff; }
    .reason{
      color: var(--text-color);
      white-space: normal;
      word-break: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      line-height: 1.6;                        /* 与下面的 min-height 配合 */
      min-height: calc(1.6em * 3);             /* <— 关键：至少 3 行高 */
    }

    .meta { display: grid; grid-template-columns: 1fr; gap: 4px; color: #64748b; font-size: 12px; }
    .actions{
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: auto;                 /* <— 关键：把按钮推到卡片底部 */
    }

    .muted { color: #64748b; font-size: 12px; text-align: center; padding: 18px; }

    .pagination { display: flex; align-items: center; gap: 10px; justify-content: flex-end; padding-top: 12px; }
    .page-info { color: var(--secondary); font-size: 13px; }
    .page-size { width: 120px; }

    /* Modal */
    .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100vw; height: 100vh; overflow: auto; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
    .modal-content { background: #fff; padding: 22px; border-radius: 12px; width: 520px; max-width: 92%; box-shadow: 0 4px 20px rgba(0,0,0,0.25); display: flex; flex-direction: column; gap: 14px; }
    .modal-row { display: grid; grid-template-columns: 100px 1fr; gap: 10px; align-items: center; }
    .modal .title { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #0f172a; }
    .modal .btns { display: flex; gap: 10px; justify-content: flex-end; padding-top: 6px; }

    .toast { position: fixed; right: 16px; bottom: 16px; background: #111827; color: #fff; padding: 10px 14px; border-radius: 10px; box-shadow: var(--shadow); opacity: 0; transform: translateY(10px); transition: .25s; z-index: 1000; }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* 输入增强 */
    .modal-row label { align-self: flex-start; padding-top: 2px; }
    textarea.input{ height: auto; min-height: 120px; line-height: 1.5; padding: 10px 12px; resize: vertical; }
    .s-item.disabled { opacity: .55; cursor: not-allowed; }
    .s-item.disabled .meta::after { content: " · 不可拉黑"; color: #ef4444; }
    .input.invalid { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.15); }

    /* 小屏 */
    @media (max-width: 640px){
      .toolbar { flex-direction: column; align-items: stretch; gap: 8px; margin-bottom: 8px; }
      .toolbar .input, .toolbar .btn { flex: 0 0 auto; min-width: 0; width: 100%; }
      .venue-filter { width: 100%; }
      .card { padding: 14px; }
      .input { height: 36px; padding: 6px 10px; font-size: 14px; }
      select.input, .page-size { height: 36px; }
      .btn { height: 36px; padding: 6px 10px; font-size: 14px; }
    }

    /* UID 联想下拉 */
    .field{ position: relative; }
    .suggest{ position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1px solid var(--border-color); border-radius: 10px; box-shadow: var(--shadow); max-height: 260px; overflow: auto; padding: 6px 0; z-index: 1002; }
    .s-item{ padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .s-item:hover{ background: var(--hover-bg); }
    .s-item .nick{ font-weight: 600; color: var(--text-color); }
    .s-item .meta{ margin-left: auto; font-size: 12px; color: var(--secondary); }

    @media (prefers-color-scheme: dark){
      .suggest{ background: #111827; border-color: rgba(255,255,255,0.12); }
      .s-item:hover{ background: rgba(255,255,255,0.06); }
      .s-item .nick{ color: #e5e7eb; }
      .s-item .meta{ color: #9ca3af; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-title">场地用户拉黑管理</div>

      <div class="toolbar">
        <input id="kw" class="input" placeholder="按 UID 精确 / 按原因模糊搜索…" />
        <!-- 仅 role_id == 1 可见：场地筛选 -->
        <select id="venueFilter" class="input venue-filter" hidden>
          <option value="">全部场地</option>
        </select>

        <select id="pageSize" class="input page-size">
          <option value="12">每页 12</option>
          <option value="20">每页 20</option>
          <option value="50">每页 50</option>
        </select>
        <button id="btnSearch" class="btn btn-outline">搜索</button>
        <button id="btnAdd" class="btn btn-primary">添加拉黑</button>
        <!-- 仅 role_id == 1 可见 -->
        <button id="btnAssign" class="btn btn-outline" hidden>指定添加</button>
      </div>

      <!-- 卡片列表 -->
      <div id="cardList" class="cards">
        <div class="black-card"><div class="loading">加载中…</div></div>
      </div>

      <div class="pagination">
        <span class="page-info" id="pageInfo">—</span>
        <button class="btn btn-outline" id="prev">上一页</button>
        <button class="btn btn-outline" id="next">下一页</button>
      </div>
    </div>
  </div>

  <!-- 添加拉黑 Modal（当前场地） -->
  <div class="modal" id="addModal" aria-hidden="true" role="dialog">
    <div class="modal-content" role="document">
      <div class="title">添加拉黑</div>
      <div class="modal-row">
        <label for="addUid">用户 UID</label>
        <div class="field">
          <input id="addUid" class="input" type="number" inputmode="numeric" autocomplete="off" placeholder="请输入用户 UID" />
          <div id="uidSuggest" class="suggest" hidden></div>
        </div>
      </div>
      <div class="modal-row">
        <label for="addReason">拉黑原因 <span style="color:#ef4444">*</span></label>
        <textarea id="addReason" class="input" rows="4" maxlength="255" placeholder="请输入拉黑原因（必填）" required aria-required="true"></textarea>
      </div>
      <div class="modal-row">
          <label></label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:#475569;">
            <input type="checkbox" id="addRemoveVoiceRoom" style="width:16px;height:16px;">
            <span>发送移除语音房指令，把这个用户移除语音房</span>
          </label>
        </div>
      <div class="btns">
        <button class="btn btn-outline" data-close>取消</button>
        <button class="btn btn-primary" id="confirmAdd">确定</button>
        <!-- 仅管理员可见 -->
        <button class="btn btn-danger" id="confirmAddAll" hidden>一键拉黑所有场地</button>
      </div>
    </div>
  </div>

  <!-- 指定添加 Modal（UID + 场地） -->
  <div class="modal" id="assignModal" aria-hidden="true" role="dialog">
    <div class="modal-content" role="document">
      <div class="title">指定添加（UID + 场地）</div>
      <div class="modal-row">
        <label for="assignUid">用户 UID</label>
        <div class="field">
          <input id="assignUid" class="input" type="number" inputmode="numeric" autocomplete="off" placeholder="请输入用户 UID" />
          <div id="uidSuggestAssign" class="suggest" hidden></div>
        </div>
      </div>
      <div class="modal-row">
        <label for="venue_id">场地</label>
        <select id="venue_id" class="input">
          <option value="">加载中…</option>
        </select>
      </div>
      <div class="modal-row">
        <label for="assignReason">拉黑原因 <span style="color:#ef4444">*</span></label>
        <textarea id="assignReason" class="input" rows="4" maxlength="255" placeholder="请输入拉黑原因（必填）" required aria-required="true"></textarea>
      </div>
      <div class="modal-row">
          <label></label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:#475569;">
            <input type="checkbox" id="assignRemoveVoiceRoom" style="width:16px;height:16px;">
            <span>发送移除语音房指令，把这个用户移除语音房</span>
          </label>
        </div>
      <div class="btns">
        <button class="btn btn-outline" data-close>取消</button>
        <button class="btn btn-primary" id="confirmAssign">确定</button>
      </div>
    </div>
  </div>

  <!-- 删除确认 Modal -->
  <div class="modal" id="delModal" aria-hidden="true" role="dialog">
    <div class="modal-content" role="document">
      <div class="title">确认取消拉黑？</div>
      <div class="muted">此操作只影响当前记录所在的场地。</div>
      <div class="btns">
        <button class="btn btn-outline" data-close>再想想</button>
        <button class="btn btn-danger" id="confirmDel">确认删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ===== API 路径 =====
    const API_BASE = '/api/operat';
    const API = {
      LIST: API_BASE + '/blacklist_list.php',
      BLOCK: API_BASE + '/block_user.php',
      UNBLOCK: API_BASE + '/unblock_user.php',
      SEARCH_USER: API_BASE + '/search_user.php',
      GET_CUR_USER: API_BASE + '/get_current_user.php',
      BLOCK_FOR_VENUE: API_BASE + '/block_user_for_venue.php'
    };

    // 禁止拉黑 UID（示例）
    const DENY_UIDS = new Set([10001, 10107, 10130]);
    const isDenyUid = (uid) => DENY_UIDS.has(Number(uid));

    // 工具
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));
    const escapeHTML = (s='') => String(s).replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'
    }[m]));
    const fmt = (dstr) => {
      if(!dstr) return '-';
      const d = new Date(dstr.replace(/-/g,'/'));
      if(isNaN(d)) return dstr;
      const pad = (n)=>String(n).padStart(2,'0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    };
    let TOAST_TIMER = null;
    function toast(msg, ok=true){
      const el = $('#toast');
      el.textContent = msg;
      el.style.background = ok ? '#111827' : '#ef4444';
      el.classList.add('show');
      clearTimeout(TOAST_TIMER);
      TOAST_TIMER = setTimeout(()=> el.classList.remove('show'), 2000);
    }

    // 状态
    let state = {
      page: 1, pageSize: 12, kw: '', total: 0, pendingDel: {uid:null, venue_id:null},
      roleId: 0, venueId: 0, venueFilter: ''   // venueFilter 仅 role==1 用
    };
    const isPlatformAdmin = () => (state.roleId === 1 || state.roleId === 2);

    // 列表加载
    async function loadList(){
      const params = new URLSearchParams({ page: state.page, page_size: state.pageSize });
      if(state.kw.trim()) params.set('kw', state.kw.trim());
      if(isPlatformAdmin() && state.venueFilter){ params.set('venue_id', state.venueFilter); }

      setCardsLoading();
      try{
        const resp = await fetch(`${API.LIST}?${params.toString()}`, { credentials: 'include' });
        const json = await resp.json();
        if(json.code !== 0) throw new Error(json.msg || '加载失败');
        const { total, list, page, page_size } = json.data || {};
        state.total = total || 0; state.page = page || 1; state.pageSize = page_size || state.pageSize;
        renderCards(list || []);
        renderPager();
      }catch(err){
        renderCards([]);
        renderPager();
        toast(err.message || '网络错误', false);
      }
    }

    function setCardsLoading(){
      const wrap = $('#cardList');
      wrap.innerHTML = `<div class="black-card"><div class="loading">加载中…</div></div>`;
    }

    function renderCards(list){
      const wrap = $('#cardList');
      if(!list.length){
        wrap.innerHTML = `<div class="muted" style="grid-column:1/-1;">暂无数据</div>`;
        return;
      }
      const isAdmin = isPlatformAdmin();

      wrap.innerHTML = list.map(row=>{
        const uid = escapeHTML(row.uid);
        const venue = escapeHTML(row.venue_id);
        const handler = escapeHTML(row.handler_uid);
        const reason = escapeHTML(row.reason);
        const created = fmt(row.created_at);

        // 非管理员只显示：UID、原因、操作
        const metaHtml = isAdmin ? `
          <div class="meta">
            <div>场地ID：${venue}</div>
            <div>操作人UID：${handler || '-'}</div>
            <div>创建时间：${created}</div>
          </div>
        ` : ``;

        return `
          <div class="black-card">
            <div class="card-top">
              <div class="uid"><span class="tag">UID ${uid}</span></div>
            </div>
            <div class="reason" title="${reason}">原因：${reason}</div>
            ${metaHtml}
            <div class="actions">
           
            <button class="btn btn-danger"
                    data-unblock
                    data-id="${row.id}"
                    data-uid="${row.uid}"
                    data-venue="${row.venue_id}">取消拉黑</button>

            </div>
          </div>
        `;
      }).join('');

      // 绑定取消拉黑
      $$('#cardList [data-unblock]').forEach(btn => btn.addEventListener('click', (e)=>{
        const id       = Number(e.currentTarget.getAttribute('data-id'));
        const uid = Number(e.currentTarget.getAttribute('data-uid'));
        const venue_id = Number(e.currentTarget.getAttribute('data-venue')) || (isPlatformAdmin() ? Number(state.venueFilter||0) : state.venueId);
        state.pendingDel = { uid, venue_id };
        openModal('#delModal');
      }));
    }

    function renderPager(){
      const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
      $('#pageInfo').textContent = `共 ${state.total} 条，${state.page}/${totalPages} 页`;
      $('#prev').disabled = state.page <= 1;
      $('#next').disabled = state.page >= totalPages;
    }

    // Modal 控制
    function openModal(sel){ const el = $(sel); if(el){ el.style.display = 'flex'; el.setAttribute('aria-hidden','false'); } }
    function closeModal(sel){ const el = $(sel); if(el){ el.style.display = 'none'; el.setAttribute('aria-hidden','true'); } }
    $$('[data-close]').forEach(b => b.addEventListener('click', ()=>{ ['#addModal','#assignModal','#delModal'].forEach(closeModal); }));

    // 事件
$('#btnAdd').addEventListener('click', ()=>{
  $('#addUid').value = '';
  $('#addReason').value = '';
  $('#addRemoveVoiceRoom').checked = false;
  $('#addUid').classList.remove('invalid');
  openModal('#addModal');
  setTimeout(()=> $('#addUid').focus(), 50);
});

$('#btnAssign').addEventListener('click', ()=>{
  $('#assignUid').value = '';
  $('#assignReason').value = '';
  $('#assignRemoveVoiceRoom').checked = false;
  $('#assignUid').classList.remove('invalid');
  openModal('#assignModal');
  loadVenuesIntoSelect($('#venue_id'));
  setTimeout(()=> $('#assignUid').focus(), 50);
});

    // 添加（当前场地）- 原因必填
    $('#confirmAdd').addEventListener('click', async ()=>{
      const uidEl = $('#addUid');
      const reasonEl = $('#addReason');
      const uid = Number(uidEl.value.trim());
      const reason = reasonEl.value.trim();
      if(!uid || uid < 1){ toast('请输入正确的 UID', false); return; }
      if(!reason){ reasonEl.setCustomValidity('请输入拉黑原因'); } else { reasonEl.setCustomValidity(''); }
      if(!reasonEl.checkValidity()){ reasonEl.reportValidity(); reasonEl.focus(); return; }
      if (isDenyUid(uid)) { toast(`UID ${uid} 为受保护账号，禁止拉黑`, false); uidEl.classList.add('invalid'); return; }
      uidEl.classList.remove('invalid');

try{
  const removeVoiceRoom = $('#addRemoveVoiceRoom').checked ? 1 : 0;

  const resp = await fetch(API.BLOCK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
    body: JSON.stringify({
      uid,
      reason,
      remove_voice_room: removeVoiceRoom
    })
  });

  const json = await resp.json();
  if(json.code !== 0) throw new Error(json.msg || '添加失败');
  toast(json.msg || '已拉黑');
  closeModal('#addModal');
  state.page = 1;
  await loadList();
}catch(err){
  toast(err.message || '网络错误', false);
}
    });
    // 一键拉黑所有场地（仅管理员）
    $('#confirmAddAll').addEventListener('click', async ()=>{
      if(!isPlatformAdmin()){ return; }
    
      const uidEl = $('#addUid');
      const reasonEl = $('#addReason');
      const uid = Number(uidEl.value.trim());
      const reason = reasonEl.value.trim();
    
      if(!uid || uid < 1){ toast('请输入正确的 UID', false); return; }
      if(!reason){ reasonEl.setCustomValidity('请输入拉黑原因'); } else { reasonEl.setCustomValidity(''); }
      if(!reasonEl.checkValidity()){ reasonEl.reportValidity(); reasonEl.focus(); return; }
      if (isDenyUid(uid)) { toast(`UID ${uid} 为受保护账号，禁止拉黑`, false); uidEl.classList.add('invalid'); return; }
      uidEl.classList.remove('invalid');
    
      try{
        const resp = await fetch(API.BLOCK + '?type=all', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ uid, reason })
        });
        const json = await resp.json();
        if(json.code !== 0) throw new Error(json.msg || '一键拉黑失败');
        toast(json.msg || '已对所有场地拉黑');
        closeModal('#addModal');
        state.page = 1;
        await loadList();
      }catch(err){
        toast(err.message || '网络错误', false);
      }
    });

    // 指定添加（UID+场地）- 原因必填
// 指定添加（UID+场地）- 原因必填
$('#confirmAssign').addEventListener('click', async ()=>{
  const uidEl = $('#assignUid');
  const venueEl = $('#venue_id');
  const reasonEl = $('#assignReason');

  const uid = Number(uidEl.value.trim());
  const venue_id = Number(venueEl.value);
  const reason = reasonEl.value.trim();

  if(!uid || uid < 1){ toast('请输入正确的 UID', false); return; }
  if(!venue_id || venue_id < 1){ toast('请选择场地', false); return; }

  if(!reason){
    reasonEl.setCustomValidity('请输入拉黑原因');
  } else {
    reasonEl.setCustomValidity('');
  }

  if(!reasonEl.checkValidity()){
    reasonEl.reportValidity();
    reasonEl.focus();
    return;
  }

  if (isDenyUid(uid)) {
    toast(`UID ${uid} 为受保护账号，禁止拉黑`, false);
    uidEl.classList.add('invalid');
    return;
  }

  uidEl.classList.remove('invalid');

  try{
    const removeVoiceRoom = $('#assignRemoveVoiceRoom').checked ? 1 : 0;

    const resp = await fetch(API.BLOCK_FOR_VENUE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        uid,
        venue_id,
        reason,
        remove_voice_room: removeVoiceRoom
      })
    });

    const json = await resp.json();

    if(json.code !== 0) {
      throw new Error(json.msg || '添加失败');
    }

    toast(json.msg || '已拉黑');
    closeModal('#assignModal');
    state.page = 1;
    await loadList();

  }catch(err){
    toast(err.message || '网络错误', false);
  }
});

    // 取消拉黑
       $('#confirmDel').addEventListener('click', async ()=>{
      const { id, uid, venue_id } = state.pendingDel || {};
      if(!id && !uid){ closeModal('#delModal'); return; }
      try{
        // 优先按 id 删除；没有 id 再走旧逻辑
        const body = id ? { id } : (isPlatformAdmin()  ? { uid, venue_id } : { uid });
    
        const resp = await fetch(API.UNBLOCK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body)
        });
        const json = await resp.json();
        if(json.code !== 0) throw new Error(json.msg || '操作失败');
        toast(json.msg || '已取消拉黑');
        closeModal('#delModal');
        await loadList();
      }catch(err){ toast(err.message || '网络错误', false); }
    });


    // 搜索 & 分页
    let searchTimer = null;
    const triggerSearch = ()=>{ clearTimeout(searchTimer); searchTimer = setTimeout(()=>{ state.page = 1; state.kw = $('#kw').value || ''; loadList(); }, 250); };
    $('#btnSearch').addEventListener('click', triggerSearch);
    $('#kw').addEventListener('input', triggerSearch);
    $('#prev').addEventListener('click', ()=>{ if(state.page>1){ state.page--; loadList(); } });
    $('#next').addEventListener('click', ()=>{ const totalPages = Math.max(1, Math.ceil(state.total/state.pageSize)); if(state.page<totalPages){ state.page++; loadList(); } });
    $('#pageSize').addEventListener('change', ()=>{ state.pageSize = Number($('#pageSize').value); state.page = 1; loadList(); });

    // 点击遮罩关闭
    ['addModal','assignModal','delModal'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('click', (e)=>{ if(e.target === el) closeModal('#'+id); });
    });

    /* UID 联想（复用） */
    function attachUidSuggest(input, panel){
      if(!input || !panel) return;
      let timer = null;
      function hide(){ panel.hidden = true; panel.innerHTML=''; }
      function render(list){
        if(!list || !list.length){ hide(); return; }
        panel.innerHTML = list.map(u => {
          const disabled = isDenyUid(u.uid);
          return `
            <div class="s-item${disabled ? ' disabled' : ''}" data-uid="${u.uid}" ${disabled ? 'data-disabled="1"' : ''}>
              <span class="nick">${escapeHTML(u.nickname || '(无昵称)')}</span>
              <span class="meta">UID: ${u.uid}</span>
            </div>
          `;
        }).join('');
        panel.hidden = false;
      }
      async function query(q){
        if(!q){ hide(); return; }
        try{
          const resp = await fetch(`${API.SEARCH_USER}?kw=${encodeURIComponent(q)}`, { credentials: 'include' });
          const json = await resp.json();
          if(json.code !== 0) throw new Error(json.msg || '');
          const data = json.data || json.list || [];
          render(data);
        }catch{ hide(); }
      }
      input.addEventListener('input', ()=>{
        const q = input.value.trim();
        clearTimeout(timer);
        if(!q){ hide(); input.classList.remove('invalid'); return; }
        input.classList.toggle('invalid', isDenyUid(q));
        timer = setTimeout(()=> query(q), 200);
      });
      panel.addEventListener('click', (e)=>{
        const item = e.target.closest('.s-item');
        if(!item) return;
        if (item.dataset.disabled === '1' || isDenyUid(item.dataset.uid)) {
          toast(`UID ${item.dataset.uid} 为受保护账号，禁止拉黑`, false);
          return;
        }
        input.value = item.getAttribute('data-uid');
        input.classList.remove('invalid');
        hide();
      });
      document.addEventListener('click', (e)=>{ if(!input.closest('.modal-content')?.contains(e.target)) hide(); });
    }
    attachUidSuggest($('#addUid'), $('#uidSuggest'));
    attachUidSuggest($('#assignUid'), $('#uidSuggestAssign'));

    /* 获取当前用户，控制权限与控件可见性 */
    async function fetchCurUser(){
      try{
        const resp = await fetch(API.GET_CUR_USER, { credentials: 'include' });
        const json = await resp.json();
        if(json.code === 0 && json.data){
          state.roleId = Number(json.data.role_id || 0);
          state.venueId = Number(json.data.venue_id || 0);
        // role_id === 1 或 2 显示“指定添加”“场地筛选”“一键拉黑”
         const admin = isPlatformAdmin();
         $('#btnAssign').hidden = !admin;
         $('#venueFilter').hidden = !admin;
         $('#confirmAddAll').hidden = !admin;
        
         if(admin){
           await loadVenuesForFilter($('#venueFilter'));
         }
        }
      }catch(e){ /* 忽略 */ }
    }

    /* 场地下拉（指定添加用） */
    function loadVenuesIntoSelect(selectEl){
      if(!selectEl) return;
      selectEl.innerHTML = `<option value="">加载中…</option>`;
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://open.rcwulian.cn/api/operat/EnergyGift.php', true);
      xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try{
              const response = JSON.parse(xhr.responseText);
              if (response.code === 0) {
                const data = response.data || [];
                selectEl.innerHTML = '';
                data.forEach(venue => {
                  const option = document.createElement('option');
                  option.value = venue.id;
                  option.textContent = `${venue.id} - ${venue.venue_name}`;
                  selectEl.appendChild(option);
                });
                if(!data.length) selectEl.innerHTML = `<option value="">无可选场地</option>`;
              } else {
                selectEl.innerHTML = `<option value="">加载失败</option>`;
              }
            }catch{ selectEl.innerHTML = `<option value="">加载失败</option>`; }
          } else {
            selectEl.innerHTML = `<option value="">加载失败</option>`;
          }
        }
      };
      xhr.send('action=get_venues');
    }

    /* 场地筛选（工具栏用） */
    async function loadVenuesForFilter(selectEl){
      if(!selectEl) return;
      selectEl.innerHTML = `<option value="">全部场地</option>`;
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://open.rcwulian.cn/api/operat/EnergyGift.php', true);
      xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try{
            const response = JSON.parse(xhr.responseText);
            if (response.code === 0) {
              const data = response.data || [];
              data.forEach(venue => {
                const opt = document.createElement('option');
                opt.value = venue.id;
                opt.textContent = `${venue.id} - ${venue.venue_name}`;
                selectEl.appendChild(opt);
              });
            }
          }catch{}
        }
      };
      xhr.send('action=get_venues');

      selectEl.addEventListener('change', ()=>{
        state.venueFilter = selectEl.value || '';
        state.page = 1;
        loadList();
      });
    }

    // 初始
    (async function init(){
      await fetchCurUser();
      await loadList();
    })();
  </script>
</body>
