<!DOCTYPE html> 
<html lang="zh-CN"> 
 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>设备管理</title> 
  <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">  -->
     <link rel="stylesheet" href="/res/fa/css/all.min.css"> 
  <style> 
    :root { 
      --primary: #5b8cff; 
      --secondary: #7f8fa4; 
      --background-gradient-start: #f8f9ff; 
      --background-gradient-end: #f0f3ff; 
      --card-bg: #ffffff; 
      --border-color: #ddd; 
      --text-color: #333; 
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08); 
      --transition: all 0.3s ease; 
      --hover-bg: #f9f9f9; 
    } 
 
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: "PingFang SC", system-ui; 
    } 
 
    body { 
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%); 
      min-height: 100vh; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; 
    } 
 
    .container { 
      max-width: 1200px; 
      width: 100%; 
    } 
 
    .card { 
      background: var(--card-bg); 
      border-radius: 12px; 
      padding: 20px; 
      box-shadow: var(--shadow); 
      margin-bottom: 20px; 
      transition: var(--transition); 
    } 
 
    .card-title { 
      font-size: 24px; 
      color: var(--text-color); 
      margin-bottom: 20px; 
      font-weight: 600; 
      border-bottom: 2px solid var(--primary); 
      padding-bottom: 10px; 
      text-align: center; 
    } 
 
    /* 设备卡片样式 */ 
    .device-card { 
      background: #fff; 
      border: 1px solid var(--border-color); 
      border-radius: 8px; 
      padding: 15px; 
      margin-bottom: 15px; 
      display: flex; 
      gap: 15px; 
      transition: var(--transition); 
    } 
 
    .device-card:hover { 
      background-color: var(--hover-bg); 
    } 
 
    .device-img { 
      width: 100px; 
      height: 100px; 
      object-fit: cover; 
      border-radius: 8px; 
    } 
 
    .device-info { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
      font-size: 14px; 
      color: var(--text-color); 
    } 
 
    .device-info .device-name { 
      font-size: 16px; 
      font-weight: 600; 
      color: var(--primary); 
    } 
 
    .device-info span { 
      display: block; 
    } 
 
    .modify-btn { 
      align-self: flex-start; 
      background-color: var(--primary); 
      color: #fff; 
      border: none; 
      border-radius: 6px; 
      padding: 8px 12px; 
      cursor: pointer; 
      font-size: 14px; 
      transition: var(--transition); 
    } 
 
    .modify-btn:hover { 
      background-color: #4a77e4; 
    } 
 
    /* 加载提示 */ 
    .loading { 
      text-align: center; 
      font-size: 16px; 
      color: var(--primary); 
      padding: 20px; 
    }

    /* 按钮区 */
.device-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* 手机端优化 */
@media (max-width: 768px) {
  body {
    padding: 10px 8px;
  }

  .container {
    width: 100%;
  }

  .card {
    border-radius: 18px;
    padding: 14px;
  }

  .card-title {
    font-size: 20px;
    text-align: left;
    margin-bottom: 14px;
  }

  .device-card {
    display: grid;
    grid-template-columns: 86px minmax(0, 1fr);
    gap: 10px 12px;
    align-items: start;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 14px;
  }

  .device-img {
    width: 86px;
    height: 76px;
    object-fit: contain;
    border-radius: 8px;
    background: #fff;
  }

  .device-info {
    text-align: left;
    gap: 5px;
    font-size: 13px;
    line-height: 1.45;
    min-width: 0;
  }

  .device-info .device-name {
    font-size: 16px;
    margin-bottom: 2px;
  }

  .device-info span {
    line-height: 1.45;
    word-break: break-all;
  }

  .device-actions {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    margin-top: 6px;
  }

  .modify-btn {
    width: 100%;
    margin: 0;
    padding: 10px 0;
    font-size: 13px;
    border-radius: 8px;
    text-align: center;
  }
}
/* 名称 + 状态标签 */
.device-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.status-tag {
  display: inline-flex;
  align-items: center;
  height: 20px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  line-height: 20px;
}

.status-tag.online {
  background: rgba(34, 197, 94, 0.12);
  color: #16a34a;
}

/* 占有 / 使用中 */
.status-tag.busy {
  background: rgba(249, 115, 22, 0.14);
  color: #f97316;
}

.status-tag.offline {
  background: rgba(239, 68, 68, 0.12);
  color: #ef4444;
}

/* 不占页面空间的悬浮刷新按钮 */
.float-refresh-btn {
  position: fixed;
  right: 22px;
  bottom: 28px;
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  box-shadow: 0 8px 24px rgba(91, 140, 255, 0.35);
  cursor: pointer;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.float-refresh-btn:active {
  transform: scale(0.96);
}

.float-refresh-btn.loading i {
  animation: refreshRotate 0.8s linear infinite;
}

@keyframes refreshRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
  .float-refresh-btn {
    right: 16px;
    bottom: 18px;
    width: 42px;
    height: 42px;
  }

  .device-name-row {
    gap: 6px;
  }

  .status-tag {
    height: 19px;
    line-height: 19px;
    font-size: 11px;
    padding: 0 7px;
  }
}
  </style> 
</head> 
 
<body> 
  <div class="container"> 
    <div class="card"> 
      <div class="card-title">设备管理</div> 
      <div id="device-list"> 
        <!-- 设备信息将动态加载 --> 
      </div> 
      <div id="loading" class="loading" style="display: none;">正在加载...</div> 
      <button class="float-refresh-btn" onclick="refreshDeviceList()" title="刷新">
          <i class="fas fa-sync-alt"></i>
      </button>
    </div> 
  </div> 
 
  <script> 
    let currentPage = 1; 
    const limit = 10; 
    const accessToken = 'df39da38cf68a599912b75361e85d19b0269e1a0f355dc72ddf6495a204f41c4'; 
 
    // 获取设备数据 
    function loadDeviceData(page) { 
      const url = `https://open.rcwulian.cn/api/vehicle/getVehicleList.php?page=${page}&limit=${limit}&access_token=${accessToken}`;  
      document.getElementById('loading').style.display  = 'block'; 
 
      fetch(url) 
        .then(response => response.json())  
        .then(data => { 
          if (data.code  === 0 && data.data  && data.data.length  > 0) { 
            displayDevices(data.data);  
            currentPage++; 
          } else { 
            document.getElementById('loading').textContent  = '没有更多数据了'; 
          } 
          document.getElementById('loading').style.display  = 'none'; 
        }) 
        .catch(error => { 
          console.error(' 数据加载失败:', error); 
          document.getElementById('loading').textContent  = '加载失败，请重试'; 
          setTimeout(() => { 
            document.getElementById('loading').style.display  = 'none'; 
          }, 2000); 
        }); 
    } 
 
function getDeviceStatusTag(device) {
  const status = String(device.status || '').trim();

  // 在线：绿色
  if (status === '在线') {
    return {
      text: '在线',
      className: 'online'
    };
  }

  // 占有 / 占用：橙色
  if (status === '占有' || status === '占用') {
    return {
      text: '占有',
      className: 'busy'
    };
  }

  // 离线：红色
  return {
    text: '离线',
    className: 'offline'
  };
}
    // 显示设备信息 
    function displayDevices(devices) { 
      const deviceList = document.getElementById('device-list');  
      devices.forEach(device  => { 
          const statusTag = getDeviceStatusTag(device);
        // 将设备对象转为 JSON 字符串，并存入 data-device 属性中 
        const card = document.createElement('div');  
        card.classList.add('device-card');  
        card.setAttribute('data-device',  JSON.stringify(device));  
        card.setAttribute('data-device-cfg',  JSON.stringify(device));  
        card.innerHTML = ` 
  <img class="device-img" src="${device.photo_url}" alt="设备图片"> 
  <div class="device-info"> 
<div class="device-name-row">
  <span class="device-name">${device.name}</span>
  <span class="status-tag ${statusTag.className}">${statusTag.text}</span>
</div>
<span>序列号: ${device.serial_number}</span>

    <span>车辆状态: ${device.vehicle_status}</span>  
    <span>共享状态: ${device.sharing_status}</span>  
    <span>分享标题: ${device.share_name}</span>  
    <span>前图传: ${device.image_device_serial}</span>  
    ${device.bk_image_device_serial ? `<span>后图传: ${device.bk_image_device_serial}</span>` : ''} 
  </div> 
<div class="device-actions">
  <button class="modify-btn" onclick="modifyDevice(this)">修改信息</button> 
  <button class="modify-btn" onclick="modifyDeviceCfg(this)">修改配置</button> 
</div>
`;

        deviceList.appendChild(card);  
      }); 
    } 
 
   // 修改设备操作：将设备信息作为 URL 参数传递，然后跳转到修改页面 
    function modifyDevice(button) { 
      const card = button.closest('.device-card');  
      const deviceData = card.getAttribute('data-device');  
      const device = JSON.parse(deviceData);  
      const queryString = Object.keys(device).map(key  => `${encodeURIComponent(key)}=${encodeURIComponent(device[key])}`).join('&'); 
      window.location.href  = `modify-device.html?${queryString}`;  
    } 
 
    function modifyDeviceCfg(button) { 
      const card = button.closest('.device-card');  
      const deviceDataCfg = card.getAttribute('data-device-cfg');  
      const device = JSON.parse(deviceDataCfg);  
      const queryString = Object.keys(device).map(key  => `${encodeURIComponent(key)}=${encodeURIComponent(device[key])}`).join('&'); 
      window.location.href  = `modify-deviceCfgTest.html?${queryString}`;  
    } 
 function refreshDeviceList() {
  const btn = document.querySelector('.float-refresh-btn');
  const deviceList = document.getElementById('device-list');
  const loading = document.getElementById('loading');

  if (btn) btn.classList.add('loading');

  currentPage = 1;
  deviceList.innerHTML = '';
  loading.textContent = '正在刷新...';
  loading.style.display = 'block';

  const url = `https://open.rcwulian.cn/api/vehicle/getVehicleList.php?page=${currentPage}&limit=${limit}&access_token=${accessToken}`;

  fetch(url)
    .then(response => response.json())
    .then(data => {
      deviceList.innerHTML = '';

      if (data.code === 0 && data.data && data.data.length > 0) {
        displayDevices(data.data);
        currentPage = 2;
        loading.style.display = 'none';
      } else {
        loading.textContent = '暂无设备数据';
      }
    })
    .catch(error => {
      console.error('刷新失败:', error);
      loading.textContent = '刷新失败，请重试';
      setTimeout(() => {
        loading.style.display = 'none';
      }, 2000);
    })
    .finally(() => {
      if (btn) btn.classList.remove('loading');
    });
}
    // 自动加载下一页（滚动到底部时） 
 
    // 页面加载时获取第一页数据 
    loadDeviceData(currentPage); 
  </script> 
</body> 
 
</html>
