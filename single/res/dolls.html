<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>娃娃管理</title>

<style>
:root {
  --primary:#5b8cff; --secondary:#7f8fa4;
  --background-gradient-start:#f8f9ff; --background-gradient-end:#f0f3ff;
  --card-bg:#ffffff; --border-color:#ddd; --text-color:#333;
  --shadow:0 4px 24px rgba(91,140,255,.08); --transition:all .3s ease;
  --hover-bg:#f9f9f9;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC",system-ui}
body{background:linear-gradient(135deg,var(--background-gradient-start) 0%,var(--background-gradient-end) 100%);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
.container{max-width:1200px;width:100%}
.card{background:var(--card-bg);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:20px;transition:var(--transition)}
.card-title{font-size:24px;color:var(--text-color);margin-bottom:20px;font-weight:600;border-bottom:2px solid var(--primary);padding-bottom:10px;text-align:left}

.venue-card{background:#fff;border:1px solid var(--border-color);border-radius:8px;padding:15px;margin-bottom:15px;display:flex;gap:15px;transition:var(--transition);align-items:flex-start}
.venue-card:hover{background-color:var(--hover-bg)}
.venue-img{width:100px;height:100px;object-fit:cover;border-radius:8px;flex:0 0 auto}
.venue-info{flex:1;display:flex;flex-direction:column;gap:8px;font-size:14px;color:var(--text-color)}
.venue-info .venue-name{font-size:16px;font-weight:600;color:var(--primary)}
.venue-info span{display:block;line-height:1.5}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
.break-any{word-break:break-word;overflow-wrap:anywhere}
.venue-actions{display:flex;flex-direction:column;justify-content:center;padding-left:15px;gap:8px;min-width:88px}

.btn{background:#fff;border:1px solid var(--border-color);color:#333;border-radius:6px;padding:10px 12px;cursor:pointer;font-size:14px;transition:var(--transition)}
.btn:hover{background:#f7f7f7}
.edit-btn{background-color:var(--primary);color:#fff;border:none;border-radius:6px;padding:10px 12px;cursor:pointer;font-size:14px;transition:var(--transition)}
.edit-btn:hover{background-color:#4a77e4}
.danger{background:#ff4d4f;color:#fff;border:none}
.danger:hover{background:#e64547}
.loading{text-align:center;font-size:16px;color:var(--primary);padding:20px}

.row{display:flex;gap:10px;flex-wrap:wrap}
.input,.select{padding:10px;border:1px solid #ccc;border-radius:6px;font-size:14px;min-height:40px}
.tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.pagination{display:flex;gap:8px;align-items:center;justify-content:flex-end}
.tag{display:inline-block;background:#eef3ff;color:#4666d4;border-radius:12px;padding:2px 8px;font-size:12px}

/* Modal */
.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100vw;height:100vh;overflow:auto;background-color:rgba(0,0,0,.6);justify-content:center;align-items:center;padding:16px}
.modal-content{background:#fff;padding:22px;border-radius:12px;width:520px;max-width:100%;box-shadow:0 4px 20px rgba(0,0,0,.25);display:flex;flex-direction:column;gap:12px}
.modal-content input,.modal-content textarea,.modal-content select{width:100%;padding:10px;font-size:14px;border:1px solid #ccc;border-radius:6px;transition:border-color .3s}
.modal-content input:focus,.modal-content textarea:focus,.modal-content select:focus{outline:none;border-color:var(--primary)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
textarea.code{font-family:ui-monospace,Menlo,Consolas,monospace;height:180px;white-space:pre}
.small{font-size:12px;color:#888}

/* 开关文字一行显示更稳 */
.inline-switch{display:flex;align-items:center;gap:8px}
.inline-switch label{margin:0}

/* 自动编号三项用网格，更稳 */
.form-grid{display:grid;grid-template-columns:1fr 120px 120px;gap:10px}

/* ====== 响应式：手机端优化 ====== */
@media (max-width: 768px){
  body{padding:12px}
  .tools{flex-direction:column}
  .tools > *{width:100%}
  .venue-card{flex-direction:column}
  .venue-img{width:100%;height:auto;max-height:220px}
  .venue-actions{width:100%;padding-left:0}
  .venue-actions .btn,.venue-actions .edit-btn{width:100%}      /* 按钮一行一个 */
  .pagination{flex-direction:column;align-items:stretch;gap:10px}
  .pagination .btn,.pagination .select{width:100%}
  .modal-actions{flex-direction:column}
  .modal-actions .btn,.modal-actions .edit-btn{width:100%}
  .form-grid{grid-template-columns:1fr}                          /* 自动编号三项一列 */
  textarea.code{height:140px}
}

/* 超长内容换行（web+mobile 都生效）*/
.long-text{word-break:break-word;overflow-wrap:anywhere}
/* ✅ 勾选框 + 文案：稳定布局 */
.inline-switch{
  display:grid;
  grid-template-columns: 20px auto; /* 左勾选框、右文字 */
  align-items:center;
  column-gap:8px;
  margin:6px 0 2px;
}
.inline-switch input[type="checkbox"]{
  width:16px;height:16px; /* 与文字更贴合 */
  justify-self:start;
}
.inline-switch label{
  margin:0;
  font-weight:500;
  line-height:1;
  white-space:nowrap; /* 桌面端不换行 */
}
@media (max-width: 480px){
  .inline-switch label{ white-space:normal; } /* 手机可以换行，不会跑偏 */
}

/* ✅ “积分 / 状态 / 默认图片 URL” 三栏：给 URL 更宽 */
.form-row-3{
  display:grid;
  grid-template-columns: 1fr 1fr 2.4fr; /* URL 列更宽 */
  gap:10px;
}
@media (max-width: 768px){
  .form-row-3{ grid-template-columns: 1fr; } /* 手机一列 */
}

/* （可选）让弹窗里各 label 与控件间距更舒服 */
.modal-content label{ display:block; font-size:14px; color:#555; margin-top:4px; }
.modal-content label > input,
.modal-content label > select{ margin-top:6px; }

</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-title">娃娃管理</div>

    <!-- 顶部工具条：移动端自动纵向铺满 -->
    <div class="tools row">
      <input id="q_doll_id" class="input" placeholder="按 doll_id 精确查询">
      <input id="q_doll_name" class="input" placeholder="按名称模糊查询">
      <select id="q_status" class="select">
        <option value="">状态（全部）</option>
        <option value="1">未上报</option>
        <option value="2">已上报</option>
      </select>
      <button class="btn" onclick="reload()">搜索</button>
      <button class="btn" onclick="resetFilters()">重置</button>
      <button class="edit-btn" style="width:100%" onclick="openBatch()">批量录入（单/多）</button>
    </div>

    <div id="list"></div>

    <div class="pagination">
      <button class="btn" onclick="prevPage()">上一页</button>
      <span id="pageInfo" class="tag">第 1/1 页</span>
      <button class="btn" onclick="nextPage()">下一页</button>
      <select id="pageSize" class="select" onchange="reload(true)">
        <option>10</option><option selected>25</option><option>50</option><option>100</option>
      </select>
    </div>
  </div>
</div>

<!-- 单条编辑（保留编辑用） -->
<div id="editModal" class="modal" onclick="modalBgClose(event,'editModal')">
  <div class="modal-content">
    <h3>编辑娃娃</h3>
    <input id="f_id" type="hidden">
    <label>doll_id</label>
    <input id="f_doll_id" placeholder="娃娃唯一ID">
    <label>名称</label>
    <input id="f_doll_name" placeholder="娃娃名称">
    <label>积分</label>
    <input id="f_integral" type="number" value="20">
    <label>图片URL</label>
    <input id="f_image" placeholder="https://...">
    <label>状态</label>
    <select id="f_status" class="select">
      <option value="1" selected>未上报</option>
      <option value="2">已上报</option>
    </select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('editModal')">取消</button>
      <button class="edit-btn" onclick="saveOne()">保存</button>
    </div>
  </div>
</div>

<!-- 批量录入 -->
<div id="batchModal" class="modal" onclick="modalBgClose(event,'batchModal')">
  <div class="modal-content">
    <h3>批量录入</h3>
    <div class="small">每行一个 <b>doll_id</b>（空行自动忽略）。公共字段在下方一次性设置。</div>

    <textarea id="batchIds" class="code" placeholder="E280F3372000F0000F19
E280F3372000F00010AA
E280F3372000F00010AB"></textarea>

    <!-- 自动编号开关：更稳的布局 -->
    <div class="inline-switch">
      <input id="batchAutoName" type="checkbox" checked>
      <label for="batchAutoName">自动编号娃娃名称</label>
    </div>

    <!-- 自动编号行 使用网格 -->
    <div id="autoNameRow" class="form-grid">
      <label>名称前缀
        <input id="batchNamePrefix" placeholder="例如：测试" value="测试">
      </label>
      <label>起始号
        <input id="batchStartNo" type="number" value="1">
      </label>
      <label>位数
        <input id="batchPadLen" type="number" value="2">
      </label>
    </div>

    <!-- 不自动编号时显示 -->
    <div id="fixedNameRow" class="row" style="display:none">
      <label style="flex:1">固定名称（不编号）
        <input id="batchFixedName" placeholder="留空则使用“未命名”">
      </label>
    </div>

    <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr">
      <label>积分
        <input id="batchIntegral" type="number" value="20">
      </label>
      <label>状态
        <select id="batchStatus" class="select">
          <option value="1" selected>未上报</option>
          <option value="2">已上报</option>
        </select>
      </label>
      <label>默认图片 URL
        <input id="batchImage" value="https://rcwulian.cn/app/imgv2/img/1745489652869_venue_1.jpg">
      </label>
    </div>

    <div class="small">* 录入采用 upnotsert，若某个 doll_id 已存在，本次将不录入名称/积分/图片/状态。</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('batchModal')">取消</button>
      <button class="edit-btn" onclick="submitBatch()">录入</button>
    </div>
  </div>
</div>

<script>
const API_URL = '/api/operat/dolls_crud.php';
const STATUS_TEXT = { '1':'未上报', '2':'已上报' };
let state = { page:1, size:25, total:0, list:[] };

function qs(id){ return document.getElementById(id); }
function openModal(id){ qs(id).style.display='flex'; }
function closeModal(id){ qs(id).style.display='none'; }
function modalBgClose(e,id){ if(e.target.classList.contains('modal')) closeModal(id); }

function resetFilters(){
  qs('q_doll_id').value = '';
  qs('q_doll_name').value = '';
  qs('q_status').value = '';
  reload(true);
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

async function api(params, method='POST'){
  const body = (method==='GET') ? undefined : JSON.stringify(params||{});
  const q = (method==='GET') ? ('?'+new URLSearchParams(params).toString()) : '';
  const res = await fetch(API_URL + q, { method, headers: { 'Content-Type':'application/json' }, body, credentials:'include' });
  return res.json();
}

async function reload(reset=false){
  if(reset) state.page=1;
  state.size = parseInt(qs('pageSize').value,10) || 25;

  const params = {
    action:'list',
    page:state.page, size:state.size,
    doll_id: qs('q_doll_id').value.trim(),
    doll_name: qs('q_doll_name').value.trim(),
    report_status: qs('q_status').value || ''
  };
  const data = await api(params,'GET');
  if(data.code===0){
    state.list = data.data.list||[];
    state.total = data.data.total||0;
    renderList();
  }else{
    alert(data.msg||'加载失败');
  }
}

function renderList(){
  const box = qs('list');
  if(!state.list.length){
    box.innerHTML = `<div class="loading">暂无数据</div>`;
    qs('pageInfo').textContent = `第 ${state.page}/1 页`;
    return;
  }
  box.innerHTML = state.list.map(row=>{
    const img = row.doll_image || 'https://rcwulian.cn/app/imgv2/img/1745489652869_venue_1.jpg';
    const statusTxt = STATUS_TEXT[String(row.report_status||'1')] || row.report_status;
    return `
      <div class="venue-card">
        <img class="venue-img" src="${img}" onerror="this.src='https://via.placeholder.com/100x100?text=Img'">
        <div class="venue-info">
          <div class="venue-name">${escapeHtml(row.doll_name||'未命名')}</div>
          <span>ID：${row.id}</span>
          <span class="mono break-any">doll_id：${escapeHtml(row.doll_id||'')}</span>
          <span>积分：${row.doll_machine_integral ?? 0}　状态：${statusTxt}</span>
          <span class="small">创建：${row.created_at || '-'}</span>
        </div>
        <div class="venue-actions">
          <button class="edit-btn" onclick='openEdit(${JSON.stringify(row).replace(/'/g,"&#39;")})'>编辑</button>
          <button class="btn danger" onclick="removeOne(${row.id})">删除</button>
        </div>
      </div>`;
  }).join('');
  const totalPages = Math.max(1, Math.ceil(state.total/state.size));
  qs('pageInfo').textContent = `第 ${state.page}/${totalPages} 页（共 ${state.total} 条）`;
}

function prevPage(){ if(state.page>1){ state.page--; reload(); } }
function nextPage(){ const totalPages = Math.max(1, Math.ceil(state.total/state.size)); if(state.page<totalPages){ state.page++; reload(); } }

function openEdit(row){
  if(!row){ return; }
  qs('f_id').value = row?.id ?? '';
  qs('f_doll_id').value = row?.doll_id ?? '';
  qs('f_doll_name').value = row?.doll_name ?? '';
  qs('f_integral').value = row?.doll_machine_integral ?? 20;
  qs('f_image').value = row?.doll_image ?? 'https://rcwulian.cn/app/imgv2/img/1745489652869_venue_1.jpg';
  qs('f_status').value = String(row?.report_status ?? 1);
  openModal('editModal');
}

// 批量录入弹窗
function openBatch(){
  qs('batchIds').value = '';
  qs('batchAutoName').checked = true;
  qs('batchNamePrefix').value = '测试';
  qs('batchStartNo').value = 1;
  qs('batchPadLen').value = 2;
  qs('batchFixedName').value = '';
  qs('batchIntegral').value = 20;
  qs('batchStatus').value = '1';
  qs('batchImage').value = 'https://rcwulian.cn/app/imgv2/img/1745489652869_venue_1.jpg';
  toggleBatchNameRows();
  openModal('batchModal');
}
function toggleBatchNameRows(){
  const on = qs('batchAutoName').checked;
  qs('autoNameRow').style.display  = on ? ''   : 'none';
  qs('fixedNameRow').style.display = on ? 'none': '';
}
function genName(prefix, start, padLen, index){
  const n = start + index;
  const s = padLen>0 ? String(n).padStart(padLen, '0') : String(n);
  return `${prefix}${s}`;
}

async function submitBatch(){
  const idsText = qs('batchIds').value || '';
  const lines = idsText.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  if(!lines.length){ alert('请粘贴至少一个 doll_id'); return; }

  const auto = qs('batchAutoName').checked;
  const prefix  = qs('batchNamePrefix').value.trim();
  const startNo = Number(qs('batchStartNo').value||1);
  const padLen  = Number(qs('batchPadLen').value||0);
  const fixed   = qs('batchFixedName').value.trim();

  const integral = Number(qs('batchIntegral').value||0);
  const status   = Number(qs('batchStatus').value||1);
  const image    = qs('batchImage').value.trim() || 'https://rcwulian.cn/app/imgv2/img/1745489652869_venue_1.jpg';

  const items = lines.map((id, i) => ({
    doll_id: id,
    doll_name: auto ? genName(prefix, startNo, padLen, i) : (fixed || '未命名'),
    doll_machine_integral: integral,
    doll_image: image,
    report_status: status
  }));

  const res = await api({
    action: 'save',
    items,
    reject_duplicates: 1,
    auto_name: auto ? 1 : 0,
    name_prefix: prefix,
    start_no: startNo,
    pad_len: padLen
  });

  if(res.code===0){
    closeModal('batchModal');
    reload(true);
    const d = res.data||{};
    let msg = `录入完成：成功 ${d.ok||0} 条，跳过 ${d.skipped||0} 条。`;
    if (Array.isArray(d.skipped_detail) && d.skipped_detail.length) {
      msg += `\n\n以下条目重复未录入：\n` +
        d.skipped_detail.map(x =>
          `- 第${(x.idx+1)}行  ID:${x.doll_id || '-'}  名称:${x.doll_name || '-'}  原因:${x.reason}`
        ).join('\n');
    }
    alert(msg);
  }else if(res.code===409){
    const d = res.data||{};
    let msg = res.msg || '存在重复，未录入';
    if (Array.isArray(d.skipped_detail) && d.skipped_detail.length) {
      msg += `\n\n重复项：\n` +
        d.skipped_detail.map(x =>
          `- 第${(x.idx+1)}行  ID:${x.doll_id || '-'}  名称:${x.doll_name || '-'}  原因:${x.reason}`
        ).join('\n');
    }
    alert(msg);
  }else{
    alert(res.msg||'批量录入失败');
  }
}

async function saveOne(){
  const id = qs('f_id').value.trim();
  if(!id){ alert('仅支持编辑已有记录。'); return; }
  const payload = {
    doll_id: qs('f_doll_id').value.trim(),
    doll_name: qs('f_doll_name').value.trim() || '未命名',
    doll_machine_integral: Number(qs('f_integral').value||0),
    doll_image: qs('f_image').value.trim(),
    report_status: Number(qs('f_status').value||1),
  };
  const res = await api({ action:'update', id, ...payload, reject_duplicates:1 });
  if(res.code===0){ closeModal('editModal'); reload(true); }
  else if(res.code===409){
    const d = res.data || {};
    let msg = res.msg || '保存失败：存在重复';
    if (Array.isArray(d.skipped_detail) && d.skipped_detail.length) {
      const x = d.skipped_detail[0];
      msg += `\n\nID:${x.doll_id || '-'}  名称:${x.doll_name || '-'}  原因:${x.reason}`;
    }
    alert(msg);
  }else{
    alert(res.msg||'保存失败');
  }
}

async function removeOne(id){
  if(!confirm('确定删除该记录吗？')) return;
  const res = await api({ action:'delete', id });
  if(res.code===0){ reload(); } else { alert(res.msg||'删除失败'); }
}

// 初次加载
window.addEventListener('DOMContentLoaded', ()=>{
  reload(true);
  const el = qs('batchAutoName');
  if(el) el.addEventListener('change', toggleBatchNameRows);
});
</script>
</body>
</html>
