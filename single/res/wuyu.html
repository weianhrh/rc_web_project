<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场地信息展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a3a, #2d3b4e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4cc9f0, #4361ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #a0a0c0;
            font-size: 1.1rem;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 25px;
            background: linear-gradient(90deg, #3a0ca3, #4361ee);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .search-box {
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 300px;
            font-size: 1rem;
            backdrop-filter: blur(5px);
        }
        
        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .venues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }
        
        .venue-card {
            background: rgba(30, 30, 50, 0.7);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .venue-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        
        .venue-image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        
        .venue-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .venue-card:hover .venue-image {
            transform: scale(1.05);
        }
        
        .no-image {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #3a0ca3, #4361ee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .venue-info {
            padding: 20px;
        }
        
        .venue-id {
            display: inline-block;
            background: rgba(67, 97, 238, 0.2);
            color: #4cc9f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border: 1px solid rgba(76, 201, 240, 0.3);
        }
        
        .venue-name {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #a0a0c0;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            background: rgba(244, 67, 54, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            color: #f44336;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0c0;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .venues-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .search-box {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .venues-grid {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 10px;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>场地信息展示</h1>
            <p>所有场地的ID和备份图片卡片展示</p>
        </div>
        
        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="搜索场地名称或ID...">
            <button class="btn" id="refreshBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                刷新数据
            </button>
        </div>
        
        <div id="venuesContainer">
            <div class="loading">正在加载场地信息...</div>
        </div>
    </div>

    <script>
        // 获取场地数据并展示
        async function fetchVenues() {
            const container = document.getElementById('venuesContainer');
            
            try {
                container.innerHTML = '<div class="loading">正在加载场地信息...</div>';
                
                // 发送请求获取场地数据
                const response = await fetch('https://open.rcwulian.cn/api/operat/venues_images.php?action=get_venues_images');
                
                if (!response.ok) {
                    throw new Error(`网络响应不正常: ${response.status}`);
                }
                
                const result = await response.json();
                
                if (result.code === 0) {
                    displayVenues(result.data);
                    setupSearch(result.data);
                } else {
                    container.innerHTML = `<div class="error">错误: ${result.msg}</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="error">获取数据失败: ${error.message}</div>`;
                console.error('获取场地数据时出错:', error);
            }
        }
        
        // 展示场地卡片
        function displayVenues(venues, filteredVenues = null) {
            const container = document.getElementById('venuesContainer');
            const venuesToDisplay = filteredVenues || venues;
            
            if (!venuesToDisplay || venuesToDisplay.length === 0) {
                const message = filteredVenues ? 
                    '<div class="empty-state"><i>🔍</i><p>没有找到匹配的场地</p></div>' :
                    '<div class="empty-state"><i>📷</i><p>没有找到场地数据</p></div>';
                container.innerHTML = message;
                return;
            }
            
            let html = '<div class="venues-grid">';
            
            venuesToDisplay.forEach(venue => {
                // 假设备份图片URL字段为backup_image_url，如果没有则使用默认图片
                const imageUrl = venue.backup_image_url || '';
                const hasImage = venue.backup_image_url && venue.backup_image_url !== '';
                
                html += `
                    <div class="venue-card">
                        <div class="venue-image-container">
                            ${hasImage ? 
                                `<img src="${imageUrl}" alt="${venue.venue_name}" class="venue-image" onerror="handleImageError(this)">` :
                                `<div class="no-image">暂无图片</div>`
                            }
                        </div>
                        <div class="venue-info">
                            <span class="venue-id">ID: ${venue.id}</span>
                            <h3 class="venue-name">${venue.venue_name || '未命名场地'}</h3>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // 图片加载错误处理
        function handleImageError(img) {
            img.style.display = 'none';
            const container = img.parentNode;
            container.innerHTML = '<div class="no-image">图片加载失败</div>';
        }
        
        // 设置搜索功能
        function setupSearch(venues) {
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const searchTerm = this.value.toLowerCase().trim();
                    
                    if (searchTerm === '') {
                        displayVenues(venues);
                        return;
                    }
                    
                    const filteredVenues = venues.filter(venue => {
                        return (
                            venue.id.toString().includes(searchTerm) ||
                            (venue.venue_name && venue.venue_name.toLowerCase().includes(searchTerm))
                        );
                    });
                    
                    displayVenues(venues, filteredVenues);
                }, 300);
            });
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', fetchVenues);
        
        // 刷新按钮点击事件
        document.getElementById('refreshBtn').addEventListener('click', fetchVenues);
    </script>
</body>
</html>
