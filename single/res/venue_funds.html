<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>场地资金账号管理</title>

  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", system-ui; }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container { max-width: 1200px; width: 100%; }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .card-title {
      font-size: 22px;
      color: var(--text-color);
      margin-bottom: 16px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar .field {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, input[type="text"] {
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      outline: none;
      background: #fff;
      font-size: 14px;
      min-width: 220px;
    }

    select:disabled { opacity: .6; cursor: not-allowed; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      background: #e9eefc;
      color: #2b3a55;
    }
    .btn:hover { filter: brightness(0.98); }

    .btn.primary { background: var(--primary); color: #fff; }
    .btn.primary:hover { background: #4a77e4; }

    .btn.danger { background: #ff4d4f; color: #fff; }
    .btn.danger:hover { background: #e64546; }

    .venue-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      gap: 15px;
      transition: var(--transition);
      align-items: flex-start;
    }

    .venue-card:hover { background-color: var(--hover-bg); }

    .venue-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      color: var(--text-color);
      min-width: 0;
    }

    .venue-info .venue-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2b62ff;
      border: 1px solid #d8e6ff;
    }

    .venue-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding-left: 10px;
    }

    .edit-btn {
      background-color: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
    }
    .edit-btn:hover { background-color: #4a77e4; }

    .loading { text-align: center; font-size: 16px; color: var(--primary); padding: 20px; }

    .muted { color: #6b7a90; font-size: 13px; }

    /* modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      width: 440px;
      max-width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-content h3 {
      font-size: 18px;
      color: #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .modal-content label { font-size: 13px; color: #334; }

    .modal-content input, .modal-content textarea, .modal-content select {
      width: 100%;
      padding: 9px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: border-color 0.3s;
      outline: none;
    }

    .modal-content textarea { min-height: 72px; resize: vertical; }

    .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
      border-color: var(--primary);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .close-x {
      cursor: pointer;
      color: #667;
      font-size: 18px;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 8px;
    }
    .close-x:hover { background: #f2f4f8; }

    @media (max-width: 640px) {
      select, input[type="text"] { min-width: 0; width: 100%; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar .field { width: 100%; }
      .venue-card { flex-direction: column; }
      .venue-actions { flex-direction: row; padding-left: 0; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="card-title">
        <span>场地资金账号管理</span>
        <button class="btn primary" id="btnAdd">+ 新增账号</button>
      </div>

      <div class="toolbar">
        <div class="field" id="venueField">
          <span class="muted">场地筛选：</span>
          <select id="venue_id">
            <option value="">全部场地</option>
          </select>
        </div>

        <div class="field" style="flex:1;">
          <input type="text" id="kw" placeholder="搜索：卡号/类型/姓名/银行/备注..." />
        </div>

        <button class="btn" id="btnSearch">搜索</button>
        <button class="btn" id="btnReset">重置</button>
      </div>

      <div id="loading" class="loading" style="display:none;">加载中...</div>
      <div id="list"></div>
      <div class="muted" id="pagerInfo" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>
        <span id="modalTitle">新增账号</span>
        <span class="close-x" id="modalClose">×</span>
      </h3>

      <div id="adminVenueWrap" style="display:none;">
        <label>场地ID（管理员可选）</label>
        <select id="form_venue_id">
          <option value="">请选择场地</option>
        </select>
      </div>

      <label>提现账号（必填）</label>
      <input id="withdrawal_account" placeholder="银行卡号 / 支付宝 / 微信等" />

      <label>账号类型（必填）</label>
      <input id="account_type" placeholder="例如：银行卡 / 支付宝 / 微信" />

      <label>姓名（必填）</label>
      <input id="account_name" placeholder="持卡人 / 收款人姓名" />

      <label>银行名称</label>
      <input id="bank_name" placeholder="例如：招商银行" />

      <label>银行卡号（可与提现账号不同，用于识别分行等）</label>
      <input id="bank_number" placeholder="例如：6222..." />

      <!--<label>账户余额</label>-->
      <!--<input id="account_balance" placeholder="默认 0.00" />-->

      <label>备注</label>
      <textarea id="remarks" placeholder="可选：说明/用途/注意事项"></textarea>

      <div class="modal-actions">
        <button class="btn" id="btnCancel">取消</button>
        <button class="btn primary" id="btnSave">保存</button>
      </div>

      <div class="muted" id="modalHint"></div>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  // ====== 你需要改这里：接口地址 ======
  const API_BASE = '/api/operat/venue_funds_api.php';

  // 如果你已经有 get_venues 的接口（你示例的 EnergyGift.php?action=get_venues），可以复用：
  const VENUE_LIST_API = '/api/operat/EnergyGift.php'; // action=get_venues

  // ====== 状态 ======
  let page = 1;
  const pageSize = 50;
  let currentVenueId = '';     // 筛选用
  let isAdmin = false;         // 由后端返回推断（如果你愿意也可做 /me 接口）
  let editingId = null;        // 当前编辑记录 id

  const $ = (id) => document.getElementById(id);

  function showLoading(show) {
    $('loading').style.display = show ? 'block' : 'none';
  }

  function openModal(title) {
    $('modalTitle').textContent = title;
    $('modalHint').textContent = '';
    $('modal').style.display = 'flex';
  }

  function closeModal() {
    $('modal').style.display = 'none';
    editingId = null;
  }

    function fillForm(row) {
      $('withdrawal_account').value = row?.withdrawal_account ?? '';
      $('account_type').value = row?.account_type ?? '';
      $('account_name').value = row?.account_name ?? '';
      $('bank_name').value = row?.bank_name ?? '';
      $('bank_number').value = row?.bank_number ?? '';
      $('remarks').value = row?.remarks ?? '';
      if (isAdmin) $('form_venue_id').value = row?.venue_id ?? '';
    }

    function readForm() {
  const payload = {
    withdrawal_account: $('withdrawal_account').value.trim(),
    account_type: $('account_type').value.trim(),
    account_name: $('account_name').value.trim(),
    bank_name: $('bank_name').value.trim(),
    bank_number: $('bank_number').value.trim(),
    remarks: $('remarks').value.trim()
  };

  if (isAdmin) {
    const vid = $('form_venue_id').value.trim();
    if (vid) payload.venue_id = parseInt(vid, 10);
  }

  return payload;
}

  function requireFields(payload) {
    if (!payload.withdrawal_account) return '提现账号必填';
    if (!payload.account_type) return '账号类型必填';
    if (!payload.account_name) return '姓名必填';
    return '';
  }

  // ====== AJAX（保持你 XMLHttpRequest 风格）======
  function postJson(url, obj, cb) {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.withCredentials = true; // 让 cookie 带上（session_token）
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        try {
          const res = JSON.parse(xhr.responseText || '{}');
          cb(res, xhr.status);
        } catch (e) {
          cb({code: -1, msg: '响应解析失败'}, xhr.status);
        }
      }
    };
    xhr.send(JSON.stringify(obj || {}));
  }

  function getJson(url, cb) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.withCredentials = true;
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        try {
          const res = JSON.parse(xhr.responseText || '{}');
          cb(res, xhr.status);
        } catch (e) {
          cb({code: -1, msg: '响应解析失败'}, xhr.status);
        }
      }
    };
    xhr.send(null);
  }

  // ====== 拉场地下拉（复用你已有接口）======
  function loadVenues() {
    const venueSelect = $('venue_id');
    const formVenue = $('form_venue_id');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', VENUE_LIST_API, true);
    xhr.withCredentials = true;
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        try {
          const response = JSON.parse(xhr.responseText || '{}');
          // 你旧接口是 code===0，我这里兼容 code===0 / 200
          const ok = (response.code === 0 || response.code === 200);
          if (ok && Array.isArray(response.data)) {
            response.data.forEach(v => {
              const opt1 = document.createElement('option');
              opt1.value = v.id;
              opt1.textContent = `${v.id} - ${v.venue_name}`;
              venueSelect.appendChild(opt1);

              const opt2 = document.createElement('option');
              opt2.value = v.id;
              opt2.textContent = `${v.id} - ${v.venue_name}`;
              formVenue.appendChild(opt2);
            });
          }
        } catch(e) {}
      }
    };
    xhr.send('action=get_venues');
  }

  // ====== 渲染列表 ======
  function renderList(rows) {
    const wrap = $('list');
    wrap.innerHTML = '';

    if (!rows || rows.length === 0) {
      wrap.innerHTML = `<div class="muted" style="padding:12px;">暂无数据</div>`;
      return;
    }

    rows.forEach(row => {
      const venueTitle = row.venue_name
        ? `${row.venue_id} - ${row.venue_name}`
        : `场地ID：${row.venue_id}`;

      const el = document.createElement('div');
      el.className = 'venue-card';

      el.innerHTML = `
        <div class="venue-info">
<div class="venue-name">
  <span class="tag">${escapeHtml(row.account_type || '未知类型')}</span>
  <span>${escapeHtml(venueTitle)}</span>
</div>
          <span><b>提现账号：</b>${escapeHtml(row.withdrawal_account || '')}</span>
          <span><b>姓名：</b>${escapeHtml(row.account_name || '')}</span>
          <span><b>银行：</b>${escapeHtml(row.bank_name || '')} ${row.bank_number ? (' / ' + escapeHtml(row.bank_number)) : ''}</span>
          <span><b>余额：</b>${escapeHtml(row.account_balance || '0.00')}</span>
          ${row.remarks ? `<span class="muted"><b>备注：</b>${escapeHtml(row.remarks)}</span>` : ''}
          <span class="muted">创建：${escapeHtml(row.created_at || '')}　更新：${escapeHtml(row.updated_at || '')}</span>
        </div>

        <div class="venue-actions">
          <button class="edit-btn" data-act="edit" data-id="${row.id}">编辑</button>
          <button class="btn danger" data-act="del" data-id="${row.id}">删除</button>
        </div>
      `;

      wrap.appendChild(el);
    });

    // 绑定按钮事件（事件代理也行，这里简单绑）
    wrap.querySelectorAll('button[data-act="edit"]').forEach(btn => {
      btn.addEventListener('click', () => onEdit(btn.dataset.id));
    });
    wrap.querySelectorAll('button[data-act="del"]').forEach(btn => {
      btn.addEventListener('click', () => onDelete(btn.dataset.id));
    });
  }

  function escapeHtml(s) {
    return String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  // ====== 拉列表（关键：顺便探测是否 admin）======
  function loadList() {
    showLoading(true);

    const kw = $('kw').value.trim();
    const venueParam = currentVenueId ? `&venue_id=${encodeURIComponent(currentVenueId)}` : '';
    const kwParam = kw ? `&kw=${encodeURIComponent(kw)}` : '';

    const url = `${API_BASE}?action=list&page=${page}&page_size=${pageSize}${venueParam}${kwParam}`;

    getJson(url, (res, status) => {
      showLoading(false);

      if (status !== 200) {
        $('list').innerHTML = `<div class="muted" style="padding:12px;">请求失败：HTTP ${status}</div>`;
        return;
      }
      if (res.code !== 200) {
        // 这里如果后端提示无权限/未登录
        $('list').innerHTML = `<div class="muted" style="padding:12px;">${escapeHtml(res.msg || '加载失败')}</div>`;
        return;
      }

      const rows = res.data?.list || [];
      renderList(rows);

      $('pagerInfo').textContent = `共 ${res.data?.total ?? rows.length} 条，当前页 ${res.data?.page ?? page}`;

      // 通过数据推断管理员：
      // 如果当前下拉可选“全部场地”且后端返回了多个不同 venue_id，基本就是管理员
      const venueIds = new Set(rows.map(r => String(r.venue_id)));
      if (venueIds.size > 1 || currentVenueId === '') {
        // 不能完全 100% 推断，但够用。更严谨你可以做 /me 接口返回 role_id。
        isAdmin = true;
      }
      applyAdminUI();
    });
  }

  function applyAdminUI() {
    // 非管理员：隐藏/禁用场地筛选，下拉表单也隐藏
    // （更严谨建议你做一个 /me 接口返回 role_id）
    if (!isAdmin) {
      $('venueField').style.display = 'none';
      $('adminVenueWrap').style.display = 'none';
    } else {
      $('venueField').style.display = 'flex';
      $('adminVenueWrap').style.display = 'block';
    }
  }

  // ====== CRUD ======
  function onAdd() {
    editingId = null;
    fillForm(null);
    openModal('新增账号');
  }

  function onEdit(id) {
    const url = `${API_BASE}?action=get&id=${encodeURIComponent(id)}${currentVenueId ? `&venue_id=${encodeURIComponent(currentVenueId)}` : ''}`;
    showLoading(true);
    getJson(url, (res) => {
      showLoading(false);
      if (res.code !== 200) return alert(res.msg || '加载失败');
      editingId = res.data.id;
      fillForm(res.data);
      openModal('编辑账号');
    });
  }

  function onDelete(id) {
    if (!confirm('确定要删除这条记录吗？')) return;
    postJson(`${API_BASE}?action=delete`, {id: parseInt(id,10)}, (res) => {
      if (res.code !== 200) return alert(res.msg || '删除失败');
      loadList();
    });
  }

  function onSave() {
    const payload = readForm();
    const err = requireFields(payload);
    if (err) { $('modalHint').textContent = err; return; }

    if (editingId) {
      payload.id = editingId;
      postJson(`${API_BASE}?action=update`, payload, (res) => {
        if (res.code !== 200) { $('modalHint').textContent = res.msg || '更新失败'; return; }
        closeModal();
        loadList();
      });
    } else {
      postJson(`${API_BASE}?action=create`, payload, (res) => {
        if (res.code !== 200) { $('modalHint').textContent = res.msg || '新增失败'; return; }
        closeModal();
        loadList();
      });
    }
  }

  // ====== 事件绑定 ======
  $('btnAdd').addEventListener('click', onAdd);
  $('btnSearch').addEventListener('click', () => { page = 1; loadList(); });
  $('btnReset').addEventListener('click', () => {
    $('kw').value = '';
    $('venue_id').value = '';
    currentVenueId = '';
    page = 1;
    loadList();
  });

  $('venue_id').addEventListener('change', () => {
    currentVenueId = $('venue_id').value;
    page = 1;
    loadList();
  });

  $('modalClose').addEventListener('click', closeModal);
  $('btnCancel').addEventListener('click', closeModal);
  $('btnSave').addEventListener('click', onSave);

// 禁止点击黑色遮罩关闭弹窗，避免误点导致已填写内容丢失
$('modal').addEventListener('click', (e) => {
  if (e.target === $('modal')) {
    e.preventDefault();
    e.stopPropagation();
  }
});
  // ====== 初始化 ======
  loadVenues();
  loadList();
});
</script>

</body>
</html>
