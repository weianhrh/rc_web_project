<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>主播认证测试版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 阿里云 H5 获取 MetaInfo -->
    <script type="text/javascript" src="https://o.alicdn.com/yd-cloudauth/cloudauth-cdn/jsvm_all.js"></script>

    <style>
        body {
            margin: 0;
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
            color: #333;
        }

        .wrap {
            max-width: 760px;
            margin: 40px auto;
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,.08);
        }

        h2 {
            margin: 0 0 24px;
            font-size: 22px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        .form-row label {
            width: 110px;
            color: #666;
            font-size: 15px;
        }

        .form-row input {
            flex: 1;
            height: 38px;
            border: 1px solid #d6dbe6;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 15px;
            outline: none;
        }

        .form-row input:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64,158,255,.12);
        }

        .form-row input:disabled {
            background: #f5f7fa;
            color: #606266;
            cursor: not-allowed;
        }

        .btn {
            height: 40px;
            padding: 0 22px;
            border: none;
            border-radius: 8px;
            background: #1677ff;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:disabled {
            background: #aab7c8;
            cursor: not-allowed;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .result {
            margin-top: 18px;
            padding: 14px;
            background: #f7f9fc;
            border-radius: 10px;
            word-break: break-all;
            line-height: 1.7;
            display: none;
        }

        .tip {
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .warn-box {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #c2410c;
            line-height: 1.7;
            font-weight: 600;
            text-align: left;
        }

        .debug-box {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            background: #111827;
            color: #d1d5db;
            font-size: 12px;
            line-height: 1.6;
            text-align: left;
            white-space: pre-wrap;
            max-height: 220px;
            overflow: auto;
            display: none;
        }

        .center {
            text-align: center;
        }

        .mobile-title {
            font-size: 22px;
            margin-bottom: 12px;
        }

        .mobile-desc {
            color: #666;
            line-height: 1.8;
            margin-bottom: 26px;
        }

        .test-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 3px 8px;
            border-radius: 999px;
            background: #fff7ed;
            color: #c2410c;
            font-size: 12px;
            vertical-align: middle;
        }

        @media (max-width: 600px) {
            .wrap {
                margin: 18px;
                padding: 22px;
            }

            .form-row {
                display: block;
            }

            .form-row label {
                display: block;
                width: auto;
                margin-bottom: 8px;
            }

            .form-row input {
                width: 100%;
                box-sizing: border-box;
            }

            .btn,
            .btn-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="wrap" id="adminBox" style="display:none;">
    <h2>主播认证资料录入 <span class="test-badge">测试版</span></h2>

    <div class="tip">
        测试版不会显示认证链接，也不会显示复制按钮。提交后只生成“开始实名认证”按钮，用于排查摄像头权限问题。
    </div>

    <div class="form-row">
        <label>姓名</label>
        <input id="real_name" placeholder="请输入真实姓名">
    </div>

    <div class="form-row">
        <label>身份证号</label>
        <input id="id_card_no" placeholder="请输入身份证号">
    </div>

    <div class="form-row">
        <label>开播账户ID</label>
        <input id="uid" placeholder="对应用户的UID">
    </div>

    <div class="center">
        <button class="btn" id="submitBtn" onclick="submitAuth()">提交并生成认证按钮</button>
    </div>

    <div class="result" id="resultBox"></div>
    <div class="debug-box" id="debugBox"></div>
</div>

<div class="wrap center" id="mobileBox" style="display:none;">
    <div class="mobile-title">主播实名认证 <span class="test-badge">测试版</span></div>
    <div class="mobile-desc">
        请使用主播本人手机完成认证。<br>
        认证准备完成后，点击开始认证，并允许浏览器使用摄像头。
    </div>

    <button class="btn" id="startBtn" onclick="startFaceAuth()">认证准备中...</button>

    <div class="result" id="mobileResult"></div>
    <div class="debug-box" id="debugBoxMobile"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');

let authFormLocked = false;
let preparedCertifyUrl = '';
let prepareStarted = false;

const TEST_SUBMIT_URL = '/api/admin/anchor_auth_submit_test.php';
const DEBUG_LOG_URL = TEST_SUBMIT_URL + '?action=front_log';
const WECHAT_BROWSER_TIP = '若微信APP内置浏览器无法跳转认证页面，请更换其它浏览器进行认证';

function isWeChatBrowser() {
    const ua = navigator.userAgent || '';
    return /MicroMessenger/i.test(ua);
}

function getWeChatTipHtml() {
    if (!isWeChatBrowser()) {
        return '';
    }

    return `
        <div class="warn-box">
            ${WECHAT_BROWSER_TIP}<br>
            请点击微信右上角“...”选择“在浏览器打开”，再进行实名认证。
        </div>
    `;
}

function getUrlHost(url) {
    try {
        return new URL(url).host;
    } catch (e) {
        return '';
    }
}

function browserDebugInfo() {
    return {
        href: location.href,
        referrer: document.referrer || '',
        has_token: !!token,
        ua: navigator.userAgent || '',
        platform: navigator.platform || '',
        language: navigator.language || '',
        is_wechat: isWeChatBrowser(),
        is_secure_context: !!window.isSecureContext,
        has_media_devices: !!navigator.mediaDevices,
        has_get_user_media: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia),
        has_get_meta_info: !!window.getMetaInfo,
        screen: {
            width: window.screen ? window.screen.width : 0,
            height: window.screen ? window.screen.height : 0
        }
    };
}

function appendDebugToPage(stage, data) {
    const box = document.getElementById(token ? 'debugBoxMobile' : 'debugBox');
    if (!box) return;

    box.style.display = 'block';
    box.textContent += '[' + new Date().toLocaleTimeString() + '] ' + stage + '\n'
        + JSON.stringify(data || {}, null, 2) + '\n\n';
}

function debugLog(stage, data = {}) {
    const payload = {
        stage: stage,
        data: data,
        browser: browserDebugInfo(),
        time: new Date().toISOString()
    };

    console.log('[anchor_auth_test_debug]', payload);
    appendDebugToPage(stage, data);

    try {
        fetch(DEBUG_LOG_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            keepalive: true
        }).catch(() => {});
    } catch (e) {}
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, function (ch) {
        return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[ch];
    });
}

debugLog('page_loaded');

// 页面初始化
if (token) {
    document.getElementById('mobileBox').style.display = 'block';

    const startBtn = document.getElementById('startBtn');
    const result = document.getElementById('mobileResult');

    if (isWeChatBrowser()) {
        debugLog('wechat_blocked');

        startBtn.disabled = true;
        startBtn.innerText = '请更换浏览器认证';

        result.style.display = 'block';
        result.innerHTML = getWeChatTipHtml();
    } else {
        prepareFaceAuth();
    }
} else {
    document.getElementById('adminBox').style.display = 'block';

    if (isWeChatBrowser()) {
        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'block';
        resultBox.innerHTML = getWeChatTipHtml();
    }

    checkVenueAuthStatus();
}

async function submitAuth() {
    const btn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');

    const data = {
        real_name: document.getElementById('real_name').value.trim(),
        phone: '',
        id_card_no: document.getElementById('id_card_no').value.trim(),
        uid: document.getElementById('uid').value.trim()
    };

    if (!data.real_name || !data.id_card_no || !data.uid) {
        alert('请把姓名、身份证号、开播账户ID都填完整');
        return;
    }

    debugLog('submit_click', {
        uid: data.uid,
        real_name_len: data.real_name.length,
        id_card_len: data.id_card_no.length
    });

    btn.disabled = true;
    btn.innerText = '提交中...';

    try {
        const res = await fetch(TEST_SUBMIT_URL + '?action=create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        const json = await res.json();

        debugLog('create_response', {
            code: json.code,
            msg: json.msg || '',
            has_auth_url: !!(json.data && json.data.auth_url),
            auth_host: json.data && json.data.auth_url ? getUrlHost(json.data.auth_url) : ''
        });

        if (json.code !== 0) {
            alert(json.msg || '提交失败');
            return;
        }

        const authUrl = json.data && json.data.auth_url ? json.data.auth_url : '';

        if (!authUrl) {
            alert('认证入口生成失败，请联系管理员');
            return;
        }

        resultBox.style.display = 'block';
        resultBox.innerHTML = `
            ${getWeChatTipHtml()}
            <b>测试认证入口已生成</b><br>
            不显示链接，不提供复制按钮。请让主播本人点击下面按钮完成实名认证。<br><br>
            <a class="btn btn-link" href="${escapeHtml(authUrl)}" onclick="debugLog('go_auth_click', {auth_host: getUrlHost('${escapeHtml(authUrl)}')})">开始实名认证</a>
        `;

    } catch (e) {
        debugLog('create_error', {
            message: e.message
        });
        alert('请求失败：' + e.message);
    } finally {
        if (!authFormLocked) {
            btn.disabled = false;
            btn.innerText = '提交并生成认证按钮';
        }
    }
}

async function prepareFaceAuth() {
    const btn = document.getElementById('startBtn');
    const result = document.getElementById('mobileResult');

    debugLog('prepare_enter', {
        has_token: !!token
    });

    if (!token) {
        result.style.display = 'block';
        result.innerText = '认证链接无效';
        return;
    }

    if (prepareStarted) {
        return;
    }

    prepareStarted = true;
    preparedCertifyUrl = '';

    btn.disabled = true;
    btn.innerText = '认证准备中...';

    result.style.display = 'block';
    result.innerText = '正在准备认证环境，请稍候...';

    debugLog('metainfo_check', {
        has_get_meta_info: !!window.getMetaInfo
    });

    if (!window.getMetaInfo) {
        result.innerText = '阿里云认证组件加载失败，请刷新页面或更换浏览器';
        btn.disabled = false;
        btn.innerText = '重新准备认证';
        prepareStarted = false;
        return;
    }

    try {
        const metaInfo = window.getMetaInfo();

        const metaText = typeof metaInfo === 'string'
            ? metaInfo
            : JSON.stringify(metaInfo || {});

        debugLog('metainfo_ok', {
            meta_type: typeof metaInfo,
            meta_len: metaText.length,
            meta_preview: metaText.slice(0, 120)
        });

        debugLog('init_fetch_start');

        const res = await fetch(TEST_SUBMIT_URL + '?action=init', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                token: token,
                meta_info: metaInfo
            })
        });

        const json = await res.json();

        debugLog('init_response', {
            code: json.code,
            msg: json.msg || '',
            has_certify_url: !!(json.data && json.data.certify_url),
            certify_host: json.data && json.data.certify_url ? getUrlHost(json.data.certify_url) : ''
        });

        if (json.code !== 0) {
            result.innerText = json.msg || '认证初始化失败';
            btn.disabled = false;
            btn.innerText = '重新准备认证';
            prepareStarted = false;
            return;
        }

        preparedCertifyUrl = json.data && json.data.certify_url ? json.data.certify_url : '';

        if (!preparedCertifyUrl) {
            result.innerText = '阿里云认证地址为空，请重新准备认证';
            btn.disabled = false;
            btn.innerText = '重新准备认证';
            prepareStarted = false;
            return;
        }

debugLog('prepare_success', {
    certify_host: getUrlHost(preparedCertifyUrl)
});

result.innerText = '认证准备完成，请点击“开始认证”，将在新页面打开阿里云认证页面。';

btn.outerHTML = `
    <a class="btn btn-link" id="startBtn" href="${escapeHtml(preparedCertifyUrl)}" target="_blank" rel="noopener">
        开始认证
    </a>
`;

const startLink = document.getElementById('startBtn');
if (startLink) {
    startLink.addEventListener('click', function () {
        debugLog('jump_certify_new_page', {
            certify_host: getUrlHost(preparedCertifyUrl)
        });
    });
}

    } catch (e) {
        debugLog('prepare_error', {
            message: e.message
        });

        result.innerText = '认证准备失败：' + e.message;
        btn.disabled = false;
        btn.innerText = '重新准备认证';
        prepareStarted = false;
    }
}

function startFaceAuth() {
    const btn = document.getElementById('startBtn');
    const result = document.getElementById('mobileResult');

    debugLog('start_click', {
        has_prepared_certify_url: !!preparedCertifyUrl,
        certify_host: preparedCertifyUrl ? getUrlHost(preparedCertifyUrl) : '',
        is_wechat: isWeChatBrowser()
    });

    if (isWeChatBrowser()) {
        result.style.display = 'block';
        result.innerHTML = getWeChatTipHtml();
        return;
    }

    if (!preparedCertifyUrl) {
        result.style.display = 'block';
        result.innerText = '认证地址还在准备中，请稍候再点。';

        if (!prepareStarted) {
            prepareFaceAuth();
        }

        return;
    }

    btn.disabled = true;
    btn.innerText = '正在跳转...';

    result.style.display = 'block';
    result.innerText = '正在跳转阿里云认证页面...';

debugLog('jump_certify_new_page_by_window_open', {
    certify_host: getUrlHost(preparedCertifyUrl)
});

const win = window.open(preparedCertifyUrl, '_blank', 'noopener');

if (!win) {
    result.innerHTML = `
        新页面被浏览器拦截，请点击下面按钮继续认证。<br><br>
        <a class="btn btn-link" href="${escapeHtml(preparedCertifyUrl)}" target="_blank" rel="noopener">
            打开认证页面
        </a>
    `;
}
}

function setInputValue(id, value) {
    const el = document.getElementById(id);
    if (el) {
        el.value = value == null ? '' : String(value);
    }
}

function lockInput(id) {
    const el = document.getElementById(id);
    if (el) {
        el.disabled = true;
        el.readOnly = true;
    }
}

function lockAuthedForm(record) {
    authFormLocked = true;

    const btn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');

    record = record || {};

    setInputValue('real_name', record.real_name || '');
    setInputValue('id_card_no', record.id_card_mask || '');
    setInputValue('uid', record.uid || '');

    lockInput('real_name');
    lockInput('id_card_no');
    lockInput('uid');

    btn.disabled = true;
    btn.innerText = '当前场地已认证';

    resultBox.style.display = 'block';
    resultBox.innerHTML = `
        ${getWeChatTipHtml()}
        <b>测试认证入口已生成</b><br>
        不显示链接，不提供复制按钮。请让主播本人点击下面按钮完成实名认证。<br><br>
        <a class="btn btn-link" id="goAuthLink" href="${escapeHtml(authUrl)}" target="_blank" rel="noopener">
            开始实名认证
        </a>
    `;
    
    const goAuthLink = document.getElementById('goAuthLink');
    if (goAuthLink) {
        goAuthLink.addEventListener('click', function () {
            debugLog('go_auth_new_page_click', {
                auth_host: getUrlHost(authUrl)
            });
        });
    }
}

async function checkVenueAuthStatus() {
    try {
        const res = await fetch('/api/admin/anchor_auth_check_venue.php', {
            method: 'GET',
            credentials: 'include'
        });

        const json = await res.json();

        debugLog('check_venue_auth_response', {
            code: json.code,
            msg: json.msg || '',
            can_auth: json.data ? json.data.can_auth : null
        });

        if (json.code === 1010 || (json.data && json.data.can_auth === false)) {
            const record = json.data && json.data.record ? json.data.record : {};
            lockAuthedForm(record);
        }
    } catch (e) {
        debugLog('check_venue_auth_error', {
            message: e.message
        });
        console.log('检查场地认证状态失败', e);
    }
}
</script>

</body>
</html>
