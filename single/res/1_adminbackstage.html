.metrics-grid {
    display: grid;
    gap: 16px;
}

.metrics-grid-top {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-bottom: 16px;
}

.metrics-grid-bottom {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
}
.metrics-grid-bottom.no-doll-revenue {
    grid-template-columns: repeat(2, minmax(0, 1fr));

 document.body.classList.remove('loading');

document.getElementById('dollRevenueToday').textContent = `¥${dollRevenue.toFixed(2)}`;

    const reportCount = Number(data.reportCount || 0);

    const appealCount = Number(data.appeal_count || 0);

// ✅ 异常用户数：role=2 也显示

<script>
let shippingAlertShown = false;
let shippingAlertTimer = null;
let lastPendingShippingCount = 0;

// localStorage 控制：1分钟最多弹一次（刷新页面也有效）
const SHIPPING_ALERT_STORAGE_KEY = 'pending_shipping_alert_last_time';
const SHIPPING_ALERT_COOLDOWN = 60 * 3000; // 1分钟

function closeShippingAlert() {
    const box = document.getElementById('shippingAlert');
    if (box) box.style.display = 'none';
    shippingAlertShown = false;

    if (shippingAlertTimer) {
        clearTimeout(shippingAlertTimer);
        shippingAlertTimer = null;
    }
}

function goToPendingShippingPage() {
    window.location.href = "pending-shipping.html";
}

function canShowShippingAlert() {
    const lastTime = Number(localStorage.getItem(SHIPPING_ALERT_STORAGE_KEY) || 0);
    return Date.now() - lastTime >= SHIPPING_ALERT_COOLDOWN;
}

function markShippingAlertShown() {
    localStorage.setItem(SHIPPING_ALERT_STORAGE_KEY, String(Date.now()));
}

function showShippingAlert(count) {
    const box = document.getElementById('shippingAlert');
    const msg = document.getElementById('shippingAlertMessage');
    if (!box || !msg) return;

    msg.textContent = `当前有 ${count} 条待发货记录，是否立即前往？`;
    box.style.display = 'block';
    shippingAlertShown = true;

    // 记录本次弹窗时间到 localStorage
    markShippingAlertShown();

    // 每次弹出时重新计时，30秒自动关闭
    if (shippingAlertTimer) clearTimeout(shippingAlertTimer);
    shippingAlertTimer = setTimeout(() => {
        closeShippingAlert();
    }, 30000);
}

function checkPendingShippingCount() {
    fetch('/api/dolls/getPendingShipmentCount.php', {
        credentials: 'include'
    })
    .then(res => res.json())
    .then(data => {
        if (data.code === 0) {
            const count = Number(data.result || 0);

            // 只要有待发货，并且当前没在显示，且满足 localStorage 的 1 分钟冷却，就弹
            if (count > 0 && !shippingAlertShown && canShowShippingAlert()) {
                showShippingAlert(count);
            }

            lastPendingShippingCount = count;
        }
    })
    .catch(err => {
        console.error('待发货数量检查失败:', err);
    });
}

// 首次检查
checkPendingShippingCount();

// 每30秒轮询一次
setInterval(checkPendingShippingCount, 30000);
</script>
