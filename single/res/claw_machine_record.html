<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改娃娃机记录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", system-ui; }
    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container { max-width: 720px; width: 100%; }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: var(--transition);
    }
    .card-title {
      font-size: 22px;
      color: var(--text-color);
      margin-bottom: 18px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      text-align: center;
    }
    .form-field { margin-bottom: 14px; }
    .form-field label {
      display: block;
      font-size: 14px;
      color: var(--secondary);
      margin-bottom: 6px;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      outline: none;
    }
    .form-field textarea { min-height: 110px; resize: vertical; }
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .row > .col { flex: 1; }
    .helper {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
      line-height: 1.4;
    }
    .preview {
      margin-top: 10px;
      border: 1px solid #eee;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    .preview img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      display: block;
    }
    .submit-btn {
      background-color: var(--primary);
      color: #fff;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
    }
    .submit-btn:hover { background-color: #4a77e4; }
    .btn {
      border: 1px solid var(--border-color);
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }
    .btn:hover { border-color: #c8d6ff; box-shadow: 0 4px 18px rgba(91,140,255,0.12); }
    .btn i { margin-right: 6px; color: var(--primary); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f2f6ff;
      color: #3b66d6;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .badge i { color: #3b66d6; }
    /* 一列信息展示 */
.info-list{
  background:#f2f6ff;
  border:1px solid #e2ebff;
  border-radius:12px;
  padding:12px 14px;
  margin-bottom:16px;
}
.info-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  line-height:1.4;
}
.info-label{
  color:#3b66d6;
  font-weight:600;
  white-space:nowrap;
}
.info-value{
  color:#1f2d4d;
  font-weight:600;
  word-break:break-all;
}

  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="card-title">修改娃娃机信息</div>

<div class="info-list">
  <div class="info-item">
    <span class="info-label">娃娃设备序列号：</span>
    <span class="info-value" id="sn_text">-</span>
  </div>
</div>


      <form id="edit-form">
        <!-- 隐藏字段 -->
        <input type="hidden" id="serial_number" name="serial_number" />

        <div class="form-field">
          <label for="product_name">品名</label>
          <input type="text" id="product_name" name="product_name" placeholder="例如：毛绒1" required />
        </div>

        <div class="form-field">
          <label for="billing_plan">资费套餐</label>
          <select id="billing_plan" name="billing_plan" required>
            <option value="1">套餐价格 1</option>
            <option value="2">套餐价格 2</option>
            <option value="3">套餐价格 3</option>
          </select>
          <div class="helper"></div>
        </div>

        <div class="form-field">
          <label>图片（保持原图：不改就别动）</label>

          <div class="row">
            <div class="col">
              <input type="text" id="product_image" name="product_image"
                     placeholder="输入图片URL（不改就保持原图）" />
              <div class="helper">如果你不想更新图片，保持这个输入框不变（默认会填原图）。</div>
            </div>
            <div class="col" style="max-width: 240px;">
              <input type="file" id="image_file" accept="image/*" style="display:none;" />
              <button type="button" id="btn_upload" class="btn">
                <i class="fas fa-upload"></i>上传并填入
              </button>
              <div class="helper">上传到 rcwulian.cn 后自动写入URL。</div>
            </div>
          </div>

          <div class="preview" id="img_preview_wrap">
            <img id="img_preview" src="" alt="预览" />
          </div>
        </div>

        <div class="form-field">
          <label for="product_introduction">介绍</label>
          <textarea id="product_introduction" name="product_introduction" placeholder="例如：玩法说明..."></textarea>
        </div>

        <button type="submit" class="submit-btn">保存修改</button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = '/api/devMgr/claw_machine_record.php';

    function qs(name) {
      const u = new URL(window.location.href);
      return u.searchParams.get(name) || '';
    }

    function setPreview(url) {
      const wrap = document.getElementById('img_preview_wrap');
      const img = document.getElementById('img_preview');
      const u = (url || '').trim();
      if (!u) {
        wrap.style.display = 'none';
        img.src = '';
        return;
      }
      img.src = u;
      wrap.style.display = '';
    }

    async function loadRecord(serialNumber) {
      const snText = document.getElementById('sn_text');
      snText.textContent = serialNumber;

      const res = await fetch(`${API_BASE}?serial_number=${encodeURIComponent(serialNumber)}`, {
        method: 'GET',
        credentials: 'include'
      });
      const result = await res.json();

      if (result.code !== 0) {
        alert('拉取失败：' + (result.msg || '未知错误'));
        return;
      }
      const r = result.data;
      if (!r) {
        alert('未找到该 serial_number 的记录');
        return;
      }

      document.getElementById('serial_number').value = r.serial_number || serialNumber;
      document.getElementById('product_name').value = r.product_name || '';
      document.getElementById('billing_plan').value = String(r.billing_plan ?? '1');
      document.getElementById('product_image').value = r.product_image || '';
      document.getElementById('product_introduction').value = r.product_introduction || '';

      setPreview(r.product_image || '');
    }

    async function uploadImageAndFill() {
      const fileInput = document.getElementById('image_file');
      fileInput.click();

      fileInput.onchange = async () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;

        const btn = document.getElementById('btn_upload');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>上传中...';

        try {
          const formData = new FormData();
          // 这里字段名按你上传接口需要的来改（常见是 file / image / avatar）
          formData.append('file', file);

          const response = await fetch('https://rcwulian.cn/app/img/userimg/upload_profile.php', {
            method: 'POST',
            body: formData
          });

          const result = await response.json();
          const url = (result && result.url) ? String(result.url).trim() : '';

          if (!url) {
            alert('上传失败：接口未返回 url');
            return;
          }

          document.getElementById('product_image').value = url;
          setPreview(url);
          alert('上传成功，已填入图片链接');
        } catch (e) {
          console.error(e);
          alert('上传失败，请重试');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-upload"></i>上传并填入';
          fileInput.value = '';
        }
      };
    }

    async function submitUpdate(e) {
      e.preventDefault();

      const submitBtn = document.querySelector('.submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      try {
        const serial_number = document.getElementById('serial_number').value.trim();
        const product_name = document.getElementById('product_name').value.trim();
        const billing_plan = document.getElementById('billing_plan').value;
        const product_image = document.getElementById('product_image').value.trim();
        const product_introduction = document.getElementById('product_introduction').value.trim();

        // 关键：如果你想“保持原图不变”，那就不要把空字符串传给后端
        // 这里策略：只有有值才带上（后端也只更新有值字段更安全）
        const payload = {
          action: 'update',
          serial_number,
          product_name,
          billing_plan,
          product_introduction
        };
        if (product_image) payload.product_image = product_image;

        const res = await fetch(API_BASE, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await res.json();
        if (result.code === 0) {
          alert('保存成功');
          history.back();
        } else {
          alert('保存失败：' + (result.msg || '未知错误'));
        }
      } catch (err) {
        console.error(err);
        alert('提交失败，请重试');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '保存修改';
      }
    }

    // init
    window.addEventListener('DOMContentLoaded', async () => {
      const sn = qs('serial_number');
      if (!sn) {
        alert('缺少 serial_number 参数');
        return;
      }
      await loadRecord(sn);

      document.getElementById('btn_upload').addEventListener('click', uploadImageAndFill);
      document.getElementById('product_image').addEventListener('input', (e) => setPreview(e.target.value));
      document.getElementById('edit-form').addEventListener('submit', submitUpdate);
    });
  </script>
</body>
</html>
