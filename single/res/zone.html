<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>专区管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --primary: #4f7cff;
      --primary-dark: #3867f0;
      --primary-soft: #eef3ff;
      --bg: #f5f7ff;
      --card-bg: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --line: #e5e7eb;
      --danger: #ef4444;
      --danger-soft: #fff1f2;
      --success: #16a34a;
      --success-soft: #ecfdf5;
      --warning: #f59e0b;
      --warning-soft: #fffbeb;
      --shadow: 0 16px 40px rgba(36, 72, 160, 0.10);
      --shadow-soft: 0 10px 24px rgba(36, 72, 160, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --transition: all .22s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(79,124,255,.16), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(22,163,74,.10), transparent 28%),
        linear-gradient(135deg, #f7f9ff 0%, #eef3ff 100%);
      padding: 22px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .page-shell {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .hero-card {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      backdrop-filter: blur(12px);
      margin-bottom: 16px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-title {
      font-size: 28px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .hero-desc {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      height: 38px;
      padding: 0 15px;
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 8px 18px rgba(79,124,255,.24);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 650;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(79,124,255,.28);
    }

    .btn:disabled {
      opacity: .65;
      cursor: not-allowed;
      transform: none;
    }

    .btn.secondary {
      background: #f3f4f6;
      color: #374151;
      box-shadow: none;
      border: 1px solid var(--line);
    }

    .btn.secondary:hover {
      background: #e5e7eb;
      box-shadow: none;
    }

    .btn.danger {
      background: linear-gradient(135deg, #ff5a5f, #ef4444);
      box-shadow: 0 8px 18px rgba(239,68,68,.20);
    }

    .btn.small {
      height: 34px;
      padding: 0 12px;
      border-radius: 10px;
      font-size: 13px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      text-align: left;
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.82);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-soft);
      padding: 16px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(79,124,255,.28);
      box-shadow: 0 16px 30px rgba(36, 72, 160, 0.12);
    }

    .stat-card.active {
      border-color: rgba(79,124,255,.58);
      background: linear-gradient(135deg, rgba(255,255,255,.98), rgba(238,243,255,.96));
      box-shadow: 0 18px 34px rgba(79,124,255,.18);
    }

    .stat-card.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 5px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
    }

    .stat-card.active .stat-label,
    .stat-card.active .stat-value {
      color: var(--primary-dark);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .content-card {
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(255,255,255,.82);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .section-title {
      font-size: 19px;
      font-weight: 800;
    }

    .section-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .filter-wrap {
      position: relative;
      width: min(360px, 100%);
    }

    .filter-input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      outline: none;
      padding: 0 12px;
      color: var(--text);
      transition: var(--transition);
    }

    .filter-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,124,255,.12);
    }

    .zone-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .zone-card {
      background: #fff;
      border: 1px solid #edf0f7;
      border-radius: var(--radius-md);
      box-shadow: 0 8px 20px rgba(17,24,39,.04);
      padding: 14px;
      display: grid;
      grid-template-columns: 152px 1fr auto;
      gap: 14px;
      transition: var(--transition);
      min-height: 152px;
    }

    .zone-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(17,24,39,.08);
      border-color: #dfe6ff;
    }

    .zone-cover {
      width: 152px;
      height: 124px;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, #eef3ff, #f8fafc);
      border: 1px solid #edf0f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #93a0b8;
      font-size: 13px;
      font-weight: 650;
    }

    .zone-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .zone-main {
      min-width: 0;
    }

    .zone-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .zone-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      word-break: break-word;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.show {
      color: #047857;
      background: var(--success-soft);
    }

    .pill.hide {
      color: #be123c;
      background: var(--danger-soft);
    }

    .pill.normal {
      color: #3150c8;
      background: var(--primary-soft);
    }

    .pill.claw {
      color: #b45309;
      background: var(--warning-soft);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      margin-top: 8px;
    }

    .meta-item {
      min-width: 0;
      background: #f8faff;
      border: 1px solid #eef2ff;
      border-radius: 12px;
      padding: 8px 10px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 750;
      color: var(--text);
      word-break: break-all;
    }

    .time-line {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .zone-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-width: 92px;
    }

    .empty-state,
    .loading {
      min-height: 160px;
      border: 1px dashed #d8def0;
      border-radius: var(--radius-md);
      background: #fbfcff;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      grid-column: 1 / -1;
      font-size: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      inset: 0;
      background: rgba(15, 23, 42, .56);
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-panel {
      width: min(620px, 96vw);
      max-height: min(86vh, 760px);
      overflow-y: auto;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
      border: 1px solid rgba(255,255,255,.9);
    }

    .modal-head {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(10px);
      z-index: 2;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 850;
      margin-bottom: 4px;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--muted);
    }

    .modal-close {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      background: #f3f4f6;
      color: #4b5563;
      transition: var(--transition);
      font-size: 18px;
    }

    .modal-close:hover {
      background: #e5e7eb;
    }

    .form-grid {
      padding: 18px 22px 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-item {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-item.full {
      grid-column: 1 / -1;
    }

    .form-label {
      font-size: 13px;
      color: #374151;
      font-weight: 750;
    }

    .form-control {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      transition: var(--transition);
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,124,255,.12);
    }

    .image-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .image-preview {
      margin-top: 2px;
      min-height: 120px;
      border: 1px dashed #d8def0;
      border-radius: 16px;
      background: #fbfcff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    .image-preview img {
      width: 100%;
      max-height: 210px;
      object-fit: cover;
      display: block;
    }

    .modal-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 6px;
    }

    .toast {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 2000;
      min-width: 220px;
      max-width: 360px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #111827;
      color: #fff;
      box-shadow: 0 16px 32px rgba(15,23,42,.26);
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      transition: var(--transition);
      font-size: 14px;
      line-height: 1.5;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #047857;
    }

    .toast.error {
      background: #be123c;
    }

    .confirm-panel {
      width: min(420px, 94vw);
      background: #fff;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
    }

    .confirm-title {
      font-size: 19px;
      font-weight: 850;
      margin-bottom: 8px;
    }

    .confirm-desc {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 1100px) {
      .zone-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .hero-card,
      .section-head {
        flex-direction: column;
        align-items: stretch;
      }

      .hero-actions {
        width: 100%;
      }

      .hero-actions .btn {
        flex: 1;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .zone-card {
        grid-template-columns: 1fr;
      }

      .zone-cover {
        width: 100%;
        height: 170px;
      }

      .zone-actions {
        flex-direction: row;
        min-width: 0;
      }

      .zone-actions .btn {
        flex: 1;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .image-row {
        grid-template-columns: 1fr;
      }

      .modal-actions,
      .confirm-actions {
        flex-direction: column;
      }

      .modal-actions .btn,
      .confirm-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page-shell">
    <section class="hero-card">
      <div>
        <div class="kicker">专区配置</div>
        <h1 class="hero-title">专区管理</h1>
        <div class="hero-desc">管理首页专区、展示状态、排序和专区封面图。</div>
      </div>
      <div class="hero-actions">
        <button class="btn" type="button" onclick="openAddModal()">＋ 添加专区</button>
      </div>
    </section>

    <section class="stats-grid">
      <button class="stat-card active" type="button" data-stat-filter="all" onclick="setStatsFilter('all')">
        <div class="stat-label">专区总数</div>
        <div class="stat-value" id="statTotal">0</div>
      </button>
      <button class="stat-card" type="button" data-stat-filter="visible" onclick="setStatsFilter('visible')">
        <div class="stat-label">显示中</div>
        <div class="stat-value" id="statVisible">0</div>
      </button>
      <button class="stat-card" type="button" data-stat-filter="hidden" onclick="setStatsFilter('hidden')">
        <div class="stat-label">隐藏中</div>
        <div class="stat-value" id="statHidden">0</div>
      </button>
      <button class="stat-card" type="button" data-stat-filter="claw" onclick="setStatsFilter('claw')">
        <div class="stat-label">娃娃机专区</div>
        <div class="stat-value" id="statClaw">0</div>
      </button>
    </section>

    <section class="content-card">
      <div class="section-head">
        <div>
          <div class="section-title">专区列表</div>
          <div class="section-subtitle" id="listFilterTip">当前显示：全部专区；支持按专区名称、ID、类型快速过滤。</div>
        </div>
        <div class="filter-wrap">
          <input class="filter-input" id="filterInput" type="text" placeholder="搜索专区名称 / ID / 类型" oninput="renderZones()" />
        </div>
      </div>

      <div id="zone-list" class="zone-grid">
        <div class="loading">加载中...</div>
      </div>
    </section>
  </div>

  <!-- 添加 / 编辑专区弹窗 -->
  <div class="modal" id="addModal" onclick="closeAddModal()">
    <div class="modal-panel" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modalTitle">添加专区</div>
          <div class="modal-desc">图片可以手动填写 URL，也可以直接上传后自动回填。</div>
        </div>
        <button class="modal-close" type="button" onclick="closeAddModal()">×</button>
      </div>

      <div class="form-grid">
        <input type="hidden" id="editZoneId" />

        <div class="form-item full">
          <label class="form-label" for="addName">专区名称</label>
          <input class="form-control" type="text" placeholder="例如：热门专区 / 娃娃机专区" id="addName" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addPartition">分区数量</label>
          <input class="form-control" type="number" placeholder="0" id="addPartition" min="0" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addVehicle">车辆数量</label>
          <input class="form-control" type="number" placeholder="0" id="addVehicle" min="0" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addSort">排序</label>
          <input class="form-control" type="number" placeholder="数值越小越靠前" id="addSort" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addVisible">显示状态</label>
          <select class="form-control" id="addVisible">
            <option value="1">显示专区</option>
            <option value="0">隐藏专区</option>
          </select>
        </div>

        <div class="form-item">
          <label class="form-label" for="addClawMachine">专区类型</label>
          <select class="form-control" id="addClawMachine">
            <option value="0">普通专区</option>
            <option value="1">娃娃机专区</option>
          </select>
        </div>

        <div class="form-item full">
          <label class="form-label" for="addImage">专区图片 URL</label>
          <div class="image-row">
            <input class="form-control" type="text" placeholder="图片 URL，上传后会自动回填" id="addImage" oninput="updateImagePreview()" />
            <button class="btn secondary" id="uploadImageBtn" type="button" onclick="chooseZoneImage()">上传图片</button>
          </div>
          <input type="file" id="zoneImageFile" accept="image/*" style="display:none" />
        </div>

        <div class="form-item full">
          <label class="form-label">图片预览</label>
          <div class="image-preview" id="imagePreview">暂无图片</div>
        </div>

        <div class="modal-actions">
          <button class="btn secondary" type="button" onclick="closeAddModal()">取消</button>
          <button class="btn" id="submitBtn" type="button" onclick="submitZone()">保存提交</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal" id="confirmModal" onclick="closeConfirm()">
    <div class="confirm-panel" onclick="event.stopPropagation()">
      <div class="confirm-title" id="confirmTitle">确认操作</div>
      <div class="confirm-desc" id="confirmDesc">确认继续？</div>
      <div class="confirm-actions">
        <button class="btn secondary" type="button" onclick="closeConfirm()">取消</button>
        <button class="btn danger" id="confirmOkBtn" type="button">确认删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ZONES_API = 'https://open.rcwulian.cn/api/venue/zones.php';
    const UPLOAD_API = 'https://rcwulian.cn/app/img/userimg/upload_profile.php';

    let mode = 'add';
    let zoneDataList = [];
    let activeStatsFilter = 'all';
    let confirmCallback = null;
    let toastTimer = null;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, function (m) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m];
      });
    }

    function normalizeUrl(url) {
      const value = String(url || '').trim();
      if (!value) return '';
      return value.replace(/^http:\/\//i, 'https://');
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = 'toast';
      }, 2200);
    }

    function setLoading(text = '处理中...') {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = text;
    }

    function clearLoading() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = '保存提交';
    }

    function openConfirm(title, desc, okText, callback) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmDesc').textContent = desc;
      document.getElementById('confirmOkBtn').textContent = okText || '确认';
      confirmCallback = callback;
      document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirm() {
      document.getElementById('confirmModal').style.display = 'none';
      confirmCallback = null;
    }

    document.getElementById('confirmOkBtn').addEventListener('click', function () {
      const callback = confirmCallback;
      closeConfirm();
      if (typeof callback === 'function') callback();
    });

    function renderImage(url) {
      const imgUrl = normalizeUrl(url);
      if (!imgUrl) return '<div>暂无图片</div>';
      return `<img src="${escapeHtml(imgUrl)}" alt="专区图" onerror="handleImageError(this)" />`;
    }

    function handleImageError(img) {
      const parent = img && img.parentElement;
      if (!parent) return;
      parent.innerHTML = '<div>图片加载失败</div>';
    }

    function updateStats(list) {
      const total = list.length;
      const visible = list.filter(z => Number(z.is_visible) === 1).length;
      const hidden = total - visible;
      const claw = list.filter(z => Number(z.is_claw_machine) === 1).length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statVisible').textContent = visible;
      document.getElementById('statHidden').textContent = hidden;
      document.getElementById('statClaw').textContent = claw;
    }

    function setStatsFilter(type) {
      activeStatsFilter = type || 'all';

      document.querySelectorAll('.stat-card').forEach(card => {
        card.classList.toggle('active', card.dataset.statFilter === activeStatsFilter);
      });

      renderZones();
    }

    function getStatsFilterText() {
      const map = {
        all: '全部专区',
        visible: '显示中的专区',
        hidden: '隐藏中的专区',
        claw: '娃娃机专区'
      };

      return map[activeStatsFilter] || map.all;
    }

    function applyStatsFilter(list) {
      if (activeStatsFilter === 'visible') {
        return list.filter(zone => Number(zone.is_visible) === 1);
      }

      if (activeStatsFilter === 'hidden') {
        return list.filter(zone => Number(zone.is_visible) !== 1);
      }

      if (activeStatsFilter === 'claw') {
        return list.filter(zone => Number(zone.is_claw_machine) === 1);
      }

      return list;
    }

    function openAddModal() {
      mode = 'add';
      document.getElementById('modalTitle').innerText = '添加专区';
      document.getElementById('editZoneId').value = '';
      document.getElementById('addName').value = '';
      document.getElementById('addPartition').value = '0';
      document.getElementById('addVehicle').value = '0';
      document.getElementById('addImage').value = '';
      document.getElementById('addSort').value = '0';
      document.getElementById('addVisible').value = '1';
      document.getElementById('addClawMachine').value = '0';
      updateImagePreview();
      document.getElementById('addModal').style.display = 'flex';
      setTimeout(() => document.getElementById('addName').focus(), 50);
    }

    function closeAddModal() {
      document.getElementById('addModal').style.display = 'none';
    }

    function editZone(id) {
      const zone = zoneDataList.find(z => Number(z.zone_id) === Number(id));
      if (!zone) {
        showToast('未找到该专区数据', 'error');
        return;
      }

      mode = 'edit';
      document.getElementById('modalTitle').innerText = '编辑专区';
      document.getElementById('editZoneId').value = zone.zone_id;
      document.getElementById('addName').value = zone.partition_name || '';
      document.getElementById('addPartition').value = zone.partition_count ?? 0;
      document.getElementById('addVehicle').value = zone.vehicle_count ?? 0;
      document.getElementById('addImage').value = normalizeUrl(zone.zone_image || '');
      document.getElementById('addSort').value = zone.sort_order ?? 0;
      document.getElementById('addVisible').value = String(zone.is_visible ?? 1);
      document.getElementById('addClawMachine').value = String(zone.is_claw_machine ?? 0);
      updateImagePreview();
      document.getElementById('addModal').style.display = 'flex';
    }

    function chooseZoneImage() {
      document.getElementById('zoneImageFile').click();
    }

    document.getElementById('zoneImageFile').addEventListener('change', async function () {
      const file = this.files && this.files[0];
      if (!file) return;

      const btn = document.getElementById('uploadImageBtn');
      btn.disabled = true;
      btn.textContent = '上传中...';

      try {
        const formData = new FormData();

        // 同时传 file 和 image，兼容你现在其他页面用过的 upload_profile.php。
        formData.append('file', file);
        formData.append('image', file);

        const response = await fetch(UPLOAD_API, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();
        const url = normalizeUrl(result && result.url ? result.url : '');

        if (!url) {
          throw new Error(result && result.msg ? result.msg : '接口未返回 url');
        }

        document.getElementById('addImage').value = url;
        updateImagePreview();
        showToast('上传成功，已回填图片链接', 'success');
      } catch (e) {
        console.error('专区图片上传失败：', e);
        showToast('上传失败：' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '上传图片';
        this.value = '';
      }
    });

    function updateImagePreview() {
      const url = normalizeUrl(document.getElementById('addImage').value);
      const preview = document.getElementById('imagePreview');

      if (!url) {
        preview.innerHTML = '暂无图片';
        return;
      }

      preview.innerHTML = `<img src="${escapeHtml(url)}" alt="图片预览" onerror="this.parentElement.innerHTML='图片加载失败，请检查 URL'" />`;
    }

    async function submitZone() {
      const name = document.getElementById('addName').value.trim();
      const count = document.getElementById('addPartition').value || '0';
      const vehicle = document.getElementById('addVehicle').value || '0';
      const image = normalizeUrl(document.getElementById('addImage').value);
      const sort = document.getElementById('addSort').value || '0';
      const zoneId = document.getElementById('editZoneId').value;
      const isVisible = document.getElementById('addVisible').value;
      const isClawMachine = document.getElementById('addClawMachine').value;

      if (!name) {
        showToast('请填写专区名称', 'error');
        return;
      }

      const params = new URLSearchParams({
        partition_name: name,
        partition_count: count,
        vehicle_count: vehicle,
        zone_image: image,
        sort_order: sort,
        is_visible: isVisible,
        is_claw_machine: isClawMachine
      });

      let url = `${ZONES_API}?action=add`;
      if (mode === 'edit') {
        url = `${ZONES_API}?action=edit`;
        params.append('zone_id', zoneId);
      }

      setLoading(mode === 'add' ? '添加中...' : '保存中...');

      try {
        const res = await fetch(url, {
          method: 'POST',
          body: params
        });

        const result = await res.json();

        if (result.code === 0) {
          closeAddModal();
          showToast(mode === 'add' ? '添加成功' : '更新成功', 'success');
          await loadZones();
        } else {
          showToast((mode === 'add' ? '添加' : '编辑') + '失败：' + (result.msg || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('请求失败：' + e.message, 'error');
      } finally {
        clearLoading();
      }
    }

    async function loadZones() {
      const container = document.getElementById('zone-list');
      container.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(ZONES_API);
        const data = await res.json();

        if (data.code !== 0) {
          container.innerHTML = `<div class="empty-state">加载失败：${escapeHtml(data.msg || '未知错误')}</div>`;
          updateStats([]);
          return;
        }

        zoneDataList = Array.isArray(data.data) ? data.data : [];
        renderZones();
      } catch (e) {
        container.innerHTML = `<div class="empty-state">请求失败：${escapeHtml(e.message)}</div>`;
        updateStats([]);
      }
    }

    function renderZones() {
      const container = document.getElementById('zone-list');
      const keyword = document.getElementById('filterInput').value.trim().toLowerCase();

      let list = zoneDataList.slice().sort((a, b) => {
        const sa = Number(a.sort_order ?? 0);
        const sb = Number(b.sort_order ?? 0);
        if (sa !== sb) return sa - sb;
        return Number(b.zone_id ?? 0) - Number(a.zone_id ?? 0);
      });

      list = applyStatsFilter(list);

      if (keyword) {
        list = list.filter(zone => {
          const typeText = Number(zone.is_claw_machine) === 1 ? '娃娃机专区 claw' : '普通专区 normal';
          const visibleText = Number(zone.is_visible) === 1 ? '显示 show' : '隐藏 hide';
          return [
            zone.zone_id,
            zone.partition_name,
            zone.partition_count,
            zone.vehicle_count,
            zone.sort_order,
            typeText,
            visibleText
          ].join(' ').toLowerCase().includes(keyword);
        });
      }

      updateStats(zoneDataList);

      const filterTip = document.getElementById('listFilterTip');
      if (filterTip) {
        const keywordText = keyword ? `，搜索关键字：${document.getElementById('filterInput').value.trim()}` : '';
        filterTip.textContent = `当前显示：${getStatsFilterText()}${keywordText}，共 ${list.length} 条。`;
      }

      if (!list.length) {
        container.innerHTML = '<div class="empty-state">没有找到匹配的专区</div>';
        return;
      }

      container.innerHTML = '';

      list.forEach(zone => {
        const visible = Number(zone.is_visible) === 1;
        const isClaw = Number(zone.is_claw_machine) === 1;
        const card = document.createElement('div');
        card.className = 'zone-card';

        card.innerHTML = `
          <div class="zone-cover">
            ${renderImage(zone.zone_image)}
          </div>

          <div class="zone-main">
            <div class="zone-name-row">
              <div class="zone-name">${escapeHtml(zone.partition_name || '未命名专区')}</div>
              <span class="pill ${visible ? 'show' : 'hide'}">${visible ? '显示中' : '已隐藏'}</span>
              <span class="pill ${isClaw ? 'claw' : 'normal'}">${isClaw ? '娃娃机专区' : '普通专区'}</span>
            </div>

            <div class="meta-grid">
              <div class="meta-item">
                <div class="meta-label">专区 ID</div>
                <div class="meta-value">${escapeHtml(zone.zone_id)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">排序</div>
                <div class="meta-value">${escapeHtml(zone.sort_order ?? 0)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">分区数</div>
                <div class="meta-value">${escapeHtml(zone.partition_count ?? 0)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">车辆数</div>
                <div class="meta-value">${escapeHtml(zone.vehicle_count ?? 0)}</div>
              </div>
            </div>

            <div class="time-line">
              创建：${escapeHtml(zone.created_at || '-')}<br />
              更新：${escapeHtml(zone.updated_at || '-')}
            </div>
          </div>

          <div class="zone-actions">
            <button class="btn small" type="button" onclick="location.href='zone_detail.html?zone_id=${Number(zone.zone_id)}'">详情</button>
            <button class="btn small secondary" type="button" onclick="editZone(${Number(zone.zone_id)})">修改</button>
            <button class="btn small danger" type="button" onclick="confirmDelete(${Number(zone.zone_id)})">删除</button>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function confirmDelete(id) {
      const zone = zoneDataList.find(z => Number(z.zone_id) === Number(id));
      const name = zone ? zone.partition_name : `ID ${id}`;

      openConfirm(
        '删除专区',
        `确定要删除「${name}」吗？删除后不可恢复。`,
        '确认删除',
        () => deleteZone(id)
      );
    }

    async function deleteZone(id) {
      const form = new URLSearchParams({ action: 'delete', zone_id: id });

      try {
        const res = await fetch(`${ZONES_API}?action=delete`, {
          method: 'POST',
          body: form
        });

        const result = await res.json();

        if (result.code === 0) {
          showToast('删除成功', 'success');
          await loadZones();
        } else {
          showToast('删除失败：' + (result.msg || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('请求失败：' + e.message, 'error');
      }
    }

    loadZones();
  </script>
</body>
</html>
