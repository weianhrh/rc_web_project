<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>主播实名认证管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #5b8cff;
            --primary-dark: #4a77e4;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-color: #333;
            --muted: #6b7280;
            --success: #18a058;
            --warning: #d48806;
            --danger: #ff4d4f;
            --danger-dark: #cf1322;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --transition: all 0.25s ease;
            --hover-bg: #f9fbff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .card-title {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 12px;
            font-weight: 700;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 12px;
            text-align: left;
        }

        .sub-title {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 14px;
            line-height: 1.7;
        }

        .tabs {
            display: inline-flex;
            padding: 4px;
            background: #eef2ff;
            border-radius: 999px;
            margin-bottom: 18px;
            gap: 4px;
        }

        .tab-btn {
            height: 34px;
            border-radius: 999px;
            padding: 0 18px;
            color: var(--primary);
            background: transparent;
            border: 0;
        }

        .tab-btn.active {
            color: #fff;
            background: var(--primary);
            box-shadow: 0 6px 14px rgba(91, 140, 255, 0.25);
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto auto;
            gap: 12px;
            align-items: end;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-item label {
            font-size: 13px;
            color: var(--muted);
        }

        input,
        select {
            height: 38px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 10px;
            outline: none;
            font-size: 14px;
            background: #fff;
            transition: var(--transition);
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.12);
        }

        input:disabled,
        select:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }

        button {
            height: 38px;
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            white-space: nowrap;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-ghost {
            background: #eef2ff;
            color: var(--primary);
        }

        .btn-ghost:hover {
            background: #e0e7ff;
        }

        .btn-warning {
            height: 30px;
            padding: 0 10px;
            font-size: 13px;
            background: #fff7e6;
            color: #ad6800;
            border: 1px solid #ffd591;
        }

        .btn-warning:hover {
            background: #ffe7ba;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 180px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            background: #fbfcff;
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            word-break: break-all;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            min-width: 860px;
        }

        thead {
            background: #f3f6ff;
        }

        th,
        td {
            padding: 13px 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            font-size: 14px;
            vertical-align: middle;
        }

        th {
            color: #374151;
            font-weight: 700;
        }

        tbody tr:hover {
            background: var(--hover-bg);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            color: #0f8a45;
            background: #e9f8ef;
        }

        .badge-muted {
            color: #6b7280;
            background: #f3f4f6;
        }

        .empty,
        .loading {
            padding: 36px 0;
            text-align: center;
            color: var(--muted);
        }

        .loading {
            color: var(--primary);
        }

        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .filter-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .filter-row {
                grid-template-columns: 1fr;
            }

            .tabs {
                display: flex;
                width: 100%;
            }

            .tab-btn {
                flex: 1;
                padding: 0 10px;
            }

            .card-title {
                font-size: 20px;
            }

            .pagination {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <div class="card">
        <div class="card-title">主播实名认证管理</div>
        <div class="sub-title" id="page_desc">
            默认展示当前仍绑定场地的主播实名认证记录；点击“解绑记录”可查看已经释放场地的旧认证信息。
        </div>

        <div class="tabs">
            <button type="button" id="tab_active" class="tab-btn active" onclick="switchTab('active')">当前认证</button>
            <button type="button" id="tab_unbound" class="tab-btn" onclick="switchTab('unbound')">解绑记录</button>
        </div>

        <div class="filter-row">
            <div class="form-item">
                <label for="venue_search" id="venue_search_label">场地搜索</label>
                <input id="venue_search" type="text" placeholder="输入场地ID或名称过滤下拉框">
            </div>

            <div class="form-item">
                <label for="venue_id" id="venue_select_label">场地下拉框</label>
                <select id="venue_id">
                    <option value="">全部场地</option>
                </select>
            </div>

            <div class="form-item">
                <label for="keyword">记录搜索</label>
                <input id="keyword" type="text" placeholder="搜索 uid / 场地ID / 场地名">
            </div>

            <button class="btn-primary" onclick="loadList(1)">查询</button>
            <button class="btn-ghost" onclick="resetFilter()">重置</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label" id="total_label">当前认证总数</div>
                <div class="stat-value" id="total_count">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">当前页</div>
                <div class="stat-value" id="page_info">1</div>
            </div>

            <div class="stat-card">
                <div class="stat-label" id="current_venue_label">当前筛选场地</div>
                <div class="stat-value" id="current_venue">全部场地</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="table-wrap">
            <table>
                <thead id="table_head"></thead>
                <tbody id="table_body">
                <tr>
                    <td colspan="6" class="loading">加载中...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="btn-ghost" id="prev_btn" onclick="changePage(-1)">上一页</button>
            <span id="pagination_text">第 1 / 1 页</span>
            <button class="btn-ghost" id="next_btn" onclick="changePage(1)">下一页</button>
        </div>
    </div>
</div>

<script>
    const VENUE_API = '/api/operat/EnergyGift.php';
    const LIST_API = '/api/admin/AnchorRealnameAuthList.php';

    let allVenues = [];
    let currentPage = 1;
    let totalPage = 1;
    let pageSize = 20;
    let isAdmin = 0;
    let loginVenueId = 0;
    let currentStatus = 'active';

    document.addEventListener('DOMContentLoaded', function () {
        bindEvents();
        renderTableHead();
        updateTabText();
        loadVenues();
    });

    function bindEvents() {
        document.getElementById('venue_search').addEventListener('input', function () {
            renderVenueOptions(this.value.trim());
        });

        document.getElementById('venue_id').addEventListener('change', function () {
            loadList(1);
        });

        document.getElementById('keyword').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                loadList(1);
            }
        });
    }

    function switchTab(status) {
        if (!['active', 'unbound'].includes(status)) {
            status = 'active';
        }

        if (currentStatus === status) {
            return;
        }

        currentStatus = status;
        currentPage = 1;
        updateTabText();
        renderTableHead();
        loadList(1);
    }

    function updateTabText() {
        document.getElementById('tab_active').classList.toggle('active', currentStatus === 'active');
        document.getElementById('tab_unbound').classList.toggle('active', currentStatus === 'unbound');

        document.getElementById('page_desc').textContent = currentStatus === 'active'
            ? '默认展示当前仍绑定场地的主播实名认证记录；点击“解绑”会释放 anchor_realname_auth.venue_id，并同步清空 users.streamer_venue，旧认证信息仍保留。'
            : '这里展示已经解绑的旧认证信息；场地ID取 old_venue_id，用来追溯该主播原来绑定过哪个场地。';

        document.getElementById('total_label').textContent = currentStatus === 'active' ? '当前认证总数' : '解绑记录总数';
        document.getElementById('current_venue_label').textContent = currentStatus === 'active' ? '当前筛选场地' : '当前筛选解绑前场地';
        document.getElementById('venue_select_label').textContent = currentStatus === 'active' ? '场地下拉框' : '解绑前场地下拉框';
        document.getElementById('venue_search_label').textContent = currentStatus === 'active' ? '场地搜索' : '解绑前场地搜索';
        document.getElementById('keyword').placeholder = currentStatus === 'active'
            ? '搜索 uid / 当前场地ID / 场地名'
            : '搜索 uid / 解绑前场地ID / 场地名';
    }

    function renderTableHead() {
        const thead = document.getElementById('table_head');

        if (currentStatus === 'unbound') {
            thead.innerHTML = `
                <tr>
                    <th>UID</th>
                    <th>解绑前场地ID</th>
                    <th>场地名称</th>
                    <th>阿里云 Passed</th>
                    <th>认证完成时间</th>
                    <th>解绑时间</th>
                    <th>解绑操作人</th>
                    <th>状态</th>
                </tr>
            `;
            return;
        }

        thead.innerHTML = `
            <tr>
                <th>UID</th>
                <th>场地ID</th>
                <th>场地名称</th>
                <th>阿里云 Passed</th>
                <th>认证完成时间</th>
                <th>操作</th>
            </tr>
        `;
    }

    function getColspan() {
        return currentStatus === 'unbound' ? 8 : 6;
    }

    function loadVenues() {
        fetch(VENUE_API, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: 'action=get_venues'
        })
            .then(res => res.json())
            .then(res => {
                if (res.code === 0 && Array.isArray(res.data)) {
                    allVenues = res.data;
                    renderVenueOptions('');
                }
            })
            .catch(err => {
                console.error('加载场地下拉失败：', err);
            })
            .finally(() => {
                loadList(1);
            });
    }

    function renderVenueOptions(searchText) {
        const venueSelect = document.getElementById('venue_id');
        const oldValue = venueSelect.value;

        venueSelect.innerHTML = '<option value="">全部场地</option>';

        const keyword = String(searchText || '').toLowerCase();

        allVenues
            .filter(venue => {
                const id = String(venue.id || '');
                const name = String(venue.venue_name || '');

                if (!keyword) return true;

                return id.includes(keyword) || name.toLowerCase().includes(keyword);
            })
            .forEach(venue => {
                const option = document.createElement('option');
                option.value = venue.id;
                option.textContent = `${venue.id} - ${venue.venue_name || '未命名场地'}`;
                venueSelect.appendChild(option);
            });

        if (oldValue) {
            venueSelect.value = oldValue;
        }
    }

    function loadList(page) {
        currentPage = page;

        const venueId = document.getElementById('venue_id').value;
        const keyword = document.getElementById('keyword').value.trim();

        const params = new URLSearchParams();
        params.append('action', 'list');
        params.append('status', currentStatus);
        params.append('page', currentPage);
        params.append('page_size', pageSize);
        params.append('venue_id', venueId);
        params.append('keyword', keyword);

        const tbody = document.getElementById('table_body');
        tbody.innerHTML = `<tr><td colspan="${getColspan()}" class="loading">加载中...</td></tr>`;

        fetch(`${LIST_API}?${params.toString()}`, {
            method: 'GET',
            credentials: 'include'
        })
            .then(res => res.json())
            .then(res => {
                if (res.code === 1001) {
                    alert(res.msg || '登录已过期');
                    location.href = 'login.html';
                    return;
                }

                if (res.code !== 0) {
                    tbody.innerHTML = `<tr><td colspan="${getColspan()}" class="empty">${escapeHtml(res.msg || '加载失败')}</td></tr>`;
                    return;
                }

                const data = res.data || {};

                isAdmin = Number(data.is_admin || 0);
                loginVenueId = Number(data.login_venue_id || 0);

                handlePermission();
                renderTable(data.list || []);

                totalPage = Number(data.total_page || 1);
                currentPage = Number(data.page || 1);

                document.getElementById('total_count').textContent = data.total || 0;
                document.getElementById('page_info').textContent = currentPage;
                document.getElementById('pagination_text').textContent = `第 ${currentPage} / ${totalPage} 页`;

                document.getElementById('prev_btn').disabled = currentPage <= 1;
                document.getElementById('next_btn').disabled = currentPage >= totalPage;

                updateCurrentVenueText();
            })
            .catch(err => {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="${getColspan()}" class="empty">请求失败，请检查接口路径</td></tr>`;
            });
    }

    function handlePermission() {
        const venueSelect = document.getElementById('venue_id');
        const venueSearch = document.getElementById('venue_search');

        if (!isAdmin && loginVenueId > 0) {
            venueSelect.value = String(loginVenueId);
            venueSelect.disabled = true;

            venueSearch.value = '';
            venueSearch.disabled = true;
            venueSearch.placeholder = '非管理员只能查看自己场地';
        }
    }

    function renderTable(list) {
        const tbody = document.getElementById('table_body');

        if (!list.length) {
            const text = currentStatus === 'active' ? '暂无当前认证记录' : '暂无解绑记录';
            tbody.innerHTML = `<tr><td colspan="${getColspan()}" class="empty">${text}</td></tr>`;
            return;
        }

        if (currentStatus === 'unbound') {
            tbody.innerHTML = list.map(item => {
                return `
                    <tr>
                        <td>${escapeHtml(item.uid)}</td>
                        <td>${escapeHtml(item.old_venue_id || '-')}</td>
                        <td>${escapeHtml(item.venue_name || '-')}</td>
                        <td><span class="badge badge-success">${escapeHtml(item.aliyun_passed || '-')}</span></td>
                        <td>${escapeHtml(item.certify_finished_at || '-')}</td>
                        <td>${escapeHtml(item.unbound_at || '-')}</td>
                        <td>${escapeHtml(item.unbound_by || '-')}</td>
                        <td><span class="badge badge-muted">已解绑</span></td>
                    </tr>
                `;
            }).join('');
            return;
        }

        tbody.innerHTML = list.map(item => {
            const recordId = Number(item.id || 0);

            let actionHtml = '-';

            if (isAdmin) {
                actionHtml = `
                    <button class="btn-warning" onclick="unbindAuthRecord(${recordId}, '${escapeJs(item.uid)}', '${escapeJs(item.venue_id)}')">
                        解绑
                    </button>
                `;
            }

            return `
                <tr>
                    <td>${escapeHtml(item.uid)}</td>
                    <td>${escapeHtml(item.venue_id)}</td>
                    <td>${escapeHtml(item.venue_name || '-')}</td>
                    <td><span class="badge badge-success">${escapeHtml(item.aliyun_passed || '-')}</span></td>
                    <td>${escapeHtml(item.certify_finished_at || '-')}</td>
                    <td>${actionHtml}</td>
                </tr>
            `;
        }).join('');
    }

    function unbindAuthRecord(id, uid, venueId) {
        if (!id) {
            alert('缺少记录ID');
            return;
        }

        const confirmText = `确定解绑这条主播认证吗？\n\nUID：${uid || '-'}\n当前场地ID：${venueId || '-'}\n\n解绑后不会删除旧认证信息，会释放 anchor_realname_auth.venue_id，并同步把该 uid 的 users.streamer_venue 置为 0，该场地可重新发起认证。`;

        if (!confirm(confirmText)) {
            return;
        }

        const params = new URLSearchParams();
        params.append('action', 'unbind');
        params.append('id', id);

        fetch(LIST_API, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params.toString()
        })
            .then(res => res.json())
            .then(res => {
                if (res.code === 1001) {
                    alert(res.msg || '登录已过期');
                    location.href = 'login.html';
                    return;
                }

                if (res.code !== 0) {
                    alert(res.msg || '解绑失败');
                    return;
                }

                alert('解绑成功，该场地现在可以重新认证');

                const total = Number(document.getElementById('total_count').textContent || 0);
                const nextPage = (total - 1 <= (currentPage - 1) * pageSize && currentPage > 1)
                    ? currentPage - 1
                    : currentPage;

                loadList(nextPage);
            })
            .catch(err => {
                console.error(err);
                alert('请求失败，请检查接口路径');
            });
    }

    function changePage(step) {
        const nextPage = currentPage + step;

        if (nextPage < 1 || nextPage > totalPage) {
            return;
        }

        loadList(nextPage);
    }

    function resetFilter() {
        document.getElementById('keyword').value = '';

        if (isAdmin) {
            document.getElementById('venue_search').value = '';
            document.getElementById('venue_id').value = '';
            renderVenueOptions('');
        }

        loadList(1);
    }

    function updateCurrentVenueText() {
        const venueSelect = document.getElementById('venue_id');
        const selectedText = venueSelect.options[venueSelect.selectedIndex]?.textContent || '全部场地';

        document.getElementById('current_venue').textContent = selectedText;
    }

    function escapeJs(value) {
        if (value === null || value === undefined) {
            return '';
        }

        return String(value)
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/\n/g, '\\n')
            .replace(/\r/g, '\\r');
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return '';
        }

        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
</script>
</body>
</html>
