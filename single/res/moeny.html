<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>财务对账</title>
  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
      --highlight-bg: #eff4ff;
      --danger: #ff6b6b;
      --success: #4caf50;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", system-ui; }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container { max-width: 1200px; width: 100%; }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition);
    }

    .card-title {
      font-size: 24px;
      color: var(--text-color);
      margin-bottom: 8px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar {
      display: none;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px;
      background: #f7f9ff;
      border: 1px solid #e4e9ff;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .toolbar .field {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 0;
      justify-content: flex-start;
    }

    select, input[type="number"], input[type="date"] {
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      outline: none;
      background: #fff;
      font-size: 14px;
      min-width: 220px;
    }

    input[type="date"] { min-width: 150px; }

    .filter-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--secondary);
      font-size: 14px;
      padding: 8px 2px;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-check input { margin: 0; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      background: #e9eefc;
      color: #2b3a55;
      white-space: nowrap;
    }

    .btn:hover { filter: brightness(0.98); }
    .btn.primary { background: var(--primary); color: #fff; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--secondary);
      font-size: 13px;
      padding: 2px 0 8px;
    }

    .revenue-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid var(--border-color);
      transition: var(--transition);
      background-color: #fff;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 10px;
      border: 1px solid #edf0f6;
    }

    .revenue-item:hover { background-color: var(--highlight-bg); }

    .field {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      align-items: center;
      margin-bottom: 4px;
      gap: 16px;
    }

    .label { color: var(--secondary); font-weight: 500; flex-shrink: 0; }
    .value { color: var(--text-color); font-size: 14px; font-weight: 400; text-align: right; word-break: break-all; }
    .total-revenue { font-weight: 700; color: var(--primary); }
    .venue-name { color: #2b62ff; font-weight: 600; }
    .checked { color: var(--success); font-weight: 600; }
    .unchecked { color: var(--danger); font-weight: 600; }

    .check-button {
      background-color: var(--primary);
      color: #fff;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .check-button:hover { background-color: #4a77e4; }
    .check-button:disabled { background-color: #d0d0d0; cursor: not-allowed; }

    .loading {
      text-align: center;
      font-size: 16px;
      color: var(--primary);
      padding: 20px;
    }

    .empty {
      text-align: center;
      color: var(--secondary);
      padding: 24px 10px;
      background: #fff;
      border-radius: 10px;
      border: 1px dashed #dce4ff;
    }

    .pager {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0 2px;
    }

    .pager-info {
      color: var(--secondary);
      font-size: 13px;
      margin: 0 4px;
    }

    .page-input {
      width: 72px;
      min-width: 72px;
      text-align: center;
    }

    .custom-alert {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 18px 22px;
      border-radius: 8px;
      z-index: 999;
      display: none;
      font-size: 15px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .card { padding: 14px; }
      .card-title { font-size: 21px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar .field { width: 100%; }
      select, input[type="date"] { min-width: 0; width: 100%; }
      .filter-check { width: 100%; padding: 6px 0; }
      .field { font-size: 13px; align-items: flex-start; }
      .value { font-size: 13px; }
      .total-revenue { font-size: 16px; }
      .pager { justify-content: stretch; }
      .pager .btn { flex: 1; padding-left: 8px; padding-right: 8px; }
      .pager-info { width: 100%; text-align: center; margin: 4px 0; }
      .page-input { flex: 1; min-width: 90px; }
    }
  </style>
</head>

<body>
  <div class="container" id="pageRoot">
    <div class="card">
      <div class="card-title">
        <span>财务对账</span>
      </div>

      <!-- role_id == 1/2 才显示 -->
      <div class="toolbar" id="adminToolbar">
        <div class="field">
          <span class="label">场地筛选：</span>
          <select id="venue_id">
            <option value="">全部场地</option>
          </select>
        </div>
        <div class="field">
          <span class="label">开始日期：</span>
          <input type="date" id="start_date" />
        </div>
        <div class="field">
          <span class="label">结束日期：</span>
          <input type="date" id="end_date" />
        </div>
        <label class="filter-check" title="勾选后不展示总收入为 0 的记录">
          <input type="checkbox" id="hide_zero" />
          <span>隐藏0收入</span>
        </label>
        <button class="btn primary" id="btnSearch">查询</button>
        <button class="btn" id="btnResetFilter">重置</button>
      </div>

      <div class="summary">
        <span id="summaryText">正在加载...</span>
        <span id="roleText"></span>
      </div>

      <div id="revenue-details"></div>
      <div id="loading" class="loading" style="display:none;">正在加载...</div>

      <div class="pager" id="pager">
        <button class="btn" id="btnFirst">首页</button>
        <button class="btn" id="btnPrev">上一页</button>
        <span class="pager-info" id="pageInfo">第 1 / 1 页</span>
        <button class="btn" id="btnNext">下一页</button>
        <button class="btn" id="btnLast">尾页</button>
        <input class="page-input" type="number" id="jumpPage" min="1" placeholder="页码" />
        <button class="btn primary" id="btnJump">跳转</button>
      </div>
    </div>
  </div>

  <div id="custom-alert" class="custom-alert">核对成功！</div>

<script>
(function () {
  // ✅ 防止后台 iframe / 手机 WebView 重复初始化
  const pageRoot = document.getElementById('pageRoot');
  if (pageRoot && pageRoot.dataset.inited === '1') return;
  if (pageRoot) pageRoot.dataset.inited = '1';

  const API_URL = '/api/pay/GetDailyVenueRevenue.php';
  const CHECK_URL = '/api/pay/CheckDailyVenueRevenue.php';
  const VENUE_API = '/api/operat/EnergyGift.php'; // action=get_venues

  const state = {
    page: 1,
    limit: 31,
    total: 0,
    totalPages: 1,
    roleId: 0,
    isAdmin: false,
    venueId: '',
    startDate: '',
    endDate: '',
    hideZero: false,
    loading: false,
    reqSeq: 0,
    venuesLoaded: false
  };

  const venueMap = {};
  const $ = (id) => document.getElementById(id);

  const revenueDetails = $('revenue-details');
  const loadingEl = $('loading');
  const adminToolbar = $('adminToolbar');
  const venueSelect = $('venue_id');
  const startDateInput = $('start_date');
  const endDateInput = $('end_date');
  const hideZeroInput = $('hide_zero');

  function escapeHtml(s) {
    return String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function xhrGetJson(url, cb) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.withCredentials = true;
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        try {
          cb(JSON.parse(xhr.responseText || '{}'), xhr.status);
        } catch (e) {
          cb({ code: -1, msg: '响应解析失败' }, xhr.status);
        }
      }
    };
    xhr.onerror = function () {
      cb({ code: -1, msg: '网络请求失败' }, 0);
    };
    xhr.send(null);
    return xhr;
  }

  function xhrPostFormJson(url, body, cb) {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.withCredentials = true;
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded; charset=UTF-8');
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        try {
          cb(JSON.parse(xhr.responseText || '{}'), xhr.status);
        } catch (e) {
          cb({ code: -1, msg: '响应解析失败' }, xhr.status);
        }
      }
    };
    xhr.onerror = function () {
      cb({ code: -1, msg: '网络请求失败' }, 0);
    };
    xhr.send(body);
    return xhr;
  }

  function showLoading(show) {
    loadingEl.style.display = show ? 'block' : 'none';
  }

  function buildListUrl(page) {
    const params = new URLSearchParams();
    params.set('page', page);
    params.set('limit', state.limit);

    // ✅ 只有 role_id=1/2 才传这些筛选条件；普通场地账号由后端强制限制自己的 venue_id
    if (state.isAdmin) {
      if (state.venueId) params.set('venue_id', state.venueId);
      if (state.startDate) params.set('start_date', state.startDate);
      if (state.endDate) params.set('end_date', state.endDate);
      if (state.hideZero) params.set('hide_zero', '1');
    }

    return `${API_URL}?${params.toString()}`;
  }

  function applyRoleUI() {
    const roleId = Number(state.roleId);
    state.isAdmin = roleId === 1 || roleId === 2;
    adminToolbar.style.display = state.isAdmin ? 'flex' : 'none';

    const roleNameMap = { 1: '管理员', 2: '运营', 3: '加盟商' };
    $('roleText').textContent = roleNameMap[roleId] || '';

    if (state.isAdmin && !state.venuesLoaded) {
      loadVenues();
    }
  }

  function loadVenues() {
    state.venuesLoaded = true;
    venueSelect.innerHTML = '<option value="">全部场地</option>';

    xhrPostFormJson(VENUE_API, 'action=get_venues', function (res, status) {
      if (status !== 200 || res.code !== 0 || !Array.isArray(res.data)) {
        return;
      }

      res.data.forEach(venue => {
        const id = String(venue.id ?? '');
        const name = String(venue.venue_name ?? '');
        if (!id) return;

        venueMap[id] = name;

        const option = document.createElement('option');
        option.value = id;
        option.textContent = `${id} - ${name}`;
        venueSelect.appendChild(option);
      });
    });
  }

  function renderRows(rows) {
    revenueDetails.innerHTML = '';

    if (!Array.isArray(rows) || rows.length === 0) {
      revenueDetails.innerHTML = '<div class="empty">暂无数据</div>';
      return;
    }

    rows.forEach(revenue => {
      const venueId = String(revenue.venue_id ?? '');
      const venueName = revenue.venue_name || venueMap[venueId] || '';
      const venueText = venueName ? `${venueId} - ${venueName}` : `场地ID：${venueId || '-'}`;
      const isChecked = Number(revenue.is_checked) === 1;
      const showVenueLine = state.isAdmin;
    
      const venueLineHtml = showVenueLine ? `
        <div class="field">
          <div class="label">场地:</div>
          <div class="value venue-name">${escapeHtml(venueText)}</div>
        </div>
      ` : '';
      const item = document.createElement('div');
      item.className = 'revenue-item';
      item.innerHTML = `
        ${venueLineHtml}
        <div class="field">
          <div class="label">日期:</div>
          <div class="value">${escapeHtml(revenue.date || '')}</div>
        </div>
        <div class="field">
          <div class="label">总收入:</div>
          <div class="value total-revenue">${escapeHtml(revenue.total_revenue || '0.00')} 元</div>
        </div>
        <div class="field">
          <div class="label">创建时间:</div>
          <div class="value">${escapeHtml(revenue.created_at || '')}</div>
        </div>
        <div class="field">
          <div class="label">更新时间:</div>
          <div class="value">${escapeHtml(revenue.updated_at || '')}</div>
        </div>
        <div class="field">
          <div class="label">核对状态:</div>
          <div class="value">
            ${isChecked
              ? '<span class="checked">已核对</span>'
              : `<button class="check-button" data-id="${escapeHtml(revenue.id)}">核对</button>`}
          </div>
        </div>
      `;

      revenueDetails.appendChild(item);
    });
  }

  function renderPager() {
    const totalPages = Math.max(1, Number(state.totalPages || 1));
    const page = Math.max(1, Number(state.page || 1));

    $('summaryText').textContent = `共 ${state.total} 条，每页 ${state.limit} 条`;
    $('pageInfo').textContent = `第 ${page} / ${totalPages} 页`;
    $('jumpPage').max = totalPages;
    $('jumpPage').value = page;

    $('btnFirst').disabled = page <= 1 || state.loading;
    $('btnPrev').disabled = page <= 1 || state.loading;
    $('btnNext').disabled = page >= totalPages || state.loading;
    $('btnLast').disabled = page >= totalPages || state.loading;
    $('btnJump').disabled = state.loading;
  }

  function loadRevenueData(page) {
    if (state.loading) return;

    state.loading = true;
    state.reqSeq += 1;
    const reqSeq = state.reqSeq;

    showLoading(true);
    renderPager();

    xhrGetJson(buildListUrl(page), function (res, status) {
      if (reqSeq !== state.reqSeq) return;

      state.loading = false;
      showLoading(false);

      if (status !== 200) {
        revenueDetails.innerHTML = `<div class="empty">请求失败：HTTP ${status}</div>`;
        renderPager();
        return;
      }

      if (res.code !== 0) {
        revenueDetails.innerHTML = `<div class="empty">${escapeHtml(res.msg || '加载失败')}</div>`;
        renderPager();
        return;
      }

      state.roleId = Number(res.role_id || 0);
      state.page = Number(res.page || page || 1);
      state.limit = Number(res.limit || state.limit || 31);
      state.total = Number(res.count || 0);
      state.totalPages = Number(res.total_pages || 1);

      applyRoleUI();
      renderRows(res.data || []);
      renderPager();
    });
  }

  function showToast(msg) {
    const alertEl = $('custom-alert');
    alertEl.textContent = msg || '操作成功';
    alertEl.style.display = 'block';
    setTimeout(() => {
      alertEl.style.display = 'none';
    }, 1800);
  }

  function checkRevenue(id, button) {
    if (!id || !button) return;
    button.disabled = true;
    button.textContent = '处理中...';

    const body = `id=${encodeURIComponent(id)}`;
    xhrPostFormJson(CHECK_URL, body, function (res, status) {
      if (status === 200 && res.code === 0) {
        showToast('核对成功！');
        loadRevenueData(state.page);
        return;
      }

      button.disabled = false;
      button.textContent = '核对';

      if (res.code === 1002) {
        alert(res.msg || '需要先绑定提现账号才可以核对');
      } else {
        alert(res.msg || '核对失败，请稍后再试');
      }
    });
  }

  // 事件代理：核对按钮
  revenueDetails.addEventListener('click', function (e) {
    const btn = e.target.closest('.check-button');
    if (!btn) return;
    checkRevenue(btn.dataset.id, btn);
  });

  function syncFilterState() {
    state.venueId = venueSelect.value || '';
    state.startDate = startDateInput.value || '';
    state.endDate = endDateInput.value || '';
    state.hideZero = !!hideZeroInput.checked;
  }

  function reloadWithFilters() {
    syncFilterState();
    loadRevenueData(1);
  }

  venueSelect.addEventListener('change', reloadWithFilters);
  hideZeroInput.addEventListener('change', reloadWithFilters);

  $('btnSearch').addEventListener('click', reloadWithFilters);

  $('btnResetFilter').addEventListener('click', function () {
    venueSelect.value = '';
    startDateInput.value = '';
    endDateInput.value = '';
    hideZeroInput.checked = false;
    syncFilterState();
    loadRevenueData(1);
  });

  [startDateInput, endDateInput].forEach(function (input) {
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') reloadWithFilters();
    });
  });

  $('btnFirst').addEventListener('click', function () {
    if (state.page > 1) loadRevenueData(1);
  });

  $('btnPrev').addEventListener('click', function () {
    if (state.page > 1) loadRevenueData(state.page - 1);
  });

  $('btnNext').addEventListener('click', function () {
    if (state.page < state.totalPages) loadRevenueData(state.page + 1);
  });

  $('btnLast').addEventListener('click', function () {
    if (state.page < state.totalPages) loadRevenueData(state.totalPages);
  });

  $('btnJump').addEventListener('click', function () {
    let p = parseInt($('jumpPage').value, 10);
    if (!Number.isFinite(p) || p < 1) p = 1;
    if (p > state.totalPages) p = state.totalPages;
    loadRevenueData(p);
  });

  $('jumpPage').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') $('btnJump').click();
  });

  // 初始化：不再用手机下滑无限加载，改成明确分页
  loadRevenueData(1);
})();
</script>
</body>
</html>
