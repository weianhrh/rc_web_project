<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>邀请码排行</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
      --transition: all 0.3s ease;
      --hover-bg: #f9f9f9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", system-ui;
    }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .card-title {
      font-size: 24px;
      color: var(--text-color);
      margin-bottom: 18px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      text-align: left;
    }

    /* 搜索条 */
    .toolbar {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .form-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 260px;
      max-width: 100%;
    }

    .form-label {
      font-size: 13px;
      color: var(--secondary);
    }

    .form-input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 6px;
      transition: border-color 0.3s;
      height: 36px;
      background: #fff;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.12);
    }

    .btn {
      background-color: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn:hover { background-color: #4a77e4; }

    .btn-ghost{
      background:#eef3ff;
      color:var(--primary);
      border:1px solid rgba(91,140,255,.25);
    }
    .btn-ghost:hover{ background:#e6eeff; }

    /* 卡片列表 */
    .venue-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      transition: var(--transition);
    }
    .venue-card:hover { background-color: var(--hover-bg); }

    .venue-img {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(91,140,255,.15), rgba(91,140,255,.05));
      display:flex;
      align-items:center;
      justify-content:center;
      color: var(--primary);
      font-size: 34px;
      flex-shrink: 0;
    }

    .venue-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      color: var(--text-color);
      min-width: 0;
    }

    .venue-info .venue-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .badge {
      display:inline-flex;
      align-items:center;
      padding:2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(91,140,255,.10);
      color: var(--primary);
      border: 1px solid rgba(91,140,255,.20);
    }

    .venue-actions {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 15px;
      gap: 8px;
      min-width: 160px;
    }

    .edit-btn {
      background-color: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: var(--transition);
      height: 36px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
    }
    .edit-btn:hover { background-color: #4a77e4; }

    .loading {
      text-align: center;
      font-size: 16px;
      color: var(--primary);
      padding: 20px;
    }

    /* 分页 */
    .pagination {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .pagination button {
      background-color: var(--primary);
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .pagination button:disabled { opacity: .45; cursor: not-allowed; }
    #page-info { color: var(--secondary); font-size: 14px; }

    @media (max-width: 768px){
      .venue-card{flex-direction: column;}
      .venue-actions{padding-left:0; min-width: 0;}
      .venue-img{width:100%; height:70px; font-size:28px;}
      .toolbar{flex-direction: column; align-items: stretch;}
      .form-item{width:100%;}
      .btn{width:100%; justify-content:center;}
      .card-title{font-size:20px;}
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="card-title">邀请码排行</div>

      <!-- 搜索区 -->
      <div class="toolbar">
        <div class="form-item">
          <label class="form-label">邀请码搜索</label>
          <input id="kw" class="form-input" type="text" placeholder="输入邀请码（支持模糊）" />
        </div>

        <button id="searchBtn" class="btn" type="button">
          <i class="fas fa-search"></i> 搜索
        </button>

        <button id="resetBtn" class="btn btn-ghost" type="button">
          <i class="fas fa-undo"></i> 重置
        </button>
      </div>

      <!-- 列表 -->
      <div id="rank-list"></div>
      <div id="loading" class="loading" style="display:none;">正在加载...</div>

      <!-- 分页 -->
      <div class="pagination">
        <button id="prev-page" disabled>上一页</button>
        <span id="page-info">第 1 页，共 1 页</span>
        <button id="next-page" disabled>下一页</button>
      </div>
    </div>
  </div>

  <script>
    const API = "/api/operat/invitationRank.php";

    const listEl = document.getElementById("rank-list");
    const loadingEl = document.getElementById("loading");
    const pageInfoEl = document.getElementById("page-info");
    const prevBtn = document.getElementById("prev-page");
    const nextBtn = document.getElementById("next-page");

    const kwEl = document.getElementById("kw");
    const searchBtn = document.getElementById("searchBtn");
    const resetBtn = document.getElementById("resetBtn");

    let currentPage = 1;
    let totalPages = 1;
    let lastParams = {};

    function buildQuery(params){
      return Object.entries(params)
        .filter(([_, v]) => v !== undefined && v !== null && String(v).trim() !== "")
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join("&");
    }

    async function loadData(params = {}) {
      lastParams = params;

      const p = { ...params };
      p.page = currentPage;
      p.limit = 20;

      const url = `${API}?${buildQuery(p)}`;

      loadingEl.style.display = "block";
      listEl.innerHTML = "";

      try {
        const r = await fetch(url, { credentials: "include" });
        const d = await r.json();

        loadingEl.style.display = "none";

        if (d.code !== 0) {
          listEl.innerHTML = `<div class="loading">加载失败：${d.msg || "未知错误"}</div>`;
          return;
        }

        const count = Number(d.count || 0);
        totalPages = Math.max(1, Math.ceil(count / p.limit));
        pageInfoEl.textContent = `第 ${currentPage} 页，共 ${totalPages} 页（共 ${count} 个邀请码）`;

        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        const rows = d.data || [];
        if (rows.length === 0) {
          listEl.innerHTML = `<div class="loading">暂无数据</div>`;
          return;
        }

        rows.forEach((row, idx) => {
          const rankNo = (currentPage - 1) * p.limit + idx + 1;
          const code = row.invitation_code || "-";
          const userCount = row.user_count || 0;

          const html = `
            <div class="venue-card">
              <div class="venue-img" title="排行">
                <i class="fas fa-trophy"></i>
              </div>

              <div class="venue-info">
                <div class="venue-name">
                  #${rankNo} 邀请码：${code}
                  <span class="badge">${userCount} 人</span>
                </div>
                <span style="color:var(--secondary);">点击“查看该邀请码用户”可跳转筛选</span>
              </div>

              <div class="venue-actions">
                <button class="edit-btn" type="button" onclick="copyCode('${code}')">
                  <i class="fas fa-copy"></i> 复制邀请码
                </button>
                <button class="edit-btn" type="button" style="background:var(--secondary);" onclick="searchUsersByCode('${code}')">
                  <i class="fas fa-users"></i> 查看该邀请码用户
                </button>
              </div>
            </div>
          `;
          listEl.insertAdjacentHTML("beforeend", html);
        });

      } catch (e) {
        loadingEl.style.display = "none";
        listEl.innerHTML = `<div class="loading">请求异常，请稍后再试</div>`;
        console.error(e);
      }
    }

    // 复制邀请码
    async function copyCode(code){
      try{
        await navigator.clipboard.writeText(code);
        alert("已复制：" + code);
      }catch(e){
        const t = document.createElement("textarea");
        t.value = code;
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);
        alert("已复制：" + code);
      }
    }

    // 跳转到用户页并带邀请码搜索
    function searchUsersByCode(code){
      window.location.href = `Balancerecharge.html?invitation_code=${encodeURIComponent(code)}`;
    }

    // 搜索
    searchBtn.addEventListener("click", () => {
      currentPage = 1;
      loadData({ invitation_code: kwEl.value.trim() });
    });

    // 重置
    resetBtn.addEventListener("click", () => {
      kwEl.value = "";
      currentPage = 1;
      loadData({});
    });

    // 分页
    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        loadData(lastParams);
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < totalPages) {
        currentPage++;
        loadData(lastParams);
      }
    });

    // 初始加载
    loadData({});
  </script>
</body>
</html>
