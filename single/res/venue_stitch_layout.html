<!DOCTYPE html>
<!-- venue.html -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>场地信息管理</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>

    :root{
      --primary:#0060a9;
      --primary-2:#409eff;
      --secondary:#286c00;
      --error:#ba1a1a;
      --surface:#f8f9fe;
      --surface-card:rgba(255,255,255,.74);
      --surface-soft:#f3f6fb;
      --surface-blue:#eef5ff;
      --text:#191c1f;
      --muted:#667085;
      --border:#d9e1ee;
      --border-soft:rgba(192,199,212,.55);
      --shadow:0 20px 48px rgba(15,23,42,.06);
      --radius-xl:24px;
      --radius-lg:18px;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Plus Jakarta Sans","PingFang SC",system-ui,-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;}
    body{
      min-height:100vh;
      padding:24px;
      color:var(--text);
      background:
        radial-gradient(circle at 0 0, #e9f5ff 0, rgba(233,245,255,0) 36%),
        linear-gradient(180deg,#f7f9ff 0%,#f3f6fb 100%);
    }
    .container{max-width:1220px;margin:0 auto;}
    .page-hero{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      margin-bottom:20px;padding:0 4px;
    }
    .page-title{font-size:24px;line-height:1.3;font-weight:800;color:var(--primary);letter-spacing:-.01em;}
    .page-subtitle{font-size:13px;color:var(--muted);margin-top:4px;}
    .venue-dashboard{display:block;}
    .venue-top-grid{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(360px,.75fr);gap:22px;margin-bottom:22px;}
    .settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;align-items:stretch;}
    .glass-pane,.card{
      background:var(--surface-card);
      border:1px solid rgba(255,255,255,.7);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .card{padding:24px;margin-bottom:0;}
    .panel{padding:24px;}
    .panel-title{
      display:flex;align-items:center;gap:10px;
      font-size:18px;font-weight:800;color:var(--text);margin-bottom:20px;
    }
    .panel-title i{color:var(--primary);font-size:18px;width:22px;text-align:center;}
    .venue-image-panel{display:flex;flex-direction:column;gap:14px;}
    .cover-box{
      position:relative;aspect-ratio:16/9;overflow:hidden;border-radius:16px;
      border:2px dashed rgba(64,158,255,.25);background:rgba(64,158,255,.05);
    }
    .cover-box img{width:100%;height:100%;object-fit:cover;display:block;margin:0;border-radius:14px;max-width:none;}
    .cover-hover{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;
      color:#fff;background:rgba(0,96,169,.38);opacity:0;transition:.2s ease;font-weight:800;
    }
    .cover-box:hover .cover-hover{opacity:1;}
    #imageUploadInput{
      width:100%;padding:10px 12px;border:1px dashed rgba(64,158,255,.38);border-radius:12px;background:#fff;color:var(--muted);
    }
    .status-strip{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;border-radius:14px;background:rgba(243,246,251,.92);
      color:var(--muted);font-size:14px;font-weight:700;
    }
    .status-strip:before{content:"\f058";font-family:"Font Awesome 5 Free";font-weight:900;color:#15803d;margin-right:6px;}
    .venue-info{width:100%;display:block;}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;}
    .field{margin:0;min-width:0;}
    .field.full{grid-column:1/-1;}
    .label{
      display:block;margin-bottom:8px;color:var(--muted);font-size:14px;line-height:1.35;font-weight:800;
    }
    .value{color:var(--text);font-size:15px;line-height:1.55;min-width:0;}
    .value.readonly-text{
      min-height:46px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.46);
      border:1px solid rgba(217,225,238,.72);
    }
    #venue-tags{
      display:inline-flex;align-items:center;min-height:30px;padding:4px 10px;
      color:var(--primary);background:rgba(64,158,255,.12);border-radius:999px;font-weight:800;font-size:13px;
    }
    .edit-input,.edit-select{
      width:100%;height:46px;padding:0 14px;border-radius:14px;
      border:1px solid var(--border);background:rgba(255,255,255,.62);color:var(--text);
      font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;
    }
    .edit-input:focus,.edit-select:focus{border-color:var(--primary-2);box-shadow:0 0 0 3px rgba(64,158,255,.14);background:#fff;}
    .edit-input:disabled,.edit-select:disabled,
    .edit-input[readonly],.edit-select[readonly]{background:rgba(243,246,251,.78);color:#64748b;opacity:1;}
    #venue-time{display:grid!important;grid-template-columns:1fr auto 1fr;gap:10px!important;align-items:center;white-space:nowrap;}
    #venue-time input[type="time"]{width:100%;min-width:0;}
    #venue-time span{text-align:center;color:var(--muted);font-weight:800;}
    .mini-btn{
      min-height:34px;padding:7px 12px;border:1px solid transparent;border-radius:12px;
      background:var(--primary);color:#fff;font-size:13px;font-weight:800;cursor:pointer;transition:.2s ease;
    }
    .mini-btn:hover{filter:brightness(1.05);transform:translateY(-1px);}
    .setting-card{display:flex;flex-direction:column;gap:16px;min-height:100%;}
    .setting-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:2px;}
    .setting-title{display:flex;align-items:center;gap:12px;font-size:18px;font-weight:800;}
    .setting-icon{width:40px;height:40px;border-radius:12px;background:rgba(64,158,255,.12);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;}
    .setting-field{margin:0 0 14px 0;}
    .setting-field:last-child{margin-bottom:0;}
    .inline-action{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .live-ban-box{margin-top:auto;padding-top:16px;border-top:1px solid rgba(192,199,212,.45);display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .live-ban-desc{color:var(--muted);font-size:13px;line-height:1.55;max-width:280px;}
    #liveBanBtn{background:#fff!important;color:var(--error)!important;border:1px solid rgba(186,26,26,.45)!important;}
    #liveBanBtn:hover{background:rgba(255,218,214,.3)!important;}
    #liveBanTip{display:inline-block;margin-top:8px;line-height:1.5;}
    .advanced-card{background:rgba(64,158,255,.07);border:1px solid rgba(64,158,255,.18);}
    .advanced-item{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.70);border:1px solid rgba(255,255,255,.86);}
    .hint{color:var(--muted);font-size:12px;line-height:1.5;margin-top:6px;}
    .restriction-card .restriction-row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;border-radius:14px;background:rgba(243,246,251,.86);border:1px solid rgba(217,225,238,.58);
    }
    .restriction-card .danger-row{background:rgba(255,218,214,.38);border-color:rgba(186,26,26,.20);}
    #lock30dBadge{margin:0!important;padding:4px 8px;border-radius:999px;background:rgba(186,26,26,.10);color:var(--error)!important;font-size:12px!important;font-weight:800;}
    #unlock30dBtn{margin-left:0!important;background:var(--error)!important;color:#fff!important;}
    .action-bar{margin-top:24px;display:grid;grid-template-columns:1fr;gap:12px;}
    .edit-btn,.save-btn{
      width:100%;height:48px;margin:0;border:none;border-radius:14px;cursor:pointer;
      color:#fff;background:var(--primary);font-size:15px;font-weight:900;
      box-shadow:0 10px 24px rgba(0,96,169,.20);transition:.2s ease;
    }
    .save-btn{background:#15803d;}
    .edit-btn:hover,.save-btn:hover{filter:brightness(1.06);transform:translateY(-1px);}
    #name-lock-tip{border-radius:10px;background:rgba(255,218,214,.34);padding:8px 10px;}

    @media (max-width: 920px){
      body{padding:14px 10px 22px;}
      .container{max-width:480px;}
      .page-hero{margin-bottom:14px;}
      .page-title{font-size:22px;}
      .venue-top-grid,.settings-grid{grid-template-columns:1fr;gap:14px;margin-bottom:14px;}
      .panel{padding:16px;}
      .panel-title,.setting-title{font-size:17px;margin-bottom:14px;}
      .form-grid{grid-template-columns:1fr;gap:14px;}
      .cover-box{border-radius:14px;}
      .status-strip{padding:12px;font-size:13px;align-items:flex-start;flex-direction:column;}
      .edit-input,.edit-select{height:42px;border-radius:12px;font-size:14px;}
      .value.readonly-text{padding:10px 12px;}
      .live-ban-box{align-items:stretch;flex-direction:column;}
      #liveBanBtn,.mini-btn{width:100%;}
      .restriction-card .restriction-row{align-items:stretch;flex-direction:column;}
      .action-bar{margin-top:16px;}
    }


    /* 修复：强制控件样式，避免浏览器默认小输入框 */
    input.edit-input,
    select.edit-select,
    .edit-control{
      display:block !important;
      width:100% !important;
      min-height:46px !important;
      padding:0 14px !important;
      border-radius:14px !important;
      border:1px solid var(--border) !important;
      background:rgba(255,255,255,.72) !important;
      color:var(--text) !important;
      font-size:15px !important;
      line-height:46px !important;
      outline:none !important;
      appearance:auto;
    }
    input.edit-input:disabled,
    select.edit-select:disabled,
    .edit-control:disabled{
      background:rgba(243,246,251,.88) !important;
      color:#64748b !important;
      opacity:1 !important;
    }
    button.mini-btn,
    button.edit-btn,
    button.save-btn{
      border:0 !important;
      font-family:inherit !important;
    }


    /* ===== 紧凑版布局修正：去掉右侧卡片被强行撑高的空白 ===== */
    .venue-top-grid{
      grid-template-columns:minmax(0,1.34fr) minmax(380px,.86fr);
      gap:20px;
      align-items:start !important;
      margin-bottom:20px;
    }
    .settings-grid{
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:20px;
      align-items:start !important;
    }
    .panel{padding:22px;}
    .panel-title{margin-bottom:16px;}

    /* 封面图卡片不要再把右侧基本信息撑出大空白 */
    .venue-cover-card{gap:12px;}
    .cover-box{
      aspect-ratio:16/7.2;
      max-height:330px;
      min-height:240px;
    }
    #imageUploadInput{min-height:38px;padding:7px 10px;}
    .status-strip{padding:10px 14px;min-height:40px;}

    /* 基本信息：开放时间单独占一整行，避免 01:28 变成 01: */
    .basic-card .form-grid{gap:14px 16px;}
    .basic-card .field{margin:0;}
    .time-field{grid-column:1/-1;}
    #venue-time{
      display:grid !important;
      grid-template-columns:minmax(120px,1fr) 20px minmax(120px,1fr) !important;
      gap:10px !important;
      align-items:center;
    }
    #venue-time input[type="time"]{
      min-width:0 !important;
      width:100% !important;
    }

    /* 直播和语音房：取消等高拉伸，去掉底部空白 */
    .setting-card{
      min-height:0 !important;
      gap:12px;
    }
    .setting-field{margin-bottom:12px;}
    .live-card .live-ban-box{
      margin-top:12px !important;
      padding-top:12px;
    }
    .live-card,.voice-card{padding-bottom:20px;}
    .voice-card .setting-head{margin-bottom:2px;}
    .voice-card .setting-field{margin-bottom:10px;}
    .voice-card .edit-input,.voice-card .edit-select,
    .live-card .edit-input,.live-card .edit-select{height:44px;min-height:44px !important;}

    /* 高级设置和系统限制：卡片按内容自适应，不要被同一行撑高 */
    .advanced-card{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:22px;
    }
    .advanced-card .setting-title{margin-bottom:2px !important;}
    .advanced-item{padding:13px 16px;}

    .restriction-card{
      min-height:206px;
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:22px;
    }
    .restriction-card .setting-title{margin-bottom:0 !important;}
    .restriction-list{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:104px;
    }
    .restriction-card .restriction-row{
      flex:1;
      min-height:86px;
      padding:14px 16px;
    }

    @media (max-width: 920px){
      .venue-top-grid,.settings-grid{grid-template-columns:1fr;gap:14px;margin-bottom:14px;}
      .panel,.advanced-card,.restriction-card{padding:16px;}
      .cover-box{aspect-ratio:16/9;min-height:160px;max-height:none;}
      #venue-time{grid-template-columns:1fr auto 1fr !important;}
      .restriction-card{min-height:auto;}
      .restriction-list{min-height:0;}
      .restriction-card .restriction-row{min-height:72px;}
    }



    /* ===== 最终调整：封面点击上传、语音房背景图按钮右置、去掉高级设置、系统限制全宽 ===== */
    .cover-box{cursor:pointer;}
    .cover-box:active{transform:scale(.998);}
    #imageUploadInput{display:none !important;}

    .voice-bg-line{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
    }
    .voice-bg-line .edit-input{
      flex:1 1 auto;
      min-width:0;
    }
    .voice-bg-line .mini-btn{
      flex:0 0 auto;
      height:44px;
      min-width:92px;
      padding:0 16px;
      white-space:nowrap;
    }

    .settings-grid .restriction-card{
      grid-column:1 / -1;
      width:100%;
      min-height:0 !important;
    }
    .restriction-card .restriction-list{
      min-height:0 !important;
    }
    .restriction-card .restriction-row{
      min-height:76px !important;
    }

    @media (max-width: 520px){
      .voice-bg-line{gap:8px;}
      .voice-bg-line .mini-btn{min-width:82px;padding:0 12px;}
    }


    /* ===== 对齐修正：直播设置/语音房底部对齐，上传按钮和输入框同高 ===== */
    .settings-grid{
      align-items:stretch !important;
    }
    .settings-grid .live-card,
    .settings-grid .voice-card{
      height:100%;
      display:flex;
      flex-direction:column;
    }
    .live-card .live-ban-box{
      margin-top:auto !important;
      min-height:68px;
      padding-top:12px;
    }
    .voice-card{
      gap:10px;
      padding-bottom:22px !important;
    }
    .voice-card .setting-field{
      margin-bottom:9px !important;
    }
    .voice-card .hint{
      margin-top:5px;
      font-size:12px;
      line-height:1.35;
    }
    .voice-bg-line{
      align-items:stretch !important;
    }
    .voice-bg-line .edit-input{
      height:46px !important;
      min-height:46px !important;
      line-height:46px !important;
    }
    .voice-bg-line .mini-btn{
      height:46px !important;
      min-height:46px !important;
      display:inline-flex !important;
      align-items:center !important;
      justify-content:center !important;
      padding:0 18px !important;
      margin:0 !important;
      align-self:stretch !important;
      border-radius:14px !important;
      line-height:1 !important;
    }
    @media (max-width:920px){
      .settings-grid{align-items:start !important;}
      .settings-grid .live-card,
      .settings-grid .voice-card{height:auto;}
      .voice-bg-line{align-items:stretch !important;}
    }


    /* ===== role_id=3：隐藏语音房时，直播设置改成整行宽度 ===== */
    .settings-grid.role3-live-full{
      grid-template-columns:1fr !important;
    }
    .settings-grid.role3-live-full .live-card,
    .settings-grid.role3-live-full .restriction-card{
      grid-column:1 / -1 !important;
      width:100% !important;
    }
    .settings-grid.role3-live-full .live-card{
      height:auto !important;
      min-height:0 !important;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="page-hero">
      <div>
        <div class="page-title">场地详情管理</div>
        <div class="page-subtitle">场地资料、直播、语音房与系统限制</div>
      </div>
    </div>
    <div id="venue-info" class="venue-dashboard"><!-- 动态加载 --></div>
  </div>

  <script>
    // ================= 全局状态 =================
    let LOCKS = { name: null, image: null };
    let IS_ADMIN  = false;
    let ROLE_ID   = 0;      // ⭐ 新增：记录当前管理员的角色ID
    let IS_EDITING = false;
    let SENSITIVE_WORDS = [];
    let hasUploaded = false;

    // ================= 工具函数 =================
    function getUrlParameter(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }


    function triggerCoverUpload() {
      const fileInput = document.getElementById('imageUploadInput');
      if (!fileInput) return;

      if (hasUploaded) {
        alert('您已经上传过图片，请等待审核结果。');
        return;
      }

      if (LOCKS.image && !IS_ADMIN) {
        alert(`图片上传处于冷却中，解锁时间：${(LOCKS.image && LOCKS.image.until_iso) || ''}`);
        return;
      }

      fileInput.disabled = false;
      fileInput.click();
    }

    function loadSensitiveWords() {
      return fetch('https://open.rcwulian.cn/api/sensitive_words.json')
        .then(res => res.json()).then(words => { SENSITIVE_WORDS = words || []; });
    }
    function containsSensitiveWords(text) {
      const t = (text || '') + '';
      for (let w of SENSITIVE_WORDS) if (t.includes(w)) return w;
      return null;
    }
async function handleVoiceRoomBgUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  try {
    const formData = new FormData();

    // 这里我同时 append 两个键，兼容你那边 upload_profile.php 可能取 file 或 image
    formData.append('file', file);
    formData.append('image', file);

    const response = await fetch('https://rcwulian.cn/app/img/userimg/upload_profile.php', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error(`HTTP 错误：${response.status}`);
    }

    const result = await response.json();
    console.log('上传返回结果', result.url);

    if (result.url) {
      document.getElementById('voice-room-bg-input').value = result.url;
      alert('上传成功，已回填链接');
    } else {
      alert(result.msg || '上传成功，但未返回图片链接');
    }
  } catch (e) {
    console.error('语音房背景图上传失败：', e);
    alert('上传失败：' + e.message);
  } finally {
    event.target.value = '';
  }
}
    // ================= 锁：名称/图片 10天冷却 =================
    function loadLocks(venueId) {
      const url = `https://open.rcwulian.cn/api/venue/getVenueEditLock.php${venueId ? `?id=${venueId}` : ''}`;
      return fetch(url)
        .then(r => r.json())
        .then(res => {
          if (res.code === 0 && res.data) {
            IS_ADMIN    = !!res.data.is_admin;
            ROLE_ID     = Number(res.data.role_id || 0);  // ⭐ 新增：从接口拿 role_id
            LOCKS.name  = res.data.name_lock  || null;
            LOCKS.image = res.data.image_lock || null;
            renderLocksUI();
            updateIncomeLockUI();
            applyLiveLock(); // ← 新增：根据是否管理员，应用直播地址可编辑/只读
            applyShowLiveVisibility();  // ← 新增
                // ✅补这句：ROLE_ID 有了，重新渲染封禁按钮显示/隐藏
            renderLiveBanUI();
            applyVenueRoomIdPermission();
            applyDrVenueIdPermission();
            applyVoiceRoomPermission();
            applyVoiceRoomBgPermission();
            applyVoiceRoomSceneTypePermission();
          }
        })
        .catch(err => console.error('锁加载失败：', err));
    }
    // =============== 直播封禁状态 ===============
let LIVE_BAN = { banned:false, ttl:-2, until:null, info:null };

function fmtTTL(sec){
  sec = Math.max(0, Number(sec||0));
  const d = Math.floor(sec / 86400); sec %= 86400;
  const h = Math.floor(sec / 3600);  sec %= 3600;
  const m = Math.floor(sec / 60);
  if (d > 0) return `${d}天${h}小时`;
  if (h > 0) return `${h}小时${m}分`;
  return `${m}分`;
}

function loadLiveBanStatus(venueId){
  const url = `https://open.rcwulian.cn/api/venue/getLiveBanStatus.php${venueId ? `?id=${venueId}` : ''}`;
  return fetch(url).then(r=>r.json()).then(res=>{
    if(res.code===0 && res.data){
      LIVE_BAN = res.data;
      renderLiveBanUI();
      applyRole3BanGuard(); // role3 被封禁时禁用 UI

function safeText(s){
  return String(s || '').trim();
}

// 可选：原因太长就截断一下（不想截断就直接 return s）
function shortReason(s, maxLen = 30){
  s = safeText(s);
  if (!s) return '';
  return s.length > maxLen ? (s.slice(0, maxLen) + '…') : s;
}

function renderLiveBanUI(){
  const btn = document.getElementById('liveBanBtn');
  const tip = document.getElementById('liveBanTip');

  // 只有 role 1/2 能看到按钮
  const canAdminBan = (ROLE_ID === 1 || ROLE_ID === 2);
  if (btn) btn.style.display = canAdminBan ? 'inline-block' : 'none';

  if (LIVE_BAN && LIVE_BAN.banned) {
    if (btn) btn.textContent = '解封直播';

    const reason = shortReason(LIVE_BAN?.data?.reason || LIVE_BAN?.info?.reason || '');
    const reasonText = reason ? `，原因：${reason}` : '';

    if (tip) {
      tip.style.display = 'inline';
      tip.textContent = `直播已封禁，剩余：${fmtTTL(LIVE_BAN.ttl)}${reasonText}`;
      // ✅ 鼠标悬停显示完整原因（PC 上很好用）
      const fullReason = safeText(LIVE_BAN?.data?.reason || LIVE_BAN?.info?.reason || '');
      tip.title = fullReason ? `原因：${fullReason}` : '';
    }
  } else {
    if (btn) btn.textContent = '封禁直播';
    if (tip) { tip.style.display = 'none'; tip.textContent = ''; tip.title = ''; }
  }
}

    // ================= 数据加载 =================
    function loadVenueData() {
      const venueId = getUrlParameter('id');
      const url = venueId
        ? `https://open.rcwulian.cn/api/venue/getVenueList.php?id=${venueId}`
        : 'https://open.rcwulian.cn/api/venue/getVenueList.php?page=1&limit=10';

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.code === 0 && data.data.length > 0) {
            const venue = data.data[0];
            displayVenueInfo(venue);
            loadLocks(venueId);
            loadLiveBanStatus(venueId);

            // ===== 名称审核状态（通过时刷新锁与数据；拒绝时告警并清理）=====
            fetch('https://open.rcwulian.cn/api/venue/getVenueNameStatus.php')
              .then(r => r.json()).then(res => {
                if (res.code === 0 && res.data) {
                  const status = res.data.status, reason = res.data.reason;
                  if (status === 'approved') { loadLocks(venueId); loadVenueData(); }
                  else if (status === 'rejected') {
                    alert(`场地名称审核未通过，原因：${reason}`);
                    fetch('https://open.rcwulian.cn/api/venue/deleteVenueNameStatus.php');
                  }
                }
              });

            // ===== 图片审核状态（通过时刷新锁；拒绝时显示原因）=====
            fetch('https://open.rcwulian.cn/api/venue/getVenueImageStatus.php')
              .then(r => r.json()).then(imgRes => {
                const statusEl = document.getElementById('image_status');
                if (imgRes.code === 0 && imgRes.data && statusEl) {
                  const status = imgRes.data.status;
                  const reason = imgRes.data.reason || '无';
                  if (status === 'pending') { statusEl.innerText = '图片审核中'; statusEl.style.color = '#ff9800'; }
                  else if (status === 'approved') { statusEl.innerText = '图片审核已通过'; statusEl.style.color = '#4caf50'; loadLocks(venueId); }
                  else if (status === 'rejected') {
                    statusEl.innerHTML = `图片审核未通过<br><span style="color:#999;font-size:14px;">原因：${reason}</span>`;
                    statusEl.style.color = '#f44336';
                  }
                }
              });

            // 场地描述审核状态（保持不变）
            fetch('https://open.rcwulian.cn/api/venue/getVenueDescriptionStatus.php')
              .then(res => res.json()).then(res => {
                if (res.code === 0 && res.data && res.data.status === 'rejected') {
                  alert(`场地描述审核未通过，原因：${res.data.reason}`);
                  fetch('https://open.rcwulian.cn/api/venue/deleteVenueDescriptionStatus.php');
                }
              });

          } else {
            alert('未找到场地信息');
          }
        })
        .catch(err => console.error('数据加载失败:', err));
    }

    function updateIncomeLockUI() {
      const badge = document.getElementById('lock30dBadge');
      const btn   = document.getElementById('unlock30dBtn');
      if (!window.CURRENT_VENUE) return;

      const locked = Number(window.CURRENT_VENUE.income_30d_lock) === 1;
      if (locked) {
        if (badge) badge.style.display = 'inline';
        if (btn)   btn.style.display   = IS_ADMIN ? 'inline-block' : 'none';
      } else {
        if (badge) badge.style.display = 'none';
        if (btn)   btn.style.display   = 'none';
      }
    }

    function unlock30d() {
      if (!window.CURRENT_VENUE) return;
      if (!IS_ADMIN) { alert('仅管理员可解除该限制'); return; }
      if (!confirm('确定要解除“近30天无收入锁”吗？')) return;

      fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: window.CURRENT_VENUE.id, unlock_income_30d: 1 })
      })
      .then(r => r.json())
      .then(res => {
        if (res.code === 0) {
          alert('已解除限制');
          window.CURRENT_VENUE.income_30d_lock = 0;
          updateIncomeLockUI();
        } else {
          alert(res.msg || '操作失败');
        }
      })
      .catch(err => { console.error(err); alert('请求失败，请稍后重试'); });
    }
function clearVenueLock(type) {
  const venueId = getUrlParameter('id');
  if (!venueId) { alert('缺少场地ID'); return; }
  if (!IS_ADMIN) { alert('仅管理员可解除'); return; }

  const tip = (type === 'name') ? '名称锁' : (type === 'image') ? '图片锁' : '锁';
  if (!confirm(`确定要解除该场地的【${tip}】吗？`)) return;

  fetch('https://open.rcwulian.cn/api/venue/clearVenueEditLock.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
    body: `id=${encodeURIComponent(venueId)}&type=${encodeURIComponent(type)}`
  })
  .then(r => r.json())
  .then(res => {
    if (res.code === 0) {
      alert('已解除');
      // 解除后刷新锁信息 + UI
      loadLocks(venueId);
      // 如果你想更“干净”，也可以直接 reload
      // location.reload();
    } else {
      alert(res.msg || '解除失败');
    }
  })
  .catch(err => { console.error(err); alert('请求失败'); });
}

    // ================= 进入编辑/保存 =================
    function enableEdit() {
    //   alert("因服务器更新维护需将设备重启后方可设置营业!");
      if (IS_EDITING) return;
      IS_EDITING = true;

      document.getElementById('mainEditBtn').style.display = 'none';
      document.getElementById('mainSaveBtn').style.display = 'inline-block';

      // 批量解锁可编辑控件
      document.querySelectorAll('.edit-control').forEach(el => el.disabled = false);

      // 名称锁下，非管理员不得编辑
      if (LOCKS.name && !IS_ADMIN) {
        const nameInput = document.getElementById('venue-name-input');
        if (nameInput) nameInput.disabled = true;
      }

      // 图片：不再显示系统“选择文件”控件，点击封面图上的“更新图片”直接选择
      const fileInput = document.getElementById('imageUploadInput');
      if (fileInput) {
        fileInput.style.display = 'none';
        const locked = (LOCKS.image && !IS_ADMIN);
        fileInput.disabled = !!locked;
        fileInput.style.opacity = locked ? 0.5 : 1;
      }
        // 再次应用直播地址权限（确保非管理员仍是只读）
        applyLiveLock();
        applyShowLiveVisibility();  // ← 新增
        applyVenueRoomIdPermission();
        applyDrVenueIdPermission();
        applyVoiceRoomPermission();
        applyVoiceRoomBgPermission();
        applyVoiceRoomSceneTypePermission();
    }


function saveChanges() {
  const payload = {
    id: getUrlParameter('id'),
    venue_name: document.getElementById('venue-name-input').value.trim(),
    venue_status: document.getElementById('status-select').value
  };
if (ROLE_ID === 1 || ROLE_ID === 2) {
  const venueRoomIdRaw = document.getElementById('venue-room-id-input').value.trim();

  if (venueRoomIdRaw === '') {
    payload.venue_room_id = null;
  } else {
    if (!/^\d+$/.test(venueRoomIdRaw)) {
      alert('venue_room_id 只能填写数字');
      return;
    }
    payload.venue_room_id = parseInt(venueRoomIdRaw, 10);
  }

  // 海外DR场地ID暂时从页面去掉：没有 dr-venue-id-input 时不提交该字段，避免覆盖数据库原值
  const drVenueIdInput = document.getElementById('dr-venue-id-input');
  if (drVenueIdInput) {
    const drVenueIdRaw = drVenueIdInput.value.trim();

    if (drVenueIdRaw === '') {
      payload.dr_venue_id = null;
    } else {
      if (!/^\d+$/.test(drVenueIdRaw)) {
        alert('dr_venue_id 只能填写数字');
        return;
      }

      const drVenueId = parseInt(drVenueIdRaw, 10);

      if (drVenueId < 1 || drVenueId > 9999) {
        alert('dr_venue_id 必须留空，或者填写 1~9999 的数字');
        return;
      }

      payload.dr_venue_id = drVenueId;
    }
  }

  const voiceRoomBgInput = document.getElementById('voice-room-bg-input');
  if (voiceRoomBgInput) {
    payload.voice_room_bg_url = voiceRoomBgInput.value.trim();
  }

  const voiceRoomSceneType = parseInt(
    document.getElementById('voice-room-scene-type-select').value,
    10
  );

  if (![1, 2].includes(voiceRoomSceneType)) {
    alert('语音房场景只能选择室内或户外');
    return;
  }

  payload.voice_room_scene_type = voiceRoomSceneType;
}
    // 仅 role_id=1 || 2 可改语音房标识
if (ROLE_ID === 1 || ROLE_ID === 2) {
      payload.venue_status_num = parseInt(
        document.getElementById('voice-room-select').value,
        10
      );
    }
  const st = document.getElementById('start-time').value;
  const et = document.getElementById('end-time').value;
  if (st && et) payload.start_time = `${st}-${et}`;

  const hitName = containsSensitiveWords(payload.venue_name || '');
  if (hitName) { alert(`场地名称中包含敏感词：${hitName}`); return; }

  const canEditLive =
    (ROLE_ID === 1 || ROLE_ID === 2) ||
    (ROLE_ID === 3 && !(LIVE_BAN && LIVE_BAN.banned));

  if (canEditLive) {
    payload.show_live_stream = document.getElementById('show-live-stream-select').value;
    payload.live_stream_url = document.getElementById('live-stream-input').value.trim();
  }

  fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res.code === 0 || res.code === 1008) {
      alert(res.msg || '保存成功');
      setTimeout(() => location.reload(), 50); // ✅ 稳一点
      return;
    }

    // ✅ 名称冷却
    if (res.code === 1020) {
      alert(res.msg || '名称处于冷却期');
      loadLocks(getUrlParameter('id'));
      return;
    }

    alert(res.msg || '保存失败');
    loadVenueData();
  })
  .catch(e => { console.error(e); alert('保存失败，请稍后重试'); })
  .finally(() => { IS_EDITING = false; });
}




    // ================= 图片上传 =================
    function handleImageUpload(event) {
      if (hasUploaded) { alert("您已经上传过图片，请等待审核结果。"); return; }
      if (LOCKS.image && !IS_ADMIN) {
        alert(`图片上传处于冷却中，解锁时间：${(LOCKS.image && LOCKS.image.until_iso) || ''}`);
        event.target.value = '';
        return;
      }

      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      const venueId = getUrlParameter('id');
      formData.append('id', venueId || '');
      formData.append('image', file);

      fetch('https://open.rcwulian.cn/api/venue/uploadImg.php', { method:'POST', body:formData })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            alert("图片上传成功，等待审核");
            hasUploaded = true;
            loadVenueData(); // 刷新状态
          } else if (data.code === 1021) {
            alert(data.msg);
            loadLocks(venueId);
          } else {
            alert("上传失败：" + (data.msg || '未知错误'));
          }
        })
        .catch(err => {
          console.error('上传失败:', err);
          alert("上传失败，请重试");
        });
    }
function onClickLiveBanBtn(){
  if (!(ROLE_ID === 1 || ROLE_ID === 2)) { alert('仅管理员可操作'); return; }
  if (!window.CURRENT_VENUE) return;

  // 如果当前已封禁 => 解封
  if (LIVE_BAN && LIVE_BAN.banned) {
    if (!confirm('确定要解封直播吗？')) return;
    fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id: window.CURRENT_VENUE.id, unban_live: 1 })
    }).then(r=>r.json()).then(res=>{
      if(res.code===0){
        alert('已解封');
        loadLiveBanStatus(getUrlParameter('id'));
          setTimeout(() => location.reload(), 50); // ✅ 稳一点
      } else {
        alert(res.msg || '操作失败');
      }
    }).catch(e=>{console.error(e); alert('请求失败');});
    return;
  }

  // 未封禁 => 弹出封禁模态
  showLiveBanModal();
}

function showLiveBanModal(){
  // 简单原生 modal（不引入库）
  const html = `
  <div id="banModalMask" style="position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:9999;">
    <div style="width:min(92vw,420px);background:#fff;border-radius:16px;padding:16px 16px 12px;box-shadow:0 12px 40px rgba(0,0,0,.18);">
      <div style="font-weight:700;font-size:16px;margin-bottom:12px;">封禁直播</div>

      <div style="margin-bottom:10px;">
        <div style="color:#7f8fa4;font-size:13px;margin-bottom:6px;">封禁时长</div>
        <select id="banDuration" class="edit-select" style="width:100%;">
          <option value="3600">1 小时</option>
          <option value="21600">6 小时</option>
          <option value="86400" selected>1 天</option>
          <option value="259200">3 天</option>
          <option value="604800">7 天</option>
          <option value="2592000">30 天</option>
        </select>
      </div>

      <div style="margin-bottom:12px;">
        <div style="color:#7f8fa4;font-size:13px;margin-bottom:6px;">原因（选填）</div>
        <textarea id="banReason" placeholder="选填" style="width:100%;min-height:72px;padding:10px;border:1px solid #ddd;border-radius:10px;resize:none;">经核实，你存在引流至第三方APP行为，现对你直播跳转功能限制，请及时整改。</textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="mini-btn" style="padding:8px 12px;background:#e5e7eb;color:#111;" onclick="closeLiveBanModal()">取消</button>
        <button class="mini-btn" style="padding:8px 12px;" onclick="submitLiveBan()">确定封禁</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeLiveBanModal(){
  const m = document.getElementById('banModalMask');
  if (m) m.remove();
}

function submitLiveBan(){
  if (!window.CURRENT_VENUE) return;
  const ttl = Number(document.getElementById('banDuration')?.value || 86400);
  const reason = (document.getElementById('banReason')?.value || '').trim();

  fetch('https://open.rcwulian.cn/api/venue/setVenue.php', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      id: window.CURRENT_VENUE.id,
      ban_live: 1,
      ban_live_ttl: ttl,
      ban_reason: reason
    })
  }).then(r=>r.json()).then(res=>{
    if(res.code===0){
      alert('已封禁');
      closeLiveBanModal();
      loadLiveBanStatus(getUrlParameter('id'));
    } else {
      alert(res.msg || '封禁失败');
    }
  }).catch(e=>{console.error(e); alert('请求失败');});
}

    window.handleImageUpload = handleImageUpload;

    window.unlock30d = unlock30d;
    window.onClickLiveBanBtn = onClickLiveBanBtn;
window.closeLiveBanModal = closeLiveBanModal;
window.submitLiveBan = submitLiveBan;
  </script>
