<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场地管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary: #5b8cff;
            --secondary: #7f8fa4;
            --background-gradient-start: #f8f9ff;
            --background-gradient-end: #f0f3ff;
            --card-bg: #ffffff;
            --border-color: #ddd;
            --text-color: #333;
            --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
            --transition: all 0.3s ease;
            --hover-bg: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", system-ui;
        }

body {
    background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
    min-height: 100vh;
    padding: 12px 16px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.container {
    width: min(1680px, calc(100vw - 32px));
    max-width: 1680px;
}

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .card-title {
            font-size: 24px;
            color: var(--text-color);
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            text-align: left;
        }

        .venue-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            transition: var(--transition);
        }

        .venue-card:hover {
            background-color: var(--hover-bg);
        }

        .venue-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .venue-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: var(--text-color);
        }

        .venue-info .venue-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }

        .venue-info span {
            display: block;
        }

        .add-btn {
            align-self: flex-start;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            margin-bottom: 15px;
        }

        .add-btn:hover {
            background-color: #4a77e4;
        }

        .loading {
            text-align: center;
            font-size: 16px;
            color: var(--primary);
            padding: 20px;
        }

        .add-venue-form {
            display: none;
            margin-bottom: 15px;
        }

        .add-venue-form input,
        .add-venue-form select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .add-venue-form button {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .add-venue-form button:hover {
            background-color: #4a77e4;
        }

        .venue-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
        }

        .edit-btn {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .edit-btn:hover {
            background-color: #4a77e4;
        }

        .unban-btn {
            background-color: #ff4d4f;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .unban-btn:hover {
            background-color: #d9363e;
        }

        .ban-btn {
            background-color: #ffc107;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .ban-btn:hover {
            background-color: #d9363e;
        }
        .sound-ban-btn {
            background-color: #8b5cf6;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .sound-ban-btn:hover {
            background-color: #7c3aed;
        }

        .sound-unban-btn {
            background-color: #10b981;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .sound-unban-btn:hover {
            background-color: #059669;
        }
        .voice-room-ban-btn {
            background-color: #ef4444;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .voice-room-ban-btn:hover {
            background-color: #dc2626;
        }
        
        .voice-room-unban-btn {
            background-color: #14b8a6;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .voice-room-unban-btn:hover {
            background-color: #0f766e;
        }
        .spending-alert-on-btn {
            background-color: #f97316;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .spending-alert-on-btn:hover {
            background-color: #ea580c;
        }
        
        .spending-alert-off-btn {
            background-color: #64748b;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        
        .spending-alert-off-btn:hover {
            background-color: #475569;
        }
        /* 新增：顶部统计筛选栏 */
        .venue-toolbar {
            width: 100%;
            margin-bottom: 15px;
        }

        .venue-stats {
            width: 100%;
            display: flex;
            gap: 12px;
        }

        .stat-card {
            flex: 1 1 50%;
            min-width: 0;
            padding: 14px 16px;
            border-radius: 12px;
            background: #f7f8fc;
            border: 1px solid #e9edf5;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .stat-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(91, 140, 255, 0.08);
        }

        .stat-card.active {
            box-shadow: 0 8px 22px rgba(91, 140, 255, 0.12);
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-open .stat-value {
            color: #10b981;
        }

        .stat-rest .stat-value {
            color: #999;
        }

        .stat-open.active {
            background: rgba(16, 185, 129, 0.10);
            border-color: rgba(16, 185, 129, 0.35);
        }

        .stat-rest.active {
            background: rgba(153, 153, 153, 0.10);
            border-color: rgba(153, 153, 153, 0.35);
        }

        .venue-card.status-open {
            border-left: 4px solid #10b981;
        }

        .venue-card.status-rest {
            border-left: 4px solid #c9c9c9;
        }

        .venue-status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
            width: fit-content;
        }

        .venue-status-badge.open {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
        }

        .venue-status-badge.rest {
            background: rgba(153, 153, 153, 0.16);
            color: #888;
        }
        .venue-status-switch {
            border: none;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            appearance: none;
            -webkit-appearance: none;
        }
        
        .venue-status-switch:hover {
            filter: brightness(0.96);
            transform: translateY(-1px);
        }
        
        .venue-status-badge.build {
            background: rgba(245, 158, 11, 0.14);
            color: #d97706;
        }
        
        .venue-card.status-build {
            border-left: 4px solid #f59e0b;
        }
        @media (max-width: 768px) {
            .venue-card {
                flex-direction: column;
                align-items: center;
            }

            .venue-img {
                width: 80px;
                height: 80px;
            }

            .venue-info {
                text-align: center;
            }

            .venue-actions {
                width: 100%;
                justify-content: center;
            }

            .venue-toolbar {
                width: 100%;
            }

            .venue-stats {
                width: 100%;
                flex-direction: row;
                gap: 10px;
            }
        
            .stat-card {
                flex: 1 1 33.333%;
                padding: 12px;
            }
        }
        .stat-card {
    flex: 1 1 33.333%;
    min-width: 0;
    padding: 14px 16px;
    border-radius: 12px;
    background: #f7f8fc;
    border: 1px solid #e9edf5;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    transition: var(--transition);
    user-select: none;
}

.stat-live .stat-value {
    color: #3b82f6;
}

.stat-live.active {
    background: rgba(59, 130, 246, 0.10);
    border-color: rgba(59, 130, 246, 0.35);
}

.venue-live-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(59, 130, 246, 0.12);
    color: #2563eb;
    margin-top: 4px;
    width: fit-content;
}
.live-time-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
    margin-bottom: 4px;
}

.live-time-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 26px;
    padding: 0 10px;
    border-radius: 999px;
    background: rgba(124, 58, 237, 0.12);
    color: #7c3aed;
    font-size: 12px;
    font-weight: 700;
    line-height: 26px;
    white-space: nowrap;
}

.live-time-value {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 30px;
    padding: 0 14px;
    border-radius: 10px;
    background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
    border: 1px solid rgba(249, 115, 22, 0.22);
    color: #ea580c;
    font-size: 14px;
    font-weight: 700;
    line-height: 30px;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(249, 115, 22, 0.10);
}

.live-time-value.empty {
    background: #f8fafc;
    border: 1px dashed #cbd5e1;
    color: #94a3b8;
    box-shadow: none;
}
.live-btn {
    background: linear-gradient(135deg, #ff4d4f 0%, #ff7a45 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    min-width: 118px;
    height: 38px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: var(--transition);
    box-shadow: 0 8px 18px rgba(255, 77, 79, 0.28);
}

.live-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 22px rgba(255, 77, 79, 0.35);
    filter: brightness(1.03);
}

.live-btn.cancel {
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
    box-shadow: 0 8px 18px rgba(124, 58, 237, 0.28);
}

.live-btn.cancel:hover {
    box-shadow: 0 12px 22px rgba(124, 58, 237, 0.35);
    filter: brightness(1.03);
}
#venue-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
}

.venue-card {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: var(--transition);
    min-height: 260px;
}

.venue-card-top {
    display: flex;
    gap: 14px;
    align-items: flex-start;
}

.venue-img {
    width: 88px;
    height: 88px;
    object-fit: cover;
    border-radius: 16px;
    flex-shrink: 0;
    border: 1px solid #edf1f7;
}

.venue-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
    color: var(--text-color);
    min-width: 0;
}

.venue-info .venue-name {
    font-size: 15px;
    font-weight: 700;
    color: #5b8cff;
    line-height: 1.4;
    word-break: break-all;
}

.venue-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.venue-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-start;
    align-items: center;
    flex-wrap: wrap;
    margin-top: auto;
    padding-left: 18px;
    padding-top: 6px;
}
.venue-actions button {
    min-width: 92px;
    height: 34px;
    padding: 0 12px;
    border-radius: 10px;
    font-size: 13px;
    white-space: nowrap;
}

.venue-actions .live-btn {
    min-width: 118px;
    height: 38px;
    font-size: 14px;
}

@media (max-width: 900px) {
    #venue-list {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    .venue-card {
        min-height: auto;
    }

    .venue-card-top {
        flex-direction: column;
        align-items: center;
    }

    .venue-info {
        text-align: center;
    }

    .venue-actions {
        justify-content: center;
    }
}
.venue-review-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(245, 158, 11, 0.14);
    color: #d97706;
    border: 1px solid rgba(245, 158, 11, 0.26);
    width: fit-content;
}

.review-time-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
    margin-bottom: 4px;
}

.review-time-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 26px;
    padding: 0 10px;
    border-radius: 999px;
    background: rgba(245, 158, 11, 0.12);
    color: #d97706;
    font-size: 12px;
    font-weight: 700;
    line-height: 26px;
    white-space: nowrap;
}

.review-time-value {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 30px;
    padding: 0 14px;
    border-radius: 10px;
    background: linear-gradient(135deg, #fffaf0 0%, #ffedd5 100%);
    border: 1px solid rgba(245, 158, 11, 0.22);
    color: #b45309;
    font-size: 14px;
    font-weight: 700;
    line-height: 30px;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(245, 158, 11, 0.10);
}
/* 封禁场地弹窗优化 */
.ban-modal-content {
    background: #fff;
    width: 680px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 48px);
    margin: 24px auto;
    padding: 24px;
    border-radius: 14px;
    position: relative;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
    overflow-y: auto;
}
.ban-modal-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 18px;
    color: #111827;
}

.ban-form-group {
    margin-bottom: 16px;
}

.ban-form-group label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
}

#banDuration {
    width: 180px;
    height: 36px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 0 10px;
    background: #fff;
}

.ban-desc-tips {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 8px;
}

.ban-template-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
}

.ban-desc-option {
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    text-align: left;
    font-size: 13px;
    color: #374151;
    line-height: 1.5;
    transition: all 0.2s ease;
}

.ban-desc-option:hover {
    border-color: #ff4d4f;
    background: #fff5f5;
}

.ban-desc-option.active {
    border-color: #ff4d4f;
    background: #fff1f0;
    color: #b42318;
    font-weight: 700;
}

#banReason {
    width: 100%;
    min-height: 120px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px;
    resize: vertical;
    font-size: 14px;
    line-height: 1.6;
}

.ban-submit-btn {
    margin-top: 10px;
    background-color: #ff4d4f;
    color: white;
    border: none;
    padding: 11px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
}

.ban-submit-btn:hover {
    background-color: #d9363e;
}

@media (max-width: 768px) {
    .ban-modal-content {
        width: calc(100vw - 24px);
        margin: 4vh auto;
        padding: 18px;
    }

    .ban-template-list {
        grid-template-columns: 1fr;
    }
}
.ban-preview-img,
.ban-preview-video {
    display: none;
    width: 100%;
    max-height: 260px;
    margin-top: 8px;
    border-radius: 8px;
    object-fit: contain;
    background: #f8fafc;
    border: 1px solid #e5e7eb;
}
.ban-preview-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 8px;
}

.ban-preview-list img,
.ban-preview-list video {
    width: 100%;
    height: 140px;
    border-radius: 8px;
    object-fit: contain;
    background: #f8fafc;
    border: 1px solid #e5e7eb;
}

@media (max-width: 768px) {
    .ban-preview-list {
        grid-template-columns: 1fr;
    }
}
/* 场地卡片压缩高度 */
.venue-card {
    padding: 14px 16px;
    gap: 10px;
    min-height: auto;
}

/* 顶部信息间距缩小 */
.venue-info {
    gap: 6px;
    line-height: 1.45;
}

/* 标签区域：桌面固定3列，两行更整齐 */
.venue-detail-grid {
    display: grid;
    grid-template-columns: repeat(3, max-content);
    justify-content: start;
    align-items: center;
    column-gap: 8px;
    row-gap: 7px;
    margin-top: 2px;
    font-size: 12px;
    line-height: 1;
    max-width: 100%;
}

/* 标签本身 */
.venue-detail-grid .venue-pill {
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
    width: fit-content;
    max-width: 160px;
    min-width: 0;
    height: 24px;
    padding: 0 9px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    line-height: 24px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border: 1px solid transparent;
    box-shadow: 0 3px 10px rgba(15, 23, 42, 0.04);
}

/* 描述 */
.venue-pill-desc {
    max-width: 170px;
}

/* 开放时间 */
.venue-pill-time {
    max-width: 175px;
}

/* 蓝色：描述 */
.venue-pill-blue {
    background: rgba(59, 130, 246, 0.10);
    color: #2563eb;
    border-color: rgba(59, 130, 246, 0.20);
}

/* 绿色：正常/开启 */
.venue-pill-green {
    background: rgba(16, 185, 129, 0.12);
    color: #059669;
    border-color: rgba(16, 185, 129, 0.22);
}

/* 红色：关闭/封禁 */
.venue-pill-red {
    background: rgba(239, 68, 68, 0.12);
    color: #dc2626;
    border-color: rgba(239, 68, 68, 0.22);
}

/* 灰色：未开启 */
.venue-pill-gray {
    background: #f1f5f9;
    color: #64748b;
    border-color: #e2e8f0;
}

/* 橙色：提醒 */
.venue-pill-orange {
    background: rgba(249, 115, 22, 0.12);
    color: #ea580c;
    border-color: rgba(249, 115, 22, 0.22);
}

/* 黄色：标签 */
.venue-pill-amber {
    background: rgba(245, 158, 11, 0.13);
    color: #d97706;
    border-color: rgba(245, 158, 11, 0.24);
}

/* 青色：时间 */

function setBanDescriptionTemplate(type) {

    }

    document.querySelectorAll('.ban-desc-option').forEach(btn => {

    });
}

    document.getElementById('banVenueId').value = venueId;

    if (previewList) previewList.innerHTML = '';

    document.getElementById('banModal').style.display = 'block';

    document.getElementById('voiceRoomBanModal').style.display = 'block';
}

window.setVoiceRoomUnban = function (venueId) {
    if (!confirm('确定要解除该场地语音房封禁吗？')) {
        return;
    }

    const formData = new FormData();
    formData.append('action', 'set_voice_room_unban');
    formData.append('venue_id', venueId);

    fetch('https://open.rcwulian.cn/api/venue/VenuesManagement.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.code === 0 || data.code === 200) {
            alert(data.msg || '语音房已解除封禁');
            window.loadVenues ? window.loadVenues() : location.reload();
            // loadVenues();
        } else {
            alert(data.msg || '操作失败');
        }
    })
    .catch(err => {
        console.error('解除语音房封禁失败:', err);
        alert('请求异常');
    });
};

function normalizeVenueLevel(level) {
    const v = String(level || 'A').trim().toUpperCase();
    return ['S', 'A', 'B', 'C', 'D'].includes(v) ? v : 'A';
}

function getVenueLevelRateText(level) {
    const v = normalizeVenueLevel(level);

    if (v === 'A') return '80%';
    if (v === 'C') return '60%';

    return '预留';
}

function getVenueLevelClass(level) {
    const v = normalizeVenueLevel(level);

    if (v === 'A') return 'venue-level-a';
    if (v === 'C') return 'venue-level-c';

    return 'venue-level-reserved';
}

function renderVenueLevelOptions(currentLevel) {
    const current = normalizeVenueLevel(currentLevel);
    const levels = ['S', 'A', 'B', 'C', 'D'];

    return levels.map(level => {
        const selected = level === current ? 'selected' : '';
        return `<option value="${level}" ${selected}>${level}</option>`;
    }).join('');
}

function getVoiceRoomSceneText(sceneType) {

function getVoiceRoomSceneClass(sceneType) {
    return Number(sceneType) === 2 ? 'venue-pill-scene-outdoor' : 'venue-pill-scene-indoor';

function canEditVoiceRoomSceneType() {

function isRecommendTop(venue) {
    return Number(venue.is_live || 0) === 1 && Number(venue.is_recommend || 0) === 1;
}

function formatLiveMarkedAt(value) {
    if (!value) return '';
    const str = String(value).replace('T', ' ');
    return str.length >= 16 ? str.slice(0, 16) : str;
}
function getStatusOrder(venue) {
    if (needPriorityReview(venue)) return -1; // 优先检测排最前
    if (isRecommendTop(venue)) return 0;
    if (isVenueLive(venue)) return 1;
    if ((venue.venue_status || '').trim() === '营业中') return 2;
    if (getVenueStatusGroup(venue) === '休息中') return 3;
    return 99;
}

function getLiveMarkedTimestamp(venue) {
    if (!venue.live_marked_at) return Number.MAX_SAFE_INTEGER;
    const t = new Date(String(venue.live_marked_at).replace(' ', 'T')).getTime();
    return Number.isNaN(t) ? Number.MAX_SAFE_INTEGER : t;
}
function isVenueLive(venue) {
    return (venue.venue_status || '').trim() === '营业中'
        && Number(venue.is_live || 0) === 1;
}

function getVenueStatusGroup(venue) {
    const status = (venue.venue_status || '').trim();

    // 建设中也归到休息中
    if (status === '建设中') {
        return '休息中';
    }

    return status;
}
function needPriorityReview(venue) {
    return Number(venue.need_live_review || 0) === 1;
}

function formatReviewTime(value) {

    const str = String(value).replace('T', ' ');
    return str.length >= 16 ? str.slice(0, 16) : str;

    const openCount = venues.filter(v => getVenueStatusGroup(v) === '营业中').length;
    const restCount = venues.filter(v => getVenueStatusGroup(v) === '休息中').length;
    const liveCount = venues.filter(v => isVenueLive(v)).length;

    document.getElementById('rest-count').textContent = restCount;
    document.getElementById('live-count').textContent = liveCount;
}

function applyFilters() {
    const keyword = venueSearch.value.trim().toLowerCase();
    const selectedLevel = venueLevelFilter.value.trim().toUpperCase();
    let filtered = [...allVenues];

    if (currentStatus === '直播中') {
        filtered = filtered.filter(v => isVenueLive(v));
    } else {
        filtered = filtered.filter(v => getVenueStatusGroup(v) === currentStatus);
    }

    if (keyword) {
        filtered = filtered.filter(v => {
            const idText = String(v.id || '');
            const nameText = String(v.venue_name || '').toLowerCase();
            const mixText = `${v.id} - ${v.venue_name}`.toLowerCase();
            return idText.includes(keyword) || nameText.includes(keyword) || mixText.includes(keyword);
        });
    }

    if (selectedLevel) {
        filtered = filtered.filter(v => normalizeVenueLevel(v.venue_level) === selectedLevel);
    }

    updateStatCardActive();
    renderVenues(filtered);
}

            function renderBanPreviews(files) {
                previewList.innerHTML = '';
            
                files.forEach(file => {
                    const url = URL.createObjectURL(file);
                    const isMp4 = file.type === 'video/mp4' || file.name.toLowerCase().endsWith('.mp4');
            
                    let el;
                    if (isMp4) {

                        el.src = url;
                    }
            
                    previewList.appendChild(el);
                });
            }
            
            banInput.addEventListener('change', function () {
                const files = Array.from(this.files || []);
            
                if (files.length > 3) {
                    alert('最多只能上传3个文件');
                    this.value = '';
                    previewList.innerHTML = '';
                    return;
                }
            
                renderBanPreviews(files);
            });
            
            async function uploadBanFile(file) {
                const fd = new FormData();
                fd.append('file', file);
            
                const upRes = await fetch('https://open.rcwulian.cn/api/devMgr/upload_violation_image.php', {
                    method: 'POST',
                    body: fd
                });
            
                const upJson = await upRes.json();
            
                if (!upRes.ok || upJson.code !== 0) {
                    throw new Error(upJson.msg || upRes.status);
                }
            
                const imageUrl = upJson.data && upJson.data.image_url ? upJson.data.image_url : '';
            
                if (!imageUrl) {
                    throw new Error('上传接口未返回 image_url');
                }
            
                return imageUrl;
            }
            
            // 提交封禁：先上传最多3个文件，再封禁
            document.getElementById('banForm').addEventListener('submit', async function (e) {
                e.preventDefault();
            
                const venueId = document.getElementById('banVenueId').value;
                const duration = document.getElementById('banDuration').value;
                const reason = document.getElementById('banReason').value;
            
                if (!reason.trim()) {
                    alert('请填写封禁描述');
                    return;
                }
            
                const fileInput = document.getElementById('banImage');
                const files = Array.from(fileInput.files || []);
            
                if (files.length > 3) {
                    alert('最多只能上传3个文件');
                    return;
                }
            
                let imageUrls = [];
            
                if (files.length > 0) {
                    try {
                        for (const file of files) {
                            const url = await uploadBanFile(file);
                            imageUrls.push(url);
                        }
                    } catch (err) {
                        alert('文件上传异常：' + err.message);
                        return;
                    }
                }
            
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://open.rcwulian.cn/api/devMgr/devMgtV2.php', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
            
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                if (response.code === 0) {
                                    alert('封禁成功');
                                    document.getElementById('banModal').style.display = 'none';
                                    loadVenues();
                                } else {
                                    alert('封禁失败: ' + response.msg);
                                }
                            } catch (err) {
                                console.error('响应解析失败:', err);
                                alert('服务器响应格式错误');
                            }
                        } else {
                            alert('请求失败，状态码: ' + xhr.status);
                        }
                    }
                };
            
                const data = {
                    ban: true,
                    id: 1,
                    venue_id: venueId,
                    banType: 'venue',
                    ban_duration: parseInt(duration, 10),
                    ban_reason: reason.trim(),
            
                    // 兼容后端单字段
                    image_url: imageUrls[0] || null,
                    image_url_2: imageUrls[1] || null,
                    image_url_3: imageUrls[2] || null,
            
                    // 也传数组，后端以后扩展更方便
                    image_urls: imageUrls
                };
            
                xhr.send(JSON.stringify(data));
            });
        });

            document.getElementById('voiceRoomBanForm').addEventListener('submit', function (e) {
                e.preventDefault();
            
                const venueId = document.getElementById('voiceRoomBanVenueId').value;
                const duration = document.getElementById('voiceRoomBanDuration').value;
                const reason = document.getElementById('voiceRoomBanReason').value.trim();
                const submitBtn = this.querySelector('button[type="submit"]');
            
                if (!reason) {
                    alert('请填写语音房封禁原因');
                    return;
                }
            
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = '封禁中...';
                }
            
                const formData = new FormData();
                formData.append('action', 'set_voice_room_ban');
                formData.append('venue_id', venueId);
                formData.append('ban_duration', duration);
                formData.append('ban_reason', reason);
            
                fetch('https://open.rcwulian.cn/api/venue/VenuesManagement.php', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0 || data.code === 200) {
                        alert(data.msg || '语音房已封禁');
                        document.getElementById('voiceRoomBanModal').style.display = 'none';
                        window.loadVenues ? window.loadVenues() : location.reload();
                    } else {
                        alert(data.msg || '封禁失败');
                    }
                })
                .catch(err => {
                    console.error('语音房封禁失败:', err);
                    alert('请求异常');
                })
                .finally(() => {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '确认封禁语音房';
                    }
                });
            });
            const closeBtn = document.querySelector('.unban-modal-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    document.getElementById('unbanModal').style.display = 'none';
                });
            }

            window.addEventListener('click', function (event) {
                const modal = document.getElementById('unbanModal');
                if (event.target === modal) modal.style.display = 'none';
            });

            document.getElementById('unbanForm').addEventListener('submit', function (e) {
                e.preventDefault();
            
                const venueId = document.getElementById('unbanVenueId').value;
                const reason = document.getElementById('unbanReason').value.trim();
                const submitBtn = this.querySelector('button[type="submit"]');
            
                if (!reason) {
                    alert('请填写解封原因');
                    return;
                }
            
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = '解封中...';
                    submitBtn.style.opacity = '0.7';
                    submitBtn.style.cursor = 'not-allowed';
                }
            
                const formData = new FormData();
                formData.append('action', 'unban_venue');
                formData.append('venue_id', venueId);
                formData.append('unban_reason', reason);
            
                fetch('https://open.rcwulian.cn/api/venue/VenuesManagement.php', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    // 兼容后端返回 code=0 或 code=200
                    if (data.code === 0 || data.code === 200) {
                        document.getElementById('unbanModal').style.display = 'none';
                        alert('解封成功');
            
                        // 稍微延迟一下，避免弹窗状态没来得及更新
                        setTimeout(() => {
                            location.reload();
                        }, 300);
                    } else {
                        alert('解封失败：' + (data.msg || data.message || '未知错误'));
                    }
                })
                .catch(err => {
                    alert('请求异常：' + err);
                })
                .finally(() => {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '确认解封';
                        submitBtn.style.opacity = '1';
                        submitBtn.style.cursor = 'pointer';
                    }
                });
            });
        });
    </script>
